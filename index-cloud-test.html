function handleProPrixSpecialChange(productId, val) {
  if (!adminProsDraft) return;
  if (val === '' || val == null) {
    delete adminProsDraft.prix_speciaux[productId];
  } else {
    const n = parseFloat(String(val).replace(',', '.'));
    if (!isNaN(n) && n >= 0) adminProsDraft.prix_speciaux[productId] = n;
  }
}

function handleProPrixSpecialAdd(productId) {
  if (!adminProsDraft || !productId) return;
  if (adminProsDraft.prix_speciaux[productId] == null) {
    adminProsDraft.prix_speciaux[productId] = 0;
  }
  renderAdminPros();
}

function removeProPrixSpecial(productId) {
  if (!adminProsDraft) return;
  delete adminProsDraft.prix_speciaux[productId];
  renderAdminPros();
}

// v21.0.3 — Panier type ({ product_id, qty }[])
function handleProTemplateField(idx, field, val) {
  if (!adminProsDraft || !adminProsDraft.template_items[idx]) return;
  if (field === 'qty') {
    const n = parseFloat(String(val).replace(',', '.'));
    adminProsDraft.template_items[idx].qty = isNaN(n) ? 0 : n;
  } else {
    adminProsDraft.template_items[idx][field] = val;
  }
}

function addProTemplateItem() {
  if (!adminProsDraft) return;
  adminProsDraft.template_items.push({ product_id: '', qty: 1 });
  renderAdminPros();
}

function removeProTemplateItem(idx) {
  if (!adminProsDraft) return;
  adminProsDraft.template_items.splice(idx, 1);
  renderAdminPros();
}

async function saveProForm() {
  const d = adminProsDraft;
  if (!d) return;
  const nom = (d.nom || '').trim();
  if (!nom) { showToast('Nom obligatoire', 'error'); return; }
  if (!d.boutique_principale) { showToast('Boutique principale obligatoire', 'error'); return; }
  if (d.boutique_secours && d.boutique_secours === d.boutique_principale) {
    showToast('La boutique de secours doit être différente de la principale', 'error'); return;
  }
  setSyncStatus('syncing');
  const isNew = (adminProsEditingId === 'new');
  let proId = isNew ? makeProSlug(nom) : d.id;
  if (!proId) { setSyncStatus('error'); showToast('Impossible de générer un identifiant depuis le nom', 'error'); return; }
  if (isNew && adminPros.some(function(p) { return p.id === proId; })) {
    setSyncStatus('error');
    showToast('Un pro avec cet identifiant existe déjà : ' + proId + '. Change le nom.', 'error');
    return;
  }
  // v21.0.2 — nettoie les contacts vides avant d'envoyer
  const cleanContacts = (d.contacts || []).map(function(c) {
    const obj = {};
    if (c.nom && c.nom.trim())     obj.nom   = c.nom.trim();
    if (c.tel && c.tel.trim())     obj.tel   = c.tel.trim();
    if (c.email && c.email.trim()) obj.email = c.email.trim();
    if (c.role && c.role.trim())   obj.role  = c.role.trim();
    return obj;
  }).filter(function(c) { return Object.keys(c).length > 0; });
  // v21.0.3 — nettoie panier type : retire les lignes sans produit ou qty <= 0
  const cleanTemplate = (d.template_items || []).filter(function(t) {
    return t.product_id && Number(t.qty) > 0;
  }).map(function(t) {
    return { product_id: t.product_id, qty: Number(t.qty) };
  });
  // v21.0.3 — nettoie prix spéciaux : retire les NaN, garde uniquement nombres >= 0
  const cleanPrix = {};
  Object.keys(d.prix_speciaux || {}).forEach(function(pid) {
    const v = Number(d.prix_speciaux[pid]);
    if (!isNaN(v) && v >= 0) cleanPrix[pid] = v;
  });
  // v21.0.3 + v21.0.3.1 — nettoie jours : retire inactifs, persiste butoir_decalage + butoir_heure
  const cleanJours = {};
  Object.keys(d.jours_livraison || {}).forEach(function(j) {
    const cfg = d.jours_livraison[j];
    if (cfg && cfg.actif) {
      cleanJours[j] = {
        actif: true,
        butoir_decalage: (cfg.butoir_decalage != null ? cfg.butoir_decalage : -1),
        butoir_heure: cfg.butoir_heure || null,
        livraison: cfg.livraison || null
      };
    }
  });

  const row = {
    id: proId,
    tenant_id: TENANT_ID,
    nom: nom,
    contacts: cleanContacts,
    sources_par_categorie: d.sources_par_categorie || {},
    jours_livraison:       cleanJours,
    catalogue_restreint:   d.catalogue_restreint, // null = tout autorisé, sinon array
    prix_speciaux:         cleanPrix,
    template_items:        cleanTemplate,
    boutique_principale:   d.boutique_principale,
    boutique_secours:      d.boutique_secours || null,
    notes:                 (d.notes || '').trim() || null,
    actif:                 !!d.actif
  };
  let res;
  if (isNew) {
    res = await supa.from('pros').insert(row).select();
  } else {
    res = await supa.from('pros').update(row).eq('id', proId).select();
  }
  if (res.error) { setSyncStatus('error'); showToast(res.error.message, 'error'); return; }
  if (!res.data || !res.data.length) {
    setSyncStatus('error');
    alert('Sauvegarde bloquée par Supabase (RLS).\nVérifie les policies sur la table pros (FOR ALL TO anon).');
    return;
  }
  setSyncStatus('ok');
  await loadAdminPros();
  closeProForm();
  showToast(isNew ? 'Pro cree' : 'Pro modifie', 'sync');
}

async function togglePro(pid) {
  const p = adminPros.find(function(x) { return x.id === pid; });
  if (!p) return;
  setSyncStatus('syncing');
  const { data, error } = await supa.from('pros').update({ actif: !p.actif }).eq('id', pid).select();
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  if (!data || !data.length) {
    setSyncStatus('error');
    alert('Modification bloquée par Supabase (RLS).');
    return;
  }
  setSyncStatus('ok');
  await loadAdminPros();
  renderAdminPros();
}

async function deletePro(pid) {
  const p = adminPros.find(function(x) { return x.id === pid; });
  if (!p) return;
  if (!confirm('Supprimer DEFINITIVEMENT le pro "' + p.nom + '" ?\n\nATTENTION : toutes ses commandes seront aussi supprimees (cascade).')) return;
  setSyncStatus('syncing');
  const { data, error } = await supa.from('pros').delete().eq('id', pid).select();
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  if (!data || !data.length) {
    setSyncStatus('error');
    alert('Suppression bloquée (RLS Supabase ou contrainte).');
    return;
  }
  setSyncStatus('ok');
  await loadAdminPros();
  renderAdminPros();
  showToast('Pro supprime', 'sync');
}

function renderAdminPros() {
  const mc = document.getElementById('main-content');
  if (adminProsEditingId !== null) { renderProForm(mc); return; }

  // Liste des pros
  const nbActifs = adminPros.filter(function(p) { return p.actif; }).length;
  const nbInactifs = adminPros.filter(function(p) { return !p.actif; }).length;

  let html = '<div class="info-banner"><strong>Clients professionnels</strong><br>Restos, cafes, hotels livres par Le Local (ou autre boutique source). Configure ici nom + contact + boutiques. Les jours de livraison, catalogue restreint et tarifs spéciaux arrivent en v21.0.2.</div>';
  html += '<div style="margin:10px 0"><button class="btn-gold" onclick="openProForm(\'new\')">+ Nouveau pro</button></div>';
  html += '<div class="prod-kpi-bar">'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--green)">' + nbActifs + '</div><div class="prod-kpi-lbl">Actifs</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--brown-mid)">' + nbInactifs + '</div><div class="prod-kpi-lbl">Inactifs</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--gold-dark)">' + adminPros.length + '</div><div class="prod-kpi-lbl">Total</div></div>'
    + '</div>';

  if (!adminPros.length) {
    html += '<div class="empty-state" style="margin-top:20px">Aucun pro pour l\'instant.<br>Clique sur <strong>+ Nouveau pro</strong> pour commencer.</div>';
  } else {
    html += '<div class="pros-list">';
    adminPros.forEach(function(p) {
      const bp = BOUTIQUE_NAMES[p.boutique_principale] || p.boutique_principale;
      const bs = p.boutique_secours ? (BOUTIQUE_NAMES[p.boutique_secours] || p.boutique_secours) : null;
      // v21.0.2 — 1er contact pour l'aperçu + indicateur "+N" si plusieurs
      const contacts = Array.isArray(p.contacts) ? p.contacts : [];
      const firstContact = contacts[0] || {};
      const contactBits = [];
      if (firstContact.nom) contactBits.push(escapeHtml(firstContact.nom));
      if (firstContact.tel) contactBits.push(escapeHtml(firstContact.tel));
      const moreSuffix = contacts.length > 1 ? ' <span style="color:var(--gold-dark);font-weight:700">+' + (contacts.length - 1) + '</span>' : '';
      const contactLine = contactBits.length ? (contactBits.join(' · ') + moreSuffix) : '<span style="color:#BBB">Pas de contact renseigné</span>';
      html += '<div class="pro-card' + (p.actif ? '' : ' inactive') + '">'
        + '<div class="pro-card-main">'
          + '<div class="pro-card-name">' + escapeHtml(p.nom) + ' <span class="pro-card-id">(' + escapeHtml(p.id) + ')</span></div>'
          + '<div class="pro-card-contact">' + contactLine + '</div>'
          + '<div class="pro-card-shops"><strong>' + escapeHtml(bp) + '</strong>'
            + (bs ? ' &middot; secours : ' + escapeHtml(bs) : '')
            + '</div>'
        + '</div>'
        + '<div class="pro-card-actions">'
          + '<button class="toggle-btn ' + (p.actif ? 'active' : '') + '" onclick="togglePro(\'' + p.id + '\')">' + (p.actif ? 'ON' : 'OFF') + '</button>'
          + '<button class="pro-card-btn" onclick="openProForm(\'' + p.id + '\')" title="Editer">✏️</button>'
          + '<button class="pro-card-btn pro-card-btn-del" onclick="deletePro(\'' + p.id + '\')" title="Supprimer">🗑️</button>'
        + '</div>'
      + '</div>';
    });
    html += '</div>';
  }
  mc.innerHTML = html;
}

function renderProForm(mc) {
  const d = adminProsDraft;
  const isNew = (adminProsEditingId === 'new');
  const slugPreview = isNew ? makeProSlug(d.nom) : d.id;
  // v21.0.2 — St-Av peut être source (principale en propre ou secours click & collect)
  const boutiqueOpts = [
    ['veigne',        BOUTIQUE_NAMES['veigne']],
    ['tours',         BOUTIQUE_NAMES['tours']],
    ['local',         BOUTIQUE_NAMES['local']],
    ['saint-avertin', BOUTIQUE_NAMES['saint-avertin']]
  ];
  function selOpts(current, includeAucune) {
    let h = '';
    if (includeAucune) h += '<option value=""' + (current ? '' : ' selected') + '>— Aucune</option>';
    boutiqueOpts.forEach(function(o) {
      h += '<option value="' + o[0] + '"' + (current === o[0] ? ' selected' : '') + '>' + escapeHtml(o[1]) + '</option>';
    });
    return h;
  }

  let html = '<div class="pro-form-header">'
    + '<button class="modal-action cancel" onclick="closeProForm()">← Retour</button>'
    + '<div class="pro-form-title">' + (isNew ? 'Nouveau pro' : escapeHtml(d.nom || d.id)) + '</div>'
    + '<button class="btn-gold" onclick="saveProForm()">' + (isNew ? 'Créer' : 'Enregistrer') + '</button>'
  + '</div>';

  html += '<div class="pro-form">';

  html += '<div class="pro-form-section">'
    + '<h3>Identité</h3>'
    + '<label>Nom du pro *</label>'
    + '<input type="text" class="pro-input" value="' + escapeHtml(d.nom) + '" placeholder="Café des Arts" oninput="handleProField(\'nom\', this.value); var sp = document.getElementById(\'slug-preview\'); if (sp) sp.textContent = makeProSlug(this.value);">'
    + (isNew
      ? '<div class="pro-form-hint">Identifiant généré : <code id="slug-preview">' + escapeHtml(slugPreview) + '</code></div>'
      : '<div class="pro-form-hint">Identifiant : <code>' + escapeHtml(d.id) + '</code> (non modifiable après création)</div>')
  + '</div>';

  // v21.0.2 — Multi-contacts (équipe du pro)
  html += '<div class="pro-form-section">'
    + '<h3>Contacts (équipe)</h3>'
    + '<div class="pro-form-hint" style="margin-bottom:10px">Ajoute autant de contacts que nécessaire : gérant, comptable, cuisine, etc. Au moins un est recommandé.</div>';
  d.contacts.forEach(function(c, idx) {
    html += '<div class="pro-contact-block">'
      + '<div class="pro-contact-header">'
        + '<span>Contact ' + (idx + 1) + '</span>'
        + '<button class="pro-card-btn pro-card-btn-del" onclick="removeProContact(' + idx + ')" title="Retirer ce contact">🗑️</button>'
      + '</div>'
      + '<label>Rôle</label>'
      + '<input type="text" class="pro-input" value="' + escapeHtml(c.role || '') + '" placeholder="principal, manager, comptable, cuisine…" oninput="handleProContactField(' + idx + ', \'role\', this.value)">'
      + '<label>Nom</label>'
      + '<input type="text" class="pro-input" value="' + escapeHtml(c.nom || '') + '" placeholder="Jean Dupont" oninput="handleProContactField(' + idx + ', \'nom\', this.value)">'
      + '<label>Téléphone</label>'
      + '<input type="tel" class="pro-input" value="' + escapeHtml(c.tel || '') + '" placeholder="06 12 34 56 78" oninput="handleProContactField(' + idx + ', \'tel\', this.value)">'
      + '<label>Email</label>'
      + '<input type="email" class="pro-input" value="' + escapeHtml(c.email || '') + '" placeholder="jean@cafe-arts.fr" oninput="handleProContactField(' + idx + ', \'email\', this.value)">'
    + '</div>';
  });
  html += '<button class="pro-add-btn" onclick="addProContact()">+ Ajouter un contact</button>';
  html += '</div>';

  html += '<div class="pro-form-section">'
    + '<h3>Boutique source</h3>'
    + '<label>Boutique principale *</label>'
    + '<select class="pro-input" onchange="handleProField(\'boutique_principale\', this.value)">' + selOpts(d.boutique_principale, false) + '</select>'
    + '<label>Boutique de secours (si principale fermée)</label>'
    + '<select class="pro-input" onchange="handleProField(\'boutique_secours\', this.value)">' + selOpts(d.boutique_secours, true) + '</select>'
    + '<div class="pro-form-hint">St-Avertin en secours = click & collect (le pro vient chercher).</div>'
  + '</div>';

  // v21.0.2 — Sources par catégorie (ex: pain au Local + pâtisserie à Veigné)
  html += '<div class="pro-form-section">'
    + '<h3>Sources par catégorie</h3>'
    + '<div class="pro-form-hint" style="margin-bottom:10px">Par défaut, tout vient de la boutique principale. Précise ici les exceptions (ex : pain au Local mais pâtisserie à Veigné).</div>';
  Object.keys(CAT_LABELS).forEach(function(cat) {
    const currentSource = d.sources_par_categorie[cat] || '';
    const principaleLabel = BOUTIQUE_NAMES[d.boutique_principale] || d.boutique_principale;
    let optsHtml = '<option value="">(= principale : ' + escapeHtml(principaleLabel) + ')</option>';
    boutiqueOpts.forEach(function(o) {
      optsHtml += '<option value="' + o[0] + '"' + (currentSource === o[0] ? ' selected' : '') + '>' + escapeHtml(o[1]) + '</option>';
    });
    html += '<div class="pro-cat-source-row">'
      + '<label class="pro-cat-source-lbl">' + escapeHtml(CAT_LABELS[cat]) + '</label>'
      + '<select class="pro-input pro-cat-source-sel" onchange="handleProSourceCategorie(\'' + cat + '\', this.value)">' + optsHtml + '</select>'
    + '</div>';
  });
  html += '</div>';

  html += '<div class="pro-form-section">'
    + '<h3>Notes</h3>'
    + '<textarea class="pro-input" rows="3" placeholder="Infos libres : horaires, préférences, contraintes…" oninput="handleProField(\'notes\', this.value)">' + escapeHtml(d.notes) + '</textarea>'
  + '</div>';

  html += '<div class="pro-form-section">'
    + '<h3>Statut</h3>'
    + '<div style="display:flex;align-items:center;gap:12px">'
      + '<button class="toggle-btn ' + (d.actif ? 'active' : '') + '" onclick="handleProActifToggle()">' + (d.actif ? 'ACTIF' : 'INACTIF') + '</button>'
      + '<span style="font-size:12px;color:var(--brown-mid)">Un pro inactif disparait des onglets de saisie mais son historique reste.</span>'
    + '</div>'
  + '</div>';

  // v21.0.3 — Jours de livraison (7 jours, chaque jour = toggle + butoir + livraison)
  html += '<div class="pro-form-section">'
    + '<h3>Jours de livraison</h3>'
    + '<div class="pro-form-hint" style="margin-bottom:10px">Coche les jours où le pro est livré. Butoir = jusqu\'à quand il peut passer commande. Livraison = heure cible.</div>';
  PRO_JOURS.forEach(function(jp) {
    const jourId = jp[0];
    const jourLbl = jp[1];
    const cfg = d.jours_livraison[jourId] || {};
    const isActif = !!cfg.actif;
    const curDec = (cfg.butoir_decalage != null ? cfg.butoir_decalage : -1);
    let decOpts = '';
    PRO_BUTOIR_DECALAGES.forEach(function(opt) {
      decOpts += '<option value="' + opt[0] + '"' + (curDec === opt[0] ? ' selected' : '') + '>' + escapeHtml(opt[1]) + '</option>';
    });
    html += '<div class="pro-jour-row' + (isActif ? ' actif' : '') + '">'
      + '<button class="toggle-btn ' + (isActif ? 'active' : '') + '" onclick="handleProJourActif(\'' + jourId + '\')">' + jourLbl + '</button>'
      + (isActif
        ? '<div class="pro-jour-fields">'
          + '<label>Butoir</label>'
          + '<select class="pro-input pro-input-decalage" onchange="handleProJourField(\'' + jourId + '\', \'butoir_decalage\', this.value)">' + decOpts + '</select>'
          + '<input type="time" class="pro-input pro-input-time" value="' + escapeHtml(cfg.butoir_heure || '') + '" oninput="handleProJourField(\'' + jourId + '\', \'butoir_heure\', this.value)">'
          + '<label>Livraison</label>'
          + '<input type="time" class="pro-input pro-input-time" value="' + escapeHtml(cfg.livraison || '') + '" oninput="handleProJourField(\'' + jourId + '\', \'livraison\', this.value)">'
        + '</div>'
        : '<div class="pro-jour-fields-off">—</div>')
    + '</div>';
  });
  html += '</div>';

  // v21.0.3 — Catalogue restreint (par catégorie, vide = tout autorisé)
  const allActiveProds = (adminProducts || []).filter(function(p) { return p.actif; });
  const allowedSet = (d.catalogue_restreint === null)
    ? null  // null = tout autorisé
    : new Set(d.catalogue_restreint);
  const searchLc = (adminProsCatalogueSearch || '').toLowerCase().trim();
  html += '<div class="pro-form-section">'
    + '<h3>Catalogue restreint</h3>'
    + '<div class="pro-form-hint" style="margin-bottom:10px">'
      + (allowedSet === null
          ? '<strong style="color:var(--green)">Tout le catalogue actif est autorisé.</strong> Décoche des produits pour passer en mode restriction.'
          : '<strong style="color:var(--orange)">' + allowedSet.size + ' produits autorisés</strong> sur ' + allActiveProds.length + ' actifs. '
            + '<button onclick="handleProCatalogueReset()" style="background:none;border:none;color:var(--gold-dark);text-decoration:underline;cursor:pointer;font-family:inherit;font-size:11px;padding:0">Tout autoriser</button>')
    + '</div>'
    + '<input type="search" class="pro-input" placeholder="🔍 Filtrer un produit…" value="' + escapeHtml(adminProsCatalogueSearch) + '" oninput="handleProCatalogueSearch(this.value)" style="margin-bottom:10px">';

  // Group active products by category for display
  const prodsByCat = {};
  allActiveProds.forEach(function(p) {
    const cat = p.category || '_autres';
    if (!prodsByCat[cat]) prodsByCat[cat] = [];
    prodsByCat[cat].push(p);
  });
  const catOrder = Object.keys(CAT_LABELS).filter(function(c) { return prodsByCat[c]; });
  Object.keys(prodsByCat).forEach(function(c) { if (catOrder.indexOf(c) === -1) catOrder.push(c); });
  catOrder.forEach(function(cat) {
    const prods = prodsByCat[cat];
    const visible = prods.filter(function(p) {
      return !searchLc || (p.name || '').toLowerCase().indexOf(searchLc) !== -1;
    });
    if (!visible.length) return;
    const catLbl = CAT_LABELS[cat] || cat;
    // v21.0.3.1 — état Tout/Rien de la catégorie (sur les produits visibles ou tous)
    const catIdsAll = prods.map(function(p) { return p.id; });
    const allInCatAllowed = (allowedSet === null) ? true : catIdsAll.every(function(id) { return allowedSet.has(id); });
    const noneInCatAllowed = (allowedSet === null) ? false : catIdsAll.every(function(id) { return !allowedSet.has(id); });
    const toggleLbl = allInCatAllowed ? 'Tout décocher' : (noneInCatAllowed ? 'Tout cocher' : 'Tout cocher');
    html += '<div class="pro-cat-prods">'
      + '<div class="pro-cat-prods-title">'
        + '<span>' + escapeHtml(catLbl) + ' <span style="color:var(--brown-mid);font-weight:400">(' + visible.length + ')</span></span>'
        + '<button class="pro-cat-toggle-all" onclick="handleProCatalogueCategoryToggle(\'' + cat + '\')">' + toggleLbl + '</button>'
      + '</div>'
      + '<div class="pro-cat-prods-list">';
    visible.forEach(function(p) {
      const allowed = (allowedSet === null) || allowedSet.has(p.id);
      html += '<label class="pro-prod-checkbox' + (allowed ? ' checked' : '') + '">'
        + '<input type="checkbox"' + (allowed ? ' checked' : '') + ' onchange="handleProCatalogueToggle(\'' + p.id + '\')">'
        + '<span>' + escapeHtml(p.name) + '</span>'
      + '</label>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  // v21.0.3 — Prix spéciaux
  const prixKeys = Object.keys(d.prix_speciaux || {});
  html += '<div class="pro-form-section">'
    + '<h3>Prix spéciaux</h3>'
    + '<div class="pro-form-hint" style="margin-bottom:10px">Override le prix de cession standard du produit pour ce pro. Vide = prix standard.</div>';
  if (!prixKeys.length) {
    html += '<div class="pro-form-hint" style="font-style:italic;margin-bottom:8px">Aucun prix spécial. Tous les produits utilisent leur prix de cession standard.</div>';
  } else {
    prixKeys.forEach(function(pid) {
      const prod = (adminProducts || []).find(function(x) { return x.id === pid; });
      const prodName = prod ? prod.name : pid;
      const prixStd = prod && prod.prix_cession != null ? prod.prix_cession.toFixed(2) + '€' : '—';
      html += '<div class="pro-prix-row">'
        + '<div class="pro-prix-info">'
          + '<div class="pro-prix-name">' + escapeHtml(prodName) + '</div>'
          + '<div class="pro-prix-std">Prix standard : ' + escapeHtml(prixStd) + '</div>'

// === VALORISATION DES FLUX ===
let currentValoWeek = null; // lundi de la semaine sélectionnée (ISO YYYY-MM-DD)
let valoData = {}; // { boutique_id: { product_id: { qty, p_name, p_cat } } }

function getMondayOf(dateStr) {
const d = new Date(dateStr + 'T12:00');
const dow = d.getDay(); // 0=dim, 1=lun
const shift = dow === 0 ? -6 : (1 - dow);
d.setDate(d.getDate() + shift);
return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function changeValoWeek(delta) {
const d = new Date(currentValoWeek + 'T12:00');
d.setDate(d.getDate() + delta * 7);
currentValoWeek = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
(async function() {
await loadValorisation();
renderValorisation();
})();
}

async function loadValorisation() {
if (!currentValoWeek) currentValoWeek = getMondayOf(todayISO());
const start = currentValoWeek;
const d = new Date(start + 'T12:00');
d.setDate(d.getDate() + 6);
const end = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
// Charger tous les reappros de la semaine
const { data, error } = await supa.from('reappros').select('*')
.eq('tenant_id', TENANT_ID).gte('service_date', start).lte('service_date', end);
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
// Charger aussi produits si pas déjà dispo
if (!adminProducts.length) await loadAdminProducts();
const prodMap = {};
adminProducts.forEach(function(p) { prodMap[p.id] = p; });
valoData = {};
(data || []).forEach(function(r) {
if (r.qty == null) return;
if (!valoData[r.boutique_id]) valoData[r.boutique_id] = {};
if (!valoData[r.boutique_id][r.product_id]) {
const p = prodMap[r.product_id];
valoData[r.boutique_id][r.product_id] = {
qty: 0,
name: p ? p.name : r.product_id,
cat: p ? (p.category || 'autre') : 'autre',
prix: p ? p.prix_cession : null
};
}
valoData[r.boutique_id][r.product_id].qty += Number(r.qty);
});
}

function renderValorisation() {
const mc = document.getElementById('main-content');
const start = currentValoWeek;
const d = new Date(start + 'T12:00');
d.setDate(d.getDate() + 6);
const endISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

// Boutiques concernees (ont des reappros)
const boutiques = Object.keys(valoData).sort();

// Totaux par boutique + grand total
const totalParBoutique = {};
const totalParBoutiqueNonValorise = {};
let grandTotal = 0;
let grandTotalLignes = 0;
let grandTotalNonValorise = 0;

boutiques.forEach(function(b) {
let tot = 0, totNV = 0, nbLignes = 0;
Object.keys(valoData[b]).forEach(function(pid) {
const e = valoData[b][pid];
if (e.prix != null && e.prix > 0) {
tot += e.qty * Number(e.prix);
} else {
totNV += e.qty;
}
nbLignes++;
});
totalParBoutique[b] = tot;
totalParBoutiqueNonValorise[b] = totNV;
grandTotal += tot;
grandTotalNonValorise += totNV;
grandTotalLignes += nbLignes;
});

let html = '<div class="date-bar">'

+ '<button class="date-nav" onclick="changeValoWeek(-1)">←</button>'
+ '<div class="date-title">Semaine du <strong>' + escapeHtml(formatDateFr(start)) + '</strong> au <strong>' + escapeHtml(formatDateFr(endISO)) + '</strong>'
+ '<div class="date-sub">Valorisation des flux Local vers Boutiques</div>'
+ '</div>'
+ '<button class="date-nav" onclick="changeValoWeek(1)">→</button>'
+ '</div>';

html += '<div style="margin:10px 0"><button class="btn-gold" onclick="exportBackOfficeToXlsx()">📊 Export Excel (BackOffice complet)</button></div>';

html += '<div class="prod-kpi-bar">'

+ '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--green)">' + grandTotal.toFixed(2).replace('.', ',') + ' EUR</div><div class="prod-kpi-lbl">Total valorise</div></div>'
+ '<div class="prod-kpi"><div class="prod-kpi-val">' + grandTotalLignes + '</div><div class="prod-kpi-lbl">Produits livres</div></div>'
+ '<div class="prod-kpi"><div class="prod-kpi-val" style="color:' + (grandTotalNonValorise > 0 ? 'var(--red)' : 'var(--brown-mid)') + '">' + formatQty(grandTotalNonValorise) + '</div><div class="prod-kpi-lbl">Qty sans prix</div></div>'
+ '</div>';

if (!boutiques.length) {
html += '<div class="prod-empty">Aucune livraison enregistree cette semaine.</div>';
mc.innerHTML = html;
return;
}

if (grandTotalNonValorise > 0) {
html += '<div class="info-banner" style="background:#FEF2F2;border-left:3px solid var(--red)">'

+ '<strong>Produits sans prix</strong><br>Certains produits livres n ont pas de prix de cession renseigne. Va dans l onglet Produits pour les renseigner.</div>';
  }

// Tableau par boutique
boutiques.forEach(function(b) {
const rows = Object.keys(valoData[b]).map(function(pid) {
return Object.assign({ pid: pid }, valoData[b][pid]);
});
rows.sort(function(a, c) {
const ao = Object.keys(CAT_LABELS).indexOf(a.cat);
const co = Object.keys(CAT_LABELS).indexOf(c.cat);
if (ao !== co) return (ao === -1 ? 999 : ao) - (co === -1 ? 999 : co);
return a.name.localeCompare(c.name);
});

html += '<div class="valo-boutique-card">'

+ '<div class="valo-boutique-head">'

let stockData = {
// par product_id : { last_real_qty, last_real_at, receipts_since, outputs_since, theoretical, seuil }
};
let stockReceiptModalOpen = false;
let stockReceiptDraft = { product_id: '', qty: '', supplier: '', note: '' };

async function loadStockData() {
// 1. Dernier inventaire de chaque produit
const { data: invRows } = await supa.from('stock_inventory').select('*').eq('tenant_id', TENANT_ID).order('inventoried_at', { ascending: false });
// 2. Receptions fournisseur (toutes)
const { data: recRows } = await supa.from('stock_receipts').select('*').eq('tenant_id', TENANT_ID);
// 3. Réappros envoyés aux boutiques (qty_livree si défini, sinon commander) - sert au calcul sorties
const { data: reapRows } = await supa.from('reappros').select('*').eq('tenant_id', TENANT_ID);

// Grouper par produit
const byProd = {};
(invRows || []).forEach(function(r) {
if (!byProd[r.product_id]) byProd[r.product_id] = { last_real: null };
if (!byProd[r.product_id].last_real) byProd[r.product_id].last_real = r; // le + recent
});
(recRows || []).forEach(function(r) {
if (!byProd[r.product_id]) byProd[r.product_id] = { last_real: null };
byProd[r.product_id].receipts = byProd[r.product_id].receipts || [];
byProd[r.product_id].receipts.push(r);
});
(reapRows || []).forEach(function(r) {
if (!byProd[r.product_id]) byProd[r.product_id] = { last_real: null };
byProd[r.product_id].reappros = byProd[r.product_id].reappros || [];
byProd[r.product_id].reappros.push(r);
});

stockData = {};
products.forEach(function(p) {
// Ne suivre stock QUE viennoiserie + brioches (Phil a confirme)
if (p.category !== 'viennoiserie' && p.category !== 'brioches_special') return;
const entry = byProd[p.id] || {};
const baseReal = entry.last_real ? parseQty(entry.last_real.qty_real) : 0;
const baseDate = entry.last_real ? entry.last_real.inventoried_at : null;
// Receptions depuis baseDate
let recSince = 0;
(entry.receipts || []).forEach(function(r) {
if (!baseDate || r.received_at > baseDate) recSince += parseQty(r.qty);
});
// Sorties reappros depuis baseDate (prend qty_livree si défini, sinon commander)
let outSince = 0;
(entry.reappros || []).forEach(function(r) {
if (!baseDate || (r.updated_at && r.updated_at > baseDate)) {
if (r.qty_livree != null) outSince += parseQty(r.qty_livree);
else if (r.commander != null) outSince += parseQty(r.commander);
}
});
const theo = baseReal + recSince - outSince;
stockData[p.id] = {
product: p,
last_real: baseReal,
last_real_at: baseDate,
receipts_since: recSince,
outputs_since: outSince,
theoretical: Math.max(0, theo),
seuil: p.seuil_stock != null ? parseQty(p.seuil_stock) : null
};
});
}

function renderStock() {
const mc = document.getElementById('main-content');
let html = renderProductFilter();
html += '<div class="info-banner"><strong>Stock Tourier</strong> (viennoiserie + brioches surgelées)<br>Théorique = auto (dernier réel + réceptions - sorties). Réel = inventaire physique. Décompte auto lors de la validation livreur. Seuil en BackOffice > Produits.</div>';

html += '<div class="stock-actions-bar">'

+ '<button class="btn-gold" onclick="openStockReceiptModal()">+ Réception fournisseur</button>'
+ '</div>';

const entries = Object.keys(stockData).map(function(pid) { return stockData[pid]; });
if (!entries.length) {
html += '<div class="empty-state">Aucun produit suivi en stock.<br>Seules les viennoiseries et brioches sont suivies.</div>';
mc.innerHTML = html;
return;
}

// Grouper par catégorie
const byCat = { 'viennoiserie': [], 'brioches_special': [] };
entries.forEach(function(e) { byCat[e.product.category].push(e); });

html += '<div class="section reappro-section">';
html += '<div class="col-header stock-col-header">'

+ '<span class="col-lbl">Produit</span>'
+ '<span class="col-lbl">Théo.</span>'
+ '<span class="col-lbl cmd">Réel</span>'
+ '<span class="col-lbl">Écart</span>'
+ '<span class="col-lbl">Seuil</span>'
+ '</div>';

['viennoiserie', 'brioches_special'].forEach(function(cat) {
if (!byCat[cat] || !byCat[cat].length) return;
html += '<div class="prod-cat-title">' + (CAT_LABELS[cat] || cat) + ' <span style="font-size:11px;color:#999;font-weight:500">(' + byCat[cat].length + ')</span></div>';
byCat[cat].sort(function(a, b) { return a.product.name.localeCompare(b.product.name); });
byCat[cat].forEach(function(e) {
const theo = e.theoretical;
const real = e.last_real;
const ecart = real - theo;
const seuil = e.seuil;
// Alerte
let alertCls = '';
if (seuil != null && seuil > 0) {
const ratio = real / seuil;
if (ratio < 0.3) alertCls = 'stock-red';
else if (ratio < 0.5) alertCls = 'stock-orange';
else alertCls = 'stock-green';
}
let ecartCls = '';
if (Math.abs(ecart) > Math.max(theo * 0.1, 1)) ecartCls = 'stock-red';
html += '<div class="produit-row stock-row ' + alertCls + '">';
html += '<div><div class="produit-name">' + escapeHtml(e.product.name) + '</div></div>';
html += '<div class="stock-cell">' + theo + '</div>';
html += '<div class="stock-cell"><input type="text" inputmode="decimal" class="qty-input stock-real-inp" data-pid="' + e.product.id + '" placeholder="' + real + '" onchange="saveStockReal(this)"></div>';
html += '<div class="stock-cell ' + ecartCls + '">' + (ecart > 0 ? '+' : '') + ecart + '</div>';
html += '<div class="stock-cell">' + (seuil != null ? seuil : '<span style="color:#bbb">-</span>') + '</div>';
html += '</div>';
});
});

html += '</div>';
mc.innerHTML = html;
applyProductFilter();

if (stockReceiptModalOpen) renderStockReceiptModal();
}

async function loadPrevis(boutique, date) {

async function loadPrevisRaw(boutique, date) {
const { data, error } = await supa.from('previs').select('*')
.eq('tenant_id', TENANT_ID).eq('boutique_id', boutique).eq('service_date', date);
if (error) return {};
const out = {};
(data || []).forEach(function(r) {
out[r.product_id] = r.qty == null ? 0 : parseQty(r.qty);
});
return out;
}

async function upsertPrevis(pid, boutique, date, raw) {
setSyncStatus('syncing');
const qty = raw === '' || raw == null ? null : parseQty(raw);
const { error } = await supa.from('previs').upsert({
tenant_id: TENANT_ID, boutique_id: boutique, product_id: pid,
service_date: date, qty: qty,
updated_by: DEVICE_ID, updated_at: new Date().toISOString()
}, { onConflict: 'tenant_id,boutique_id,product_id,service_date' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
}

function subscribeRealtimePrevis() {
if (realtimeChannelPrevis) supa.removeChannel(realtimeChannelPrevis);
realtimeChannelPrevis = supa.channel('previs_rt')
.on('postgres_changes', { event: '*', schema: 'public', table: 'previs' }, async function(payload) {
const r = payload.new;
if (!r || r.updated_by === DEVICE_ID) return;
if (r.service_date !== currentPrevisDate) return;
if (r.boutique_id === currentBoutique) {
previsData[r.product_id] = r.qty == null ? '' : String(r.qty).replace('.', ',');
if (currentVue === 'previs') renderPrevis();
}
if (currentVue === 'traiteur' && (currentBoutique === 'veigne' || currentBoutique === 'tours')) {
// Pour le traiteur consolide, recharger les prévis utiles
if (currentBoutique === 'veigne' && (r.boutique_id === 'veigne' || r.boutique_id === 'saint-avertin')) {
await reloadTraiteurData();
renderTraiteur();
} else if (currentBoutique === 'tours' && r.boutique_id === 'tours') {
await reloadTraiteurData();
renderTraiteur();
}
}
if (currentVue === 'previs_traiteur' && currentBoutique === 'saint-avertin' && r.boutique_id === 'saint-avertin') {
previsTraiteurDataSA[r.product_id] = r.qty == null ? '' : String(r.qty).replace('.', ',');
renderPrevisTraiteurSA();
}
}).subscribe();
}

async function reloadTraiteurData() {
if (currentBoutique === 'veigne') {
const [vData, saData] = await Promise.all([
loadPrevisRaw('veigne', currentPrevisDate),
loadPrevisRaw('saint-avertin', currentPrevisDate)
]);
previsTraiteurDataV = {};
previsTraiteurDataSA = {};
Object.keys(vData).forEach(function(pid) { previsTraiteurDataV[pid] = String(vData[pid]).replace('.', ','); });
Object.keys(saData).forEach(function(pid) { previsTraiteurDataSA[pid] = String(saData[pid]).replace('.', ','); });
} else if (currentBoutique === 'tours') {
const tData = await loadPrevisRaw('tours', currentPrevisDate);
previsTraiteurDataV = {};
Object.keys(tData).forEach(function(pid) { previsTraiteurDataV[pid] = String(tData[pid]).replace('.', ','); });
}
}

function getProductionShopForProduct(productId, originShop) {
// Determine qui produit la commande pour ce produit
const p = products.find(function(x) { return x.id === productId; });
if (!p) return originShop; // fallback
const supply = getProductSupply(p, originShop);
if (!supply || supply === 'on_site') return originShop;
if (supply === 'local') return 'local';
if (supply === 'veigne') return 'veigne';
return originShop;
}

function computeOrderProductionShop(draft) {
// Selon les items de la commande, deduit un production_shop majoritaire.
// Si plusieurs productions dans une même commande (cas rare), on prend la plus frequente.
const counts = {};
(draft.items || []).forEach(function(it) {
if (!it.product_id) return;
const ps = getProductionShopForProduct(it.product_id, draft.origin_shop);
counts[ps] = (counts[ps] || 0) + 1;
});
const keys = Object.keys(counts);
if (!keys.length) return draft.origin_shop;
keys.sort(function(a, b) { return counts[b] - counts[a]; });
return keys[0];
}

async function loadSpecialOrders(b, weekStart) {
const endD = new Date(weekStart + 'T12:00');
endD.setDate(endD.getDate() + 6);
const weekEnd = endD.getFullYear() + '-' + String(endD.getMonth()+1).padStart(2,'0') + '-' + String(endD.getDate()).padStart(2,'0');
let q = supa.from('special_orders').select('*').eq('tenant_id', TENANT_ID);
if (b !== 'local') {
q = q.or('origin_shop.eq.' + b + ',production_shop.eq.' + b);
} else {
q = q.eq('production_shop', 'local');
}
q = q.gte('pickup_date', weekStart).lte('pickup_date', weekEnd).order('pickup_date').order('pickup_time', { nullsFirst: true });
const { data: ordersData, error } = await q;
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
const orderIds = (ordersData || []).map(function(o) { return o.id; });
let itemsData = [];
if (orderIds.length) {
const { data: its, error: e2 } = await supa.from('special_order_items').select('*').in('order_id', orderIds).order('position');
if (!e2) itemsData = its || [];
}
specialOrdersData = (ordersData || []).map(function(o) {
o.items = itemsData.filter(function(i) { return i.order_id === o.id; });
return o;
});
}

async function upsertSpecialOrder() {
const d = specialFormDraft;
if (!d) return;
if (!d.customer_name || !d.customer_name.trim()) { showToast('Nom client obligatoire', 'error'); return; }
if (!d.pickup_date) { showToast('Date de retrait obligatoire', 'error'); return; }
const cleanItems = (d.items || []).filter(function(it) {
return (it.product_id || (it.product_name_custom && it.product_name_custom.trim()));
});
if (!cleanItems.length) { showToast('Au moins 1 produit', 'error'); return; }

setSyncStatus('syncing');
const productionShop = computeOrderProductionShop({ origin_shop: d.origin_shop, items: cleanItems });
const nowISO = new Date().toISOString();
const orderRow = {
tenant_id: TENANT_ID,
origin_shop: d.origin_shop,
production_shop: productionShop,
customer_name: d.customer_name.trim(),
customer_phone: d.customer_phone ? d.customer_phone.trim() : null,
pickup_date: d.pickup_date,
pickup_time: d.pickup_time || null,
status: d.status || 'brouillon',
notes: d.notes ? d.notes.trim() : null,
updated_at: nowISO
};

let orderId = d.id;
if (orderId) {
const { error } = await supa.from('special_orders').update(orderRow).eq('id', orderId);
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
await supa.from('special_order_items').delete().eq('order_id', orderId);
} else {
orderRow.created_by = DEVICE_ID;
orderRow.created_at = nowISO;
const { data, error } = await supa.from('special_orders').insert(orderRow).select('id').single();
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
orderId = data.id;
}

const itemRows = cleanItems.map(function(it, idx) {
return {
order_id: orderId,
product_id: it.product_id || null,
product_name_custom: it.product_name_custom ? it.product_name_custom.trim() : null,
qty: parseQty(it.qty) || 1,
unit_price: it.unit_price ? parseQty(it.unit_price) : null,
notes: it.notes ? it.notes.trim() : null,
position: idx
};
});
if (itemRows.length) {
const { error } = await supa.from('special_order_items').insert(itemRows);
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
}

setSyncStatus('ok');
specialFormMode = null;
specialFormDraft = null;
selectedSpecialDay = d.pickup_date;
if (d.pickup_date < currentSpecialWeekStart || d.pickup_date > addDaysISO(currentSpecialWeekStart, 6)) {
currentSpecialWeekStart = getMondayOf(d.pickup_date);
}
await loadSpecialOrders(currentBoutique, currentSpecialWeekStart);
renderSpecials();
showToast('Commande enregistree', 'sync');
}

function addDaysISO(iso, n) {
const d = new Date(iso + 'T12:00');
d.setDate(d.getDate() + n);
return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

selectedSpecialDay = currentSpecialWeekStart;

renderSpecials();
}

// === MESSAGERIE LIVREUR ===
async function loadMessages() {
let q = supa.from('livreur_messages').select('*').eq('tenant_id', TENANT_ID);
// Le livreur voit tout. Un expediteur (local/veigne) ne voit que ses messages envoyés.
if (currentBoutique !== 'livreur') {
q = q.eq('sender_boutique', currentBoutique);
}
const { data, error } = await q.order('created_at', { ascending: false }).limit(80);
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
messagesData = data || [];
}

async function sendMessage() {
const content = (messageDraft.content || '').trim();
if (!content) { showToast('Message vide', 'error'); return; }
setSyncStatus('syncing');
const payload = {
tenant_id: TENANT_ID,
sender_boutique: currentBoutique,
sender_device: DEVICE_ID,
content: content,
urgent: !!messageDraft.urgent,
stop_boutique: messageDraft.stop_boutique || null
};
const { error } = await supa.from('livreur_messages').insert(payload);
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
messageDraft = { content: '', urgent: false, stop_boutique: '' };
await loadMessages();
renderMessages();
showToast('Message envoyé', 'sync');
}

async function markMessageRead(id) {
const msg = messagesData.find(function(m) { return m.id === id; });
if (!msg || msg.read_at) return;
const nowISO = new Date().toISOString();
const { error } = await supa.from('livreur_messages').update({ read_at: nowISO }).eq('id', id);
if (!error) msg.read_at = nowISO;
}

async function markAllMessagesRead() {
const unread = messagesData.filter(function(m) { return !m.read_at; });
if (!unread.length) return;
const nowISO = new Date().toISOString();
const ids = unread.map(function(m) { return m.id; });
await supa.from('livreur_messages').update({ read_at: nowISO }).in('id', ids);
unread.forEach(function(m) { m.read_at = nowISO; });
renderMessages();
}

async function toggleMessageDone(id, currentVal) {
setSyncStatus('syncing');
const newVal = !currentVal;
const { error } = await supa.from('livreur_messages').update({ done: newVal }).eq('id', id);
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
const msg = messagesData.find(function(m) { return m.id === id; });
if (msg) msg.done = newVal;
renderMessages();
}

async function deleteMessage(id) {
if (!confirm('Supprimer ce message ?')) return;
setSyncStatus('syncing');
const { error } = await supa.from('livreur_messages').delete().eq('id', id);
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
messagesData = messagesData.filter(function(m) { return m.id !== id; });
renderMessages();
showToast('Supprime', 'sync');
}

function subscribeRealtimeMessages() {
if (realtimeChannelMessages) supa.removeChannel(realtimeChannelMessages);
realtimeChannelMessages = supa.channel('messages_' + currentBoutique)
.on('postgres_changes', { event: '*', schema: 'public', table: 'livreur_messages' },
function(payload) {
const r = payload.new || payload.old;
if (!r) return;
// Filtrer selon le contexte (idem loadMessages)
if (currentBoutique !== 'livreur' && r.sender_boutique !== currentBoutique) return;
if (payload.eventType === 'INSERT') {
if (payload.new.sender_device === DEVICE_ID) return; // déjà traite localement
messagesData.unshift(payload.new);
renderMessages();
if (currentBoutique === 'livreur' && payload.new.urgent) {
showToast('Nouveau message URGENT', 'error');
} else {
showToast('Nouveau message', 'sync');
}
} else if (payload.eventType === 'UPDATE') {
const idx = messagesData.findIndex(function(m) { return m.id === payload.new.id; });
if (idx >= 0) {
messagesData[idx] = payload.new;
renderMessages();
}
} else if (payload.eventType === 'DELETE') {
messagesData = messagesData.filter(function(m) { return m.id !== payload.old.id; });
renderMessages();
}
}).subscribe();
}

function formatMsgDate(iso) {
const d = new Date(iso);
const now = new Date();
const sameDay = d.toDateString() === now.toDateString();
const hh = String(d.getHours()).padStart(2, '0');
const mm = String(d.getMinutes()).padStart(2, '0');
if (sameDay) return 'Aujourd hui ' + hh + 'h' + mm;
// yesterday?
const yest = new Date(now);
yest.setDate(yest.getDate() - 1);
if (d.toDateString() === yest.toDateString()) return 'Hier ' + hh + 'h' + mm;
return d.getDate() + '/' + (d.getMonth()+1) + ' ' + hh + 'h' + mm;
}

function renderMessageCard(m, isLivreur) {
const cls = 'msg-card'

+ (m.urgent ? ' urgent' : '')
+ (m.done ? ' done' : '')
+ (!m.read_at && isLivreur ? ' unread' : '');
  const sender = BOUTIQUE_NAMES[m.sender_boutique] || m.sender_boutique;
  const stop = m.stop_boutique ? (BOUTIQUE_NAMES[m.stop_boutique] || m.stop_boutique) : null;

let status = '';
if (m.done) status = '<span class="msg-status done">✓ Fait</span>';
else if (m.read_at) status = '<span class="msg-status read">Lu ' + formatMsgDate(m.read_at) + '</span>';
else status = '<span class="msg-status unread">Non lu</span>';

let html = '<div class="' + cls + '">';
html += '<div class="msg-head">'

+ '<div class="msg-sender">' + escapeHtml(sender) + (stop ? ' <span class="msg-stop">→ ' + escapeHtml(stop) + '</span>' : '') + (m.urgent ? ' <span class="msg-urgent-tag">URGENT</span>' : '') + '</div>'
+ '<div class="msg-date">' + formatMsgDate(m.created_at) + '</div>'
+ '</div>';
  html += '<div class="msg-content">' + escapeHtml(m.content).replace(/\n/g, '<br>') + '</div>';
  html += '<div class="msg-footer">';
  html += status;
  if (isLivreur) {
  html += '<button class="msg-done-btn ' + (m.done ? 'undone' : '') + '" onclick="toggleMessageDone(\'' + m.id + '\', ' + !!m.done + ')">'
+ (m.done ? 'Annuler' : 'Marquer fait')
+ '</button>';
  } else {
  html += '<button class="msg-del-btn" onclick="deleteMessage(\'' + m.id + '\')">Supprimer</button>';
  }
  html += '</div>';
  html += '</div>';
  return html;
  }

// === IMPRESSION ===
function printCurrentView() {
// Prepare: set print title based on current view
const boutiqueLabel = BOUTIQUE_NAMES[currentBoutique] || currentBoutique;
let title = boutiqueLabel;
if (currentVue === 'production') title += ' - Production du ' + formatDateFr(currentReapproDate);
else if (currentVue === 'recap') title += ' - Recap semaine du ' + formatDateFr(currentWeekStart);
else if (currentVue === 'livraison') title += ' - Feuille de route ' + formatDateFr(currentDate);
document.title = 'LBDD - ' + title;
window.print();
setTimeout(function() { document.title = 'LBDD Cloud'; }, 500);
}

function canPrintCurrent() {
return currentVue === 'production' || currentVue === 'recap' || currentVue === 'livraison';
}

// === HELPERS ===
function setSyncStatus(s) {
const dot = document.getElementById('sync-dot'), text = document.getElementById('sync-text');
dot.className = 'sync-dot ' + s;
if (s === 'syncing') text.textContent = 'Synchronisation...';
else if (s === 'ok') text.textContent = 'Synchronise';
else if (s === 'error') text.textContent = 'Erreur';
}

let toastTimer;
function showToast(msg, type) {
const t = document.getElementById('toast');
t.textContent = msg;
t.className = 'toast' + (type ? ' ' + type : '');
setTimeout(function() { t.classList.add('show'); }, 10);
clearTimeout(toastTimer);
toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function escapeHtml(s) {
if (s == null) return '';
return String(s).replace(/[&<>"']/g, function(c) {
return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
});
}
