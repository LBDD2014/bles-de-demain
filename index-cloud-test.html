+ '</div>';
  }

html += '<div class="prod-filter-bar"><label>'

+ '<input type="checkbox" ' + (productionFilterEmpty ? 'checked' : '') + ' onchange="toggleProductionFilter()">'
+ '<span>Cacher les produits sans activite</span></label></div>';

if (!filtered.length) {
html += '<div class="prod-empty">'

+ (productionFilterEmpty
  ? 'Aucune activite pour cette date.<br>Decoche le filtre pour voir tous les produits.'
  : 'Aucun produit dans la base.')
+ '</div>';
  mc.innerHTML = html;
  return;
  }

const byCat = {};
filtered.forEach(function(r) {
const c = r.p.category || 'autre';
if (!byCat[c]) byCat[c] = [];
byCat[c].push(r);
});

const catOrder = Object.keys(CAT_LABELS);
const cats = Object.keys(byCat).sort(function(a, b) {
const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);

// === MARCHES ===
async function loadMarketEntries(marketId, date) {
const { data, error } = await supa.from('market_entries').select('*')
.eq('tenant_id', TENANT_ID).eq('market_id', marketId).eq('service_date', date);
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
marketEntriesData = {};
(data || []).forEach(function(r) {
marketEntriesData[r.product_id] = {
marche:             r.marche             == null ? '' : String(r.marche).replace('.', ','),
commande:           r.commande           == null ? '' : String(r.commande).replace('.', ','),
commande_tranchee:  r.commande_tranchee  == null ? '' : String(r.commande_tranchee).replace('.', ','),
pertes:             r.pertes             == null ? '' : String(r.pertes).replace('.', ','),
product_notes:      r.product_notes || ''
};
});
}

async function loadMarketEntriesForDate(marketId, date) {
const { data, error } = await supa.from('market_entries').select('*')
.eq('tenant_id', TENANT_ID).eq('market_id', marketId).eq('service_date', date);
if (error) return {};
const result = {};
(data || []).forEach(function(r) {
result[r.product_id] = {
marche:             r.marche             == null ? '' : String(r.marche).replace('.', ','),
commande:           r.commande           == null ? '' : String(r.commande).replace('.', ','),
commande_tranchee:  r.commande_tranchee  == null ? '' : String(r.commande_tranchee).replace('.', ','),
pertes:             r.pertes             == null ? '' : String(r.pertes).replace('.', ','),
product_notes:      r.product_notes || ''
};
});
return result;
}

async function upsertMarketEntry(pid) {
setSyncStatus('syncing');
const d = marketEntriesData[pid] || {};
const marche = d.marche === '' || d.marche == null ? null : parseQty(d.marche);
const commande = d.commande === '' || d.commande == null ? null : parseQty(d.commande);
const commandeTr = d.commande_tranchee === '' || d.commande_tranchee == null ? null : parseQty(d.commande_tranchee);
const pertes = d.pertes === '' || d.pertes == null ? null : parseQty(d.pertes);
const { error } = await supa.from('market_entries').upsert({
tenant_id: TENANT_ID, market_id: currentMarketId, service_date: currentMarketDate,
product_id: pid,
marche: marche, commande: commande, commande_tranchee: commandeTr, pertes: pertes,
product_notes: d.product_notes || null,
updated_by: DEVICE_ID, updated_at: new Date().toISOString()
}, { onConflict: 'tenant_id,market_id,service_date,product_id' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
else { setSyncStatus('ok'); }
}

async function loadMarketDayNote(marketId, date) {
const { data, error } = await supa.from('market_day_notes').select('*')
.eq('tenant_id', TENANT_ID).eq('market_id', marketId).eq('service_date', date).maybeSingle();
if (error) { marketDayNote = ''; return; }
marketDayNote = (data && data.notes) || '';
}

async function upsertMarketDayNote(text) {
setSyncStatus('syncing');
const { error } = await supa.from('market_day_notes').upsert({
tenant_id: TENANT_ID, market_id: currentMarketId, service_date: currentMarketDate,
notes: text || null,
updated_by: DEVICE_ID, updated_at: new Date().toISOString()
}, { onConflict: 'tenant_id,market_id,service_date' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
else { setSyncStatus('ok'); }
}

function subscribeRealtimeMarket() {
if (realtimeChannelMarket) supa.removeChannel(realtimeChannelMarket);
realtimeChannelMarket = supa.channel('market_' + currentMarketId)
.on('postgres_changes', { event: '*', schema: 'public', table: 'market_entries', filter: 'market_id=eq.' + currentMarketId },
function(payload) {
const r = payload.new;
if (!r || r.updated_by === DEVICE_ID) return;
if (r.service_date !== currentMarketDate) return;
marketEntriesData[r.product_id] = {
marche:             r.marche             == null ? '' : String(r.marche).replace('.', ','),
commande:           r.commande           == null ? '' : String(r.commande).replace('.', ','),
commande_tranchee:  r.commande_tranchee  == null ? '' : String(r.commande_tranchee).replace('.', ','),
pertes:             r.pertes             == null ? '' : String(r.pertes).replace('.', ','),
product_notes: r.product_notes || ''
};
renderMarket();
showToast('MAJ marche d un autre appareil', 'sync');
})
.on('postgres_changes', { event: '*', schema: 'public', table: 'market_day_notes', filter: 'market_id=eq.' + currentMarketId },
function(payload) {
const r = payload.new;
if (!r || r.updated_by === DEVICE_ID) return;
if (r.service_date !== currentMarketDate) return;
marketDayNote = r.notes || '';
const ta = document.getElementById('market-day-note');
if (ta && document.activeElement !== ta) ta.value = marketDayNote;
})
.subscribe();
}

async function changeMarketDate(delta) {
const d = new Date(currentMarketDate + 'T12:00');
d.setDate(d.getDate() + delta);
currentMarketDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
await loadMarketEntries(currentMarketId, currentMarketDate);
await loadMarketDayNote(currentMarketId, currentMarketDate);
renderMarket();
}

async function copyFromLastMarket() {
// Meme marche, semaine d'avant - on ne reprend que le volume "Marché" (walk-in)
// et les notes produit. Les commandes clients ne se reportent pas (specifiques chaque semaine).
const d = new Date(currentMarketDate + 'T12:00');
d.setDate(d.getDate() - 7);
const prevISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
const prevData = await loadMarketEntriesForDate(currentMarketId, prevISO);
const pids = Object.keys(prevData).filter(function(pid) {
const v = prevData[pid];
return (v.marche && v.marche !== '');
});
if (!pids.length) {
showToast('Aucune base Marché à reprendre du ' + prevISO, 'error');
return;
}
if (!confirm('Reprendre la base "Marché" de ' + pids.length + ' produit(s) du marche du ' + prevISO + ' ?')) return;
setSyncStatus('syncing');
const rows = pids.map(function(pid) {
return {
tenant_id: TENANT_ID, market_id: currentMarketId, service_date: currentMarketDate,
product_id: pid,
marche: prevData[pid].marche === '' ? null : parseQty(prevData[pid].marche),
commande: null, commande_tranchee: null, pertes: null,
product_notes: prevData[pid].product_notes || null,
updated_by: DEVICE_ID, updated_at: new Date().toISOString()
};
});
const { error } = await supa.from('market_entries').upsert(rows, { onConflict: 'tenant_id,market_id,service_date,product_id' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
await loadMarketEntries(currentMarketId, currentMarketDate);
renderMarket();
showToast('Base Marché reprise depuis ' + prevISO, 'sync');
}

function handleMarketInput(el) {
const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
if (!marketEntriesData[pid]) marketEntriesData[pid] = { marche: '', commande: '', commande_tranchee: '', pertes: '', product_notes: '' };
marketEntriesData[pid][field] = val;
if (field !== 'product_notes') {
el.classList.toggle('has-' + field, !!val);
}
clearTimeout(updateTimers['m_' + pid]);
updateTimers['m_' + pid] = setTimeout(function() { upsertMarketEntry(pid); }, 400);
}

function handleMarketDayNoteInput(el) {
marketDayNote = el.value;
clearTimeout(updateTimers['m_daynote']);
updateTimers['m_daynote'] = setTimeout(function() { upsertMarketDayNote(marketDayNote); }, 500);
}

// Charge les commandes marche à venir dans les MARKET_PREP_DAYS jours suivant la date du Local
async function loadMarketUpcoming(localDate) {
marketUpcomingData = {};
const startD = new Date(localDate + 'T12:00');
const endD = new Date(localDate + 'T12:00');
endD.setDate(endD.getDate() + MARKET_PREP_DAYS);
const startISO = startD.getFullYear() + '-' + String(startD.getMonth()+1).padStart(2,'0') + '-' + String(startD.getDate()).padStart(2,'0');
const endISO = endD.getFullYear() + '-' + String(endD.getMonth()+1).padStart(2,'0') + '-' + String(endD.getDate()).padStart(2,'0');
const { data, error } = await supa.from('market_entries').select('*')
.eq('tenant_id', TENANT_ID)
.gte('service_date', startISO).lte('service_date', endISO);
if (error) return;
(data || []).forEach(function(r) {
// Total à produire pour ce produit/marche/date = marche + commande + commande_tranchee
const total = (r.marche || 0) + (r.commande || 0) + (r.commande_tranchee || 0);
if (total === 0) return;
if (!marketUpcomingData[r.market_id]) marketUpcomingData[r.market_id] = { _date: r.service_date, _products: {} };
if (r.service_date < marketUpcomingData[r.market_id]._date) {
marketUpcomingData[r.market_id]._date = r.service_date;
}
marketUpcomingData[r.market_id]._products[r.product_id] = total;
});
}

async function handleImportProductsFile(input) {

function _impNumEq(a, b) {
  const na = (a == null || a === '') ? null : Number(a);
  const nb = (b == null || b === '') ? null : Number(b);
  if (na === null && nb === null) return true;
  if (na === null || nb === null) return false;
  return Math.abs(na - nb) < 0.001;
}
function _impSupplyEq(a, b) {
  const ks = ['veigne','tours','saint-avertin','local'];
  for (let i = 0; i < ks.length; i++) {
    if ((a[ks[i]] || '') !== (b[ks[i]] || '')) return false;
  }
  return true;
}
function _impNum(v) {
  if (v === '' || v == null) return null;
  const n = Number(v);
  return isNaN(n) ? undefined : n;
}
function _impBoolOuiNon(v) {
  if (v === '' || v == null) return undefined;
  const s = String(v).trim().toUpperCase();
  if (s === 'OUI' || s === 'YES' || s === 'TRUE' || s === '1') return true;
  if (s === 'NON' || s === 'NO' || s === 'FALSE' || s === '0') return false;
  return undefined;
}
function _impSupply(v) {
  if (v === '' || v == null) return '';
  const s = String(v).trim().toLowerCase();
  if (s === '') return '';
  if (['on_site','local','veigne','none'].indexOf(s) !== -1) return s;
  return undefined;
}

function buildImportDiff(rows) {
  const creates = [], updates = [], errors = [], unchanged = [];
  if (!rows.length) {
    return { creates, updates, errors: [{ row: 0, reason: 'Fichier vide ou feuille Produits sans données' }], unchanged };
  }
  const requiredCols = ['id','name','category','actif'];
  const firstRow = rows[0];
  const missingCols = requiredCols.filter(function(c) { return !(c in firstRow); });
  if (missingCols.length) {
    return { creates, updates, errors: [{ row: 0, reason: 'Colonnes obligatoires manquantes : ' + missingCols.join(', ') }], unchanged };
  }
  const byId = {};
  adminProducts.forEach(function(p) { byId[p.id] = p; });

  rows.forEach(function(r, idx) {
    const rowNum = idx + 2; // ligne 1 = header dans Excel
    const id = String(r.id || '').trim();
    const name = String(r.name || '').trim();
    const category = String(r.category || '').trim();
    if (!id) { errors.push({ row: rowNum, reason: 'id vide' }); return; }
    if (!name) { errors.push({ row: rowNum, reason: 'name vide (id=' + id + ')' }); return; }
    if (!category) { errors.push({ row: rowNum, reason: 'category vide (id=' + id + ')' }); return; }
    const actif = _impBoolOuiNon(r.actif);
    if (actif === undefined) { errors.push({ row: rowNum, reason: 'actif doit être OUI ou NON (id=' + id + ')' }); return; }
    const prix = _impNum(r.prix_cession);
    if (prix === undefined) { errors.push({ row: rowNum, reason: 'prix_cession invalide (id=' + id + ')' }); return; }
    const pces = _impNum(r.pces_per_caisse);
    if (pces === undefined) { errors.push({ row: rowNum, reason: 'pces_per_caisse invalide (id=' + id + ')' }); return; }
    const seuil = _impNum(r.seuil_stock);
    if (seuil === undefined) { errors.push({ row: rowNum, reason: 'seuil_stock invalide (id=' + id + ')' }); return; }
    const sv = _impSupply(r.supply_veigne);
    const st = _impSupply(r.supply_tours);
    const ssa = _impSupply(r.supply_saint_avertin);
    const sl = _impSupply(r.supply_local);
    if (sv === undefined) { errors.push({ row: rowNum, reason: 'supply_veigne invalide (id=' + id + ') — attendu on_site/local/veigne/none/vide' }); return; }
    if (st === undefined) { errors.push({ row: rowNum, reason: 'supply_tours invalide (id=' + id + ')' }); return; }
    if (ssa === undefined) { errors.push({ row: rowNum, reason: 'supply_saint_avertin invalide (id=' + id + ')' }); return; }
    if (sl === undefined) { errors.push({ row: rowNum, reason: 'supply_local invalide (id=' + id + ')' }); return; }
    const supply = {};
    if (sv) supply.veigne = sv;
    if (st) supply.tours = st;
    if (ssa) supply['saint-avertin'] = ssa;
    if (sl) supply.local = sl;

    const cleanRow = {
      tenant_id: TENANT_ID,
      id: id,
      name: name,
      category: category,
      actif: actif,
      unit: String(r.unit || '').trim() || null,
      usage: String(r.usage || '').trim() || 'reappro',
      prix_cession: prix,
      pces_per_caisse: pces,
      seuil_stock: seuil,
      supply_by_boutique: supply
    };

    const existing = byId[id];
    if (!existing) {
      creates.push({ row: rowNum, id: id, name: name, data: cleanRow });
    } else {
      const changes = [];
      if ((existing.name || '') !== cleanRow.name) changes.push('name');
      if ((existing.category || '') !== cleanRow.category) changes.push('category');
      if (Boolean(existing.actif) !== cleanRow.actif) changes.push('actif');
      if ((existing.unit || null) !== cleanRow.unit) changes.push('unit');
      if ((existing.usage || 'reappro') !== cleanRow.usage) changes.push('usage');
      if (!_impNumEq(existing.prix_cession, cleanRow.prix_cession)) changes.push('prix_cession');
      if (!_impNumEq(existing.pces_per_caisse, cleanRow.pces_per_caisse)) changes.push('pces_per_caisse');
      if (!_impNumEq(existing.seuil_stock, cleanRow.seuil_stock)) changes.push('seuil_stock');
      const existingSupply = existing.supply_by_boutique
        ? (typeof existing.supply_by_boutique === 'string' ? JSON.parse(existing.supply_by_boutique) : existing.supply_by_boutique)
        : {};
      if (!_impSupplyEq(existingSupply, supply)) changes.push('supply');
      if (!changes.length) {
        unchanged.push({ row: rowNum, id: id, name: name });
      } else {
        updates.push({ row: rowNum, id: id, name: name, changes: changes, data: cleanRow });
      }
    }
  });

  return { creates: creates, updates: updates, errors: errors, unchanged: unchanged };
}

async function confirmImportProducts() {
  if (!pendingImportDiff) return;
  const diff = pendingImportDiff;
  const rowsToUpsert = diff.creates.concat(diff.updates).map(function(x) { return x.data; });
  if (!rowsToUpsert.length) { closeImportPreviewModal(); return; }
  setSyncStatus('syncing');
  const { data, error } = await supa.from('products').upsert(rowsToUpsert, { onConflict: 'id' }).select();
  if (error) {
    setSyncStatus('error');
    showToast('Erreur import: ' + error.message, 'error');
    return;
  }
  if (!data || data.length !== rowsToUpsert.length) {
    setSyncStatus('error');
    alert('Import partiel ou bloqué par Supabase.\nAttendu : ' + rowsToUpsert.length + ' lignes\nAppliqué : ' + (data ? data.length : 0) + ' lignes\n\nVérifie les policies RLS sur products (UPDATE + INSERT).');
    return;
  }
  setSyncStatus('ok');
  closeImportPreviewModal();
  pendingImportDiff = null;
  await loadAdminProducts();
  await loadProducts();
  renderAdminProducts();
  showToast('Import OK : ' + diff.creates.length + ' créés, ' + diff.updates.length + ' modifiés', 'sync');
}

// v20.24 — Export BackOffice complet en .xlsx (3 onglets : Produits / Catégories / Valorisation)
async function exportBackOfficeToXlsx() {
  if (typeof XLSX === 'undefined') { showToast('Lib XLSX non chargée', 'error'); return; }
  setSyncStatus('syncing');
  try {
    // S'assurer que les data sont chargées
    if (!adminProducts.length) await loadAdminProducts();
    if (!Object.keys(categorySettings).length) await loadCategorySettings();
    await loadValorisation();

    // 1. Sheet Produits — éclate supply_by_boutique en 4 colonnes
    const prodRows = adminProducts.map(function(p) {
      const sb = p.supply_by_boutique
        ? (typeof p.supply_by_boutique === 'string' ? JSON.parse(p.supply_by_boutique) : p.supply_by_boutique)
        : {};
      return {
        id: p.id,
        name: p.name || '',
        category: p.category || '',
        actif: p.actif ? 'OUI' : 'NON',
        unit: p.unit || '',
        usage: p.usage || 'reappro',
        prix_cession: p.prix_cession != null ? p.prix_cession : '',
        pces_per_caisse: p.pces_per_caisse != null ? p.pces_per_caisse : '',
        seuil_stock: p.seuil_stock != null ? p.seuil_stock : '',
        supply_veigne: sb.veigne || '',
        supply_tours: sb.tours || '',
        supply_saint_avertin: sb['saint-avertin'] || '',
        supply_local: sb.local || ''
      };
    });

    // 2. Sheet Catégories
    const allCats = Array.from(new Set(adminProducts.map(function(p) { return p.category; }).filter(Boolean)));
    Object.keys(CAT_LABELS).forEach(function(c) { if (allCats.indexOf(c) === -1) allCats.push(c); });
    const catRows = allCats.map(function(cat) {
      const cfg = categorySettings[cat] || { a_previs: false };
      const nbProducts = adminProducts.filter(function(p) { return p.category === cat; }).length;
      return {
        category: cat,
        label: CAT_LABELS[cat] || cat,
        a_previs: cfg.a_previs ? 'OUI' : 'NON',
        nb_produits: nbProducts
      };
    });

    // 3. Sheet Valorisation — somme par produit × boutique × semaine courante
    const valoRows = [];
    Object.keys(valoData).forEach(function(bid) {
      Object.keys(valoData[bid]).forEach(function(pid) {
        const v = valoData[bid][pid];
        const qty = v.qty || 0;
        const prix = v.prix || 0;
        valoRows.push({
          boutique: bid,
          product_id: pid,
          product_name: v.name,
          category: v.cat,
          qty: qty,
          prix_cession: prix,
          valeur: qty * prix
        });
      });
    });

    // Workbook
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prodRows), 'Produits');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(catRows), 'Catégories');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(valoRows), 'Valorisation');

    const today = todayISO();
    XLSX.writeFile(wb, 'lbdd-backoffice-' + today + '.xlsx');
    setSyncStatus('ok');
    showToast('Export Excel téléchargé', 'sync');
  } catch (e) {
    setSyncStatus('error');
    showToast('Erreur export: ' + e.message, 'error');
  }
}

function genProductId(name) {
  const slug = (name || 'prod').toString().toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 24);
  return (slug || 'prod') + '_' + Date.now().toString(36).slice(-4) + Math.floor(Math.random() * 1296).toString(36);
}

async function deleteProduct(pid) {
const p = adminProducts.find(function(x) { return x.id === pid; });
if (!p) return;
if (!confirm('Supprimer DEFINITIVEMENT "' + p.name + '" ?\n\nATTENTION : si ce produit a un historique (commandes, ventes, production), la suppression sera impossible et je te proposerai de le desactiver à la place.')) return;
setSyncStatus('syncing');
// v20.29 : .select() pour vérifier que la DELETE a réellement supprimé une ligne
// (RLS Supabase peut bloquer silencieusement sans renvoyer d'erreur).
const { data: deletedRows, error } = await supa.from('products').delete().eq('id', pid).select();
if (error) {
setSyncStatus('error');
const msg = (error.message || '').toLowerCase();
if (msg.indexOf('foreign') !== -1 || msg.indexOf('violates') !== -1 || msg.indexOf('referenced') !== -1) {
if (confirm('Ce produit a de l historique en base.\nLe DESACTIVER à la place (il disparaitra des ecrans mais l historique reste) ?')) {
const { error: e2 } = await supa.from('products').update({ actif: false }).eq('id', pid);

await loadAdminProducts();
await loadProducts();
renderAdminProducts();

}
} else {
showToast(error.message, 'error');
}
return;
}
// v20.29 : si pas d'erreur mais 0 ligne supprimée -> RLS bloque silencieusement.
if (!deletedRows || deletedRows.length === 0) {
setSyncStatus('error');
if (confirm('Suppression bloquée (probablement RLS Supabase ou historique).\nLe DESACTIVER à la place (il disparaitra des ecrans mais l historique reste) ?')) {
// v20.30 : vérifier que l'UPDATE passe aussi (RLS peut bloquer UPDATE pareil)
const { data: updatedRows, error: e2 } = await supa.from('products').update({ actif: false }).eq('id', pid).select();
if (e2) { showToast(e2.message, 'error'); return; }
if (!updatedRows || updatedRows.length === 0) {
alert('Modification bloquée par Supabase (RLS).\n\nLa politique de sécurité de la table `products` empêche les UPDATE et DELETE.\n\nAction nécessaire :\nDashboard Supabase > Authentication > Policies > table products\nAjouter des policies UPDATE et DELETE pour ton rôle.');
showToast('RLS Supabase bloque la modif', 'error');
return;
}
await loadAdminProducts();
await loadProducts();
renderAdminProducts();
showToast('Produit desactive', 'sync');
}
return;
}
setSyncStatus('ok');
await loadAdminProducts();
await loadProducts();
renderAdminProducts();

}

            out[j] = { actif: !!cfg.actif, butoir_decalage: -1, butoir_heure: cfg.butoir || '', livraison: cfg.livraison || '' };

        });

// v21.0.3.1 — Toggle Tout/Rien sur une catégorie complète
function handleProCatalogueCategoryToggle(cat) {
  if (!adminProsDraft) return;
  const allProds = (adminProducts || []).filter(function(p) { return p.actif; });
  const prodsInCat = allProds.filter(function(p) { return (p.category || '_autres') === cat; });
  if (!prodsInCat.length) return;
  // État courant : tous coches ?
  let cur = adminProsDraft.catalogue_restreint;
  const allAllowed = (cur === null) ? allProds.map(function(p) { return p.id; }) : cur;
  const allInCatAllowed = prodsInCat.every(function(p) { return allAllowed.indexOf(p.id) !== -1; });
  if (cur === null) {
    // null = tout autorisé. Décocher toute la catégorie passe en mode restriction.
    cur = allProds.map(function(p) { return p.id; });
  }
  const catIds = prodsInCat.map(function(p) { return p.id; });
  if (allInCatAllowed) {
    // Tout coché → on décoche toute la catégorie
    cur = cur.filter(function(id) { return catIds.indexOf(id) === -1; });
  } else {
    // Sinon (partiel ou rien) → on coche tout
    catIds.forEach(function(id) { if (cur.indexOf(id) === -1) cur.push(id); });
  }
  // Si on a tout coché → revient à null (tout autorisé)
  if (cur.length === allProds.length) cur = null;
  adminProsDraft.catalogue_restreint = cur;
  renderAdminPros();
}

// v21.3.0 — Magic link interface pro : génération / révocation / copie
function _generateMagicTokenString() {
  // 24 bytes random → 48 hex chars : largement suffisant pour secret
  const buf = new Uint8Array(24);
  if (window.crypto && window.crypto.getRandomValues) {
    window.crypto.getRandomValues(buf);
  } else {
    // fallback (Safari ancien) — moins sécurisé mais marche
    for (let i = 0; i < buf.length; i++) buf[i] = Math.floor(Math.random() * 256);
  }
  return Array.from(buf).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

async function generateProMagicLink(proId, isRenew) {
  if (isRenew && !confirm('Renouveler le magic link ?\n\nL\'ancienne URL ne marchera plus. Tu devras renvoyer la nouvelle au pro.')) return;
  setSyncStatus('syncing');
  const newToken = _generateMagicTokenString();
  const { error } = await supa.from('pros').update({ magic_token: newToken }).eq('id', proId);
  if (error) { setSyncStatus('error'); showToast('Erreur: ' + error.message, 'error'); return; }
  setSyncStatus('ok');
  // Mettre à jour le draft + le cache adminPros (pour le re-render immédiat)
  if (adminProsDraft && adminProsDraft.id === proId) adminProsDraft.magic_token = newToken;
  const pInCache = adminPros.find(function(p) { return p.id === proId; });
  if (pInCache) pInCache.magic_token = newToken;
  renderAdminPros();
  showToast(isRenew ? 'Magic link renouvelé' : 'Magic link généré', 'sync');
}

async function revokeProMagicLink(proId) {
  if (!confirm('Révoquer le magic link ?\n\nL\'URL existante ne marchera plus. Le pro ne pourra plus saisir ses commandes via son lien.')) return;
  setSyncStatus('syncing');
  const { error } = await supa.from('pros').update({ magic_token: null }).eq('id', proId);
  if (error) { setSyncStatus('error'); showToast('Erreur: ' + error.message, 'error'); return; }
  setSyncStatus('ok');
  if (adminProsDraft && adminProsDraft.id === proId) adminProsDraft.magic_token = null;
  const pInCache = adminPros.find(function(p) { return p.id === proId; });
  if (pInCache) pInCache.magic_token = null;
  renderAdminPros();
  showToast('Magic link révoqué', 'sync');
}

function copyMagicLink(url) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(function() {
      showToast('URL copiée dans le presse-papier', 'sync');
    }, function() {
      showToast('Copie échouée — copie manuellement', 'error');
    });
  } else {
    // Fallback : sélectionne dans un textarea temporaire
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('URL copiée', 'sync'); }
    catch (e) { showToast('Copie échouée — copie manuellement', 'error'); }
    document.body.removeChild(ta);
  }
}

// v21.3.1 — Retourne le timestamp butoir (ms epoch) pour commander à date_livraison.
// null si le jour n'est pas configuré comme livraison.
function proGetButoirForDate(pro, dateISO) {
  const dow = getDOWNameForISO(dateISO);
  const cfg = (pro.jours_livraison || {})[dow];
  if (!cfg || !cfg.actif) return null;
  const decalage = cfg.butoir_decalage != null ? cfg.butoir_decalage : -1;
  const heure = cfg.butoir_heure || '23:59';
  const d = new Date(dateISO + 'T12:00');
  d.setDate(d.getDate() + decalage);
  const parts = heure.split(':');
  d.setHours(parseInt(parts[0], 10) || 23, parseInt(parts[1], 10) || 59, 0, 0);
  return d.getTime();
}

// v21.3.1 — Liste des dates futures où le pro peut encore commander
// (jour configuré actif + butoir pas encore passé). Horizon 30 jours.
function getAvailableDatesForPro(pro) {
  const out = [];
  const today = todayISO();
  const nowMs = Date.now();
  for (let i = 0; i <= 30; i++) {
    const dateISO = addDays(today, i);
    const butoir = proGetButoirForDate(pro, dateISO);
    if (butoir == null) continue;
    if (nowMs < butoir) out.push(dateISO);
  }
  return out;
}

// v21.3.1 — Peut-on encore éditer / annuler cette commande ? (avant butoir)
function proCanEditOrder(o, pro) {
  if (!o || o.statut === 'livre' || o.statut === 'annule') return false;
  const butoir = proGetButoirForDate(pro, o.date_livraison);
  if (butoir == null) return false;
  return Date.now() < butoir;
}

async function loadProInterfaceProducts() {

  const { data, error } = await supa.from('products').select('*')

  const pro = proInterfacePro;
  proInterfaceProducts = all.filter(function(p) {

    if (Array.isArray(pro.catalogue_restreint) && pro.catalogue_restreint.length > 0) {
      if (pro.catalogue_restreint.indexOf(p.id) === -1) return false;
    }
    return true;
  });
}

async function loadProInterfaceOrders() {
  const pro = proInterfacePro;
  // Fenêtre : 30 derniers jours + 30 prochains jours
  const today = todayISO();
  const past = addDays(today, -30);
  const future = addDays(today, 30);
  const { data, error } = await supa.from('pro_orders')
    .select('*, pro_order_items(*)')
    .eq('tenant_id', TENANT_ID)
    .eq('pro_id', pro.id)
    .gte('date_livraison', past)
    .lte('date_livraison', future)
    .neq('statut', 'annule')
    .order('date_livraison', { ascending: false });
  if (error) { proInterfaceOrders = []; return; }
  proInterfaceOrders = data || [];
}

    const dates = getAvailableDatesForPro(pro);
    proInterfaceDraft = {
      id: null,
      date_livraison: dates[0] || '',
      boutique_source: pro.boutique_principale || 'local',
      statut: 'confirme',
      notes: '',
      items: []
    };
    // Pré-remplir avec template_items si configuré (pratique pour récurrent)
    if (Array.isArray(pro.template_items) && pro.template_items.length) {
      proInterfaceDraft.items = pro.template_items
        .filter(function(t) { return t.product_id && Number(t.qty) > 0; })
        .map(function(t) {
          return {
            id: null,
            product_id: t.product_id,
            qty: Number(t.qty),
            prix_applique: getProAppliedPrice(pro, t.product_id)
          };
        });
    }
  } else {
    const o = proInterfaceOrders.find(function(x) { return x.id === orderId; });
    if (!o) { proInterfaceFormOpen = null; renderProInterface(); return; }
    proInterfaceDraft = {
      id: o.id,
      date_livraison: o.date_livraison,
      boutique_source: o.boutique_source,
      statut: o.statut || 'confirme',
      notes: o.notes || '',
      items: (o.pro_order_items || []).map(function(it) {
        return { id: it.id, product_id: it.product_id, qty: Number(it.qty), prix_applique: it.prix_applique };
      })
    };
  }
  renderProInterface();
}

function handleProInterfaceField(field, val) {
  if (!proInterfaceDraft) return;

}

function handleProInterfaceItemField(idx, field, val) {
  if (!proInterfaceDraft || !proInterfaceDraft.items[idx]) return;

// === v21.4 — Réassort pro en 1 touche : "comme la dernière fois" / "comme la semaine dernière" ===

// Dernière commande passée (livraison < aujourd'hui), tous jours confondus, avec produits
function proFindLastOrder() {
  const today = todayISO();
  const cands = proInterfaceOrders.filter(function(o) {
    return o.date_livraison < today
      && Array.isArray(o.pro_order_items) && o.pro_order_items.length;
  });
  // proInterfaceOrders est déjà trié date desc, mais on resécurise
  cands.sort(function(a, b) { return a.date_livraison < b.date_livraison ? 1 : -1; });
  return cands[0] || null;
}

// Commande du même jour la semaine d'avant (date sélectionnée − 7 jours)
function proFindSameDayLastWeek(dateISO) {
  if (!dateISO) return null;
  const target = addDays(dateISO, -7);
  return proInterfaceOrders.find(function(o) {
    return o.date_livraison === target
      && Array.isArray(o.pro_order_items) && o.pro_order_items.length;
  }) || null;
}

// Recopie les produits d'une commande source dans le brouillon courant
function prefillProInterfaceFrom(source) {
  if (!proInterfaceDraft) return;
  const pro = proInterfacePro;
  const src = (source === 'lastweek')
    ? proFindSameDayLastWeek(proInterfaceDraft.date_livraison)
    : proFindLastOrder();
  if (!src) { alert('Aucune commande à reprendre.'); return; }
  // On ne reprend que les produits encore au catalogue du pro ; prix recalculé au prix actuel
  const items = (src.pro_order_items || [])
    .filter(function(it) {
      return it.product_id && Number(it.qty) > 0
        && proInterfaceProducts.some(function(p) { return p.id === it.product_id; });
    })
    .map(function(it) {
      return { id: null, product_id: it.product_id, qty: Number(it.qty), prix_applique: getProAppliedPrice(pro, it.product_id) };
    });
  if (!items.length) { alert('Cette commande ne contient aucun produit encore disponible.'); return; }
  // Écrase le panier, avec confirmation s'il n'est pas vide
  const hasItems = proInterfaceDraft.items.some(function(it) { return it.product_id && Number(it.qty) > 0; });
  if (hasItems && !confirm('Remplacer les produits déjà saisis par ceux de cette commande ?')) return;
  proInterfaceDraft.items = items;
  renderProInterface();
}

async function saveProInterfaceOrder() {
  const d = proInterfaceDraft;
  if (!d) return;
  const pro = proInterfacePro;
  if (!d.date_livraison) { alert('Choisis une date de livraison.'); return; }
  // Re-vérifier le butoir au save (au cas où l'utilisateur a tardé)
  if (!d.id) {
    const butoir = proGetButoirForDate(pro, d.date_livraison);
    if (butoir == null || Date.now() >= butoir) {
      const _src = pro.boutique_principale || 'local';
      const _tels = { local: '07 50 05 22 96', tours: '07 57 77 05 87', veigne: '07 57 77 05 39' };
      const _tel = _tels[_src] || _tels.local;
      const _bn = BOUTIQUE_NAMES[_src] || 'Le Local';
      alert('Trop tard pour commander en ligne pour ce jour — l\'heure limite est passée.\n\nPour un dépannage, appelez ' + _bn + ' au ' + _tel + ' : on verra ensemble si c\'est possible.');
      return;
    }
  }
  // Nettoyer les items vides
  const cleanItems = d.items.filter(function(it) { return it.product_id && Number(it.qty) > 0; });
  if (!cleanItems.length && !(d.notes || '').trim()) {
    alert('Ajoute au moins un produit ou écris une note (commande spéciale).');
    return;
  }
  const orderRow = {
    tenant_id: TENANT_ID,
    pro_id: pro.id,
    date_livraison: d.date_livraison,
    boutique_source: d.boutique_source || pro.boutique_principale || 'local',
    statut: d.statut || 'confirme',
    notes: (d.notes || '').trim() || null,
    created_by: 'pro_self'
  };
  let orderId = d.id;
  if (!orderId) {
    const res = await supa.from('pro_orders').insert(orderRow).select();
    if (res.error || !res.data || !res.data.length) { alert('Erreur création : ' + (res.error ? res.error.message : 'inconnue')); return; }
    orderId = res.data[0].id;
  } else {
    const res = await supa.from('pro_orders').update(orderRow).eq('id', orderId).select();
    if (res.error) { alert('Erreur modif : ' + res.error.message); return; }
    // Supprimer les items existants pour les remplacer
    const del = await supa.from('pro_order_items').delete().eq('pro_order_id', orderId);
    if (del.error) { alert('Erreur nettoyage items : ' + del.error.message); return; }
  }
  // Insérer les items
  if (cleanItems.length) {
    const itemsRows = cleanItems.map(function(it) {
      return {
        pro_order_id: orderId,
        product_id: it.product_id,
        qty: Number(it.qty),
        prix_applique: it.prix_applique != null ? Number(it.prix_applique) : getProAppliedPrice(pro, it.product_id)
      };
    });
    const ins = await supa.from('pro_order_items').insert(itemsRows);
    if (ins.error) { alert('Erreur items : ' + ins.error.message); return; }
  }
  // Recharger + fermer
  await loadProInterfaceOrders();
  proInterfaceFormOpen = null;
  proInterfaceDraft = null;
  renderProInterface();
}

async function cancelProInterfaceOrder(orderId) {
  const o = proInterfaceOrders.find(function(x) { return x.id === orderId; });
  if (!o) return;
  if (!proCanEditOrder(o, proInterfacePro)) {
    alert('Modification clôturée (heure butoir dépassée).');
    return;
  }
  if (!confirm('Annuler cette commande du ' + formatDateFr(o.date_livraison) + ' ?')) return;
  const { error } = await supa.from('pro_orders').update({ statut: 'annule' }).eq('id', orderId);
  if (error) { alert('Erreur annulation : ' + error.message); return; }
  await loadProInterfaceOrders();
  renderProInterface();
}

async function saveProForm() {
  const d = adminProsDraft;
  if (!d) return;
  const nom = (d.nom || '').trim();
  if (!nom) { showToast('Nom obligatoire', 'error'); return; }
  if (!d.boutique_principale) { showToast('Boutique principale obligatoire', 'error'); return; }
  if (d.boutique_secours && d.boutique_secours === d.boutique_principale) {
    showToast('La boutique de secours doit être différente de la principale', 'error'); return;
  }
  setSyncStatus('syncing');
  const isNew = (adminProsEditingId === 'new');
  let proId = isNew ? makeProSlug(nom) : d.id;
  if (!proId) { setSyncStatus('error'); showToast('Impossible de générer un identifiant depuis le nom', 'error'); return; }
  if (isNew && adminPros.some(function(p) { return p.id === proId; })) {
    setSyncStatus('error');
    showToast('Un pro avec cet identifiant existe déjà : ' + proId + '. Change le nom.', 'error');
    return;
  }
  // v21.0.2 — nettoie les contacts vides avant d'envoyer
  const cleanContacts = (d.contacts || []).map(function(c) {
    const obj = {};
    if (c.nom && c.nom.trim())     obj.nom   = c.nom.trim();
    if (c.tel && c.tel.trim())     obj.tel   = c.tel.trim();
    if (c.email && c.email.trim()) obj.email = c.email.trim();
    if (c.role && c.role.trim())   obj.role  = c.role.trim();
    return obj;
  }).filter(function(c) { return Object.keys(c).length > 0; });
  // v21.0.3 — nettoie panier type : retire les lignes sans produit ou qty <= 0
  const cleanTemplate = (d.template_items || []).filter(function(t) {
    return t.product_id && Number(t.qty) > 0;
  }).map(function(t) {
    return { product_id: t.product_id, qty: Number(t.qty) };
  });
  // v21.0.3 — nettoie prix spéciaux : retire les NaN, garde uniquement nombres >= 0
  const cleanPrix = {};
  Object.keys(d.prix_speciaux || {}).forEach(function(pid) {
    const v = Number(d.prix_speciaux[pid]);
    if (!isNaN(v) && v >= 0) cleanPrix[pid] = v;
  });
  // v21.0.3 + v21.0.3.1 — nettoie jours : retire inactifs, persiste butoir_decalage + butoir_heure
  const cleanJours = {};
  Object.keys(d.jours_livraison || {}).forEach(function(j) {
    const cfg = d.jours_livraison[j];
    if (cfg && cfg.actif) {
      cleanJours[j] = {
        actif: true,
        butoir_decalage: (cfg.butoir_decalage != null ? cfg.butoir_decalage : -1),
        butoir_heure: cfg.butoir_heure || null,
        livraison: cfg.livraison || null
      };
    }
  });

  const row = {
    id: proId,
    tenant_id: TENANT_ID,
    nom: nom,
    contacts: cleanContacts,
    sources_par_categorie: d.sources_par_categorie || {},
    jours_livraison:       cleanJours,
    catalogue_restreint:   d.catalogue_restreint, // null = tout autorisé, sinon array
    prix_speciaux:         cleanPrix,
    template_items:        cleanTemplate,
    boutique_principale:   d.boutique_principale,
    boutique_secours:      d.boutique_secours || null,
    notes:                 (d.notes || '').trim() || null,
    actif:                 !!d.actif
  };
  let res;
  if (isNew) {
    res = await supa.from('pros').insert(row).select();
  } else {
    res = await supa.from('pros').update(row).eq('id', proId).select();
  }
  if (res.error) { setSyncStatus('error'); showToast(res.error.message, 'error'); return; }
  if (!res.data || !res.data.length) {
    setSyncStatus('error');
    alert('Sauvegarde bloquée par Supabase (RLS).\nVérifie les policies sur la table pros (FOR ALL TO anon).');
    return;
  }
  setSyncStatus('ok');
  await loadAdminPros();
  closeProForm();
  showToast(isNew ? 'Pro cree' : 'Pro modifie', 'sync');
}

async function togglePro(pid) {
  const p = adminPros.find(function(x) { return x.id === pid; });
  if (!p) return;
  setSyncStatus('syncing');
  const { data, error } = await supa.from('pros').update({ actif: !p.actif }).eq('id', pid).select();
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  if (!data || !data.length) {
    setSyncStatus('error');
    alert('Modification bloquée par Supabase (RLS).');
    return;
  }
  setSyncStatus('ok');
  await loadAdminPros();
  renderAdminPros();
}

async function deletePro(pid) {
  const p = adminPros.find(function(x) { return x.id === pid; });
  if (!p) return;
  if (!confirm('Supprimer DEFINITIVEMENT le pro "' + p.nom + '" ?\n\nATTENTION : toutes ses commandes seront aussi supprimees (cascade).')) return;
  setSyncStatus('syncing');
  const { data, error } = await supa.from('pros').delete().eq('id', pid).select();
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  if (!data || !data.length) {
    setSyncStatus('error');
    alert('Suppression bloquée (RLS Supabase ou contrainte).');
    return;
  }
  setSyncStatus('ok');
  await loadAdminPros();
  renderAdminPros();
  showToast('Pro supprime', 'sync');
}

  html += '<button class="pro-add-btn" onclick="addProTemplateItem()">+ Ajouter un produit au panier</button>';

// === v21.0.5 — RÉCAP PAR PRO (historique facturation) ===

function renderProsViewToggle(active) {
  return '<div class="tour-switch" style="margin-top:6px;margin-bottom:10px">'
    + '<button class="tour-btn' + (active === 'list' ? ' active' : '') + '" onclick="setAdminProsView(\'list\')">📋 Liste</button>'
    + '<button class="tour-btn' + (active === 'recap' ? ' active' : '') + '" onclick="setAdminProsView(\'recap\')">📊 Récap</button>'
    + '<button class="tour-btn' + (active === 'week' ? ' active' : '') + '" onclick="setAdminProsView(\'week\')">📅 Semaine</button>'
  + '</div>';
}

async function setAdminProsView(view) {
  adminProsView = view;
  if (view === 'recap') {
    if (!adminProducts.length) await loadAdminProducts();
    // Initialiser les dates custom avec le mois en cours si vides (utile si l'utilisateur switch sur "Personnalisé")
    if (!recapProCustomStart || !recapProCustomEnd) {
      const p = computeRecapPeriodFromPreset('this_month');
      recapProCustomStart = p.start;
      recapProCustomEnd = p.end;
    }
    if (recapProSelected) await loadRecapProOrders();
  } else if (view === 'week') {
    if (!adminProducts.length) await loadAdminProducts();
    if (!recapWeekStart) recapWeekStart = mondayOfWeek(todayISO());
    await loadRecapWeekOrders();
  }
  renderAdminPros();
}

async function setRecapProSelected(id) {
  recapProSelected = id;
  if (id) {
    await loadRecapProOrders();
  } else {
    recapProOrders = [];
  }
  renderAdminPros();
}

async function setRecapProPreset(preset) {
  recapProPreset = preset;
  if (preset !== 'custom') {
    const p = computeRecapPeriodFromPreset(preset);
    recapProCustomStart = p.start;
    recapProCustomEnd = p.end;
  }
  if (recapProSelected) await loadRecapProOrders();
  renderAdminPros();
}

async function setRecapProCustomDate(field, val) {
  if (field === 'start') recapProCustomStart = val;
  else recapProCustomEnd = val;
  recapProPreset = 'custom';
  if (recapProSelected && recapProCustomStart && recapProCustomEnd) {
    await loadRecapProOrders();
  }
  renderAdminPros();
}

function computeRecapPeriodFromPreset(preset) {
  const now = new Date();
  let year = now.getFullYear();
  let month = now.getMonth(); // 0-indexed
  if (preset === 'last_month') {
    month -= 1;
    if (month < 0) { month = 11; year -= 1; }
  }
  const fmt = function(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  };
  const start = new Date(year, month, 1);
  const end = new Date(year, month + 1, 0); // jour 0 du mois suivant = dernier jour du mois
  return { start: fmt(start), end: fmt(end) };
}

function computeRecapPeriod() {
  if (recapProPreset === 'custom') {
    return { start: recapProCustomStart, end: recapProCustomEnd };
  }
  return computeRecapPeriodFromPreset(recapProPreset);
}

async function loadRecapProOrders() {
  if (!recapProSelected) { recapProOrders = []; return; }
  const period = computeRecapPeriod();
  if (!period.start || !period.end) { recapProOrders = []; return; }
  recapProLoading = true;
  renderAdminPros();
  const { data, error } = await supa
    .from('pro_orders')
    .select('*, pro_order_items(*)')
    .eq('tenant_id', TENANT_ID)
    .eq('pro_id', recapProSelected)
    .neq('statut', 'annule')
    .gte('date_livraison', period.start)
    .lte('date_livraison', period.end)
    .order('date_livraison', { ascending: true });
  recapProLoading = false;
  if (error) {
    showToast('Erreur récap: ' + error.message, 'error');
    recapProOrders = [];
    return;
  }
  recapProOrders = data || [];
}

  const actifs = adminPros.filter(function(p) { return p.actif; });

  html += '<div class="pro-form-section">'

          + '<td><strong>' + fmtEUR(sub) + '</strong></td>'
        + '</tr>';

  mc.innerHTML = html;

function fmtEUR(n) {
  return Number(n || 0).toFixed(2).replace('.', ',') + ' €';
}

function exportRecapProCSV() {
  if (!recapProSelected || !recapProOrders.length) return;
  const pro = adminPros.find(function(p) { return p.id === recapProSelected; });
  const productsMap = {};
  (adminProducts && adminProducts.length ? adminProducts : products).forEach(function(p) { productsMap[p.id] = p; });

  const period = computeRecapPeriod();
  const proNom = pro ? pro.nom : recapProSelected;

  // CSV format français : BOM UTF-8 + séparateur ; (Excel FR utilise , comme décimal)
  let csv = '﻿';
  csv += 'Date;Pro;Boutique source;Statut;Produit;Qté;Prix unitaire;Total ligne;Notes commande\n';
  recapProOrders.forEach(function(o) {
    const items = o.pro_order_items || [];
    const boutiqueLbl = BOUTIQUE_NAMES[o.boutique_source] || o.boutique_source;
    const statutLbl = ({ brouillon: 'Brouillon', confirme: 'Confirmée', livre: 'Livrée' })[o.statut] || o.statut;
    const notes = (o.notes || '').replace(/[\r\n;]/g, ' ');
    items.forEach(function(it) {
      const prod = productsMap[it.product_id];
      const name = prod ? prod.name : it.product_id;
      const qty = Number(it.qty || 0);
      const pu = Number(it.prix_applique || 0);
      const sub = qty * pu;
      csv += [
        o.date_livraison,
        '"' + proNom.replace(/"/g, '""') + '"',
        boutiqueLbl,
        statutLbl,
        '"' + name.replace(/"/g, '""') + '"',
        String(qty).replace('.', ','),
        pu.toFixed(2).replace('.', ','),
        sub.toFixed(2).replace('.', ','),
        '"' + notes.replace(/"/g, '""') + '"'
      ].join(';') + '\n';
    });
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fname = 'recap-pro-' + recapProSelected + '-' + period.start + '_' + period.end + '.csv';
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  showToast('CSV téléchargé : ' + fname, 'sync');
}

// === v21.0.6 — RÉCAP CONSOLIDÉ SEMAINE (vue Phil/MA toutes boutiques) ===

async function setRecapWeekOffset(offset) {
  if (!recapWeekStart) recapWeekStart = mondayOfWeek(todayISO());
  recapWeekStart = addDays(recapWeekStart, offset * 7);
  await loadRecapWeekOrders();
  renderAdminPros();
}

async function resetRecapWeekToCurrent() {
  recapWeekStart = mondayOfWeek(todayISO());
  await loadRecapWeekOrders();
  renderAdminPros();
}

async function loadRecapWeekOrders() {
  if (!recapWeekStart) recapWeekStart = mondayOfWeek(todayISO());
  const weekEnd = addDays(recapWeekStart, 6);
  recapWeekLoading = true;
  renderAdminPros();
  const { data, error } = await supa
    .from('pro_orders')
    .select('*, pro_order_items(*)')
    .eq('tenant_id', TENANT_ID)
    .neq('statut', 'annule')
    .gte('date_livraison', recapWeekStart)
    .lte('date_livraison', weekEnd)

// === v21.1 — Génération auto des commandes pros récurrentes ===
// Source : pros.template_items si configuré, sinon dernière commande du même DOW (lookback 30j)
// Déclencheur : bouton manuel "🔄 Générer commandes récurrentes" dans BackOffice → Pros
// Crée les commandes en statut "brouillon" → Phil/équipe valide avant envoi

const DOW_NAMES = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];

function getDOWNameForISO(iso) {
  const d = new Date(iso + 'T12:00');
  return DOW_NAMES[d.getDay()];
}

async function openGenerateRecurringModal() {
  if (!adminProducts.length) await loadAdminProducts();
  if (!adminPros.length) await loadAdminPros();

  // Fenêtre par défaut : de demain à demain+6 (= 7 jours)
  const todayD = new Date();
  todayD.setDate(todayD.getDate() + 1);
  const defaultStart = todayD.getFullYear() + '-' + String(todayD.getMonth()+1).padStart(2,'0') + '-' + String(todayD.getDate()).padStart(2,'0');

  // State local sur l'overlay (data-attrs)
  const old = document.getElementById('generate-recurring-modal');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'generate-recurring-modal';
  overlay.className = 'modal-overlay show';
  overlay.style.zIndex = '1000';
  overlay.onclick = function(e) { if (e.target === overlay) closeGenerateRecurringModal(); };
  overlay.dataset.start = defaultStart;
  overlay.dataset.days = '7';
  // Placeholder de chargement pendant la première requête Supabase
  overlay.innerHTML = '<div class="modal" style="max-width:640px"><div class="modal-title">🔄 Générer commandes récurrentes</div><div class="modal-sub">Chargement…</div></div>';
  document.body.appendChild(overlay);

  await refreshGenerateRecurringModal();
}

async function refreshGenerateRecurringModal() {
  const overlay = document.getElementById('generate-recurring-modal');
  if (!overlay) return;
  const startISO = overlay.dataset.start;
  const days = parseInt(overlay.dataset.days, 10) || 7;

  // Charger les commandes existantes dans la fenêtre + un lookback de 30j pour le fallback
  const lookback = 30;
  const lookbackD = new Date(startISO + 'T12:00');
  lookbackD.setDate(lookbackD.getDate() - lookback);
  const lookbackISO = lookbackD.getFullYear() + '-' + String(lookbackD.getMonth()+1).padStart(2,'0') + '-' + String(lookbackD.getDate()).padStart(2,'0');
  const endD = new Date(startISO + 'T12:00');
  endD.setDate(endD.getDate() + days - 1);
  const endISO = endD.getFullYear() + '-' + String(endD.getMonth()+1).padStart(2,'0') + '-' + String(endD.getDate()).padStart(2,'0');

  const { data: existingData, error } = await supa
    .from('pro_orders')
    .select('*, pro_order_items(*)')
    .eq('tenant_id', TENANT_ID)
    .gte('date_livraison', lookbackISO)
    .lte('date_livraison', endISO)
    .neq('statut', 'annule');
  if (error) { showToast('Erreur chargement: ' + error.message, 'error'); return; }
  const existing = existingData || [];

  // Construire le plan de génération
  const plan = [];  // [{ pro, dateISO, items, source }]
  const activePros = adminPros.filter(function(p) { return p.actif; });

  for (let i = 0; i < days; i++) {
    const d = new Date(startISO + 'T12:00');
    d.setDate(d.getDate() + i);
    const dateISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const dow = DOW_NAMES[d.getDay()];

    activePros.forEach(function(pro) {
      // Le jour est-il dans jours_livraison de ce pro ?
      const jours = pro.jours_livraison || {};
      if (!jours[dow] || !jours[dow].actif) return;

      // Existe déjà ?
      if (existing.some(function(o) { return o.pro_id === pro.id && o.date_livraison === dateISO; })) return;

      // Source 1 : template_items
      let items = null;
      let source = '';
      if (Array.isArray(pro.template_items) && pro.template_items.length > 0) {
        items = pro.template_items.filter(function(t) { return t.product_id && Number(t.qty) > 0; }).map(function(t) {
          return { product_id: t.product_id, qty: Number(t.qty) };
        });
        source = 'template';
      }
      // Source 2 (fallback) : dernière commande même DOW dans le lookback
      if (!items || !items.length) {
        const sameDowOrders = existing
          .filter(function(o) {
            if (o.pro_id !== pro.id) return false;
            if (o.date_livraison >= dateISO) return false; // strictement passé
            return getDOWNameForISO(o.date_livraison) === dow;
          })
          .sort(function(a, b) { return b.date_livraison.localeCompare(a.date_livraison); });
        if (sameDowOrders.length > 0) {
          const ref = sameDowOrders[0];
          const refItems = (ref.pro_order_items || []).filter(function(it) { return it.product_id && Number(it.qty) > 0; });
          if (refItems.length) {
            items = refItems.map(function(it) {
              return { product_id: it.product_id, qty: Number(it.qty) };
            });
            source = 'lastorder:' + ref.date_livraison;
          }
        }
      }

      if (!items || !items.length) return; // ni template ni historique → skip

      plan.push({ pro: pro, dateISO: dateISO, dow: dow, items: items, source: source });
    });
  }

  // Construire HTML modal
  let inner = '<div class="modal" style="max-width:640px;width:100%;max-height:88vh;overflow-y:auto">';
  inner += '<div class="modal-title">🔄 Générer commandes récurrentes</div>';
  inner += '<div class="modal-sub">Crée des commandes pros en statut <strong>brouillon</strong> selon les jours de livraison configurés. Source : panier type si défini, sinon dernière commande du même jour de la semaine.</div>';

  // Sélecteurs date/jours
  inner += '<div style="display:flex;gap:10px;align-items:end;margin-bottom:10px">';
  inner += '<div style="flex:1"><label style="font-size:11px;color:var(--brown-mid);font-weight:700;text-transform:uppercase">Date de début</label>';
  inner += '<input type="date" id="gen-start-date" value="' + escapeHtml(startISO) + '" onchange="updateGenerateModalState(\'start\', this.value)" style="width:100%;padding:8px;border:1px solid var(--gold);border-radius:6px"></div>';
  inner += '<div style="width:120px"><label style="font-size:11px;color:var(--brown-mid);font-weight:700;text-transform:uppercase">Nb jours</label>';
  inner += '<input type="number" id="gen-days" min="1" max="30" value="' + escapeHtml(String(days)) + '" onchange="updateGenerateModalState(\'days\', this.value)" style="width:100%;padding:8px;border:1px solid var(--gold);border-radius:6px;text-align:center"></div>';
  inner += '</div>';

  // KPIs
  const nbTemplate = plan.filter(function(p) { return p.source === 'template'; }).length;
  const nbLast = plan.filter(function(p) { return p.source && p.source.indexOf('lastorder') === 0; }).length;
  inner += '<div class="prod-kpi-bar" style="margin-bottom:10px">'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--gold-dark)">' + plan.length + '</div><div class="prod-kpi-lbl">À créer</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--blue)">' + nbTemplate + '</div><div class="prod-kpi-lbl">Depuis panier</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--brown-mid)">' + nbLast + '</div><div class="prod-kpi-lbl">Depuis historique</div></div>'
    + '</div>';

  if (!plan.length) {
    inner += '<div class="empty-state" style="background:#FAF6EE;border-radius:8px;padding:14px">'
      + 'Rien à créer sur cette fenêtre.<br>'
      + '<span style="font-size:11px;color:var(--brown-mid)">Causes possibles : aucun pro actif, jours_livraison vide, commandes déjà créées, ni panier type ni historique pour ce DOW.</span>'
      + '</div>';
  } else {
    inner += '<div style="max-height:50vh;overflow-y:auto;border:1px solid #E5DCC8;border-radius:8px">';
    // Trier par date puis pro
    plan.sort(function(a, b) {
      if (a.dateISO !== b.dateISO) return a.dateISO.localeCompare(b.dateISO);
      return a.pro.nom.localeCompare(b.pro.nom);
    });
    plan.forEach(function(item, idx) {
      const srcLbl = item.source === 'template' ? '<span style="color:var(--blue)">panier</span>' : '<span style="color:var(--brown-mid)">hist. ' + escapeHtml(item.source.replace('lastorder:', '')) + '</span>';
      const productsMap = {};
      (adminProducts || []).forEach(function(p) { productsMap[p.id] = p; });
      const itemsLbl = item.items.map(function(it) {
        const prod = productsMap[it.product_id];
        return (prod ? prod.name : it.product_id) + ' × ' + it.qty;
      }).join(', ');
      inner += '<div style="padding:8px;border-bottom:1px solid #F5F0E8;background:white">';
      inner += '<div style="display:flex;gap:8px;align-items:flex-start">';
      inner += '<input type="checkbox" id="gen-chk-' + idx + '" checked style="margin-top:3px;flex-shrink:0;width:18px;height:18px">';
      inner += '<div style="flex:1;min-width:0">';
      inner += '<div style="font-size:12px"><strong style="color:var(--brown)">' + escapeHtml(formatDateFr(item.dateISO)) + '</strong>';
      inner += ' · ' + escapeHtml(item.pro.nom);
      inner += ' · ' + srcLbl + '</div>';
      inner += '<div style="font-size:11px;color:var(--brown-mid);margin-top:2px">' + escapeHtml(itemsLbl) + '</div>';
      inner += '</div></div></div>';
    });
    inner += '</div>';
  }

  inner += '<div class="modal-actions" style="margin-top:12px">';
  inner += '<button class="modal-action cancel" onclick="closeGenerateRecurringModal()">Annuler</button>';
  if (plan.length) {
    inner += '<button class="modal-action" style="background:var(--gold);color:white" onclick="applyGenerateRecurring()">Générer (' + plan.length + ')</button>';
  }
  inner += '</div>';
  inner += '</div>';

  overlay.innerHTML = inner;
  // Stocker le plan sur l'overlay pour applyGenerateRecurring
  overlay._plan = plan;
}

async function updateGenerateModalState(field, val) {
  const overlay = document.getElementById('generate-recurring-modal');
  if (!overlay) return;
  if (field === 'start') overlay.dataset.start = val;
  else if (field === 'days') overlay.dataset.days = val;
  await refreshGenerateRecurringModal();
}

function closeGenerateRecurringModal() {
  const m = document.getElementById('generate-recurring-modal');
  if (m) m.remove();
}

async function applyGenerateRecurring() {
  const overlay = document.getElementById('generate-recurring-modal');
  if (!overlay || !overlay._plan) return;
  const plan = overlay._plan;
  const toCreate = plan.filter(function(_, idx) {
    const chk = document.getElementById('gen-chk-' + idx);
    return chk && chk.checked;
  });
  if (!toCreate.length) { showToast('Rien à créer', 'error'); return; }

  if (!confirm('Créer ' + toCreate.length + ' commande(s) pro en statut "brouillon" ?')) return;

  setSyncStatus('syncing');
  let ok = 0, ko = 0;
  for (let i = 0; i < toCreate.length; i++) {
    const item = toCreate[i];
    // 1) Insérer le pro_order
    const orderRow = {
      tenant_id: TENANT_ID,
      pro_id: item.pro.id,
      date_livraison: item.dateISO,
      boutique_source: item.pro.boutique_principale || 'local',
      statut: 'brouillon',
      notes: 'Généré auto (' + (item.source === 'template' ? 'panier type' : 'historique ' + item.source.replace('lastorder:', '')) + ')',
      created_by: 'v21.1 auto'
    };
    const { data: orderRes, error: oErr } = await supa.from('pro_orders').insert(orderRow).select();
    if (oErr || !orderRes || !orderRes.length) { ko++; console.error('Création order échec:', oErr); continue; }
    const orderId = orderRes[0].id;
    // 2) Insérer les items avec prix appliqué
    const itemsRows = item.items.map(function(it) {
      return {
        pro_order_id: orderId,
        product_id: it.product_id,
        qty: it.qty,
        prix_applique: getProAppliedPrice(item.pro, it.product_id)
      };
    });
    const { error: iErr } = await supa.from('pro_order_items').insert(itemsRows);
    if (iErr) { ko++; console.error('Items échec:', iErr); continue; }
    ok++;
  }
  setSyncStatus(ko > 0 ? 'error' : 'ok');
  closeGenerateRecurringModal();
  showToast(ok + ' commande(s) créée(s)' + (ko > 0 ? ', ' + ko + ' échec(s)' : ''), ko > 0 ? 'error' : 'sync');
}

// v21.0.4 — Prix appliqué = prix spécial du pro si configuré, sinon prix_cession
function getProAppliedPrice(pro, productId) {
  if (pro && pro.prix_speciaux && pro.prix_speciaux[productId] != null) return Number(pro.prix_speciaux[productId]);
  const all = (adminProducts && adminProducts.length) ? adminProducts : products;
  const prod = all.find(function(p) { return p.id === productId; });
  return (prod && prod.prix_cession != null) ? Number(prod.prix_cession) : null;
}

// v21.0.4 — Catalogue visible pour ce pro : actifs + (standards OU pros_only de ce pro) + catalogue restreint
function getProAvailableProducts(pro) {
  if (!pro) return [];
  const all = (adminProducts && adminProducts.length) ? adminProducts : products;
  return all.filter(function(p) {
    if (!p.actif) return false;
    if (p.pros_only_id && p.pros_only_id !== pro.id) return false;
    if (Array.isArray(pro.catalogue_restreint) && pro.catalogue_restreint.length > 0) {
      if (pro.catalogue_restreint.indexOf(p.id) === -1) return false;
    }
    return true;
  });
}

function openProOrderForm(orderId) {
  editingProOrderId = orderId;
  if (orderId === 'new') {
    // Date par défaut = demain
    const tmw = new Date();
    tmw.setDate(tmw.getDate() + 1);
    const tmwISO = tmw.toISOString().substring(0, 10);
    proOrderDraft = {
      id: null,

function closeProOrderForm() {

  proOrderDraft = null;
  renderProOrders();
}

function handleProOrderField(field, val) {
  if (!proOrderDraft) return;
  proOrderDraft[field] = val;
  // Quand on change le pro : auto-définir boutique_source = boutique_principale du pro
  if (field === 'pro_id') {
    const pro = adminPros.find(function(p) { return p.id === val; });
    if (pro) proOrderDraft.boutique_source = pro.boutique_principale || currentBoutique;
    // Et recalculer les prix_applique des items existants
    proOrderDraft.items.forEach(function(it) {
      if (it.product_id) it.prix_applique = getProAppliedPrice(pro, it.product_id);
    });
  }
  renderProOrders();
}

function handleProOrderItemField(idx, field, val) {
  if (!proOrderDraft || !proOrderDraft.items[idx]) return;
  if (field === 'qty') {
    const n = parseFloat(String(val).replace(',', '.'));
    proOrderDraft.items[idx].qty = isNaN(n) ? 0 : n;
  } else if (field === 'product_id') {
    proOrderDraft.items[idx].product_id = val;
    // Recalculer le prix
    const pro = adminPros.find(function(p) { return p.id === proOrderDraft.pro_id; });
    proOrderDraft.items[idx].prix_applique = val ? getProAppliedPrice(pro, val) : null;
    renderProOrders();
  } else {
    proOrderDraft.items[idx][field] = val;
  }
}

function addProOrderItem() {
  if (!proOrderDraft) return;
  proOrderDraft.items.push({ id: null, product_id: '', qty: 1, prix_applique: null });
  renderProOrders();
}

function removeProOrderItem(idx) {
  if (!proOrderDraft) return;
  proOrderDraft.items.splice(idx, 1);
  renderProOrders();
}

async function saveProOrder() {
  const d = proOrderDraft;
  if (!d) return;
  if (!d.pro_id) { showToast('Choisis un pro', 'error'); return; }
  if (!d.date_livraison) { showToast('Date de livraison obligatoire', 'error'); return; }
  if (!d.boutique_source) { showToast('Boutique source obligatoire', 'error'); return; }
  const validItems = d.items.filter(function(it) { return it.product_id && Number(it.qty) > 0; });
  if (!validItems.length && !((d.notes || '').trim())) {
    showToast('Ajoute au moins 1 produit ou une demande spéciale', 'error'); return;
  }
  setSyncStatus('syncing');
  const isNew = (editingProOrderId === 'new');
  const orderRow = {
    tenant_id: TENANT_ID,
    pro_id: d.pro_id,
    date_livraison: d.date_livraison,
    boutique_source: d.boutique_source,
    statut: d.statut || 'confirme',
    notes: (d.notes || '').trim() || null,
    created_by: currentBoutique
  };
  let orderId = d.id;
  if (isNew) {
    const res = await supa.from('pro_orders').insert(orderRow).select();
    if (res.error) { setSyncStatus('error'); showToast(res.error.message, 'error'); return; }
    if (!res.data || !res.data.length) {
      setSyncStatus('error');
      alert('Création bloquée par Supabase (RLS). Vérifie les policies sur pro_orders.');
      return;
    }
    orderId = res.data[0].id;
  } else {
    const res = await supa.from('pro_orders').update(orderRow).eq('id', orderId).select();
    if (res.error) { setSyncStatus('error'); showToast(res.error.message, 'error'); return; }
    if (!res.data || !res.data.length) {
      setSyncStatus('error');
      alert('Modif bloquée par Supabase (RLS). Vérifie les policies sur pro_orders.');
      return;
    }
    // Strategy : full-replace items. DELETE old, INSERT new.
    const del = await supa.from('pro_order_items').delete().eq('pro_order_id', orderId);
    if (del.error) { setSyncStatus('error'); showToast('Erreur suppression items : ' + del.error.message, 'error'); return; }
  }
  // INSERT items
  if (validItems.length) {
    const itemsRows = validItems.map(function(it) {
      return {
        pro_order_id: orderId,
        product_id: it.product_id,
        qty: Number(it.qty),
        prix_applique: it.prix_applique != null ? Number(it.prix_applique) : null
      };
    });
    const insItems = await supa.from('pro_order_items').insert(itemsRows);
    if (insItems.error) { setSyncStatus('error'); showToast('Erreur ajout items : ' + insItems.error.message, 'error'); return; }
  }
  setSyncStatus('ok');
  await loadProOrders(currentBoutique);
  closeProOrderForm();
  showToast(isNew ? 'Commande creee' : 'Commande modifiee', 'sync');
}

async function cancelProOrder(orderId) {
  if (!confirm('Annuler cette commande ?\n\nElle restera en historique avec statut "annule" mais ne sera plus traitee en production.')) return;
  setSyncStatus('syncing');
  const { data, error } = await supa.from('pro_orders').update({ statut: 'annule' }).eq('id', orderId).select();

    setSyncStatus('error');
    alert('Annulation bloquée par Supabase (RLS).');
    return;
  }
  setSyncStatus('ok');
  await loadProOrders(currentBoutique);
  renderProOrders();
  showToast('Commande annulee', 'sync');
}

// v20.42 — Charge les pro_orders sur 7 jours (J à J+6) pour anticiper
async function loadProOrdersForProductionWeek(boutique, startDate) {
  // v20.61 — charge du lundi de la semaine jusqu'à J+6 (couvre la bande semaine ET la section "à anticiper")
  const dow = new Date(startDate + 'T12:00').getDay();
  const weekStart = addDays(startDate, dow === 0 ? -6 : 1 - dow);
  const endDate = addDays(startDate, 6);
  const { data, error } = await supa
    .from('pro_orders')
    .select('*, pro_order_items(*)')
    .eq('tenant_id', TENANT_ID)
    .eq('boutique_source', boutique)
    .gte('date_livraison', weekStart)
    .lte('date_livraison', endDate)
    .neq('statut', 'annule')
    .order('date_livraison', { ascending: true });
  if (error) { productionProOrdersWeek = []; return; }
  productionProOrdersWeek = data || [];
}

// v21.0.4.3 — Agrégation pour la vue Production : { product_id: { totalQty, byPro: [...] } }
// Pour Le Local Prod. Boulangers : filtre items pains
// Pour Le Local Prod. Touriers : filtre items viennoiserie + brioches_special
// Pour Veigné Pâtissier : tous les items
function aggregateProOrdersForProduction(vue) {
  const allProds = (adminProducts && adminProducts.length) ? adminProducts : products;
  const prodById = {};
  allProds.forEach(function(p) { prodById[p.id] = p; });

  const result = {}; // product_id -> { totalQty, byPro: { pro_id: qty } }
  productionProOrdersData.forEach(function(o) {
    (o.pro_order_items || []).forEach(function(it) {
      const prod = prodById[it.product_id];
      if (!prod) return;
      // Filtre par vue (catégorie produit)
      if (vue === 'prod_boul' && prod.category !== 'pains') return;
      if (vue === 'prod_tour' && prod.category !== 'viennoiserie' && prod.category !== 'brioches_special') return;
      if (!result[it.product_id]) result[it.product_id] = { totalQty: 0, byPro: {} };
      const qty = Number(it.qty) || 0;
      result[it.product_id].totalQty += qty;
      if (!result[it.product_id].byPro[o.pro_id]) result[it.product_id].byPro[o.pro_id] = 0;
      result[it.product_id].byPro[o.pro_id] += qty;
    });
  });
  return result;
}

function _proOrderInPeriod(o) {
  const todayISOval = todayISO();
  const tmw = new Date(); tmw.setDate(tmw.getDate() + 1);
  const tmwISO = tmw.toISOString().substring(0, 10);
  const sun = new Date(); sun.setDate(sun.getDate() + (7 - sun.getDay()));
  const sunISO = sun.toISOString().substring(0, 10);
  if (proOrderFilterPeriod === 'today')    return o.date_livraison === todayISOval;
  if (proOrderFilterPeriod === 'tomorrow') return o.date_livraison === tmwISO;
  // 'week' : aujourd'hui jusqu'à dimanche
  return o.date_livraison >= todayISOval && o.date_livraison <= sunISO;
}

}

// === v20.37 — Détection de doublons produit ===

// Normalise un nom : accents/casse/espaces ignorés pour comparaison
function normalizeProductName(s) {
  return String(s || '')
    .normalize('NFD').replace(/[̀-ͯ]/g, '') // strip diacritics (combining marks)
    .toLowerCase()
    .trim()
    .replace(/\s+/g, ' ');
}

// Groupe les produits par nom normalisé, retourne les groupes de ≥ 2
function computeDoublons() {
  const groups = {};
  adminProducts.forEach(function(p) {
    const k = normalizeProductName(p.name);
    if (!k) return;
    if (!groups[k]) groups[k] = [];
    groups[k].push(p);
  });
  return Object.keys(groups)
    .filter(function(k) { return groups[k].length >= 2; })
    .sort()
    .map(function(k) { return { key: k, products: groups[k] }; });
}

// === v20.39 — Outil de migration des unités mal saisies ===
// Beaucoup de produits ont historiquement `unit = "caisse"` (ou "grille", "sac"...)
// alors que `unit` devrait être l'unité de VENTE (pièce / kg / L) et que le
// conditionnement (caisse/grille/sac) appartient à `conditioning_unit` v20.33.
// Cet outil détecte ces cas et propose une migration en masse.

const MIGRATION_WRONG_UNITS = ['caisse', 'grille', 'sac', 'seau', 'carton'];

function computeUnitsToMigrate() {
  return adminProducts.filter(function(p) {
    const u = String(p.unit || '').trim().toLowerCase();
    return MIGRATION_WRONG_UNITS.indexOf(u) !== -1;
  }).map(function(p) {
    const wrongUnit = String(p.unit || '').trim().toLowerCase();
    // Hint pour conditioning_qty : valeur de pces_per_caisse si existante
    let suggestedQty = null;
    if (p.conditioning_qty != null) suggestedQty = p.conditioning_qty;
    else if (p.pces_per_caisse != null && !isNaN(p.pces_per_caisse)) {
      const v = Math.round(Number(p.pces_per_caisse));
      if (v >= 1 && v <= 200) suggestedQty = v;
    }
    return {
      product: p,
      newUnit: 'pièce',
      newConditioningUnit: wrongUnit,
      newConditioningQty: suggestedQty
    };
  });
}

function openMigrationUnitsModal() {
  const candidates = computeUnitsToMigrate();
  const old = document.getElementById('migration-units-modal');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'migration-units-modal';
  overlay.className = 'modal-overlay show';
  overlay.style.zIndex = '1000';
  overlay.onclick = function(e) { if (e.target === overlay) closeMigrationUnitsModal(); };

  let inner = '<div class="modal" style="max-width:600px;width:100%;max-height:85vh;overflow-y:auto">';
  inner += '<div class="modal-title">🔧 Migrer les unités</div>';

  if (!candidates.length) {
    inner += '<div class="modal-sub" style="color:var(--green);font-weight:600">✓ Aucun produit à migrer. Toutes les unités sont propres.</div>';
    inner += '<div class="modal-actions" style="margin-top:10px"><button class="modal-action cancel" onclick="closeMigrationUnitsModal()">Fermer</button></div>';
    inner += '</div>';
    overlay.innerHTML = inner;
    document.body.appendChild(overlay);
    return;
  }

  inner += '<div class="modal-sub">' + candidates.length + ' produit' + (candidates.length > 1 ? 's' : '') + ' avec unit ∈ {caisse, grille, sac, seau, carton}. Coche ceux à migrer puis Appliquer.</div>';
  inner += '<div style="margin-bottom:10px;display:flex;gap:8px"><button class="btn-gold-sm" onclick="toggleAllMigrationChecks(true)">Tout cocher</button><button class="btn-gold-sm" onclick="toggleAllMigrationChecks(false)">Tout décocher</button></div>';

  inner += '<div style="max-height:55vh;overflow-y:auto;border:1px solid #E5DCC8;border-radius:8px">';
  candidates.forEach(function(c, idx) {
    const p = c.product;

async function applyUnitsMigration() {
  const candidates = computeUnitsToMigrate();
  const toApply = [];
  candidates.forEach(function(c, idx) {
    const chk = document.getElementById('mig-chk-' + idx);
    if (!chk || !chk.checked) return;
    const qtyEl = document.getElementById('mig-qty-' + idx);
    const qtyRaw = qtyEl ? qtyEl.value.trim() : '';
    let qty = null;
    if (qtyRaw) {
      const n = parseInt(qtyRaw, 10);
      if (!isNaN(n) && n >= 1 && n <= 200) qty = n;
    }
    toApply.push({
      pid: c.product.id,
      newUnit: c.newUnit,
      newCondUnit: c.newConditioningUnit,
      newCondQty: qty
    });
  });

  if (!toApply.length) {
    showToast('Rien à migrer', 'error');
    return;
  }

  if (!confirm('Migrer ' + toApply.length + ' produit(s) ?\n\nunit → "pièce"\nconditioning_unit → ancien unit\nconditioning_qty → valeur saisie\n\nAction réversible via édition individuelle.')) return;

  setSyncStatus('syncing');
  let ok = 0, ko = 0;
  for (let i = 0; i < toApply.length; i++) {
    const r = toApply[i];
    const updateFields = {
      unit: r.newUnit,
      conditioning_unit: r.newCondQty != null ? r.newCondUnit : null,
      conditioning_qty: r.newCondQty
    };
    const { error } = await supa.from('products').update(updateFields).eq('id', r.pid);
    if (error) {
      ko++;
      console.error('Migration échouée pour ' + r.pid, error);
    } else {
      ok++;
    }
  }
  setSyncStatus(ko > 0 ? 'error' : 'ok');
  await loadAdminProducts();
  await loadProducts();
  closeMigrationUnitsModal();
  renderAdminProducts();
  showToast(ok + ' produit(s) migré(s)' + (ko > 0 ? ', ' + ko + ' échec(s)' : ''), ko > 0 ? 'error' : 'sync');
}

function getMondayOf(dateStr) {
const d = new Date(dateStr + 'T12:00');
const dow = d.getDay(); // 0=dim, 1=lun
const shift = dow === 0 ? -6 : (1 - dow);
d.setDate(d.getDate() + shift);
return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function changeValoWeek(delta) {

// par product_id : { last_real_qty, last_real_at, receipts_since, outputs_since, theoretical, seuil }
};

async function loadStockData() {
// 1. Dernier inventaire de chaque produit
const { data: invRows } = await supa.from('stock_inventory').select('*').eq('tenant_id', TENANT_ID).order('inventoried_at', { ascending: false });
// 2. Receptions fournisseur (toutes)
const { data: recRows } = await supa.from('stock_receipts').select('*').eq('tenant_id', TENANT_ID);
// 3. Réappros envoyés aux boutiques (qty_livree si défini, sinon commander) - sert au calcul sorties
const { data: reapRows } = await supa.from('reappros').select('*').eq('tenant_id', TENANT_ID);

// Grouper par produit
const byProd = {};
(invRows || []).forEach(function(r) {
if (!byProd[r.product_id]) byProd[r.product_id] = { last_real: null };
if (!byProd[r.product_id].last_real) byProd[r.product_id].last_real = r; // le + recent
});
(recRows || []).forEach(function(r) {
if (!byProd[r.product_id]) byProd[r.product_id] = { last_real: null };
byProd[r.product_id].receipts = byProd[r.product_id].receipts || [];
byProd[r.product_id].receipts.push(r);
});
(reapRows || []).forEach(function(r) {
if (!byProd[r.product_id]) byProd[r.product_id] = { last_real: null };
byProd[r.product_id].reappros = byProd[r.product_id].reappros || [];
byProd[r.product_id].reappros.push(r);
});

stockData = {};
products.forEach(function(p) {
// Ne suivre stock QUE viennoiserie + brioches (Phil a confirme)
if (p.category !== 'viennoiserie' && p.category !== 'brioches_special') return;
const entry = byProd[p.id] || {};
const baseReal = entry.last_real ? parseQty(entry.last_real.qty_real) : 0;
const baseDate = entry.last_real ? entry.last_real.inventoried_at : null;
// Receptions depuis baseDate
let recSince = 0;
(entry.receipts || []).forEach(function(r) {
if (!baseDate || r.received_at > baseDate) recSince += parseQty(r.qty);
});
// Sorties reappros depuis baseDate (prend qty_livree si défini, sinon commander)
let outSince = 0;
(entry.reappros || []).forEach(function(r) {
if (!baseDate || (r.updated_at && r.updated_at > baseDate)) {
if (r.qty_livree != null) outSince += parseQty(r.qty_livree);
else if (r.commander != null) outSince += parseQty(r.commander);
}
});
const theo = baseReal + recSince - outSince;
stockData[p.id] = {
product: p,
last_real: baseReal,
last_real_at: baseDate,
receipts_since: recSince,
outputs_since: outSince,
theoretical: Math.max(0, theo),
seuil: p.seuil_stock != null ? parseQty(p.seuil_stock) : null
};
});
}

byCat[cat].forEach(function(e) {

// v20.38 — Conditionnement sous le nom (Stock Local)
const condTxtSt = formatConditioning(e.product);
html += '<div><div class="produit-name">' + escapeHtml(e.product.name) + '</div>' + (condTxtSt ? '<div class="produit-unit">' + escapeHtml(condTxtSt) + '</div>' : '') + '</div>';
html += '<div class="stock-cell">' + theo + '</div>';
html += '<div class="stock-cell"><input type="text" inputmode="decimal" class="qty-input stock-real-inp" data-pid="' + e.product.id + '" placeholder="' + real + '" onchange="saveStockReal(this)"></div>';
html += '<div class="stock-cell ' + ecartCls + '">' + (ecart > 0 ? '+' : '') + ecart + '</div>';
html += '<div class="stock-cell">' + (seuil != null ? seuil : '<span style="color:#bbb">-</span>') + '</div>';
html += '</div>';
});
