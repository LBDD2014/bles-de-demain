// === RECAP SEMAINE ===
async function loadRecapWeek(b, monday) {
const sunday = addDays(monday, 6);
const { data, error } = await supa.from('sales').select('*')
.eq('tenant_id', TENANT_ID).eq('boutique_id', b)
.gte('date', monday).lte('date', sunday);
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
recapWeekData = {};
const days = weekDaysFromMonday(monday);
days.forEach(function(d) { recapWeekData[d] = []; });
(data || []).forEach(function(r) {
if (!recapWeekData[r.date]) recapWeekData[r.date] = [];
recapWeekData[r.date].push(r);
});
}

function calcDayStats(dayISO) {
const rows = recapWeekData[dayISO] || [];
let totalVendu = 0, totalProduit = 0, totalPerte = 0, totalResteJ1 = 0;
let productsMap = {};
rows.forEach(function(r) {
if (r.day_closed !== true) return;  // v20.5 — exclure les journées non validées
if (recapMode === 'category' && recapCategory !== 'all') {
const p = products.find(function(x) { return x.id === r.product_id; });
if (!p || p.category !== recapCategory) return;
}
const m  = r.matin == null ? 0 : r.matin;
const a  = r.aprem == null ? 0 : r.aprem;
const rj = r.reste_j1 == null ? 0 : r.reste_j1;
const pe = r.perte == null ? 0 : r.perte;
const total = m + a;
const vendu = Math.max(0, total - rj - pe);
totalVendu += vendu;
totalProduit += total;
totalPerte += pe;
totalResteJ1 += rj;
productsMap[r.product_id] = (productsMap[r.product_id] || 0) + vendu;
});
// %Perte : sur la PERTE seulement (pas Reste J1)
const pertePct = totalProduit > 0 ? Math.round((totalPerte / totalProduit) * 100) : null;
return { vendu: totalVendu, produit: totalProduit, perte: totalPerte, resteJ1: totalResteJ1, pertePct: pertePct, products: productsMap };
}

function calcWeekStats() {
const days = weekDaysFromMonday(currentWeekStart);
let totalV = 0, totalP = 0, totalPerte = 0, totalRJ1 = 0;
let dayWithRupture = new Set();
let productsSold = {};
let productsLost = {};
days.forEach(function(d) {
const rows = recapWeekData[d] || [];
rows.forEach(function(r) {
if (r.day_closed !== true) return;  // v20.5 — exclure les journées non validées
if (recapMode === 'category' && recapCategory !== 'all') {
const p = products.find(function(x) { return x.id === r.product_id; });
if (!p || p.category !== recapCategory) return;
}
const m  = r.matin == null ? 0 : r.matin;
const a  = r.aprem == null ? 0 : r.aprem;
const rj = r.reste_j1 == null ? 0 : r.reste_j1;
const pe = r.perte == null ? 0 : r.perte;
const total = m + a;
const vendu = Math.max(0, total - rj - pe);
totalV += vendu;
totalP += total;
totalPerte += pe;
totalRJ1 += rj;
if (r.rupture_heure) dayWithRupture.add(d);
productsSold[r.product_id] = (productsSold[r.product_id] || 0) + vendu;
if (total > 0) {
if (!productsLost[r.product_id]) productsLost[r.product_id] = { perte: 0, total: 0 };
productsLost[r.product_id].perte += pe;
productsLost[r.product_id].total += total;
}
});
});
// %Perte : sur la PERTE seulement (pas Reste J1)
const pertePct = totalP > 0 ? Math.round((totalPerte / totalP) * 100) : null;
return {
vendu: totalV, produit: totalP, perte: totalPerte, resteJ1: totalRJ1, pertePct: pertePct,
daysWithRupture: dayWithRupture.size,
productsSold: productsSold, productsLost: productsLost
};
}

function renderBarChart(days, values, maxVal) {
const W = 320, H = 160, PAD = 24, BARW = 28;
const chartW = W - PAD * 2;
const barGap = (chartW - BARW * 7) / 6;
const max = Math.max(maxVal, 1);
let svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
svg += '<line x1="' + PAD + '" y1="' + (H-22) + '" x2="' + (W-PAD) + '" y2="' + (H-22) + '" stroke="#E0D8C8" stroke-width="1"/>';
days.forEach(function(d, i) {
const v = values[i] || 0;
const h = v === 0 ? 2 : ((H - 40) * v / max);
const x = PAD + i * (BARW + barGap);
const y = H - 22 - h;
const isToday = (d === todayISO());
const color = isToday ? '#CEAB52' : '#2C5F8A';
svg += '<rect x="' + x + '" y="' + y + '" width="' + BARW + '" height="' + h + '" fill="' + color + '" rx="4"/>';
if (v > 0) {
svg += '<text x="' + (x + BARW/2) + '" y="' + (y - 4) + '" text-anchor="middle" fill="#3D2B1F" font-size="10" font-weight="700">' + v + '</text>';
}
svg += '<text x="' + (x + BARW/2) + '" y="' + (H - 6) + '" text-anchor="middle" fill="#6B4226" font-size="10">' + formatDayShort(d).split(' ')[0] + '</text>';
});
svg += '</svg>';
return svg;
}

function renderLineChart(days, values) {
const W = 320, H = 160, PAD = 28;
const chartW = W - PAD * 2;
const stepX = chartW / 6;
const max = 30;
let svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
const y0 = H - 22, h10 = (H-40) * 10/max, h20 = (H-40) * 20/max;
svg += '<rect x="' + PAD + '" y="' + (y0-h10) + '" width="' + chartW + '" height="' + h10 + '" fill="#EEF7F2" opacity="0.5"/>';
svg += '<rect x="' + PAD + '" y="' + (y0-h20) + '" width="' + chartW + '" height="' + (h20-h10) + '" fill="#FEF3EC" opacity="0.5"/>';
svg += '<rect x="' + PAD + '" y="18" width="' + chartW + '" height="' + (y0-h20-18) + '" fill="#FEF2F2" opacity="0.5"/>';
svg += '<text x="' + (PAD-4) + '" y="' + (y0+3) + '" text-anchor="end" fill="#6B4226" font-size="9">0%</text>';
svg += '<text x="' + (PAD-4) + '" y="' + (y0-h10+3) + '" text-anchor="end" fill="#6B4226" font-size="9">10%</text>';
svg += '<text x="' + (PAD-4) + '" y="' + (y0-h20+3) + '" text-anchor="end" fill="#6B4226" font-size="9">20%</text>';
let pts = [];
let validPts = [];
days.forEach(function(d, i) {
const v = values[i];
const x = PAD + i * stepX;
if (v !== null && v !== undefined) {
const cappedV = Math.min(v, max);
const y = y0 - (H-40) * cappedV / max;
pts.push(x + ',' + y);
validPts.push({ x: x, y: y, v: v, d: d });
}
});
if (pts.length > 1) {
svg += '<polyline points="' + pts.join(' ') + '" fill="none" stroke="#474950" stroke-width="2"/>';
}
validPts.forEach(function(p) {
const color = p.v > 20 ? '#B83232' : p.v > 10 ? '#D4701A' : '#4A7C59';
svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="5" fill="' + color + '" stroke="white" stroke-width="2"/>';
svg += '<text x="' + p.x + '" y="' + (p.y - 10) + '" text-anchor="middle" fill="' + color + '" font-size="10" font-weight="700">' + p.v + '%</text>';
});
days.forEach(function(d, i) {
const x = PAD + i * stepX;
svg += '<text x="' + x + '" y="' + (H - 6) + '" text-anchor="middle" fill="#6B4226" font-size="10">' + formatDayShort(d).split(' ')[0] + '</text>';
});
svg += '</svg>';

async function toggleDelivered(id, currentVal) {

delivered_at: newVal ? new Date().toISOString() : null,
delivered_by: newVal ? DEVICE_ID : null,
updated_by: DEVICE_ID, updated_at: new Date().toISOString()
};

async function moveStop(id, delta) {
const stopsForTour = deliveriesData.filter(function(d) { return d.tour === currentTour; })
.sort(function(a, b) { return a.position - b.position; });
const idx = stopsForTour.findIndex(function(d) { return d.id === id; });
if (idx < 0) return;
const newIdx = idx + delta;
if (newIdx < 0 || newIdx >= stopsForTour.length) return;
const a = stopsForTour[idx], b = stopsForTour[newIdx];
const tmp = a.position;
a.position = b.position;
b.position = tmp;
setSyncStatus('syncing');
const { error: e1 } = await supa.from('deliveries').update({ position: a.position, updated_by: DEVICE_ID, updated_at: new Date().toISOString() }).eq('id', a.id);
const { error: e2 } = await supa.from('deliveries').update({ position: b.position, updated_by: DEVICE_ID, updated_at: new Date().toISOString() }).eq('id', b.id);
if (e1 || e2) { setSyncStatus('error'); showToast((e1 || e2).message, 'error'); return; }
setSyncStatus('ok');
renderLivraison();
}

async function deleteStop(id) {
if (!confirm('Supprimer cet arrêt ?')) return;
setSyncStatus('syncing');
const { error } = await supa.from('deliveries').delete().eq('id', id);
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
await loadDeliveries(currentDate);
renderLivraison();
}

}

// v20.1 : Validation produit par produit côté livreur
async function renderLivreurValidations() {
// Charger reappros du jour non encore livrés
const { data: reaps } = await supa.from('reappros').select('*')
.eq('tenant_id', TENANT_ID)
.eq('service_date', currentDate)
.not('sent_at', 'is', null); // ne montrer que les commandes ENVOYÉES
const byBoutique = {};
(reaps || []).forEach(function(r) {
const cmd = parseQty(r.commander);
if (cmd <= 0) return;
if (!byBoutique[r.boutique_id]) byBoutique[r.boutique_id] = [];
byBoutique[r.boutique_id].push(r);
});

const boutiques = Object.keys(byBoutique);
if (!boutiques.length) {
return '<div class="info-banner">Aucun reappro envoyé pour ' + escapeHtml(formatDateFr(currentDate)) + '.</div>';
}

let html = '<div class="info-banner"><strong>Validations reappros</strong><br>Coche chaque ligne livree, ou appuie sur "Tout valider [Boutique]". Si manque, tape la qte reelle livree.</div>';

boutiques.forEach(function(bid) {
const items = byBoutique[bid];
const totalItems = items.length;
const validatedItems = items.filter(function(r) { return r.livre_at != null; }).length;
const progressPct = totalItems > 0 ? Math.round(validatedItems / totalItems * 100) : 0;
html += '<div class="section reappro-section">';
html += '<div class="section-header section-header-reappro">'

+ '<span>' + escapeHtml(BOUTIQUE_NAMES[bid] || bid) + ' (' + validatedItems + '/' + totalItems + ')</span>'
+ '<button class="send-btn' + (validatedItems === totalItems ? ' disabled' : '') + '" onclick="validateAllBoutique(\'' + bid + '\')">Tout valider</button>'
+ '</div>';
  items.sort(function(a, b) {
  const pa = products.find(function(x) { return x.id === a.product_id; });
  const pb = products.find(function(x) { return x.id === b.product_id; });
  return (pa ? pa.name : '').localeCompare(pb ? pb.name : '');
  });
  items.forEach(function(r) {
  const p = products.find(function(x) { return x.id === r.product_id; });
  if (!p) return;
  const cmdQty = parseQty(r.commander);
  const livreeQty = r.qty_livree != null ? parseQty(r.qty_livree) : null;
  const isLivre = r.livre_at != null;
  const livreDisplay = livreeQty != null ? livreeQty : cmdQty;
  const isPartial = livreeQty != null && livreeQty < cmdQty;
  html += '<div class="livreur-row' + (isLivre ? ' validated' : '') + (isPartial ? ' partial' : '') + '">';
  html += '<div><div class="produit-name">' + escapeHtml(p.name) + '</div><div class="produit-unit">Cmd : ' + cmdQty + '</div></div>';
  html += '<input type="number" inputmode="numeric" min="0" class="qty-input livreur-qty" data-rid="' + r.id + '" placeholder="' + cmdQty + '" value="' + (livreeQty != null ? livreeQty : '') + '" onchange="updateLivreeQty(this)">';
  html += '<button class="livreur-check ' + (isLivre ? 'checked' : '') + '" onclick="toggleLivre(\'' + r.id + '\', ' + isLivre + ')">✓</button>';
  html += '</div>';
  });
  html += '</div>';
  });

return html;
}

let update;
if (wasLivre) {
update = { livre_at: null, qty_livree: null, livre_by: null };
} else {
// Si une qty_livree est saisie sur l'input dans la page, la prendre
const input = document.querySelector('input[data-rid="' + rid + '"]');

async function validateAllBoutique(bid) {
if (!confirm('Valider TOUS les reappros de ' + (BOUTIQUE_NAMES[bid] || bid) + ' ? Les qtes livrees prennent les qtes commandees par defaut.')) return;
setSyncStatus('syncing');
const { data: reaps } = await supa.from('reappros').select('*')
.eq('tenant_id', TENANT_ID).eq('boutique_id', bid).eq('service_date', currentDate)
.not('sent_at', 'is', null).is('livre_at', null);
const rows = (reaps || []).map(function(r) {
return {
id: r.id, tenant_id: r.tenant_id, boutique_id: r.boutique_id, product_id: r.product_id,
service_date: r.service_date,
avoir: r.avoir, commander: r.commander, previs: r.previs,
supplier: r.supplier, sent_at: r.sent_at,
livre_at: new Date().toISOString(),
qty_livree: parseQty(r.commander),
livre_by: DEVICE_ID,
updated_by: DEVICE_ID, updated_at: new Date().toISOString()
};
});
if (rows.length) {
const { error } = await supa.from('reappros').upsert(rows, { onConflict: 'id' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
}
setSyncStatus('ok');
// Déduire stock pour chaque produit suivi

await maybeDeductStock(r.id, false);
}

showToast(rows.length + ' reappros valides', 'sync');
}

async function maybeDeductStock(rid, wasAlreadyLivre) {
// Si déjà livré, on ne fait rien (la 1re validation a déjà deduit)
if (wasAlreadyLivre) return;
// Charger la ligne pour savoir quel produit et quelle qte
const { data: r } = await supa.from('reappros').select('*').eq('id', rid).single();
if (!r) return;
const p = products.find(function(x) { return x.id === r.product_id; });
if (!p) return;
if (p.category !== 'viennoiserie' && p.category !== 'brioches_special') return;
// La deduction se fait automatiquement dans le calcul du stock Local (loadStockData prend déjà qty_livree en compte)
// Rien a faire ici : le stock recalculera au prochain affichage.
}

  };

// v20.18 — Upsert d'un champ sales St-Av depuis Le Local (édition Aprem ou Reste J-1)
async function upsertStAvSaleFieldFromLocal(pid, field, val) {
  const cache = productionStAvSalesFromTable[pid] || { matin: null, aprem: null, reste_j1: null };
  const parsed = (val === '' || val == null) ? null : (parseInt(val, 10) || 0);
  cache[field] = parsed;

  setSyncStatus('syncing');
  const { error } = await supa.from('sales').upsert({
    tenant_id: TENANT_ID, boutique_id: 'saint-avertin', product_id: pid, date: currentReapproDate,
    matin: cache.matin, aprem: cache.aprem, reste_j1: cache.reste_j1,

  }, { onConflict: 'tenant_id,boutique_id,product_id,date' });

  else { setSyncStatus('ok'); }
}

async function loadSpecialOrdersForProduction(date) {

productionSpecialByProduct = {};

.eq('tenant_id', TENANT_ID)

const { data: itemsData } = await supa.from('special_order_items').select('*').in('order_id', ids);

function parseQty(v) {
if (v == null || v === '') return 0;
const n = parseFloat(String(v).replace(',', '.'));
return isNaN(n) ? 0 : n;
}

function formatQty(n) {
if (!n) return '0';
return (Math.round(n * 100) / 100).toString().replace('.', ',');
}

async function copyStockFromPreviousDay() {
const d = new Date(currentReapproDate + 'T12:00');
d.setDate(d.getDate() - 1);
const prevISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
const prevData = await loadProductionLocalDate(prevISO);
const reportableProducts = products.filter(function(p) {
return REPORTABLE_CATS.indexOf(p.category) !== -1;
});
const toCarry = reportableProducts.filter(function(p) {
const prev = prevData[p.id];
return prev && prev.stock && prev.stock !== '' && parseQty(prev.stock) > 0;
});
if (!toCarry.length) {
showToast('Aucun stock a reporter depuis ' + prevISO, 'error');
return;
}
if (!confirm('Reporter le stock de ' + toCarry.length + ' produit(s) depuis ' + prevISO + ' ?')) return;
setSyncStatus('syncing');
const rows = toCarry.map(function(p) {
const existing = productionLocalData[p.id] || {};
return {
tenant_id: TENANT_ID,
product_id: p.id,
service_date: currentReapproDate,
produit: existing.produit === '' || existing.produit == null ? null : parseQty(existing.produit),
stock: parseQty(prevData[p.id].stock),
updated_by: DEVICE_ID,
updated_at: new Date().toISOString()
};
});
const { error } = await supa.from('production_local').upsert(rows, { onConflict: 'tenant_id,service_date,product_id' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
await loadProductionLocal(currentReapproDate);
renderProduction();
showToast(toCarry.length + ' stocks reportes depuis ' + prevISO, 'sync');
}

function handleProductionInput(el) {
const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
if (!productionLocalData[pid]) productionLocalData[pid] = { produit: '', stock: '' };
productionLocalData[pid][field] = val;
if (field === 'produit') el.classList.toggle('has-prod', !!val);
else el.classList.toggle('has-stock', !!val);
const ecartEl = document.getElementById('ecart_' + pid);
if (ecartEl) {
const cmd = parseQty(ecartEl.dataset.cmd);
const p = parseQty(productionLocalData[pid].produit);
const s = parseQty(productionLocalData[pid].stock);
const dispo = p + s;
if (p === 0 && s === 0 && cmd === 0) {
ecartEl.innerHTML = '<span class="ecart-badge zero">-</span>';
} else {
const e = dispo - cmd;
const eTxt = e === 0 ? '0' : (e > 0 ? '+' + formatQty(e) : formatQty(e));
const eCls = e >= 0 ? 'ok' : 'bad';
ecartEl.innerHTML = '<span class="ecart-badge ' + eCls + '">' + eTxt + '</span>';
}
}
clearTimeout(updateTimers['pl_' + pid]);
updateTimers['pl_' + pid] = setTimeout(function() { upsertProductionLocal(pid); }, 400);
}

// Helper commun : recalcule Total = Matin V + Matin SA + Spé pour une ligne
// v20.22 — Matin SA depuis previs (cohérent avec Veigné). Au Local Boul, on inclut Aprem - Reste J-1 (sales St-Av).
function recomputeRowTotal(el, pid) {
  const row = el.closest('.prod-row');
  if (!row) return;
  const totalCell = row.querySelector('.cell.total');
  if (!totalCell) return;
  const mV = productionVeigneSalesByProduct[pid] || 0;
  const mSA = productionStAvSalesByProduct[pid] || 0;
  let aprem = 0;
  let reste = 0;
  if (currentBoutique === 'local' && (currentVue === 'prod_boul' || currentVue === 'prod_tour')) {
    const t = productionStAvSalesFromTable[pid] || {};
    // v20.32 — Aprem reste exclusif Prod. Boulangers ; Reste J-1 aussi à Prod. Touriers
    if (currentVue === 'prod_boul') aprem = t.aprem || 0;
    reste = t.reste_j1 || 0;
  }
  const spe = productionSpecialByProduct[pid] || 0;
  totalCell.textContent = formatQty(mV + mSA + aprem - reste + spe);
}

function renderProduction() {
const mc = document.getElementById('main-content');
const isToday = (currentReapproDate === serviceDateISO());

// v20.15 — Le Local split en 2 équipes (Boulangers / Touriers)
const isLocalBoul = (currentBoutique === 'local' && currentVue === 'prod_boul');
const isLocalTour = (currentBoutique === 'local' && currentVue === 'prod_tour');
let allProducts;
if (isLocalBoul) {
  allProducts = products.filter(function(p) { return p.category === 'pains'; });
} else if (isLocalTour) {
  allProducts = products.filter(function(p) { return p.category === 'viennoiserie' || p.category === 'brioches_special'; });
} else {
  allProducts = products.slice();
}

// Marches actifs dans l'horizon : ceux qui ont au moins un produit avec emmene > 0
const activeMarkets = MARKET_IDS.filter(function(mid) {
return marketUpcomingData[mid] && marketUpcomingData[mid]._products && Object.keys(marketUpcomingData[mid]._products).length > 0;
});

// v20.7 — colonne Spé pour les boutiques avec spéciales (Veigné/Local)
const showSpe = (currentBoutique === 'veigne' || currentBoutique === 'local');
// v20.8 — Veigné Pâtissier : focus Spéciales, V/T/SA + marchés en consultation seulement
const isVeignePat = (currentBoutique === 'veigne' && productionSupplierMode === 'veigne');
// v20.9 — Veigné Pâtissier : 1 colonne "Matin V" depuis sales.matin (besoin vendeuse Veigné)
const showMatinV = isVeignePat;
// v20.11 — Veigné Pâtissier : colonne "Matin SA" visible pour le traiteur produit par Veigné
// v20.16 — Le Local : "Matin SA" visible et éditable pour pain (Boulangers) et viennoiserie cuite (Touriers)
const showMatinSA = isVeignePat || isLocalBoul || isLocalTour;
// v20.18 — Le Local Prod. Boulangers : colonnes Aprem SA + Reste J-1 depuis sales St-Av
const showApremSA = isLocalBoul;
// v20.32 — Reste J-1 aussi à Prod. Touriers (tartes fines, cookies, etc. qui se gardent J+1)
const showResteJ1 = isLocalBoul || isLocalTour;
// v20.20 — Prod. Boulangers Local : pas de colonne SA (doublon avec Matin SA — ce que St-Av commande = ce qu'elle reçoit le matin)
const showVTS = !isVeignePat && !isLocalBoul;
const activeMarketsForGrid = isVeignePat ? [] : activeMarkets;
// v20.10 — Veigné Pâtissier : table simplifiée, Produit/Stock/Écart inutiles
// (pâtissiers gèrent leur stock surgelé en interne, boulangers ne remplissent jamais)
// v20.19 — Le Local Prod. Boulangers/Touriers : même règle qu'à Veigné Pâtissier (épuré)
const showProdStockEcart = !isVeignePat && !isLocalBoul && !isLocalTour;
// Grid : Produit | [Matin V | Matin SA | V T SA] | [Spé] | [marches actifs] | Total | [Produit | Stock | Ecart]
const fixedColsBefore = '1.3fr'
  + (showMatinV ? ' 0.65fr' : '')
  + (showMatinSA ? ' 0.65fr' : '')
  + (showApremSA ? ' 0.65fr' : '')
  + (showResteJ1 ? ' 0.65fr' : '')
  + (showVTS ? (isLocalBoul ? ' 0.5fr' : ' 0.5fr 0.5fr 0.5fr') : '')
  + (showSpe ? ' 0.55fr' : '');
const marketColsTpl = activeMarketsForGrid.map(function() { return '0.6fr'; }).join(' ');
const fixedColsAfter = '0.55fr' + (showProdStockEcart ? ' 0.7fr 0.7fr 0.7fr' : '');
const gridTpl = fixedColsBefore + (marketColsTpl ? ' ' + marketColsTpl : '') + ' ' + fixedColsAfter;

const rows = allProducts.map(function(p) {
const vV = productionData['veigne'] ? productionData['veigne'][p.id] : null;
const vT = productionData['tours'] ? productionData['tours'][p.id] : null;
const vS = productionData['saint-avertin'] ? productionData['saint-avertin'][p.id] : null;

// v19.1 : filtrer selon le mode fournisseur
// Mode 'local' : on ne compte que les commandes dont supply=local
// Mode 'veigne' : on ne compte que les commandes dont supply=veigne. Pour Veigné elle-même, on prend son previs (produit sur place).
const supV = getProductSupply(p, 'veigne');
const supT = getProductSupply(p, 'tours');
const supS = getProductSupply(p, 'saint-avertin');

let cV = 0, cT = 0, cS = 0;
if (productionSupplierMode === 'local') {
// Tolérance : si supply n est pas configure (null), on garde l'ancien comportement
cV = (supV == null || supV === 'local') ? parseQty(vV && vV.commander) : 0;
cT = (supT == null || supT === 'local') ? parseQty(vT && vT.commander) : 0;
cS = (supS == null || supS === 'local') ? parseQty(vS && vS.commander) : 0;
} else if (productionSupplierMode === 'veigne') {
// Veigné pour elle-même : son previs interne (ce qu'elle prevoit de produire pour son propre compte)
cV = (supV === 'on_site') ? parseQty(vV && vV.previs) : 0;
cT = (supT === 'veigne') ? parseQty(vT && vT.commander) : 0;
cS = (supS === 'veigne') ? parseQty(vS && vS.commander) : 0;
}

const marketVals = {};
let marketSum = 0;
// Les marches ne concernent que le Local
if (productionSupplierMode === 'local') {
activeMarkets.forEach(function(mid) {
const mv = (marketUpcomingData[mid] && marketUpcomingData[mid]._products && marketUpcomingData[mid]._products[p.id]) || 0;
marketVals[mid] = mv;
marketSum += mv;
});
}
// v20.7 — Commandes spéciales du jour pour ce produit (somme des items)
const cSpe = showSpe ? (productionSpecialByProduct[p.id] || 0) : 0;
// v20.9 — Matin Veigné depuis sales (besoin de la vendeuse Veigné pour le jour)
const cMatinV = showMatinV ? (productionVeigneSalesByProduct[p.id] || 0) : 0;
// v20.11 — Matin St-Av : pertinent à Veigné pour traiteur (seul cas filtré). Au Local pour pain/viennoiserie : toutes catégories filtrées en amont (allProducts).
// v20.16 — Le Local : pas de filtre catégorie ici (allProducts est déjà filtré par équipe).
// v20.22 — Matin SA toujours depuis previs (pattern cohérent avec Veigné). Aprem/Reste J-1 restent depuis sales.
// v20.23 — Veigné Pâtissier voit aussi Matin SA pour patisserie_gros + gateaux_secs (production à la demande).
const veignePatVisibleCats = ['traiteur', 'patisserie_gros', 'gateaux_secs'];
const matinSAEligible = showMatinSA && (!isVeignePat || veignePatVisibleCats.indexOf(p.category) !== -1);
const stAvSale = productionStAvSalesFromTable[p.id] || {};
const cMatinSA = matinSAEligible ? (productionStAvSalesByProduct[p.id] || 0) : 0;
const cAprem = showApremSA ? (stAvSale.aprem || 0) : 0;
const cReste = showResteJ1 ? (stAvSale.reste_j1 || 0) : 0;
// v20.8 + v20.9 + v20.11 — Veigné Pâtissier : Total = Matin V + Matin SA + Spé
// v20.18 — Le Local Boul : Total = Matin SA + Aprem + SA + Spé - Reste J-1
const totalReassort = cV + cT + cS;
const total = (showMatinV ? cMatinV : 0) + cMatinSA + cAprem - cReste + (showVTS ? totalReassort : 0) + (isVeignePat ? 0 : marketSum) + cSpe;
const pl = productionLocalData[p.id] || { produit: '', stock: '' };
const prod  = pl.produit === '' || pl.produit == null ? null : parseQty(pl.produit);
const stock = pl.stock   === '' || pl.stock   == null ? null : parseQty(pl.stock);
return {
p: p, veigne: cV, tours: cT, savertin: cS, spe: cSpe, matinV: cMatinV, matinSA: cMatinSA,
aprem: cAprem, reste: cReste,
markets: marketVals, total: total,
totalReassort: totalReassort,
produitRaw: pl.produit, stockRaw: pl.stock,
produitVal: prod, stockVal: stock
};

});

const filtered = productionFilterEmpty
? rows.filter(function(r) {
return r.total > 0 || (r.produitVal != null && r.produitVal !== 0) || (r.stockVal != null && r.stockVal !== 0);
})
: rows;

const volumeTotal = rows.reduce(function(s, r) { return s + r.total; }, 0);
const volumeProduit = rows.reduce(function(s, r) { return s + (r.produitVal || 0); }, 0);
const nbManque = rows.filter(function(r) {
const dispo = (r.produitVal || 0) + (r.stockVal || 0);
return r.total > 0 && dispo < r.total;
}).length;

const horizonTxt = activeMarkets.length

let html = '<div class="date-bar">'

+ '<div class="date-sub">' + horizonTxt + '</div>'
+ '</div>'
+ '<button class="date-nav" onclick="changeProductionDate(1)">→</button>'
+ '</div>';

// v20.10.1 — KPI épuré pour Veigné Pâtissier : juste le Total
// v20.19 — Le Local Prod. Boulangers/Touriers : même règle (KPI simplifié)
if (isVeignePat || isLocalBoul || isLocalTour) {
  html += '<div class="prod-kpi-bar" style="grid-template-columns:1fr">'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + formatQty(volumeTotal) + '</div><div class="prod-kpi-lbl">Total à produire</div></div>'

} else {
  html += '<div class="prod-kpi-bar">'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + formatQty(volumeTotal) + '</div><div class="prod-kpi-lbl">Commande</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--blue)">' + formatQty(volumeProduit) + '</div><div class="prod-kpi-lbl">Produit</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:' + (nbManque > 0 ? 'var(--red)' : 'var(--green)') + '">' + nbManque + '</div><div class="prod-kpi-lbl">À produire</div></div>'
    + '</div>';
}

// v20.7 — Bloc Spéciales du jour (repliable) pour pâtissiers/boulangers
if (showSpe && productionSpecialOrders && productionSpecialOrders.length) {
  const nbCmd = productionSpecialOrders.length;
  const totalProducts = Object.keys(productionSpecialByProduct).reduce(function(s, pid) { return s + productionSpecialByProduct[pid]; }, 0);
  html += '<div class="prod-specials-box">'
    + '<div class="prod-specials-header" onclick="toggleProductionSpecials()">'
    + '<span>⭐ <strong>Spéciales du jour</strong> — ' + nbCmd + ' commande' + (nbCmd > 1 ? 's' : '') + ' · ' + totalProducts + ' produit' + (totalProducts > 1 ? 's' : '') + '</span>'
    + '<span class="prod-specials-toggle">' + (productionSpecialsExpanded ? '▲' : '▼') + '</span>'
    + '</div>';
  if (productionSpecialsExpanded) {
    html += '<div class="prod-specials-body">';
    productionSpecialOrders.forEach(function(o) {
      const pickupTime = o.pickup_time || '—';
      const clientName = o.client_name || '(sans nom)';
      const destShop = BOUTIQUE_NAMES[o.origin_shop] || o.origin_shop || '?';
      const deliv = o.delivery_type === 'delivery' ? '🚚 livraison' : '🏪 retrait';
      html += '<div class="prod-special-row">'
        + '<div class="prod-special-meta">'
        + '<strong>' + escapeHtml(pickupTime) + '</strong> · ' + escapeHtml(clientName)
        + ' → <span class="prod-special-shop">' + escapeHtml(destShop) + '</span> · ' + deliv
        + '</div>';
      if (o.items && o.items.length) {
        html += '<div class="prod-special-items">';
        o.items.forEach(function(it) {
          const pname = it.product_id ? ((products.find(function(p) { return p.id === it.product_id; }) || {}).name || it.product_id) : (it.product_name_custom || '?');
          html += '<span class="prod-special-item">' + escapeHtml(pname) + ' ×' + (parseQty(it.qty) || 0) + '</span>';
        });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
}

const hasReportable = allProducts.some(function(p) { return REPORTABLE_CATS.indexOf(p.category) !== -1; });
if (hasReportable) {
html += '<div class="copy-stock-box">'

+ '<div class="copy-stock-txt">Reporter le stock de la veille pour Ingrédients, Sec & Traiteur, Gâteaux Secs.</div>'
+ '<button class="btn-gold-sm" onclick="copyStockFromPreviousDay()">Reporter les stocks d hier</button>'

  }

html += '<div class="prod-filter-bar"><label>'

+ '<input type="checkbox" ' + (productionFilterEmpty ? 'checked' : '') + ' onchange="toggleProductionFilter()">'
+ '<span>Cacher les produits sans activite</span></label></div>';

if (!filtered.length) {
html += '<div class="prod-empty">'

const byCat = {};
filtered.forEach(function(r) {
const c = r.p.category || 'autre';
if (!byCat[c]) byCat[c] = [];
byCat[c].push(r);
});

const catOrder = Object.keys(CAT_LABELS);
const cats = Object.keys(byCat).sort(function(a, b) {
const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
});

// Header
let headerHtml = '<div class="prod-table-header" style="grid-template-columns:' + gridTpl + '">'

+ '<span>Produit</span>';
  if (showMatinV) {
    headerHtml += '<span class="col-c" style="color:var(--green)" title="Matin Veigné (saisi par la vendeuse dans Ventes)">Matin V</span>';

    headerHtml += '<span class="col-c" style="color:var(--orange)" title="Aprem St-Avertin">Aprem SA</span>';
  }
  if (showResteJ1) {
    headerHtml += '<span class="col-c" style="color:var(--gold-dark)" title="Reste J-1 St-Av (déduit du Total)">Reste J-1</span>';

  if (showVTS) {
    if (isLocalBoul) {
      // v20.17 — Boulangers Local : seul SA est pertinent (Veigné + Tours autonomes pour le pain)
      headerHtml += '<span class="col-c">SA</span>';
    } else {

        + '<span class="col-c">T</span>'

  if (showSpe) {
    headerHtml += '<span class="col-c" style="color:var(--gold-dark)" title="Commandes spéciales du jour">⭐ Spé</span>';

  activeMarketsForGrid.forEach(function(mid) {

  : '';
  headerHtml += '<span class="col-c" style="color:var(--orange)">' + escapeHtml(MARKET_LABELS_SHORT[mid]) + dateBadge + '</span>';
  });
  headerHtml += '<span class="col-c col-total">Total</span>';
  if (showProdStockEcart) {
    headerHtml += '<span class="col-c col-prod">Produit</span>'
      + '<span class="col-c col-stock">Stock</span>'
      + '<span class="col-c col-ecart">Écart</span>';
  }
  headerHtml += '</div>';

html += '<div class="prod-table">' + headerHtml;

cats.forEach(function(cat) {
const isReportable = REPORTABLE_CATS.indexOf(cat) !== -1;
const catLabel = (CAT_LABELS[cat] || cat) + (isReportable ? ' <span style="font-size:10px;color:var(--gold);font-weight:700">(reportable)</span>' : '');
html += '<div class="prod-cat-title">' + catLabel + '</div>';
byCat[cat].forEach(function(r) {
const p = r.produitVal || 0;
const s = r.stockVal || 0;
const dispo = p + s;
let ecartHtml;
if (p === 0 && s === 0 && r.total === 0) {
ecartHtml = '<span class="ecart-badge zero">-</span>';
} else {
const e = dispo - r.total;
const eTxt = e === 0 ? '0' : (e > 0 ? '+' + formatQty(e) : formatQty(e));
const eCls = e >= 0 ? 'ok' : 'bad';
ecartHtml = '<span class="ecart-badge ' + eCls + '">' + eTxt + '</span>';
}
const prodCls = r.produitRaw ? 'has-prod' : '';
const stockCls = r.stockRaw ? 'has-stock' : '';
let rowHtml = '<div class="prod-row" style="grid-template-columns:' + gridTpl + '">'

+ '<div><span class="prod-name">' + escapeHtml(r.p.name) + '</span>'
+ (r.p.unit ? '<span class="prod-unit">' + escapeHtml(r.p.unit) + '</span>' : '') + '</div>';
  if (showMatinV) {
    // v20.10 — Matin V éditable : le boulanger ajuste si la vendeuse a mal estimé
    const matinDisp = r.matinV > 0 ? formatQty(r.matinV) : '';
    rowHtml += '<input type="text" inputmode="decimal" class="prod-input matin-v-input' + (r.matinV > 0 ? ' has-prod' : '') + '" data-pid="' + r.p.id + '" value="' + escapeHtml(matinDisp) + '" placeholder="-" oninput="handleMatinVInput(this)" onfocus="this.select()" style="color:' + (r.matinV > 0 ? 'var(--green)' : 'inherit') + ';font-weight:700">';
  }
  if (showMatinSA) {
    // v20.11 — Matin SA éditable pour catégorie traiteur à Veigné Pâtissier
    // v20.16 — Matin SA éditable pour pain/viennoiserie au Local (catégorie déjà filtrée en amont)
    // v20.23 — Veigné Pâtissier édite aussi patisserie_gros + gateaux_secs (depuis St-Av)
    const veignePatVisibleCatsR = ['traiteur', 'patisserie_gros', 'gateaux_secs'];
    const matinSAEditable = !isVeignePat || veignePatVisibleCatsR.indexOf(r.p.category) !== -1;
    if (matinSAEditable) {
      const matinSADisp = r.matinSA > 0 ? formatQty(r.matinSA) : '';
      rowHtml += '<input type="text" inputmode="decimal" class="prod-input matin-sa-input' + (r.matinSA > 0 ? ' has-prod' : '') + '" data-pid="' + r.p.id + '" value="' + escapeHtml(matinSADisp) + '" placeholder="-" oninput="handleMatinSAInput(this)" onfocus="this.select()" style="color:' + (r.matinSA > 0 ? 'var(--blue)' : 'inherit') + ';font-weight:700">';
    } else {
      rowHtml += '<div class="cell zero" style="color:#CCC">—</div>';
    }
  }
  if (showApremSA) {
    const apremDisp = r.aprem > 0 ? formatQty(r.aprem) : '';
    rowHtml += '<input type="text" inputmode="decimal" class="prod-input aprem-sa-input' + (r.aprem > 0 ? ' has-prod' : '') + '" data-pid="' + r.p.id + '" value="' + escapeHtml(apremDisp) + '" placeholder="-" oninput="handleApremSAFromLocal(this)" onfocus="this.select()" style="color:' + (r.aprem > 0 ? 'var(--orange)' : 'inherit') + ';font-weight:700">';
  }
  if (showResteJ1) {
    const resteDisp = r.reste > 0 ? formatQty(r.reste) : '';
    rowHtml += '<input type="text" inputmode="decimal" class="prod-input reste-j1-input' + (r.reste > 0 ? ' has-prod' : '') + '" data-pid="' + r.p.id + '" value="' + escapeHtml(resteDisp) + '" placeholder="-" oninput="handleResteJ1FromLocal(this)" onfocus="this.select()" style="color:' + (r.reste > 0 ? 'var(--gold-dark)' : 'inherit') + ';font-weight:700">';
  }
  if (showVTS) {
    if (isLocalBoul) {
      // v20.17 — Boulangers Local : afficher uniquement SA
      rowHtml += '<div class="cell ' + (r.savertin > 0 ? '' : 'zero') + '">' + formatQty(r.savertin) + '</div>';
    } else {
      rowHtml += '<div class="cell ' + (r.veigne > 0 ? '' : 'zero') + '">' + formatQty(r.veigne) + '</div>'
        + '<div class="cell ' + (r.tours > 0 ? '' : 'zero') + '">' + formatQty(r.tours) + '</div>'
        + '<div class="cell ' + (r.savertin > 0 ? '' : 'zero') + '">' + formatQty(r.savertin) + '</div>';
    }
  }
  if (showSpe) {
    rowHtml += '<div class="cell ' + (r.spe > 0 ? '' : 'zero') + '" style="color:' + (r.spe > 0 ? 'var(--gold-dark)' : 'inherit') + ';font-weight:' + (r.spe > 0 ? '700' : '400') + '">' + (r.spe > 0 ? '⭐' + formatQty(r.spe) : '0') + '</div>';
  }
  activeMarketsForGrid.forEach(function(mid) {
  const v = r.markets[mid] || 0;
  rowHtml += '<div class="cell ' + (v > 0 ? '' : 'zero') + '" style="color:' + (v > 0 ? 'var(--orange)' : 'inherit') + ';font-weight:' + (v > 0 ? '700' : '400') + '">' + formatQty(v) + '</div>';
  });
  rowHtml += '<div class="cell total">' + formatQty(r.total) + '</div>';
  if (showProdStockEcart) {
    rowHtml += '<input type="text" inputmode="decimal" class="prod-input ' + prodCls + '" data-pid="' + r.p.id + '" data-field="produit" value="' + escapeHtml(r.produitRaw || '') + '" placeholder="-" oninput="handleProductionInput(this)" onfocus="this.select()">'
      + '<input type="text" inputmode="decimal" class="prod-input ' + stockCls + '" data-pid="' + r.p.id + '" data-field="stock" value="' + escapeHtml(r.stockRaw || '') + '" placeholder="-" oninput="handleProductionInput(this)" onfocus="this.select()">'
      + '<div id="ecart_' + r.p.id + '" data-cmd="' + r.total + '">' + ecartHtml + '</div>';
  }
  rowHtml += '</div>';
  html += rowHtml;
  });
  });

html += '</div>';

// v20.8 — Bloc "Réassorts magasins" en bas pour Veigné Pâtissier (consultation, replié par défaut)
if (isVeignePat) {
  const reassortRows = rows.filter(function(r) { return r.totalReassort > 0; });
  if (reassortRows.length) {
    html += '<div class="prod-reassort-box">'
      + '<div class="prod-reassort-header" onclick="toggleProductionReassorts()">'
      + '<span>📦 <strong>Réassorts magasins</strong> — ' + reassortRows.length + ' produit' + (reassortRows.length > 1 ? 's' : '') + ' à prélever du stock</span>'
      + '<span class="prod-reassort-toggle">' + (productionReassortsExpanded ? '▲' : '▼') + '</span>'
      + '</div>';
    if (productionReassortsExpanded) {
      html += '<div class="prod-reassort-body">';
      // Group par catégorie
      const reassByCat = {};
      reassortRows.forEach(function(r) {
        const c = r.p.category || 'autre';
        if (!reassByCat[c]) reassByCat[c] = [];
        reassByCat[c].push(r);
      });
      const reassCats = Object.keys(reassByCat).sort(function(a, b) {
        const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
        return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
      });
      reassCats.forEach(function(cat) {
        html += '<div class="prod-reassort-cat">' + escapeHtml(CAT_LABELS[cat] || cat) + '</div>';
        reassByCat[cat].forEach(function(r) {
          html += '<div class="prod-reassort-row">'
            + '<span class="prod-reassort-name">' + escapeHtml(r.p.name) + '</span>'
            + '<span class="prod-reassort-cells">';
          if (r.veigne > 0) html += '<span class="prod-reassort-cell">V <strong>' + formatQty(r.veigne) + '</strong></span>';
          if (r.tours > 0) html += '<span class="prod-reassort-cell">T <strong>' + formatQty(r.tours) + '</strong></span>';
          if (r.savertin > 0) html += '<span class="prod-reassort-cell">SA <strong>' + formatQty(r.savertin) + '</strong></span>';
          html += '</span></div>';
        });
      });
      html += '</div>';
    }
    html += '</div>';
  }
}

mc.innerHTML = html;
}

// === MARCHES ===
async function loadMarketEntries(marketId, date) {
const { data, error } = await supa.from('market_entries').select('*')
.eq('tenant_id', TENANT_ID).eq('market_id', marketId).eq('service_date', date);
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
marketEntriesData = {};
(data || []).forEach(function(r) {
marketEntriesData[r.product_id] = {
marche:             r.marche             == null ? '' : String(r.marche).replace('.', ','),
commande:           r.commande           == null ? '' : String(r.commande).replace('.', ','),
commande_tranchee:  r.commande_tranchee  == null ? '' : String(r.commande_tranchee).replace('.', ','),
pertes:             r.pertes             == null ? '' : String(r.pertes).replace('.', ','),
product_notes:      r.product_notes || ''
};
});
}

async function loadMarketEntriesForDate(marketId, date) {
const { data, error } = await supa.from('market_entries').select('*')
.eq('tenant_id', TENANT_ID).eq('market_id', marketId).eq('service_date', date);
if (error) return {};
const result = {};
(data || []).forEach(function(r) {
result[r.product_id] = {
marche:             r.marche             == null ? '' : String(r.marche).replace('.', ','),
commande:           r.commande           == null ? '' : String(r.commande).replace('.', ','),
commande_tranchee:  r.commande_tranchee  == null ? '' : String(r.commande_tranchee).replace('.', ','),
pertes:             r.pertes             == null ? '' : String(r.pertes).replace('.', ','),
product_notes:      r.product_notes || ''
};
});
return result;
}

async function upsertMarketEntry(pid) {
setSyncStatus('syncing');
const d = marketEntriesData[pid] || {};
const marche = d.marche === '' || d.marche == null ? null : parseQty(d.marche);
const commande = d.commande === '' || d.commande == null ? null : parseQty(d.commande);
const commandeTr = d.commande_tranchee === '' || d.commande_tranchee == null ? null : parseQty(d.commande_tranchee);
const pertes = d.pertes === '' || d.pertes == null ? null : parseQty(d.pertes);
const { error } = await supa.from('market_entries').upsert({
tenant_id: TENANT_ID, market_id: currentMarketId, service_date: currentMarketDate,
product_id: pid,
marche: marche, commande: commande, commande_tranchee: commandeTr, pertes: pertes,
product_notes: d.product_notes || null,
updated_by: DEVICE_ID, updated_at: new Date().toISOString()
}, { onConflict: 'tenant_id,market_id,service_date,product_id' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
else { setSyncStatus('ok'); }
}

async function loadMarketDayNote(marketId, date) {
const { data, error } = await supa.from('market_day_notes').select('*')
.eq('tenant_id', TENANT_ID).eq('market_id', marketId).eq('service_date', date).maybeSingle();
if (error) { marketDayNote = ''; return; }
marketDayNote = (data && data.notes) || '';
}

async function upsertMarketDayNote(text) {
setSyncStatus('syncing');
const { error } = await supa.from('market_day_notes').upsert({
tenant_id: TENANT_ID, market_id: currentMarketId, service_date: currentMarketDate,
notes: text || null,
updated_by: DEVICE_ID, updated_at: new Date().toISOString()
}, { onConflict: 'tenant_id,market_id,service_date' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
else { setSyncStatus('ok'); }
}

function subscribeRealtimeMarket() {
if (realtimeChannelMarket) supa.removeChannel(realtimeChannelMarket);
realtimeChannelMarket = supa.channel('market_' + currentMarketId)
.on('postgres_changes', { event: '*', schema: 'public', table: 'market_entries', filter: 'market_id=eq.' + currentMarketId },
function(payload) {
const r = payload.new;
if (!r || r.updated_by === DEVICE_ID) return;
if (r.service_date !== currentMarketDate) return;
marketEntriesData[r.product_id] = {
marche:             r.marche             == null ? '' : String(r.marche).replace('.', ','),
commande:           r.commande           == null ? '' : String(r.commande).replace('.', ','),
commande_tranchee:  r.commande_tranchee  == null ? '' : String(r.commande_tranchee).replace('.', ','),
pertes:             r.pertes             == null ? '' : String(r.pertes).replace('.', ','),
product_notes: r.product_notes || ''
};
renderMarket();
showToast('MAJ marche d un autre appareil', 'sync');
})
.on('postgres_changes', { event: '*', schema: 'public', table: 'market_day_notes', filter: 'market_id=eq.' + currentMarketId },
function(payload) {
const r = payload.new;
if (!r || r.updated_by === DEVICE_ID) return;
if (r.service_date !== currentMarketDate) return;
marketDayNote = r.notes || '';
const ta = document.getElementById('market-day-note');
if (ta && document.activeElement !== ta) ta.value = marketDayNote;
})
.subscribe();
}

async function changeMarketDate(delta) {
const d = new Date(currentMarketDate + 'T12:00');
d.setDate(d.getDate() + delta);
currentMarketDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

async function loadMarketUpcoming(localDate) {

const startD = new Date(localDate + 'T12:00');
const endD = new Date(localDate + 'T12:00');
endD.setDate(endD.getDate() + MARKET_PREP_DAYS);
const startISO = startD.getFullYear() + '-' + String(startD.getMonth()+1).padStart(2,'0') + '-' + String(startD.getDate()).padStart(2,'0');
const endISO = endD.getFullYear() + '-' + String(endD.getMonth()+1).padStart(2,'0') + '-' + String(endD.getDate()).padStart(2,'0');
const { data, error } = await supa.from('market_entries').select('*')
.eq('tenant_id', TENANT_ID)
.gte('service_date', startISO).lte('service_date', endISO);
if (error) return;
(data || []).forEach(function(r) {
// Total à produire pour ce produit/marche/date = marche + commande + commande_tranchee
const total = (r.marche || 0) + (r.commande || 0) + (r.commande_tranchee || 0);
if (total === 0) return;
if (!marketUpcomingData[r.market_id]) marketUpcomingData[r.market_id] = { _date: r.service_date, _products: {} };
if (r.service_date < marketUpcomingData[r.market_id]._date) {
marketUpcomingData[r.market_id]._date = r.service_date;
}
marketUpcomingData[r.market_id]._products[r.product_id] = total;
});
}

function _impNumEq(a, b) {
  const na = (a == null || a === '') ? null : Number(a);
  const nb = (b == null || b === '') ? null : Number(b);
  if (na === null && nb === null) return true;
  if (na === null || nb === null) return false;
  return Math.abs(na - nb) < 0.001;
}
function _impSupplyEq(a, b) {
  const ks = ['veigne','tours','saint-avertin','local'];
  for (let i = 0; i < ks.length; i++) {
    if ((a[ks[i]] || '') !== (b[ks[i]] || '')) return false;
  }
  return true;
}
function _impNum(v) {
  if (v === '' || v == null) return null;
  const n = Number(v);
  return isNaN(n) ? undefined : n;
}
function _impBoolOuiNon(v) {
  if (v === '' || v == null) return undefined;
  const s = String(v).trim().toUpperCase();
  if (s === 'OUI' || s === 'YES' || s === 'TRUE' || s === '1') return true;
  if (s === 'NON' || s === 'NO' || s === 'FALSE' || s === '0') return false;
  return undefined;
}
function _impSupply(v) {
  if (v === '' || v == null) return '';
  const s = String(v).trim().toLowerCase();
  if (s === '') return '';
  if (['on_site','local','veigne','none'].indexOf(s) !== -1) return s;
  return undefined;
}

function buildImportDiff(rows) {
  const creates = [], updates = [], errors = [], unchanged = [];
  if (!rows.length) {
    return { creates, updates, errors: [{ row: 0, reason: 'Fichier vide ou feuille Produits sans données' }], unchanged };
  }
  const requiredCols = ['id','name','category','actif'];
  const firstRow = rows[0];
  const missingCols = requiredCols.filter(function(c) { return !(c in firstRow); });
  if (missingCols.length) {
    return { creates, updates, errors: [{ row: 0, reason: 'Colonnes obligatoires manquantes : ' + missingCols.join(', ') }], unchanged };
  }
  const byId = {};
  adminProducts.forEach(function(p) { byId[p.id] = p; });

  rows.forEach(function(r, idx) {
    const rowNum = idx + 2; // ligne 1 = header dans Excel
    const id = String(r.id || '').trim();
    const name = String(r.name || '').trim();
    const category = String(r.category || '').trim();
    if (!id) { errors.push({ row: rowNum, reason: 'id vide' }); return; }
    if (!name) { errors.push({ row: rowNum, reason: 'name vide (id=' + id + ')' }); return; }
    if (!category) { errors.push({ row: rowNum, reason: 'category vide (id=' + id + ')' }); return; }
    const actif = _impBoolOuiNon(r.actif);
    if (actif === undefined) { errors.push({ row: rowNum, reason: 'actif doit être OUI ou NON (id=' + id + ')' }); return; }
    const prix = _impNum(r.prix_cession);
    if (prix === undefined) { errors.push({ row: rowNum, reason: 'prix_cession invalide (id=' + id + ')' }); return; }
    const pces = _impNum(r.pces_per_caisse);
    if (pces === undefined) { errors.push({ row: rowNum, reason: 'pces_per_caisse invalide (id=' + id + ')' }); return; }
    const seuil = _impNum(r.seuil_stock);
    if (seuil === undefined) { errors.push({ row: rowNum, reason: 'seuil_stock invalide (id=' + id + ')' }); return; }
    const sv = _impSupply(r.supply_veigne);
    const st = _impSupply(r.supply_tours);
    const ssa = _impSupply(r.supply_saint_avertin);
    const sl = _impSupply(r.supply_local);
    if (sv === undefined) { errors.push({ row: rowNum, reason: 'supply_veigne invalide (id=' + id + ') — attendu on_site/local/veigne/none/vide' }); return; }
    if (st === undefined) { errors.push({ row: rowNum, reason: 'supply_tours invalide (id=' + id + ')' }); return; }
    if (ssa === undefined) { errors.push({ row: rowNum, reason: 'supply_saint_avertin invalide (id=' + id + ')' }); return; }
    if (sl === undefined) { errors.push({ row: rowNum, reason: 'supply_local invalide (id=' + id + ')' }); return; }
    const supply = {};
    if (sv) supply.veigne = sv;
    if (st) supply.tours = st;
    if (ssa) supply['saint-avertin'] = ssa;
    if (sl) supply.local = sl;

    const cleanRow = {
      tenant_id: TENANT_ID,
      id: id,
      name: name,
      category: category,
      actif: actif,
      unit: String(r.unit || '').trim() || null,
      usage: String(r.usage || '').trim() || 'reappro',
      prix_cession: prix,
      pces_per_caisse: pces,
      seuil_stock: seuil,
      supply_by_boutique: supply
    };

    const existing = byId[id];
    if (!existing) {
      creates.push({ row: rowNum, id: id, name: name, data: cleanRow });
    } else {
      const changes = [];
      if ((existing.name || '') !== cleanRow.name) changes.push('name');
      if ((existing.category || '') !== cleanRow.category) changes.push('category');
      if (Boolean(existing.actif) !== cleanRow.actif) changes.push('actif');
      if ((existing.unit || null) !== cleanRow.unit) changes.push('unit');
      if ((existing.usage || 'reappro') !== cleanRow.usage) changes.push('usage');
      if (!_impNumEq(existing.prix_cession, cleanRow.prix_cession)) changes.push('prix_cession');
      if (!_impNumEq(existing.pces_per_caisse, cleanRow.pces_per_caisse)) changes.push('pces_per_caisse');
      if (!_impNumEq(existing.seuil_stock, cleanRow.seuil_stock)) changes.push('seuil_stock');
      const existingSupply = existing.supply_by_boutique
        ? (typeof existing.supply_by_boutique === 'string' ? JSON.parse(existing.supply_by_boutique) : existing.supply_by_boutique)
        : {};
      if (!_impSupplyEq(existingSupply, supply)) changes.push('supply');
      if (!changes.length) {
        unchanged.push({ row: rowNum, id: id, name: name });
      } else {
        updates.push({ row: rowNum, id: id, name: name, changes: changes, data: cleanRow });
      }
    }
  });

  return { creates: creates, updates: updates, errors: errors, unchanged: unchanged };
}

async function confirmImportProducts() {
  if (!pendingImportDiff) return;
  const diff = pendingImportDiff;
  const rowsToUpsert = diff.creates.concat(diff.updates).map(function(x) { return x.data; });
  if (!rowsToUpsert.length) { closeImportPreviewModal(); return; }
  setSyncStatus('syncing');
  const { data, error } = await supa.from('products').upsert(rowsToUpsert, { onConflict: 'id' }).select();
  if (error) {
    setSyncStatus('error');
    showToast('Erreur import: ' + error.message, 'error');
    return;
  }
  if (!data || data.length !== rowsToUpsert.length) {
    setSyncStatus('error');
    alert('Import partiel ou bloqué par Supabase.\nAttendu : ' + rowsToUpsert.length + ' lignes\nAppliqué : ' + (data ? data.length : 0) + ' lignes\n\nVérifie les policies RLS sur products (UPDATE + INSERT).');
    return;
  }
  setSyncStatus('ok');
  closeImportPreviewModal();
  pendingImportDiff = null;
  await loadAdminProducts();
  await loadProducts();
  renderAdminProducts();
  showToast('Import OK : ' + diff.creates.length + ' créés, ' + diff.updates.length + ' modifiés', 'sync');
}

// v20.24 — Export BackOffice complet en .xlsx (3 onglets : Produits / Catégories / Valorisation)
async function exportBackOfficeToXlsx() {
  if (typeof XLSX === 'undefined') { showToast('Lib XLSX non chargée', 'error'); return; }
  setSyncStatus('syncing');
  try {
    // S'assurer que les data sont chargées
    if (!adminProducts.length) await loadAdminProducts();
    if (!Object.keys(categorySettings).length) await loadCategorySettings();
    await loadValorisation();

    // 1. Sheet Produits — éclate supply_by_boutique en 4 colonnes
    const prodRows = adminProducts.map(function(p) {
      const sb = p.supply_by_boutique
        ? (typeof p.supply_by_boutique === 'string' ? JSON.parse(p.supply_by_boutique) : p.supply_by_boutique)
        : {};
      return {
        id: p.id,
        name: p.name || '',
        category: p.category || '',
        actif: p.actif ? 'OUI' : 'NON',
        unit: p.unit || '',
        usage: p.usage || 'reappro',
        prix_cession: p.prix_cession != null ? p.prix_cession : '',
        pces_per_caisse: p.pces_per_caisse != null ? p.pces_per_caisse : '',
        seuil_stock: p.seuil_stock != null ? p.seuil_stock : '',
        supply_veigne: sb.veigne || '',
        supply_tours: sb.tours || '',
        supply_saint_avertin: sb['saint-avertin'] || '',
        supply_local: sb.local || ''
      };
    });

    // 2. Sheet Catégories
    const allCats = Array.from(new Set(adminProducts.map(function(p) { return p.category; }).filter(Boolean)));
    Object.keys(CAT_LABELS).forEach(function(c) { if (allCats.indexOf(c) === -1) allCats.push(c); });
    const catRows = allCats.map(function(cat) {
      const cfg = categorySettings[cat] || { a_previs: false };
      const nbProducts = adminProducts.filter(function(p) { return p.category === cat; }).length;
      return {
        category: cat,
        label: CAT_LABELS[cat] || cat,
        a_previs: cfg.a_previs ? 'OUI' : 'NON',
        nb_produits: nbProducts
      };
    });

    // 3. Sheet Valorisation — somme par produit × boutique × semaine courante
    const valoRows = [];
    Object.keys(valoData).forEach(function(bid) {
      Object.keys(valoData[bid]).forEach(function(pid) {
        const v = valoData[bid][pid];
        const qty = v.qty || 0;
        const prix = v.prix || 0;
        valoRows.push({
          boutique: bid,
          product_id: pid,
          product_name: v.name,
          category: v.cat,
          qty: qty,
          prix_cession: prix,
          valeur: qty * prix
        });
      });
    });

    // Workbook
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prodRows), 'Produits');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(catRows), 'Catégories');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(valoRows), 'Valorisation');

    const today = todayISO();
    XLSX.writeFile(wb, 'lbdd-backoffice-' + today + '.xlsx');
    setSyncStatus('ok');
    showToast('Export Excel téléchargé', 'sync');
  } catch (e) {
    setSyncStatus('error');
    showToast('Erreur export: ' + e.message, 'error');
  }
}

async function deleteProduct(pid) {
const p = adminProducts.find(function(x) { return x.id === pid; });
if (!p) return;
if (!confirm('Supprimer DEFINITIVEMENT "' + p.name + '" ?\n\nATTENTION : si ce produit a un historique (commandes, ventes, production), la suppression sera impossible et je te proposerai de le desactiver à la place.')) return;
setSyncStatus('syncing');
// v20.29 : .select() pour vérifier que la DELETE a réellement supprimé une ligne
// (RLS Supabase peut bloquer silencieusement sans renvoyer d'erreur).
const { data: deletedRows, error } = await supa.from('products').delete().eq('id', pid).select();
if (error) {
setSyncStatus('error');
const msg = (error.message || '').toLowerCase();
if (msg.indexOf('foreign') !== -1 || msg.indexOf('violates') !== -1 || msg.indexOf('referenced') !== -1) {
if (confirm('Ce produit a de l historique en base.\nLe DESACTIVER à la place (il disparaitra des ecrans mais l historique reste) ?')) {
const { error: e2 } = await supa.from('products').update({ actif: false }).eq('id', pid);
if (e2) { showToast(e2.message, 'error'); return; }
await loadAdminProducts();
await loadProducts();
renderAdminProducts();
showToast('Produit desactive', 'sync');
}
} else {
showToast(error.message, 'error');
}
return;
}
// v20.29 : si pas d'erreur mais 0 ligne supprimée -> RLS bloque silencieusement.
if (!deletedRows || deletedRows.length === 0) {
setSyncStatus('error');
if (confirm('Suppression bloquée (probablement RLS Supabase ou historique).\nLe DESACTIVER à la place (il disparaitra des ecrans mais l historique reste) ?')) {
// v20.30 : vérifier que l'UPDATE passe aussi (RLS peut bloquer UPDATE pareil)
const { data: updatedRows, error: e2 } = await supa.from('products').update({ actif: false }).eq('id', pid).select();
if (e2) { showToast(e2.message, 'error'); return; }
if (!updatedRows || updatedRows.length === 0) {
alert('Modification bloquée par Supabase (RLS).\n\nLa politique de sécurité de la table `products` empêche les UPDATE et DELETE.\n\nAction nécessaire :\nDashboard Supabase > Authentication > Policies > table products\nAjouter des policies UPDATE et DELETE pour ton rôle.');
showToast('RLS Supabase bloque la modif', 'error');
return;
}
await loadAdminProducts();
await loadProducts();
renderAdminProducts();
showToast('Produit desactive', 'sync');
}
return;
}
setSyncStatus('ok');
await loadAdminProducts();
await loadProducts();
renderAdminProducts();
showToast('Produit supprime', 'sync');
}

    // v21.0.2 — contacts est jsonb array, sources_par_categorie est jsonb object

      return { nom: c.nom || '', tel: c.tel || '', email: c.email || '', role: c.role || '' };

      boutique_principale: p.boutique_principale || 'local',
      boutique_secours: p.boutique_secours || '',
      sources_par_categorie: (p.sources_par_categorie && typeof p.sources_par_categorie === 'object') ? Object.assign({}, p.sources_par_categorie) : {},
      // v21.0.3 + v21.0.3.1 — migration legacy { butoir } → { butoir_decalage, butoir_heure }
      jours_livraison: (function() {
        const src = (p.jours_livraison && typeof p.jours_livraison === 'object') ? p.jours_livraison : {};
        const out = {};
        Object.keys(src).forEach(function(j) {
          const cfg = src[j] || {};
          if (cfg.butoir_decalage != null || cfg.butoir_heure != null) {
            // Déjà au nouveau format
            out[j] = { actif: !!cfg.actif, butoir_decalage: cfg.butoir_decalage != null ? cfg.butoir_decalage : -1, butoir_heure: cfg.butoir_heure || '', livraison: cfg.livraison || '' };
          } else {
            // Ancien format { butoir } → on suppose "la veille" (decalage = -1)
            out[j] = { actif: !!cfg.actif, butoir_decalage: -1, butoir_heure: cfg.butoir || '', livraison: cfg.livraison || '' };
          }
        });
        return out;
      })(),
      catalogue_restreint: Array.isArray(p.catalogue_restreint) ? p.catalogue_restreint.slice() : null,
      prix_speciaux: (p.prix_speciaux && typeof p.prix_speciaux === 'object') ? Object.assign({}, p.prix_speciaux) : {},

      notes: p.notes || '', actif: !!p.actif
    };
  }
  renderAdminPros();
}

function handleProCatalogueToggle(productId) {
  if (!adminProsDraft) return;
  const allProds = (adminProducts || []).filter(function(p) { return p.actif; });
  if (adminProsDraft.catalogue_restreint === null) {
    // null = tout autorisé → décocher = passer en mode restriction avec tous sauf celui-ci
    adminProsDraft.catalogue_restreint = allProds.map(function(p) { return p.id; }).filter(function(id) { return id !== productId; });
  } else {
    const idx = adminProsDraft.catalogue_restreint.indexOf(productId);
    if (idx === -1) adminProsDraft.catalogue_restreint.push(productId);
    else adminProsDraft.catalogue_restreint.splice(idx, 1);
    // Si on a tout coché → revenir à null (tout autorisé)
    if (adminProsDraft.catalogue_restreint.length === allProds.length) {
      adminProsDraft.catalogue_restreint = null;
    }
  }
  renderAdminPros();
}

}

// v21.0.3.1 — Toggle Tout/Rien sur une catégorie complète
function handleProCatalogueCategoryToggle(cat) {
  if (!adminProsDraft) return;
  const allProds = (adminProducts || []).filter(function(p) { return p.actif; });
  const prodsInCat = allProds.filter(function(p) { return (p.category || '_autres') === cat; });
  if (!prodsInCat.length) return;
  // État courant : tous coches ?
  let cur = adminProsDraft.catalogue_restreint;
  const allAllowed = (cur === null) ? allProds.map(function(p) { return p.id; }) : cur;
  const allInCatAllowed = prodsInCat.every(function(p) { return allAllowed.indexOf(p.id) !== -1; });
  if (cur === null) {
    // null = tout autorisé. Décocher toute la catégorie passe en mode restriction.
    cur = allProds.map(function(p) { return p.id; });
  }
  const catIds = prodsInCat.map(function(p) { return p.id; });
  if (allInCatAllowed) {
    // Tout coché → on décoche toute la catégorie
    cur = cur.filter(function(id) { return catIds.indexOf(id) === -1; });
  } else {
    // Sinon (partiel ou rien) → on coche tout
    catIds.forEach(function(id) { if (cur.indexOf(id) === -1) cur.push(id); });
  }
  // Si on a tout coché → revient à null (tout autorisé)
  if (cur.length === allProds.length) cur = null;
  adminProsDraft.catalogue_restreint = cur;
  renderAdminPros();
}

function handleProCatalogueSearch(q) {
  adminProsCatalogueSearch = q || '';
  renderAdminPros();
}
