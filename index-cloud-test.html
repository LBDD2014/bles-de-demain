// v20.3 — Défauts de production par jour de la semaine
// Structure : productionDefaults[boutique_id][product_id][dow] = qty (number)
// dow = 0 (dim) à 6 (sam), norme JS Date.getDay()
let productionDefaults = {};

async function loadProductionDefaults(boutique) {
  try {
    const { data, error } = await supa.from('production_defaults').select('*')
      .eq('tenant_id', TENANT_ID).eq('boutique_id', boutique);
    if (error) throw error;
    productionDefaults[boutique] = {};
    (data || []).forEach(function(r) {
      if (!productionDefaults[boutique][r.product_id]) productionDefaults[boutique][r.product_id] = {};
      productionDefaults[boutique][r.product_id][r.day_of_week] = Number(r.default_qty);
    });
  } catch (err) {
    // Silencieux : si la table n existe pas encore (SQL pas encore lancée), on continue sans défauts
    productionDefaults[boutique] = {};
  }
}

// Retourne le défaut pour (boutique, product, dateISO) ou null si absent
function getDefaultQty(boutique, productId, dateISO) {
  const map = productionDefaults[boutique];
  if (!map || !map[productId]) return null;
  const dow = new Date(dateISO + 'T12:00').getDay();
  const v = map[productId][dow];
  return v != null ? v : null;
}

// Sauve le défaut pour (boutique, product, dow) — appelé par le bouton 📌
async function saveProductionDefault(boutique, productId, dateISO, qty) {
  const dow = new Date(dateISO + 'T12:00').getDay();
  const num = parseFloat(String(qty).replace(',', '.'));
  if (isNaN(num) || num < 0) { showToast('Quantité invalide', 'error'); return false; }
  setSyncStatus('syncing');
  const { error } = await supa.from('production_defaults').upsert({
    tenant_id: TENANT_ID, boutique_id: boutique, product_id: productId,
    day_of_week: dow, default_qty: num,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  }, { onConflict: 'tenant_id,boutique_id,product_id,day_of_week' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return false; }
  setSyncStatus('ok');
  // Mise à jour du cache local
  if (!productionDefaults[boutique]) productionDefaults[boutique] = {};
  if (!productionDefaults[boutique][productId]) productionDefaults[boutique][productId] = {};
  productionDefaults[boutique][productId][dow] = num;
  const dowNames = ['dimanches','lundis','mardis','mercredis','jeudis','vendredis','samedis'];
  showToast('Défaut sauvé pour les ' + dowNames[dow], 'sync');
  return true;
}

function categoryHasPrevis(cat) {
  return categorySettings[cat] && categorySettings[cat].a_previs === true;
}

// Liste des produits éligibles au Prévis pour une boutique (hors traiteur)
function getProductsForPrevisScreen(boutique) {
  return products.filter(function(p) {
    if (!categoryHasPrevis(p.category)) return false;
    if (p.category === 'traiteur') return false; // traiteur a son propre onglet
    const supply = getProductSupply(p, boutique);
    return supply === 'on_site';
  });
}

// v20.1 : 3 onglets previs avec routage strict par catégorie
function getPrevisCatGroup(cat) {
  if (cat === 'pains' || cat === 'viennoiserie') return 'pain';
  if (cat === 'patisserie_petits' || cat === 'patisserie_gros' || cat === 'gateaux_secs') return 'pat';
  if (cat === 'traiteur') return 'traiteur';
  return null;
}

function getProductsForPrevisGroup(boutique, group) {
  return products.filter(function(p) {
    if (!categoryHasPrevis(p.category)) return false;
    if (getPrevisCatGroup(p.category) !== group) return false;
    const supply = getProductSupply(p, boutique);
    return supply === 'on_site';
  });
}

// v20.1 : sections Réappro ventilees par groupe
function getReapproSectionGroup(p, boutique) {
  const cat = p.category;
  const supply = getProductSupply(p, boutique);
  if (supply === 'veigne') return 'patisserie_veigne'; // à commander à Veigné (gros gâteaux Tours)
  if (cat === 'ingredients' || cat === 'sec_traiteur') return 'ingredients';
  if (cat === 'viennoiserie' || cat === 'brioches_special') return 'surgelés';
  if (cat === 'patisserie_petits' || cat === 'patisserie_gros' || cat === 'gateaux_secs') return 'patisserie';
  if (cat === 'pains') return 'pain';
  return 'autre';
}

// Liste des produits traiteur a previs pour une boutique
function getProductsForTraiteurPrevis(boutique) {
  return products.filter(function(p) {
    if (p.category !== 'traiteur') return false;
    if (!categoryHasPrevis(p.category)) return false;
    const supply = getProductSupply(p, boutique);
    // Pour Veigné et Tours : ils produisent eux-memes -> on_site
    // Pour St-Av : le traiteur vient de Veigné mais on veut qu'elle saisisse sa prevision
    return supply === 'on_site' || supply === 'veigne';
  });
}

function getProductsForReappro() {
  return products.filter(function(p) {
    const u = p.usage || 'reappro';
    return u === 'reappro' || u === 'both';
  });
}

function getProductsForVentes() {
  return products.filter(function(p) {
    const u = p.usage || 'reappro';
    return u === 'ventes' || u === 'both';
  });
}

// v20.53 — ordre des onglets mémorisé par appareil (localStorage), réorganisable par appui long
function orderedNavItems(boutique) {
const base = NAV_ITEMS[boutique] || [];
let saved = [];
try { saved = JSON.parse(localStorage.getItem('navOrder_' + boutique) || '[]'); } catch (e) {}
if (!Array.isArray(saved) || !saved.length) return base;
const byId = {}; base.forEach(function(it) { byId[it.id] = it; });
const out = [];
saved.forEach(function(id) { if (byId[id]) { out.push(byId[id]); delete byId[id]; } });

let _navDragInit = false;
function initNavDragOnce() {
if (_navDragInit) return;
const nav = document.getElementById('bottom-nav');
if (!nav) return;
_navDragInit = true;
let pressTimer = null, dragging = false, dragEl = null, startX = 0, startY = 0, moved = false;
function clearPress() { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } }

nav.addEventListener('pointerdown', function(e) {
  const item = e.target.closest('.bnav-item');
  if (!item) return;
  dragEl = item; startX = e.clientX; startY = e.clientY; moved = false; dragging = false;
  try { nav.setPointerCapture(e.pointerId); } catch (er) {}
  pressTimer = setTimeout(function() {
    dragging = true;
    item.classList.add('bnav-dragging');
    if (navigator.vibrate) try { navigator.vibrate(15); } catch (er) {}
  }, 450);
});

nav.addEventListener('pointermove', function(e) {
  if (!dragEl) return;
  if (!dragging) {
    if (Math.abs(e.clientX - startX) > 8 || Math.abs(e.clientY - startY) > 8) { moved = true; clearPress(); }
    return;
  }
  e.preventDefault();
  const items = Array.prototype.slice.call(nav.querySelectorAll('.bnav-item'));
  let target = null;
  for (let i = 0; i < items.length; i++) {
    if (items[i] === dragEl) continue;
    const r = items[i].getBoundingClientRect();
    if (e.clientX < r.left + r.width / 2) { target = items[i]; break; }
  }
  if (target) { if (dragEl.nextSibling !== target) nav.insertBefore(dragEl, target); }
  else if (dragEl !== nav.lastElementChild) nav.appendChild(dragEl);
});

function endPress(e) {
  clearPress();
  if (!dragEl) return;
  if (dragging) {
    dragEl.classList.remove('bnav-dragging');
    const ids = Array.prototype.slice.call(nav.querySelectorAll('.bnav-item')).map(function(it) { return it.dataset.vue; });
    saveNavOrder(currentBoutique, ids);
    renderNav();
  } else if (!moved) {
    const v = dragEl.dataset.vue;
    if (v) setVue(v);
  }
  dragEl = null; dragging = false; moved = false;
}
nav.addEventListener('pointerup', endPress);
nav.addEventListener('pointercancel', endPress);
}

function sortProductsPriority(prods) {
const priorityNames = ['tradition', 'tradition graines', 'baguette epeautre'];
function priorityIdx(name) {
const n = (name || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
for (let i = 0; i < priorityNames.length; i++) {
if (n === priorityNames[i] || n.startsWith(priorityNames[i])) return i;
}
return 999;
}
return prods.slice().sort(function(a, b) {
const pa = priorityIdx(a.name), pb = priorityIdx(b.name);
if (pa !== pb) return pa - pb;
return a.name.localeCompare(b.name);
});
}

function caisseOptions(pcesPerCaisse) {

const opts = [{ val: '', lbl: '-' }];

const pces = n * pcesPerCaisse;
const caisseLbl = n === 0.5 ? '1/2 caisse' : (n + ' caisse' + (n > 1 ? 's' : ''));
opts.push({ val: String(pces), lbl: caisseLbl + ' (' + Math.round(pces) + ' pces)' });
});
return opts;
}

function renderReapproRow(p, type) {
const val = reapprosData[p.id] || { avoir: '', commander: '', previs: '', sent_at: null };
const isSent = !!val.sent_at;
const pceC = p.pces_per_caisse ? Number(p.pces_per_caisse) : null;
const hasFill = (type === 'previs')
  ? (val.previs != null && val.previs !== '')
  : ((val.commander != null && val.commander !== '') || (val.avoir != null && val.avoir !== ''));
let html = '<div class="produit-row' + (isSent ? ' row-sent' : '') + (hasFill ? ' row-filled' : '') + '">';
// v20.33 — Conditionnement à côté du unit
const condTxt = formatConditioning(p);
// v20.34 — Cible "doit avoir" pour la boutique courante (affichée si renseignée)
const cible = getCibleForProduct(p, currentBoutique);
const cibleTxt = cible != null ? 'Cible: ' + cible : '';
const unitParts = [];
if (p.unit) unitParts.push(escapeHtml(p.unit));
if (condTxt) unitParts.push(escapeHtml(condTxt));
if (cibleTxt) unitParts.push('<span style="color:var(--gold-dark);font-weight:600">' + cibleTxt + '</span>');
const unitLine = unitParts.join(' · ');
html += '<div><div class="produit-name">' + escapeHtml(p.name) + '</div><div class="produit-unit">' + unitLine + '</div></div>';
if (type === 'previs') {
const pv = val.previs == null ? '' : String(val.previs);
html += '<input type="text" inputmode="decimal" class="qty-input cmd ' + (pv !== '' ? 'has-value' : '') + '" style="grid-column:2/-1" data-pid="' + p.id + '" data-field="previs" value="' + escapeHtml(pv) + '" placeholder="-" oninput="handleReapproInput(this)" onfocus="this.select()">';
} else {
const a = val.avoir || '', c = val.commander || '';
// v20.35 — Helper inline pour rendre soit select caisse (si pces_per_caisse), soit input
// Placeholders explicites "J'ai" / "À cmd" pour rester lisible même sans le header de colonnes
function renderReapproField(field, currentVal, placeholder, isCmd) {
  const cls = 'qty-input ' + (isCmd ? 'cmd ' : '') + (currentVal ? 'has-value' : '');
  if (pceC && pceC > 0) {
    // Mode caisse : select avec multiples de caisse + option custom si valeur hors liste
    const opts = caisseOptions(pceC).map(function(o) { return { val: o.val, lbl: o.lbl }; });
    opts[0].lbl = placeholder; // override "-" par "J'ai" / "À cmd"
    let h = '<select class="' + cls + ' caisse-select" data-pid="' + p.id + '" data-field="' + field + '" onchange="handleReapproInput(this)">';
    opts.forEach(function(o) {
      const selected = (String(currentVal) === o.val) ? ' selected' : '';
      h += '<option value="' + escapeHtml(o.val) + '"' + selected + '>' + escapeHtml(o.lbl) + '</option>';
    });
    const exists = opts.some(function(o) { return o.val === String(currentVal); });
    if (currentVal && !exists) {
      h += '<option value="' + escapeHtml(String(currentVal)) + '" selected>' + escapeHtml(String(currentVal)) + ' pces</option>';
    }
    h += '</select>';
    return h;
  }
  // Mode menu déroulant v20.71 — entiers 0→50, plus de saisie clavier (toutes boutiques)
  const MAXN = 50;
  const cv = (currentVal === null || currentVal === undefined) ? '' : String(currentVal);
  let h = '<select class="' + cls + ' unit-select" data-pid="' + p.id + '" data-field="' + field + '" onchange="handleReapproInput(this)">';
  h += '<option value="">' + escapeHtml(placeholder) + '</option>';
  for (let n = 0; n <= MAXN; n++) {
    h += '<option value="' + n + '"' + (cv === String(n) ? ' selected' : '') + '>' + n + '</option>';
  }
  // Préserve une valeur existante hors plage (ex ancien 80) sans rouvrir la saisie libre
  const inRange = (cv !== '' && /^\d+$/.test(cv) && Number(cv) >= 0 && Number(cv) <= MAXN);
  if (cv !== '' && !inRange) {
    h += '<option value="' + escapeHtml(cv) + '" selected>' + escapeHtml(cv) + '</option>';
  }
  h += '</select>';
  return h;
}
html += renderReapproField('avoir', a, "J'ai", false);
html += renderReapproField('commander', c, 'À cmd', true);
}
html += '</div>';
return html;
}

function handleReapproInput(el) {
const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
if (!reapprosData[pid]) reapprosData[pid] = { avoir: '', commander: '', previs: '', sent_at: null };
reapprosData[pid][field] = val;
// Une modif manuelle = on invalide le "sent"
if (field !== 'previs' && reapprosData[pid].sent_at) {
reapprosData[pid].sent_at = null;
}
el.classList.toggle('has-value', !!val);
// v20.34 — Auto-pré-remplissage "à commander" quand on saisit "j'ai"
// (seulement si commander était vide et cible définie pour cette boutique)
if (field === 'avoir') {
  const p = products.find(function(x) { return x.id === pid; });
  const cible = getCibleForProduct(p, currentBoutique);
  const cmdCurrent = reapprosData[pid].commander;
  if (cible != null && cible > 0 && (cmdCurrent == null || cmdCurrent === '')) {
    const aValN = parseFloat(String(val).replace(',', '.'));
    const aVal = isNaN(aValN) ? 0 : aValN;
    const aCmd = Math.max(0, cible - aVal);
    const aCmdStr = String(aCmd);
    reapprosData[pid].commander = aCmdStr;
    // Update DOM input/select "À commander" sans full re-render
    const cmdEl = document.querySelector('[data-pid="' + pid + '"][data-field="commander"]');
    if (cmdEl) {
      if (cmdEl.tagName === 'SELECT') {
        // Caisse-mode : ajoute une option custom si la valeur n'existe pas
        const exists = Array.from(cmdEl.options).some(function(o) { return o.value === aCmdStr; });
        if (!exists) {
          const opt = document.createElement('option');
          opt.value = aCmdStr;
          opt.textContent = aCmdStr + ' pces';
          cmdEl.appendChild(opt);
        }
        cmdEl.value = aCmdStr;
      } else {
        cmdEl.value = aCmdStr;
      }
      cmdEl.classList.toggle('has-value', aCmd > 0);
    }
  }
}
// v20.2 — feedback vert sur ligne saisie
const row = el.closest('.produit-row');
if (row) {
  const d = reapprosData[pid];
  const filled = (field === 'previs')
    ? (d.previs != null && d.previs !== '')
    : ((d.commander != null && d.commander !== '') || (d.avoir != null && d.avoir !== ''));
  row.classList.toggle('row-filled', filled);
}
// On perd le bandeau "J-7 auto" des qu'on modifie
if (autoCopyLastWeekDate) {
autoCopyLastWeekDate = null;
// Pas de re-render pour garder le focus, juste masquer au prochain rendu
}
clearTimeout(updateTimers['r_' + pid]);
updateTimers['r_' + pid] = setTimeout(function() {
upsertReappro(pid);
}, 500);
}

async function autoFillMatinFromYesterday(b, date) {
// v20 : Matin(J) = Prévis(J-1) - ResteJ1(J-1) si produit sur place et catégorie a_previs
//       Sinon (produit en reappro externe) : Matin(J) = Commander(J-1) validated + sent_at
//       Dans les deux cas : on stocke aussi matin_auto pour garder la trace
const d = new Date(date + 'T12:00');
d.setDate(d.getDate() - 1);
const yISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

// Recuperer previs J-1 + reappros J-1 + reste_j1 J-1 en parallele
const [previsY, reapY, restesY] = await Promise.all([
loadPrevisRaw(b, yISO),
loadReapprosDate(b, yISO),
loadRestesJ1(b, date)
]);
// Note : loadRestesJ1 fait déjà le J-1 (il sort reste_j1 de la veille de `date`)

const pidsFilled = [];
products.forEach(function(p) {
const pid = p.id;
// Ne pas ecraser si matin est déjà saisi (matin_auto servira d'indicateur mais matin manuel prevaut)
const existing = salesData[pid] || {};
if (existing.matin !== '' && existing.matin != null && existing.matin !== 0) return;

const supply = getProductSupply(p, b);
let matinVal = null;
let matinAutoVal = null;

// Cas 1 : produit sur place avec Prévis
if (supply === 'on_site' && categoryHasPrevis(p.category)) {
// v20.3 — fallback sur défaut de production si pas de Prévis saisi pour J-1
let pv = previsY[pid];
if (pv == null || pv === '') {
  const defQ = getDefaultQty(b, pid, yISO);
  pv = defQ != null ? defQ : 0;
} else {
  pv = Number(pv) || 0;
}
const j1 = restesY[pid] || 0;
const net = Math.max(0, pv - j1);
if (pv > 0 || j1 > 0) {
matinVal = net;
matinAutoVal = net;
}
}
// Cas 2 : produit arrive en reappro externe (local ou veigne)
else if ((supply === 'local' || supply === 'veigne')) {
const y = reapY[pid];
if (y && y.commander && y.commander !== '' && y.sent_at) {
const cmd = parseQty(y.commander);
if (cmd > 0) {
matinVal = cmd;
matinAutoVal = cmd;
}
}
}

if (matinVal == null) return;
if (!salesData[pid]) salesData[pid] = { matin: '', aprem: '', reste_j1: '', reste_j2: '', perte: '', rupture_heure: '', day_closed: false };
salesData[pid].matin = String(matinVal);
salesData[pid].matin_auto = matinAutoVal;
pidsFilled.push(pid);

});

if (pidsFilled.length) {
const nowISO = new Date().toISOString();
const rows = pidsFilled.map(function(pid) {
const d2 = salesData[pid];
return {
tenant_id: TENANT_ID, boutique_id: b, product_id: pid, date: date,
matin: parseInt(d2.matin) || 0,
matin_auto: d2.matin_auto == null ? null : d2.matin_auto,
aprem: d2.aprem === '' ? null : parseInt(d2.aprem) || 0,
reste_j1: d2.reste_j1 === '' ? null : parseInt(d2.reste_j1) || 0,
reste_j2: d2.reste_j2 === '' || d2.reste_j2 == null ? null : parseInt(d2.reste_j2) || 0,
perte: d2.perte === '' ? null : parseInt(d2.perte) || 0,
rupture_heure: d2.rupture_heure || null,
day_closed: d2.day_closed === true,  // v20.5 — préserve l'état de validation
updated_by: DEVICE_ID, updated_at: nowISO
};
});
await supa.from('sales').upsert(rows, { onConflict: 'tenant_id,boutique_id,product_id,date' });
}
}

// Source : Open-Meteo (gratuit, sans clé). Indicatif niveau 1 : aide à viser
// les quantités. Caché 1×/jour par boutique pour ne pas spammer d'appels.
const METEO_COORDS = {
  'veigne':        { lat: 47.286, lon: 0.747 },
  'tours':         { lat: 47.394, lon: 0.689 },
  'saint-avertin': { lat: 47.358, lon: 0.726 },

  'beaujardin':    { lat: 47.376, lon: 0.686 }   // marché Beaujardin, Tours (samedi)
};
function meteoIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 2)  return '⛅';
  if (code === 3) return '☁️';
  if (code >= 45 && code <= 48) return '🌫️';
  if (code >= 51 && code <= 67) return '🌦️';
  if (code >= 71 && code <= 77) return '🌨️';
  if (code >= 80 && code <= 82) return '🌧️';
  if (code >= 95) return '⛈️';
  return '🌥️';
}
// suggestion simple : beau & doux = + produire, pluie/orage = − produire
function meteoSuggest(code, tmax) {
  const pluie = (code >= 51 && code <= 67) || (code >= 80 && code <= 99);
  if (pluie) return { cls: 'down', txt: '− produire' };
  if (code <= 1 && tmax >= 20) return { cls: 'up', txt: '+ produire' };
  return { cls: 'flat', txt: '= normal' };
}
async function renderMeteoBar(boutique) {
  const el = document.getElementById('meteo-bar-ventes');
  if (!el) return;
  const c = METEO_COORDS[boutique];
  if (!c) { el.style.display = 'none'; return; }
  const today = new Date().toISOString().slice(0, 10);
  const ck = 'meteo_' + boutique + '_' + today;
  let data = null;
  try { const cached = localStorage.getItem(ck); if (cached) data = JSON.parse(cached); } catch (e) {}
  if (!data) {
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + c.lat + '&longitude=' + c.lon
        + '&daily=weather_code,temperature_2m_max&timezone=Europe%2FParis&forecast_days=7';
      const r = await fetch(url);
      const j = await r.json();
      data = { days: j.daily.time, codes: j.daily.weather_code, tmax: j.daily.temperature_2m_max };
      try { localStorage.setItem(ck, JSON.stringify(data)); } catch (e) {}
    } catch (e) { el.style.display = 'none'; return; }
  }
  const JJ = ['dim', 'lun', 'mar', 'mer', 'jeu', 'ven', 'sam'];
  let html = '';
  data.days.forEach(function(d, i) {
    const dt = new Date(d + 'T12:00:00');
    const isToday = d === today;
    const sug = meteoSuggest(data.codes[i], data.tmax[i]);
    html += '<div class="mto-day' + (isToday ? ' today' : '') + '">'
      + '<div class="mto-d">' + JJ[dt.getDay()] + ' ' + dt.getDate() + '</div>'
      + '<div class="mto-i">' + meteoIcon(data.codes[i]) + '</div>'
      + '<div class="mto-t">' + Math.round(data.tmax[i]) + '°</div>'
      + '<div class="mto-s ' + sug.cls + '">' + sug.txt + '</div>'
      + '</div>';
  });
  el.innerHTML = html;
}

// ── Jours fériés FR + ouverture boutique (v20.58, brique A) ─────────────
function _localISO(dt) {
  const y = dt.getFullYear(), m = String(dt.getMonth() + 1).padStart(2, '0'),
        d = String(dt.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}
// Dimanche de Pâques (algorithme de Meeus/Gauss)
function _paques(an) {
  const a = an % 19, b = Math.floor(an / 100), c = an % 100, d = Math.floor(b / 4),
        e = b % 4, f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3),
        h = (19 * a + b - d - g + 15) % 30, i = Math.floor(c / 4), k = c % 4,
        l = (32 + 2 * e + 2 * i - h - k) % 7, m = Math.floor((a + 11 * h + 22 * l) / 451),
        mois = Math.floor((h + l - 7 * m + 114) / 31), jour = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(an, mois - 1, jour);
}
function joursFeriesFR(an) {
  const f = {};
  const fixe = (mo, da, nom) => { f[_localISO(new Date(an, mo - 1, da))] = nom; };
  fixe(1, 1, 'Jour de l’An');   fixe(5, 1, 'Fête du Travail');
  fixe(5, 8, 'Victoire 1945');       fixe(7, 14, 'Fête Nationale');
  fixe(8, 15, 'Assomption');         fixe(11, 1, 'Toussaint');
  fixe(11, 11, 'Armistice');         fixe(12, 25, 'Noël');
  const p = _paques(an), off = (n, nom) => {
    const d = new Date(p); d.setDate(p.getDate() + n); f[_localISO(d)] = nom;
  };
  off(1, 'Lundi de Pâques');  off(39, 'Ascension');  off(50, 'Lundi de Pentecôte');
  return f;
}
const _feriesCache = {};
function estFerie(iso) {
  const an = parseInt(iso.slice(0, 4), 10);
  if (!_feriesCache[an]) _feriesCache[an] = joursFeriesFR(an);
  return _feriesCache[an][iso] || null;
}
// Statut d'ouverture d'une boutique à une date donnée (règles métier Phil)
function boutiqueOuverte(boutique, iso) {
  const nom = estFerie(iso);
  if (!nom) return { ferie: false, ouvert: true, matin: false, nom: null, raison: '' };
  if (iso.slice(5) === '01-01')
    return { ferie: true, ouvert: false, matin: false, nom: nom, raison: 'Fermé — toutes les boutiques le 1er janvier' };
  const dow = new Date(iso + 'T12:00').getDay(); // 0=dim, 1=lundi
  if (boutique === 'tours')
    return { ferie: true, ouvert: false, matin: false, nom: nom, raison: 'Tours fermé les jours fériés (pas de livraison pros)' };
  if (boutique === 'saint-avertin' && dow === 1)
    return { ferie: true, ouvert: false, matin: false, nom: nom, raison: 'Fermé (lundi)' };
  return { ferie: true, ouvert: true, matin: true, nom: nom, raison: 'Ouvert le matin · quantités comme un dimanche' };
}
function ferieBannerHtml(boutique, iso) {

// Brique C — prochain férié où la boutique sera FERMÉE, dans les N prochains jours
function prochainFerieFerme(boutique, dansNbJours) {
  const auj = new Date(); auj.setHours(12, 0, 0, 0);

// v20.1 : nouveau calcul Vendu base sur Prévis au lieu de Matin
// v20.5 : gate sur day_closed — Vendu n'apparaît qu'après "Valider la journée"
function calcVenduV201(pid, previs) {
const d = salesData[pid] || {};
if (!d.day_closed) return null;
const a  = d.aprem === '' ? 0 : parseInt(d.aprem) || 0;
const rj = d.reste_j1 === '' ? 0 : parseInt(d.reste_j1) || 0;
const rj2 = d.reste_j2 === '' || d.reste_j2 == null ? 0 : parseInt(d.reste_j2) || 0;
const pe = d.perte === '' ? 0 : parseInt(d.perte) || 0;
const pv = previs || 0;
return Math.max(0, pv + a - rj - rj2 - pe);
}

function calcPerteV201(pid, previs) {
const d = salesData[pid] || {};
if (!d.day_closed) return null;
const a = d.aprem === '' ? 0 : parseInt(d.aprem) || 0;
const pe = d.perte === '' ? 0 : parseInt(d.perte) || 0;
const total = (previs || 0) + a;
if (total === 0) return null;
return Math.round((pe / total) * 100);
}

// v20.5 — Valider la journée :
//   * Pour les produits avec activité réelle (Matin > 0 ou Aprem > 0) :
//     day_closed=true et champs vides (Aprem/RJ-1/Perte) → 0.
//   * Pour les rows fantômes (day_closed=true mais aucune activité réelle,
//     legacy d'un ancien clic Valider buggé) : on reset day_closed=false
//     et on vide les valeurs → cases redeviennent "-".
async function validateDay() {
  const ventesProducts = getProductsForVentes().filter(function(p) {
    if (p.boutique_restriction && p.boutique_restriction !== currentBoutique) return false;
    return true;
  });
  if (!ventesProducts.length) { showToast('Aucun produit a valider', 'error'); return; }
  function hasVal(v) { return v != null && v !== ''; }
  function realActivity(d) {
    return (parseInt(d.matin) || 0) > 0 || (parseInt(d.aprem) || 0) > 0;
  }
  const productsToValidate = ventesProducts.filter(function(p) {
    return realActivity(salesData[p.id] || {});
  });
  const productsToUnvalidate = ventesProducts.filter(function(p) {
    const d = salesData[p.id] || {};
    return d.day_closed === true && !realActivity(d);
  });
  if (!productsToValidate.length && !productsToUnvalidate.length) {
    showToast('Aucune saisie a valider (tout est vide)', 'error');
    return;
  }
  const msgParts = ['Valider la journée du ' + formatDateFr(currentDate) + ' ?'];
  if (productsToValidate.length) msgParts.push(productsToValidate.length + ' produit(s) à valider (champs vides → 0)');
  if (productsToUnvalidate.length) msgParts.push(productsToUnvalidate.length + ' produit(s) fantôme(s) à nettoyer (sans activité réelle)');
  if (!confirm(msgParts.join('\n'))) return;
  setSyncStatus('syncing');
  const nowISO = new Date().toISOString();
  const validateRows = productsToValidate.map(function(p) {
    const d = salesData[p.id] || {};
    return {
      tenant_id: TENANT_ID, boutique_id: currentBoutique, product_id: p.id, date: currentDate,
      matin: hasVal(d.matin) ? (parseInt(d.matin) || 0) : null,
      aprem: hasVal(d.aprem) ? (parseInt(d.aprem) || 0) : 0,
      reste_j1: hasVal(d.reste_j1) ? (parseInt(d.reste_j1) || 0) : 0,
      reste_j2: hasVal(d.reste_j2) ? (parseInt(d.reste_j2) || 0) : 0,
      perte: hasVal(d.perte) ? (parseInt(d.perte) || 0) : 0,
      rupture_heure: d.rupture_heure || null,
      day_closed: true,
      updated_by: DEVICE_ID, updated_at: nowISO
    };
  });
  const unvalidateRows = productsToUnvalidate.map(function(p) {
    return {
      tenant_id: TENANT_ID, boutique_id: currentBoutique, product_id: p.id, date: currentDate,
      matin: null, aprem: null, reste_j1: null, reste_j2: null, perte: null,
      rupture_heure: null,
      day_closed: false,
      updated_by: DEVICE_ID, updated_at: nowISO
    };
  });
  const allRows = validateRows.concat(unvalidateRows);
  const { error } = await supa.from('sales').upsert(allRows, { onConflict: 'tenant_id,boutique_id,product_id,date' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  // Maj cache local
  validateRows.forEach(function(r) {
    if (!salesData[r.product_id]) salesData[r.product_id] = { matin: '', aprem: '', reste_j1: '', reste_j2: '', perte: '', rupture_heure: '', day_closed: false };
    salesData[r.product_id].aprem    = String(r.aprem);
    salesData[r.product_id].reste_j1 = String(r.reste_j1);
    salesData[r.product_id].reste_j2 = String(r.reste_j2);
    salesData[r.product_id].perte    = String(r.perte);
    salesData[r.product_id].day_closed = true;
  });
  unvalidateRows.forEach(function(r) {
    if (salesData[r.product_id]) {
      salesData[r.product_id].matin = '';
      salesData[r.product_id].aprem = '';
      salesData[r.product_id].reste_j1 = '';
      salesData[r.product_id].reste_j2 = '';
      salesData[r.product_id].perte = '';
      salesData[r.product_id].day_closed = false;
    }
  });
  renderVentes();
  const parts = [];
  if (validateRows.length) parts.push(validateRows.length + ' validés');
  if (unvalidateRows.length) parts.push(unvalidateRows.length + ' nettoyés');
  showToast(parts.join(' · '), 'sync');
}

async function loadRecapWeek(b, monday) {

.eq('tenant_id', TENANT_ID).eq('boutique_id', b)
.gte('date', monday).lte('date', sunday);
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
recapWeekData = {};

days.forEach(function(d) { recapWeekData[d] = []; });
(data || []).forEach(function(r) {
if (!recapWeekData[r.date]) recapWeekData[r.date] = [];
recapWeekData[r.date].push(r);
});
}

function calcDayStats(dayISO) {
const rows = recapWeekData[dayISO] || [];
let totalVendu = 0, totalProduit = 0, totalPerte = 0, totalResteJ1 = 0;
let productsMap = {};
rows.forEach(function(r) {
if (r.day_closed !== true) return;  // v20.5 — exclure les journées non validées
if (recapMode === 'category' && recapCategory !== 'all') {
const p = products.find(function(x) { return x.id === r.product_id; });
if (!p || p.category !== recapCategory) return;
}
const m  = r.matin == null ? 0 : r.matin;
const a  = r.aprem == null ? 0 : r.aprem;
const rj = r.reste_j1 == null ? 0 : r.reste_j1;
const rj2 = r.reste_j2 == null ? 0 : r.reste_j2;
const pe = r.perte == null ? 0 : r.perte;
const total = m + a;
const vendu = Math.max(0, total - rj - rj2 - pe);
totalVendu += vendu;
totalProduit += total;
totalPerte += pe;
totalResteJ1 += rj;
productsMap[r.product_id] = (productsMap[r.product_id] || 0) + vendu;
});
// %Perte : sur la PERTE seulement (pas Reste J1)
const pertePct = totalProduit > 0 ? Math.round((totalPerte / totalProduit) * 100) : null;
return { vendu: totalVendu, produit: totalProduit, perte: totalPerte, resteJ1: totalResteJ1, pertePct: pertePct, products: productsMap };
}

function calcWeekStats() {
const days = weekDaysFromMonday(currentWeekStart);
let totalV = 0, totalP = 0, totalPerte = 0, totalRJ1 = 0;
let dayWithRupture = new Set();
let productsSold = {};
let productsLost = {};
days.forEach(function(d) {
const rows = recapWeekData[d] || [];
rows.forEach(function(r) {
if (r.day_closed !== true) return;  // v20.5 — exclure les journées non validées
if (recapMode === 'category' && recapCategory !== 'all') {
const p = products.find(function(x) { return x.id === r.product_id; });
if (!p || p.category !== recapCategory) return;
}
const m  = r.matin == null ? 0 : r.matin;
const a  = r.aprem == null ? 0 : r.aprem;
const rj = r.reste_j1 == null ? 0 : r.reste_j1;
const rj2 = r.reste_j2 == null ? 0 : r.reste_j2;
const pe = r.perte == null ? 0 : r.perte;
const total = m + a;
const vendu = Math.max(0, total - rj - rj2 - pe);
totalV += vendu;
totalP += total;
totalPerte += pe;
totalRJ1 += rj;
if (r.rupture_heure) dayWithRupture.add(d);
productsSold[r.product_id] = (productsSold[r.product_id] || 0) + vendu;
if (total > 0) {
if (!productsLost[r.product_id]) productsLost[r.product_id] = { perte: 0, total: 0 };
productsLost[r.product_id].perte += pe;
productsLost[r.product_id].total += total;
}
});
});
// %Perte : sur la PERTE seulement (pas Reste J1)
const pertePct = totalP > 0 ? Math.round((totalPerte / totalP) * 100) : null;
return {
vendu: totalV, produit: totalP, perte: totalPerte, resteJ1: totalRJ1, pertePct: pertePct,
daysWithRupture: dayWithRupture.size,
productsSold: productsSold, productsLost: productsLost
};
}

}

function renderBarChart(days, values, maxVal) {
const W = 320, H = 160, PAD = 24, BARW = 28;
const chartW = W - PAD * 2;
const barGap = (chartW - BARW * 7) / 6;
const max = Math.max(maxVal, 1);
let svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
svg += '<line x1="' + PAD + '" y1="' + (H-22) + '" x2="' + (W-PAD) + '" y2="' + (H-22) + '" stroke="#E0D8C8" stroke-width="1"/>';
days.forEach(function(d, i) {
const v = values[i] || 0;
const h = v === 0 ? 2 : ((H - 40) * v / max);
const x = PAD + i * (BARW + barGap);
const y = H - 22 - h;
const isToday = (d === todayISO());
const color = isToday ? '#CEAB52' : '#2C5F8A';
svg += '<rect x="' + x + '" y="' + y + '" width="' + BARW + '" height="' + h + '" fill="' + color + '" rx="4"/>';

svg += '<text x="' + (x + BARW/2) + '" y="' + (H - 6) + '" text-anchor="middle" fill="#6B4226" font-size="10">' + formatDayShort(d).split(' ')[0] + '</text>';
});
svg += '</svg>';
return svg;
}

function renderLineChart(days, values) {

const max = 30;

days.forEach(function(d, i) {

});
days.forEach(function(d, i) {
const x = PAD + i * stepX;
svg += '<text x="' + x + '" y="' + (H - 6) + '" text-anchor="middle" fill="#6B4226" font-size="10">' + formatDayShort(d).split(' ')[0] + '</text>';
});

async function moveStop(id, delta) {
const stopsForTour = deliveriesData.filter(function(d) { return d.tour === currentTour; })
.sort(function(a, b) { return a.position - b.position; });
const idx = stopsForTour.findIndex(function(d) { return d.id === id; });
if (idx < 0) return;
const newIdx = idx + delta;
if (newIdx < 0 || newIdx >= stopsForTour.length) return;
const a = stopsForTour[idx], b = stopsForTour[newIdx];
const tmp = a.position;
a.position = b.position;
b.position = tmp;
setSyncStatus('syncing');
const { error: e1 } = await supa.from('deliveries').update({ position: a.position, updated_by: DEVICE_ID, updated_at: new Date().toISOString() }).eq('id', a.id);
const { error: e2 } = await supa.from('deliveries').update({ position: b.position, updated_by: DEVICE_ID, updated_at: new Date().toISOString() }).eq('id', b.id);
if (e1 || e2) { setSyncStatus('error'); showToast((e1 || e2).message, 'error'); return; }
setSyncStatus('ok');
renderLivraison();
}

setSyncStatus('ok');

renderLivraison();
}

  items.sort(function(a, b) {

  });
  items.forEach(function(r) {

  html += '<button class="livreur-check ' + (isLivre ? 'checked' : '') + '" onclick="toggleLivre(\'' + r.id + '\', ' + isLivre + ')">✓</button>';
  html += '</div>';
  });
  html += '</div>';
  });

return html;

async function markProOrderDelivered(orderId, currentStatus) {
  const newStatus = currentStatus === 'livre' ? 'confirme' : 'livre';
  setSyncStatus('syncing');
  const { error } = await supa.from('pro_orders').update({ statut: newStatus }).eq('id', orderId);
  if (error) { setSyncStatus('error'); showToast('Erreur statut: ' + error.message, 'error'); return; }

  // v21.2 — Auto-décrément / réincrément du stock pro pour les items suivis
  // Nécessite d'avoir adminProducts + proStockData chargés
  const order = livreurProOrders.find(function(x) { return x.id === orderId; });
  if (order && Array.isArray(order.pro_order_items)) {
    // S'assurer que proStockData est chargé (cache local utilisé par applyProStockMovement)
    if (!Object.keys(proStockData).length) await loadProStock();
    const allProducts = (adminProducts && adminProducts.length) ? adminProducts : products;
    for (let i = 0; i < order.pro_order_items.length; i++) {
      const it = order.pro_order_items[i];
      if (!it.product_id) continue;
      const prod = allProducts.find(function(p) { return p.id === it.product_id; });
      if (!prod || !prod.suivi_stock_pro) continue; // seul les produits suivis génèrent un mouvement
      const qty = Number(it.qty) || 0;
      if (qty <= 0) continue;
      if (newStatus === 'livre') {
        // Sortie de stock
        await applyProStockMovement(it.product_id, -qty, 'delivery', orderId);
      } else {
        // Annulation : restaurer
        await applyProStockMovement(it.product_id, +qty, 'delivery_cancel', orderId);
      }
    }
  }

  setSyncStatus('ok');
  // Optimistic local update (realtime suit, mais évite le flicker)
  if (order) order.statut = newStatus;
  renderLivraison();
}

function renderLivreurProOrdersSection() {
  if (!livreurProOrders.length) return '';

  const prosMap = {};
  adminPros.forEach(function(p) { prosMap[p.id] = p; });
  const productsMap = {};
  (adminProducts && adminProducts.length ? adminProducts : products).forEach(function(p) { productsMap[p.id] = p; });

  // Groupe par boutique source
  const sourceOrder = ['local', 'veigne', 'tours', 'saint-avertin'];
  const bySource = {};
  livreurProOrders.forEach(function(o) {
    const b = o.boutique_source || '?';
    if (!bySource[b]) bySource[b] = [];
    bySource[b].push(o);
  });

  const aLivrer = livreurProOrders.filter(function(o) { return o.statut !== 'livre'; }).length;
  const livres = livreurProOrders.filter(function(o) { return o.statut === 'livre'; }).length;

  let html = '<div class="info-banner" style="border-left-color:var(--gold);margin-top:14px"><strong>💼 Commandes Pros</strong> · ' + aLivrer + ' à livrer / ' + livres + ' livrée' + (livres > 1 ? 's' : '') + '</div>';

  const sortedSources = Object.keys(bySource).sort(function(a, b) {
    const ai = sourceOrder.indexOf(a), bi = sourceOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  sortedSources.forEach(function(b) {
    const lbl = BOUTIQUE_NAMES[b] || b;
    const orders = bySource[b];
    const nbALivrer = orders.filter(function(o) { return o.statut !== 'livre'; }).length;
    html += '<div style="background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(61,43,31,0.05)">'
      + '<div style="font-family:Georgia,serif;font-weight:700;color:var(--brown);margin-bottom:8px">📦 Récupérer à <span style="color:var(--gold-dark)">' + escapeHtml(lbl) + '</span>'
      + ' <span style="color:#999;font-size:11px;font-weight:500">· ' + nbALivrer + ' à livrer</span></div>';

    // Trier : à livrer en premier, livrées ensuite
    orders.sort(function(a, b) {
      const aDone = (a.statut === 'livre') ? 1 : 0;
      const bDone = (b.statut === 'livre') ? 1 : 0;
      if (aDone !== bDone) return aDone - bDone;
      const ap = prosMap[a.pro_id], bp = prosMap[b.pro_id];
      return (ap ? ap.nom : a.pro_id).localeCompare(bp ? bp.nom : b.pro_id);
    });

    orders.forEach(function(o) {
      const pro = prosMap[o.pro_id];
      const proNom = pro ? pro.nom : o.pro_id;
      const firstContact = (pro && Array.isArray(pro.contacts) && pro.contacts[0]) || {};
      const contactBits = [];
      if (firstContact.nom) contactBits.push(escapeHtml(firstContact.nom));
      if (firstContact.tel) contactBits.push('<a href="tel:' + escapeHtml(firstContact.tel) + '" style="color:var(--blue);text-decoration:none">📞 ' + escapeHtml(firstContact.tel) + '</a>');
      const contactInfo = contactBits.join(' · ');
      const items = o.pro_order_items || [];
      let totalOrder = 0;
      items.forEach(function(it) { totalOrder += Number(it.qty || 0) * Number(it.prix_applique || 0); });
      const isDelivered = (o.statut === 'livre');

            + '<div style="color:#888;font-size:11px;margin-top:2px">' + items.length + ' ligne' + (items.length > 1 ? 's' : '') + ' · <strong style="color:var(--brown)">' + fmtEUR(totalOrder) + '</strong></div>'
            + (o.notes ? '<div style="background:#FEF8E6;border-left:3px solid var(--gold);padding:4px 8px;margin-top:4px;font-size:11px;color:var(--brown)">⭐ ' + escapeHtml(o.notes) + '</div>' : '')
          + '</div>'
          + '<button class="livreur-check ' + (isDelivered ? 'checked' : '') + '" onclick="markProOrderDelivered(\'' + o.id + '\', \'' + o.statut + '\')" title="' + (isDelivered ? 'Annuler la livraison' : 'Marquer livrée') + '">✓</button>'
        + '</div>';

      if (items.length) {
        html += '<table class="recap-table" style="margin-top:6px;font-size:11px">'
          + '<thead><tr><th>Produit</th><th>Qté</th></tr></thead><tbody>';
        items.forEach(function(it) {
          const prod = productsMap[it.product_id];
          const name = prod ? prod.name : it.product_id;
          const qty = Number(it.qty || 0);
          const qtyStr = (qty % 1 === 0) ? String(qty) : qty.toFixed(2).replace('.', ',');
          html += '<tr><td>' + escapeHtml(name) + '</td><td><strong>' + qtyStr + '</strong></td></tr>';
        });
        html += '</tbody></table>';
      }

      html += '</div>';
    });

    html += '</div>';
  });

  return html;
}

// v20.48 — Le stock se décompte quand Veigné marque le réassort « préparé » (plus à la livraison)
let veignePatDate = todayISO();
let veignePatReassort = { 'tours': [], 'saint-avertin': [] };

async function loadVeignePatStock() {
  const { data, error } = await supa.from('veigne_pat_stock').select('*').eq('tenant_id', TENANT_ID);
  veignePatStockData = {};
  if (error) { showToast('Erreur stock pât. : ' + error.message, 'error'); }
  else (data || []).forEach(function(r) { veignePatStockData[r.product_id] = r; });
  await loadVeignePatReassort();
}

// Commandes réassort Tours/St-Av envoyées et pas encore préparées, pour le jour affiché (produits suivis)
async function loadVeignePatReassort() {
  veignePatReassort = { 'tours': [], 'saint-avertin': [] };
  const { data, error } = await supa.from('reappros').select('*')
    .eq('tenant_id', TENANT_ID).eq('service_date', veignePatDate)
    .in('boutique_id', ['tours', 'saint-avertin'])
    .not('sent_at', 'is', null).is('prepared_at', null);
  if (error) return;
  (data || []).forEach(function(r) {
    if (!veignePatStockData[r.product_id]) return;
    if (!(parseQty(r.commander) > 0)) return;
    const p = products.find(function(x) { return x.id === r.product_id; });
    if (!p || getProductSupply(p, r.boutique_id) !== 'veigne') return;
    if (veignePatReassort[r.boutique_id]) veignePatReassort[r.boutique_id].push(r);
  });
}

function changeVeignePatDate(delta) {
  veignePatDate = addDays(veignePatDate, delta);
  loadVeignePatReassort().then(renderStockVeignePat);
}

function veignePatUnitLabel(st) {
  if (st.stock_unit === 'caisse') return 'caisse' + (st.unit_pieces ? ' de ' + st.unit_pieces : '');
  if (st.stock_unit === 'grille') return 'grille' + (st.unit_pieces ? ' de ' + st.unit_pieces : ' (nb à renseigner)');
  return 'pièce';
}

function renderStockVeignePat() {
  const mc = document.getElementById('main-content');
  let html = '';

  // Barre de date (réassort du jour — Tours et St-Av ne sont pas les mêmes jours)
  html += '<div class="date-bar">'
    + '<button class="date-nav" onclick="changeVeignePatDate(-1)">←</button>'
    + '<div class="date-title">Réassort du <strong>' + escapeHtml(formatDateFr(veignePatDate)) + '</strong></div>'
    + '<button class="date-nav" onclick="changeVeignePatDate(1)">→</button>'
    + '</div>';

  // SECTION 1 — Réassort à préparer, séparé par boutique
  let anyReassort = false;
  [['tours', 'Tours'], ['saint-avertin', 'St-Avertin']].forEach(function(b) {
    const list = (veignePatReassort[b[0]] || []).slice().sort(function(a, c) {
      const na = (products.find(function(x) { return x.id === a.product_id; }) || {}).name || '';
      const nc = (products.find(function(x) { return x.id === c.product_id; }) || {}).name || '';
      return na.localeCompare(nc);
    });
    if (!list.length) return;
    anyReassort = true;
    html += '<div class="section reappro-section">';
    html += '<div class="section-header" style="display:flex;justify-content:space-between;align-items:center;gap:8px">'
      + '<span>📦 À préparer — ' + escapeHtml(b[1]) + ' (' + list.length + ')</span>'
      + '<button class="btn-gold-sm" onclick="prepareVeignePatBoutique(\'' + b[0] + '\')">✓ Tout préparé</button>'
      + '</div>';
    list.forEach(function(r) {
      const p = products.find(function(x) { return x.id === r.product_id; }) || {};
      const st = veignePatStockData[r.product_id] || {};
      const qty = parseQty(r.commander);
      const u = (!st.stock_unit || st.stock_unit === 'piece') ? 'pièce' : st.stock_unit;
      html += '<div class="produit-row" style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px">';
      html += '<div><div class="produit-name">' + escapeHtml(p.name || r.product_id) + '</div>'
        + '<div class="produit-unit">' + qty + ' ' + escapeHtml(u) + (qty > 1 ? 's' : '') + '</div></div>';
      html += '<button class="btn-gold-sm" onclick="prepareVeignePatLine(\'' + b[0] + '\', \'' + r.product_id + '\')">✓ préparé</button>';
      html += '</div>';
    });
    html += '</div>';
  });
  if (!anyReassort) {
    html += '<div class="info-banner" style="background:#F0EAE0">Aucun réassort à préparer ce jour. (Les commandes Tours/St-Av apparaissent ici une fois envoyées.)</div>';
  }

  // SECTION 2 — Mon stock
  html += '<div class="info-banner"><strong>Mon stock</strong><br>L\'<strong>Entrée</strong> ajoute ta production du jour. Le stock baisse quand tu marques un réassort « préparé » ci-dessus. Alerte 🔴 sous le Mini, 🟠 au-dessus du Maxi.</div>';

  const entries = Object.keys(veignePatStockData).map(function(pid) {
    return { st: veignePatStockData[pid], p: products.find(function(x) { return x.id === pid; }) };
  }).filter(function(e) { return e.p; });

  if (!entries.length) { mc.innerHTML = html; return; }

  const byCat = {};
  entries.forEach(function(e) { const c = e.p.category || 'autre'; (byCat[c] = byCat[c] || []).push(e); });
  const CATORDER = ['patisserie_petits', 'patisserie_gros', 'sec_traiteur', 'gateaux_secs'];
  const cats = Object.keys(byCat).sort(function(a, b) {
    const ia = CATORDER.indexOf(a), ib = CATORDER.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  html += '<div class="section reappro-section">';
  html += '<div class="col-header stock-col-header">'
    + '<span class="col-lbl">Produit</span>'
    + '<span class="col-lbl cmd">Entrée</span>'
    + '<span class="col-lbl">Stock</span>'
    + '<span class="col-lbl">Mini</span>'
    + '<span class="col-lbl">Maxi</span>'
    + '</div>';

  cats.forEach(function(cat) {
    const list = byCat[cat].sort(function(a, b) { return a.p.name.localeCompare(b.p.name); });
    html += '<div class="prod-cat-title">' + escapeHtml(CAT_LABELS[cat] || cat) + ' <span style="font-size:11px;color:#999;font-weight:500">(' + list.length + ')</span></div>';
    list.forEach(function(e) {
      const st = e.st;
      const stock = Number(st.stock) || 0;
      const mini = st.mini, maxi = st.maxi;
      let alertCls = '', dot = '';
      if (mini != null && stock < Number(mini)) { alertCls = 'stock-red'; dot = '🔴 '; }
      else if (maxi != null && stock > Number(maxi)) { alertCls = 'stock-orange'; dot = '🟠 '; }
      else if (mini != null || maxi != null) { alertCls = 'stock-green'; dot = '🟢 '; }
      const editPen = (st.stock_unit !== 'piece')
        ? ' <a href="#" onclick="editVeignePatUnitPieces(\'' + e.p.id + '\');return false;" style="color:var(--gold-dark);text-decoration:none">✏️</a>' : '';
      html += '<div class="produit-row stock-row ' + alertCls + '">';
      html += '<div><div class="produit-name">' + dot + escapeHtml(e.p.name) + '</div>'
        + '<div class="produit-unit">' + escapeHtml(veignePatUnitLabel(st)) + editPen + '</div></div>';
      html += '<div class="stock-cell"><select class="qty-input" onchange="veignePatSelectEntree(\'' + e.p.id + '\', this)">' + veignePatQtyOptions(null) + '</select></div>';
      html += '<div class="stock-cell"><select class="qty-input" style="font-weight:700" onchange="veignePatSelectField(\'' + e.p.id + '\', \'stock\', this)">' + veignePatQtyOptions(stock) + '</select></div>';
      html += '<div class="stock-cell"><select class="qty-input" onchange="veignePatSelectField(\'' + e.p.id + '\', \'mini\', this)">' + veignePatQtyOptions(mini) + '</select></div>';
      html += '<div class="stock-cell"><select class="qty-input" onchange="veignePatSelectField(\'' + e.p.id + '\', \'maxi\', this)">' + veignePatQtyOptions(maxi) + '</select></div>';
      html += '</div>';
    });
  });

  html += '</div>';
  mc.innerHTML = html;
}

async function saveVeignePatField(pid, field, val) {
  const st = veignePatStockData[pid];
  if (!st) return;
  let v;
  if (field === 'unit_pieces') v = (String(val).trim() === '' ? null : (parseInt(val, 10) || null));
  else v = (String(val).trim() === '' ? null : parseQty(val));
  setSyncStatus('syncing');
  const upd = { updated_at: new Date().toISOString(), updated_by: DEVICE_ID };
  upd[field] = v;
  const { error } = await supa.from('veigne_pat_stock').update(upd)
    .eq('tenant_id', TENANT_ID).eq('product_id', pid);
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  st[field] = v;
  renderStockVeignePat();
}

// v20.49 — options de menu déroulant 0..30 + valeur hors-plage + "Autre…"
function veignePatQtyOptions(cur) {
  const c = (cur == null || cur === '') ? null : Number(cur);
  let o = '<option value="">—</option>';
  for (let i = 0; i <= 30; i++) o += '<option value="' + i + '"' + (c === i ? ' selected' : '') + '>' + i + '</option>';
  if (c != null && (c < 0 || c > 30 || !Number.isInteger(c))) o += '<option value="' + c + '" selected>' + c + '</option>';
  o += '<option value="__custom__">✏️ Autre…</option>';
  return o;
}

// Sélection d'une valeur (Stock / Mini / Maxi) via menu déroulant
function veignePatSelectField(pid, field, el) {
  let val = el.value;
  if (val === '__custom__') {
    const v = prompt('Valeur pour ' + field + ' :', '');
    if (v === null) { renderStockVeignePat(); return; }
    val = v;
  }
  saveVeignePatField(pid, field, val);
}

// Entrée du jour via menu déroulant → ajoute au stock
function veignePatSelectEntree(pid, el) {
  let val = el.value;
  if (val === '__custom__') {
    const v = prompt('Combien produit aujourd\'hui (à ajouter au stock) ?', '');
    if (v === null) { renderStockVeignePat(); return; }
    val = v;
  }
  addVeignePatEntreeVal(pid, val);
}

async function addVeignePatEntreeVal(pid, val) {
  const add = parseQty(val);
  if (!add) { renderStockVeignePat(); return; }
  const st = veignePatStockData[pid];
  if (!st) return;
  const newStock = (Number(st.stock) || 0) + add;
  setSyncStatus('syncing');
  const { error } = await supa.from('veigne_pat_stock')
    .update({ stock: newStock, updated_at: new Date().toISOString(), updated_by: DEVICE_ID })
    .eq('tenant_id', TENANT_ID).eq('product_id', pid);
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  st.stock = newStock;
  renderStockVeignePat();
}

function editVeignePatUnitPieces(pid) {
  const st = veignePatStockData[pid];
  if (!st) return;
  const p = products.find(function(x) { return x.id === pid; }) || {};
  const cur = st.unit_pieces != null ? st.unit_pieces : '';
  const val = prompt('Nombre de pièces par ' + st.stock_unit + ' pour « ' + (p.name || pid) + ' » :', cur);
  if (val === null) return;
  saveVeignePatField(pid, 'unit_pieces', val);
}

// Marquer un produit d'un réassort comme préparé → décompte le stock
async function prepareVeignePatLine(boutique, productId) {
  const rows = (veignePatReassort[boutique] || []).filter(function(r) { return r.product_id === productId; });
  if (!rows.length) return;
  await applyVeignePatPrepared(rows);
  await loadVeignePatReassort();
  renderStockVeignePat();
}

// Marquer tout le réassort d'une boutique comme préparé
async function prepareVeignePatBoutique(boutique) {
  const rows = (veignePatReassort[boutique] || []).slice();
  if (!rows.length) return;
  if (!confirm('Marquer TOUT le réassort ' + (BOUTIQUE_NAMES[boutique] || boutique) + ' comme préparé ?\nLe stock sera décompté.')) return;
  await applyVeignePatPrepared(rows);
  await loadVeignePatReassort();
  renderStockVeignePat();
}

async function applyVeignePatPrepared(rows) {
  setSyncStatus('syncing');
  const now = new Date().toISOString();
  for (const r of rows) {
    const up = await supa.from('reappros').update({ prepared_at: now }).eq('id', r.id);
    if (up.error) { setSyncStatus('error'); showToast(up.error.message, 'error'); return; }
    const st = veignePatStockData[r.product_id];
    const qty = parseQty(r.commander);
    if (st && qty > 0) {
      const newStock = (Number(st.stock) || 0) - qty;
      await supa.from('veigne_pat_stock')
        .update({ stock: newStock, updated_at: now, updated_by: DEVICE_ID })
        .eq('tenant_id', TENANT_ID).eq('product_id', r.product_id);
      st.stock = newStock;
    }
  }
  setSyncStatus('ok');
  showToast('Réassort préparé · stock décompté', 'sync');
}

async function manageAddProduct() {
  const d = manageAddDraft;
  if (!d.name.trim()) { showToast('Nom obligatoire', 'error'); return; }
  if (!d.category) { showToast('Choisis une catégorie', 'error'); return; }
  let supply = {};
  if (manageCtx.supply && manageCtx.boutique) supply[manageCtx.boutique] = manageCtx.supply;
  setSyncStatus('syncing');
  const { data: ins, error } = await supa.from('products').insert({
    id: genProductId(d.name),
    tenant_id: TENANT_ID,
    name: d.name.trim(),
    category: d.category,
    unit: d.unit || null,
    usage: d.usage || 'both',
    actif: true,
    supply_by_boutique: supply
  }).select();
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  if (!ins || !ins.length) { setSyncStatus('error'); showToast('Création bloquée par Supabase (RLS ?)', 'error'); return; }
  setSyncStatus('ok');
  showToast('Produit créé : ' + d.name.trim(), 'sync');
  manageAddDraft = { name: '', category: '', usage: manageCtx.usage, unit: '' };
  await loadProducts();
  renderManageProductsModal();
  rerenderOperationalView();
}

async function manageDeactivateProduct(pid) {

  if (!confirm('Désactiver « ' + p.name + ' » ?\nIl disparaît des écrans (réversible en BackOffice).')) return;
  setSyncStatus('syncing');
  const { error } = await supa.from('products').update({ actif: false }).eq('id', pid);
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');

function parseQty(v) {
if (v == null || v === '') return 0;
const n = parseFloat(String(v).replace(',', '.'));
return isNaN(n) ? 0 : n;
}

function formatQty(n) {
if (!n) return '0';
return (Math.round(n * 100) / 100).toString().replace('.', ',');
}

});

return;
}
if (!confirm('Reporter le stock de ' + toCarry.length + ' produit(s) depuis ' + prevISO + ' ?')) return;

const rows = toCarry.map(function(p) {

return {
tenant_id: TENANT_ID,
product_id: p.id,
service_date: currentReapproDate,
produit: existing.produit === '' || existing.produit == null ? null : parseQty(existing.produit),

updated_at: new Date().toISOString()
};
});
const { error } = await supa.from('production_local').upsert(rows, { onConflict: 'tenant_id,service_date,product_id' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }

function handleProductionInput(el) {
const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
if (!productionLocalData[pid]) productionLocalData[pid] = { produit: '', stock: '' };
productionLocalData[pid][field] = val;
if (field === 'produit') el.classList.toggle('has-prod', !!val);
else el.classList.toggle('has-stock', !!val);
const ecartEl = document.getElementById('ecart_' + pid);
if (ecartEl) {
const cmd = parseQty(ecartEl.dataset.cmd);
const p = parseQty(productionLocalData[pid].produit);
const s = parseQty(productionLocalData[pid].stock);
const dispo = p + s;
if (p === 0 && s === 0 && cmd === 0) {
ecartEl.innerHTML = '<span class="ecart-badge zero">-</span>';
} else {
const e = dispo - cmd;
const eTxt = e === 0 ? '0' : (e > 0 ? '+' + formatQty(e) : formatQty(e));
const eCls = e >= 0 ? 'ok' : 'bad';
ecartEl.innerHTML = '<span class="ecart-badge ' + eCls + '">' + eTxt + '</span>';
}
}
clearTimeout(updateTimers['pl_' + pid]);
updateTimers['pl_' + pid] = setTimeout(function() { upsertProductionLocal(pid); }, 400);
}

// v20.42 — Bande "À anticiper" : calendrier 7 jours cliquable avec total Pros
function renderProductionWeekStrip(vue) {
  const allProds = (adminProducts && adminProducts.length) ? adminProducts : products;
  const prodById = {};
  allProds.forEach(function(p) { prodById[p.id] = p; });
  function passesCategory(prod) {
    if (!prod) return false;
    if (vue === 'prod_boul') return prod.category === 'pains';
    if (vue === 'prod_tour') return prod.category === 'viennoiserie' || prod.category === 'brioches_special';
    return true;
  }
  // Agréger qty Pros par jour pour les 7 jours à partir de currentReapproDate
  const byDay = {};
  productionProOrdersWeek.forEach(function(o) {
    let qtyDay = 0;
    (o.pro_order_items || []).forEach(function(it) {
      const prod = prodById[it.product_id];
      if (!passesCategory(prod)) return;
      qtyDay += Number(it.qty) || 0;
    });
    if (qtyDay > 0) byDay[o.date_livraison] = (byDay[o.date_livraison] || 0) + qtyDay;
  });

  const dowShort = ['dim', 'lun', 'mar', 'mer', 'jeu', 'ven', 'sam'];
  let html = '<div style="background:white;border-radius:14px;padding:10px;margin:8px 0;box-shadow:0 2px 8px rgba(61,43,31,0.05)">';
  html += '<div style="font-size:11px;color:var(--brown-mid);font-weight:700;text-transform:uppercase;margin-bottom:6px">💼 Pros à anticiper — touche un jour · « » = semaine</div>';
  html += '<div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:4px">';
  // v20.61 — semaine ancrée au lundi ; le jour sélectionné est surligné (pas de glissement)
  const _curDow = new Date(currentReapproDate + 'T12:00').getDay();
  const weekStart = addDays(currentReapproDate, _curDow === 0 ? -6 : 1 - _curDow);
  for (let i = 0; i < 7; i++) {
    const dateISO = addDays(weekStart, i);
    const qty = byDay[dateISO] || 0;
    const d = new Date(dateISO + 'T12:00');
    const lbl = dowShort[d.getDay()];
    const day = d.getDate();
    const isCurrent = (dateISO === currentReapproDate);
    const bg = isCurrent ? 'var(--gold)' : (qty > 0 ? '#FFFCF2' : '#FAF6EE');
    const fg = isCurrent ? 'white' : 'var(--brown)';
    const border = isCurrent ? 'var(--gold)' : (qty > 0 ? 'var(--gold-light)' : '#E5DCC8');
    const qtyColor = isCurrent ? 'white' : (qty > 0 ? 'var(--blue)' : '#bbb');
    html += '<div onclick="goToProductionDate(\'' + dateISO + '\')" style="cursor:pointer;flex:0 0 auto;min-width:60px;padding:8px 6px;border-radius:8px;background:' + bg + ';color:' + fg + ';border:1px solid ' + border + ';text-align:center">';
    html += '<div style="font-size:10px;text-transform:uppercase;font-weight:700">' + lbl + ' ' + day + '</div>';
    html += '<div style="font-family:Georgia,serif;font-size:16px;font-weight:800;color:' + qtyColor + ';margin-top:2px">' + (qty > 0 ? qty : '—') + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

// v20.42 — Section "À anticiper" en bas : liste des commandes pros futures (J+1 à J+6)
function renderProductionUpcomingProsSection(vue) {
  const allProds = (adminProducts && adminProducts.length) ? adminProducts : products;
  const prodById = {};
  allProds.forEach(function(p) { prodById[p.id] = p; });
  const prosById = {};
  (adminPros || []).forEach(function(p) { prosById[p.id] = p; });
  function passesCategory(prod) {
    if (!prod) return false;
    if (vue === 'prod_boul') return prod.category === 'pains';
    if (vue === 'prod_tour') return prod.category === 'viennoiserie' || prod.category === 'brioches_special';
    return true;
  }
  const upcoming = productionProOrdersWeek.filter(function(o) {
    if (o.date_livraison <= currentReapproDate) return false; // exclure aujourd'hui et passé
    const items = o.pro_order_items || [];
    return items.some(function(it) { return passesCategory(prodById[it.product_id]); });
  });
  if (!upcoming.length) return '';

  let html = '<div style="background:white;border-radius:14px;padding:14px;margin-top:14px;box-shadow:0 2px 8px rgba(61,43,31,0.05)">';
  html += '<div style="font-family:Georgia,serif;font-weight:700;color:var(--brown);margin-bottom:10px">📅 À anticiper (J+1 → J+6) <span style="font-weight:400;color:var(--brown-mid);font-size:12px">· ' + upcoming.length + ' commande' + (upcoming.length > 1 ? 's' : '') + '</span></div>';
  upcoming.forEach(function(o) {
    const pro = prosById[o.pro_id];
    const proNom = pro ? pro.nom : o.pro_id;
    const items = (o.pro_order_items || []).filter(function(it) { return passesCategory(prodById[it.product_id]); });
    if (!items.length) return;
    const itemsLbl = items.map(function(it) {
      const prod = prodById[it.product_id];
      return Number(it.qty) + ' × ' + (prod ? prod.name : it.product_id);
    }).join(', ');
    html += '<div onclick="goToProductionDate(\'' + escapeHtml(o.date_livraison) + '\')" style="display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #F5F0E8;cursor:pointer">';
    html += '<div style="flex:0 0 auto;min-width:110px;font-size:11px;color:var(--brown-mid);font-weight:700">' + escapeHtml(formatDateFr(o.date_livraison)) + '</div>';
    html += '<div style="flex:1;min-width:0;font-size:12px;color:var(--brown)"><strong>' + escapeHtml(proNom) + '</strong> · ' + escapeHtml(itemsLbl) + '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// v20.10 — édition directe de Matin V depuis "À produire" (boulanger ajuste)
function handleMatinVInput(el) {
  const pid = el.dataset.pid;
  const val = el.value;
  const q = parseQty(val) || 0;
  // MAJ cache local
  if (q > 0) productionVeigneSalesByProduct[pid] = q;
  else delete productionVeigneSalesByProduct[pid];
  // Recalcule le Total de la ligne sans full re-render (perf + curseur)
  recomputeRowTotal(el, pid);
  // Debounce upsert vers la table previs (= source du Matin Veigné)
  clearTimeout(updateTimers['matinv_' + pid]);
  updateTimers['matinv_' + pid] = setTimeout(function() {
    upsertPrevis(pid, 'veigne', currentReapproDate, val);
  }, 400);
}

// v20.11 — édition directe de Matin SA depuis "À produire" (traiteur uniquement)
// v20.22 — sync toujours vers previs (pattern cohérent : la prévis St-Av = commande au Local pour pain/viennoiserie ; ou prévis traiteur à Veigné Pâtissier)
function handleMatinSAInput(el) {
  const pid = el.dataset.pid;
  const val = el.value;
  const q = parseQty(val) || 0;
  if (q > 0) productionStAvSalesByProduct[pid] = q;
  else delete productionStAvSalesByProduct[pid];
  recomputeRowTotal(el, pid);
  clearTimeout(updateTimers['matinsa_' + pid]);
  updateTimers['matinsa_' + pid] = setTimeout(function() {
    upsertPrevis(pid, 'saint-avertin', currentReapproDate, val);
  }, 400);
}

// v20.18 — édition Aprem SA depuis Le Local Prod. Boulangers (sync vers sales St-Av)
function handleApremSAFromLocal(el) {
  const pid = el.dataset.pid;
  const val = el.value;
  if (!productionStAvSalesFromTable[pid]) productionStAvSalesFromTable[pid] = { matin: null, aprem: null, reste_j1: null };
  productionStAvSalesFromTable[pid].aprem = (val === '') ? null : (parseInt(val, 10) || 0);
  recomputeRowTotal(el, pid);
  clearTimeout(updateTimers['aprem_' + pid]);
  updateTimers['aprem_' + pid] = setTimeout(function() {
    upsertStAvSaleFieldFromLocal(pid, 'aprem', val);
  }, 400);
}

// v20.18 — édition Reste J-1 depuis Le Local Prod. Boulangers (sync vers sales St-Av)
function handleResteJ1FromLocal(el) {
  const pid = el.dataset.pid;
  const val = el.value;
  if (!productionStAvSalesFromTable[pid]) productionStAvSalesFromTable[pid] = { matin: null, aprem: null, reste_j1: null };
  productionStAvSalesFromTable[pid].reste_j1 = (val === '') ? null : (parseInt(val, 10) || 0);
  recomputeRowTotal(el, pid);
  clearTimeout(updateTimers['reste_' + pid]);
  updateTimers['reste_' + pid] = setTimeout(function() {
    upsertStAvSaleFieldFromLocal(pid, 'reste_j1', val);
  }, 400);
}

// Helper commun : recalcule Total = Matin V + Matin SA + Spé pour une ligne
// v20.22 — Matin SA depuis previs (cohérent avec Veigné). Au Local Boul, on inclut Aprem - Reste J-1 (sales St-Av).
function recomputeRowTotal(el, pid) {
  const row = el.closest('.prod-row');
  if (!row) return;
  const totalCell = row.querySelector('.cell.total');
  if (!totalCell) return;
  const mV = productionVeigneSalesByProduct[pid] || 0;
  const mSA = productionStAvSalesByProduct[pid] || 0;
  let aprem = 0;
  let reste = 0;
  if (currentBoutique === 'local' && (currentVue === 'prod_boul' || currentVue === 'prod_tour')) {
    const t = productionStAvSalesFromTable[pid] || {};
    // v20.32 — Aprem reste exclusif Prod. Boulangers ; Reste J-1 aussi à Prod. Touriers
    if (currentVue === 'prod_boul') aprem = t.aprem || 0;
    reste = t.reste_j1 || 0;
  }
  const spe = productionSpecialByProduct[pid] || 0;
  // v21.0.4.4 — Inclure les pros dans le recompute (sinon le total écrase la colonne Pros après chaque édition)
  let pros = 0;
  const showProsCol = (currentBoutique === 'veigne' && productionSupplierMode === 'veigne')
    || (currentBoutique === 'local' && (currentVue === 'prod_boul' || currentVue === 'prod_tour'));
  if (showProsCol) {
    const agg = aggregateProOrdersForProduction(currentVue);
    pros = agg[pid] ? agg[pid].totalQty : 0;
  }
  totalCell.textContent = formatQty(mV + mSA + aprem - reste + spe + pros);
}

function renderProduction() {
const mc = document.getElementById('main-content');
const isToday = (currentReapproDate === serviceDateISO());

// v20.15 — Le Local split en 2 équipes (Boulangers / Touriers)
const isLocalBoul = (currentBoutique === 'local' && currentVue === 'prod_boul');
const isLocalTour = (currentBoutique === 'local' && currentVue === 'prod_tour');
// v20.52 — Tours : onglet "À produire" (pains + viennoiserie cuite + traiteur fabriqués sur place)
const isToursProd = (currentBoutique === 'tours' && currentVue === 'production');
let allProducts;
if (isToursProd) {
  // Réutilise la liste Ventes de Tours (cohérent avec la prévision Matin), limitée aux familles produites sur place
  const toursCats = ['pains', 'viennoiserie', 'brioches_special', 'traiteur'];
  allProducts = getProductsForVentes().filter(function(p) {
    if (toursCats.indexOf(p.category) === -1) return false;
    if (p.boutique_restriction && p.boutique_restriction !== 'tours') return false;
    return true;
  });
} else if (isLocalBoul) {
  allProducts = products.filter(function(p) { return p.category === 'pains'; });
} else if (isLocalTour) {
  allProducts = products.filter(function(p) {
    if (p.category === 'viennoiserie' || p.category === 'brioches_special') return true;
    // v20.46 — Pâtisseries fabriquées au Local (Vigneronnes, tartelettes, cannelés…) à la suite,
    // alimentées par la prévision St-Av. Critère : pâtisserie/gâteaux secs · source St-Av = local · version vente.
    if ((p.category === 'patisserie_petits' || p.category === 'patisserie_gros' || p.category === 'gateaux_secs')
        && getProductSupply(p, 'saint-avertin') === 'local'
        && (p.usage === 'ventes' || p.usage === 'both')) return true;
    return false;
  });
} else {
  allProducts = products.slice();
}

// Marches actifs dans l'horizon : ceux qui ont au moins un produit avec emmene > 0
const activeMarkets = MARKET_IDS.filter(function(mid) {
return marketUpcomingData[mid] && marketUpcomingData[mid]._products && Object.keys(marketUpcomingData[mid]._products).length > 0;
});
// v20.41 — Le Local (Prod. Boulangers + Touriers) : forcer l'affichage de la
// colonne Marché les jours de marché (vendredi → Amboise, samedi → Beaujardin)
// même si aucune qty n'est encore saisie côté Marché. La colonne affichera 0
// si vide, ce qui rappelle aux boulangers que le marché est ce jour-là.
if (currentBoutique === 'local' && (currentVue === 'prod_boul' || currentVue === 'prod_tour')) {
  const _curDow = new Date(currentReapproDate + 'T12:00').getDay();
  MARKET_IDS.forEach(function(mid) {
    if (MARKET_DAY_OF_WEEK[mid] === _curDow && activeMarkets.indexOf(mid) === -1) {
      activeMarkets.push(mid);
      // Init structure vide pour éviter des undefined dans le rendu
      if (!marketUpcomingData[mid]) {
        marketUpcomingData[mid] = { _date: currentReapproDate, _products: {} };
      }
    }
  });
}

// v20.7 — colonne Spé pour les boutiques avec spéciales (Veigné/Local)
const showSpe = (currentBoutique === 'veigne' || currentBoutique === 'local' || currentBoutique === 'tours');
// v20.8 — Veigné Pâtissier : focus Spéciales, V/T/SA + marchés en consultation seulement
const isVeignePat = (currentBoutique === 'veigne' && productionSupplierMode === 'veigne');
// v20.9 — Veigné Pâtissier : 1 colonne "Matin V" depuis sales.matin (besoin vendeuse Veigné)
// v20.52 — Tours : colonne Matin (prévision Tours)
const showMatinV = isVeignePat || isToursProd;
// v20.11 — Veigné Pâtissier : colonne "Matin SA" visible pour le traiteur produit par Veigné
// v20.16 — Le Local : "Matin SA" visible et éditable pour pain (Boulangers) et viennoiserie cuite (Touriers)
const showMatinSA = isVeignePat || isLocalBoul || isLocalTour;
// v20.18 — Le Local Prod. Boulangers : colonnes Aprem SA + Reste J-1 depuis sales St-Av
const showApremSA = isLocalBoul;
// v20.32 — Reste J-1 aussi à Prod. Touriers (tartes fines, cookies, etc. qui se gardent J+1)
const showResteJ1 = isLocalBoul || isLocalTour;
// v20.20 — Prod. Boulangers Local : pas de colonne SA (doublon avec Matin SA — ce que St-Av commande = ce qu'elle reçoit le matin)
const showVTS = !isVeignePat && !isLocalBoul && !isToursProd;
const activeMarketsForGrid = (isVeignePat || isToursProd) ? [] : activeMarkets;
// v20.10 — Veigné Pâtissier : table simplifiée, Produit/Stock/Écart inutiles
// (pâtissiers gèrent leur stock surgelé en interne, boulangers ne remplissent jamais)
// v20.19 — Le Local Prod. Boulangers/Touriers : même règle qu'à Veigné Pâtissier (épuré)
const showProdStockEcart = !isVeignePat && !isLocalBoul && !isLocalTour && !isToursProd;
// v21.0.4.3 — Pros : besoins des commandes pros du jour
const showProsCol = isVeignePat || isLocalBoul || isLocalTour || isToursProd;
const proAgg = showProsCol ? aggregateProOrdersForProduction(currentVue) : {};
// Grid : Produit | [Matin V | Matin SA | V T SA] | [Spé] | [Pros] | [marches actifs] | Total | [Produit | Stock | Ecart]
const fixedColsBefore = '1.3fr'
  + (showMatinV ? ' 0.65fr' : '')
  + (showMatinSA ? ' 0.65fr' : '')
  + (showApremSA ? ' 0.65fr' : '')
  + (showResteJ1 ? ' 0.65fr' : '')
  + (showVTS ? (isLocalBoul ? ' 0.5fr' : ' 0.5fr 0.5fr 0.5fr') : '')
  + (showSpe ? ' 0.55fr' : '')
  + (showProsCol ? ' 0.55fr' : '');
const marketColsTpl = activeMarketsForGrid.map(function() { return '0.6fr'; }).join(' ');
const fixedColsAfter = '0.55fr' + (showProdStockEcart ? ' 0.7fr 0.7fr 0.7fr' : '');
const gridTpl = fixedColsBefore + (marketColsTpl ? ' ' + marketColsTpl : '') + ' ' + fixedColsAfter;

const rows = allProducts.map(function(p) {
const vV = productionData['veigne'] ? productionData['veigne'][p.id] : null;
const vT = productionData['tours'] ? productionData['tours'][p.id] : null;
const vS = productionData['saint-avertin'] ? productionData['saint-avertin'][p.id] : null;

// v19.1 : filtrer selon le mode fournisseur
// Mode 'local' : on ne compte que les commandes dont supply=local
// Mode 'veigne' : on ne compte que les commandes dont supply=veigne. Pour Veigné elle-même, on prend son previs (produit sur place).
const supV = getProductSupply(p, 'veigne');
const supT = getProductSupply(p, 'tours');
const supS = getProductSupply(p, 'saint-avertin');

let cV = 0, cT = 0, cS = 0;
if (productionSupplierMode === 'local') {
// Tolérance : si supply n est pas configure (null), on garde l'ancien comportement
cV = (supV == null || supV === 'local') ? parseQty(vV && vV.commander) : 0;
cT = (supT == null || supT === 'local') ? parseQty(vT && vT.commander) : 0;
cS = (supS == null || supS === 'local') ? parseQty(vS && vS.commander) : 0;
} else if (productionSupplierMode === 'veigne') {
// Veigné pour elle-même : son previs interne (ce qu'elle prevoit de produire pour son propre compte)
cV = (supV === 'on_site') ? parseQty(vV && vV.previs) : 0;
cT = (supT === 'veigne') ? parseQty(vT && vT.commander) : 0;
cS = (supS === 'veigne') ? parseQty(vS && vS.commander) : 0;
}

const marketVals = {};
let marketSum = 0;
// Les marches ne concernent que le Local
if (productionSupplierMode === 'local') {
activeMarkets.forEach(function(mid) {
const mv = (marketUpcomingData[mid] && marketUpcomingData[mid]._products && marketUpcomingData[mid]._products[p.id]) || 0;
marketVals[mid] = mv;
marketSum += mv;
});
}
// v20.7 — Commandes spéciales du jour pour ce produit (somme des items)
const cSpe = showSpe ? (productionSpecialByProduct[p.id] || 0) : 0;
// v20.9 — Matin Veigné depuis sales (besoin de la vendeuse Veigné pour le jour)
const cMatinV = showMatinV ? ((isToursProd ? productionToursSalesByProduct[p.id] : productionVeigneSalesByProduct[p.id]) || 0) : 0;
// v20.11 — Matin St-Av : pertinent à Veigné pour traiteur (seul cas filtré). Au Local pour pain/viennoiserie : toutes catégories filtrées en amont (allProducts).
// v20.16 — Le Local : pas de filtre catégorie ici (allProducts est déjà filtré par équipe).
// v20.22 — Matin SA toujours depuis previs (pattern cohérent avec Veigné). Aprem/Reste J-1 restent depuis sales.
// v20.23 — Veigné Pâtissier voit aussi Matin SA pour patisserie_gros + gateaux_secs (production à la demande).
const veignePatVisibleCats = ['traiteur', 'patisserie_gros', 'gateaux_secs'];
const matinSAEligible = showMatinSA && (!isVeignePat || veignePatVisibleCats.indexOf(p.category) !== -1);
const stAvSale = productionStAvSalesFromTable[p.id] || {};
const cMatinSA = matinSAEligible ? (productionStAvSalesByProduct[p.id] || 0) : 0;
const cAprem = showApremSA ? (stAvSale.aprem || 0) : 0;
const cReste = showResteJ1 ? (stAvSale.reste_j1 || 0) : 0;
// v21.0.4.3 — Pros : qty cumulée des commandes pros du jour pour ce produit (filtre par vue)
const cPros = showProsCol && proAgg[p.id] ? proAgg[p.id].totalQty : 0;
// v20.8 + v20.9 + v20.11 — Veigné Pâtissier : Total = Matin V + Matin SA + Spé
// v20.18 — Le Local Boul : Total = Matin SA + Aprem + SA + Spé - Reste J-1
// v21.0.4.3 — Total inclut désormais les besoins pros
const totalReassort = cV + cT + cS;
const total = (showMatinV ? cMatinV : 0) + cMatinSA + cAprem - cReste + (showVTS ? totalReassort : 0) + ((isVeignePat || isToursProd) ? 0 : marketSum) + cSpe + cPros;
const pl = productionLocalData[p.id] || { produit: '', stock: '' };
const prod  = pl.produit === '' || pl.produit == null ? null : parseQty(pl.produit);
const stock = pl.stock   === '' || pl.stock   == null ? null : parseQty(pl.stock);
return {
p: p, veigne: cV, tours: cT, savertin: cS, spe: cSpe, matinV: cMatinV, matinSA: cMatinSA,
aprem: cAprem, reste: cReste, pros: cPros,
markets: marketVals, total: total,
totalReassort: totalReassort,
produitRaw: pl.produit, stockRaw: pl.stock,
produitVal: prod, stockVal: stock
};

});

const filtered = productionFilterEmpty
? rows.filter(function(r) {
return r.total > 0 || (r.produitVal != null && r.produitVal !== 0) || (r.stockVal != null && r.stockVal !== 0);
})
: rows;

const volumeTotal = rows.reduce(function(s, r) { return s + r.total; }, 0);
const volumeProduit = rows.reduce(function(s, r) { return s + (r.produitVal || 0); }, 0);
const nbManque = rows.filter(function(r) {
const dispo = (r.produitVal || 0) + (r.stockVal || 0);
return r.total > 0 && dispo < r.total;
}).length;

const horizonTxt = activeMarkets.length
? 'Boutiques + marches (horizon ' + MARKET_PREP_DAYS + 'j)'
: 'Commandes boutiques';
const modeLabel = productionSupplierMode === 'veigne'
  ? 'Prod. Veigné'
  : (isLocalBoul ? 'Prod. Boulangers' : (isLocalTour ? 'Prod. Touriers' : 'Production Local'));

// v20.61 — Boulangers/Touriers : la bande 7j sert à choisir le jour, les flèches changent de semaine
const prodNavDelta = (isLocalBoul || isLocalTour) ? 7 : 1;
let html = '<div class="date-bar">'

+ '<button class="date-nav" onclick="changeProductionDate(' + (-prodNavDelta) + ')">' + (prodNavDelta === 7 ? '«' : '←') + '</button>'
+ '<div class="date-title">' + modeLabel + ' du <strong>' + escapeHtml(formatDateFr(currentReapproDate)) + '</strong>'
+ (isToday ? ' <span class="date-today">(aujourd hui)</span>' : '')
+ '<div class="date-sub">' + horizonTxt + '</div>'
+ '</div>'
+ '<button class="date-nav" onclick="changeProductionDate(' + prodNavDelta + ')">' + (prodNavDelta === 7 ? '»' : '→') + '</button>'
+ '</div>';

// v20.42 — Bande "Pros à anticiper sur 7 jours" (Le Local prod_boul/prod_tour uniquement)
if (isLocalBoul || isLocalTour) {
  html += renderProductionWeekStrip(currentVue);
}

// v20.10.1 — KPI épuré pour Veigné Pâtissier : juste le Total
// v20.19 — Le Local Prod. Boulangers/Touriers : même règle (KPI simplifié)
if (isVeignePat || isLocalBoul || isLocalTour) {
  html += '<div class="prod-kpi-bar" style="grid-template-columns:1fr">'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + formatQty(volumeTotal) + '</div><div class="prod-kpi-lbl">Total à produire</div></div>'
    + '</div>';
} else {
  html += '<div class="prod-kpi-bar">'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + formatQty(volumeTotal) + '</div><div class="prod-kpi-lbl">Commande</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--blue)">' + formatQty(volumeProduit) + '</div><div class="prod-kpi-lbl">Produit</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:' + (nbManque > 0 ? 'var(--red)' : 'var(--green)') + '">' + nbManque + '</div><div class="prod-kpi-lbl">À produire</div></div>'
    + '</div>';
}

// v20.7 — Bloc Spéciales du jour (repliable) pour pâtissiers/boulangers
if (showSpe && productionSpecialOrders && productionSpecialOrders.length) {
  const nbCmd = productionSpecialOrders.length;
  const totalProducts = Object.keys(productionSpecialByProduct).reduce(function(s, pid) { return s + productionSpecialByProduct[pid]; }, 0);
  html += '<div class="prod-specials-box">'
    + '<div class="prod-specials-header" onclick="toggleProductionSpecials()">'

    + '<span class="prod-specials-toggle">' + (productionSpecialsExpanded ? '▲' : '▼') + '</span>'
    + '</div>';
  if (productionSpecialsExpanded) {
    html += '<div class="prod-specials-body">';
    productionSpecialOrders.forEach(function(o) {
      const pickupTime = o.pickup_time || '—';
      const clientName = o.client_name || '(sans nom)';
      const destShop = BOUTIQUE_NAMES[o.origin_shop] || o.origin_shop || '?';
      const deliv = o.delivery_type === 'delivery' ? '🚚 livraison' : '🏪 retrait';
      html += '<div class="prod-special-row">'
        + '<div class="prod-special-meta">'
        + '<strong>' + escapeHtml(pickupTime) + '</strong> · ' + escapeHtml(clientName)
        + ' → <span class="prod-special-shop">' + escapeHtml(destShop) + '</span> · ' + deliv
        + '</div>';
      if (o.items && o.items.length) {
        html += '<div class="prod-special-items">';
        o.items.forEach(function(it) {
          const pname = it.product_id ? ((products.find(function(p) { return p.id === it.product_id; }) || {}).name || it.product_id) : (it.product_name_custom || '?');
          html += '<span class="prod-special-item">' + escapeHtml(pname) + ' ×' + (parseQty(it.qty) || 0) + '</span>';
        });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
}

const hasReportable = allProducts.some(function(p) { return REPORTABLE_CATS.indexOf(p.category) !== -1; });
if (hasReportable) {
html += '<div class="copy-stock-box">'

+ '<div class="copy-stock-txt">Reporter le stock de la veille pour Ingrédients, Sec & Traiteur, Gâteaux Secs.</div>'
