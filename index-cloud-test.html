// v21.2.1 — Refactor pattern Stock Tourier :
// pro_stock = dernier inventaire physique (RÉEL), pro_stock_movements = log
// THÉO = RÉEL + sum(mouvements depuis updated_at de RÉEL).
// applyProStockMovement ne fait QUE logger un mouvement (n'écrase pas pro_stock.qty).
async function applyProStockMovement(productId, qtyDelta, reason, refId) {
  const { error } = await supa.from('pro_stock_movements').insert({
    tenant_id: TENANT_ID,
    product_id: productId,
    qty_delta: qtyDelta,
    reason: reason,
    ref_id: refId || null,
    created_by: DEVICE_ID
  });
  if (error) { showToast('Mouvement stock: ' + error.message, 'error'); return false; }
  return true;
}

// v21.2.1 — Saisie d'un inventaire physique (RÉEL). Update pro_stock.qty.
// Tous les mouvements antérieurs deviennent invisibles pour le calcul de THÉO.
async function saveProStockReal(productId, qtyReal) {
  setSyncStatus('syncing');
  const nowISO = new Date().toISOString();
  const { error } = await supa.from('pro_stock').upsert({
    tenant_id: TENANT_ID,
    product_id: productId,
    qty: qtyReal,
    updated_at: nowISO,
    updated_by: DEVICE_ID
  }, { onConflict: 'tenant_id,product_id' });
  if (error) { setSyncStatus('error'); showToast('Stock: ' + error.message, 'error'); return false; }
  setSyncStatus('ok');
  // Cache local : on stocke aussi updated_at pour le calcul du THÉO
  proStockData[productId] = { qty: qtyReal, updated_at: nowISO };
  return true;
}

// v21.2.1 — THÉO = last_real + somme des mouvements depuis last_real.updated_at
function computeProStockTheo(productId) {
  const inv = proStockData[productId];
  const baseQty = (inv && inv.qty != null) ? Number(inv.qty) : 0;
  const baseDate = (inv && inv.updated_at) ? inv.updated_at : null;
  let sumDelta = 0;
  proStockMovements.forEach(function(m) {
    if (m.product_id !== productId) return;
    if (baseDate && m.created_at <= baseDate) return; // mouvement antérieur au dernier inventaire
    sumDelta += Number(m.qty_delta) || 0;
  });
  return baseQty + sumDelta;
}

// v21.2.1 — Saisie inline du RÉEL (pattern Stock Tourier)

  if (!suiviProducts.length) {
    html += '<div class="empty-state">Aucun produit configuré en suivi stock pro.<br><span style="font-size:12px;color:var(--brown-mid)">Va dans BackOffice et coche « Suivi stock pro » sur les produits concernés.</span></div>';
    mc.innerHTML = html;
    return;
  }

  // Grouper par catégorie
  const byCat = {};
  suiviProducts.forEach(function(p) {
    const c = p.category || 'autre';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(p);
  });
  const catOrder = Object.keys(CAT_LABELS);
  const cats = Object.keys(byCat).sort(function(a, b) {
    const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  // Tableau 5 colonnes (style Stock Tourier)
  html += '<div class="section reappro-section">';
  html += '<div class="col-header stock-col-header">'
    + '<span class="col-lbl">Produit</span>'
    + '<span class="col-lbl">Théo.</span>'
    + '<span class="col-lbl cmd">Réel</span>'
    + '<span class="col-lbl">Écart</span>'
    + '<span class="col-lbl">Seuil</span>'
    + '</div>';

  cats.forEach(function(cat) {
    html += '<div class="prod-cat-title">' + escapeHtml(CAT_LABELS[cat] || cat) + ' <span style="font-size:11px;color:#999;font-weight:500">(' + byCat[cat].length + ')</span></div>';
    byCat[cat].sort(function(a, b) { return a.name.localeCompare(b.name); });
    byCat[cat].forEach(function(p) {
      const theo = computeProStockTheo(p.id);
      const inv = proStockData[p.id];
      const real = (inv && inv.qty != null) ? Number(inv.qty) : 0;
      const ecart = real - theo;
      const seuil = p.seuil_stock != null ? Number(p.seuil_stock) : null;
      // Alerte stock vs seuil (rouge si < 30%, orange < 50%, vert sinon)
      let alertCls = '';
      if (seuil != null && seuil > 0) {
        const ratio = theo / seuil;
        if (ratio < 0.3) alertCls = 'stock-red';
        else if (ratio < 0.5) alertCls = 'stock-orange';
        else alertCls = 'stock-green';
      }
      // Écart > 10% du théo en valeur absolue → rouge
      let ecartCls = '';
      if (Math.abs(ecart) > Math.max(Math.abs(theo) * 0.1, 1)) ecartCls = 'stock-red';
      // v20.38 — Conditionnement
      const condTxt = formatConditioning(p);
      html += '<div class="produit-row stock-row ' + alertCls + '">';
      html += '<div><div class="produit-name">' + escapeHtml(p.name) + '</div>'
        + (condTxt ? '<div class="produit-unit">' + escapeHtml(condTxt) + '</div>' : '')
        + '</div>';
      html += '<div class="stock-cell">' + theo + '</div>';
      html += '<div class="stock-cell"><input type="number" inputmode="numeric" class="qty-input stock-real-inp" data-pid="' + escapeHtml(p.id) + '" placeholder="' + real + '" onchange="handleProStockRealInput(this)"></div>';
      html += '<div class="stock-cell ' + ecartCls + '">' + (ecart > 0 ? '+' : '') + ecart + '</div>';
      html += '<div class="stock-cell">' + (seuil != null ? seuil : '<span style="color:#bbb">-</span>') + '</div>';
      html += '</div>';
    });
  });
  html += '</div>';

  // Historique du jour (filtré sur created_at >= aujourd'hui)
  const today = todayISO();
  const todayMovements = proStockMovements.filter(function(m) { return m.created_at >= today + 'T00:00:00'; });
  if (todayMovements.length) {
    const productsMap = {};
    (adminProducts || []).forEach(function(p) { productsMap[p.id] = p; });
    html += '<div style="background:white;border-radius:14px;padding:14px;margin-top:10px;box-shadow:0 2px 8px rgba(61,43,31,0.05)">';
    html += '<div style="font-family:Georgia,serif;font-weight:700;color:var(--brown);margin-bottom:10px">📜 Mouvements du jour <span style="font-weight:400;color:var(--brown-mid);font-size:12px">(' + todayMovements.length + ')</span></div>';
    todayMovements.forEach(function(m) {
      const prod = productsMap[m.product_id];
      const prodName = prod ? prod.name : m.product_id;
      const delta = Number(m.qty_delta);
      const isPos = delta > 0;
      const reasonLbl = ({
        production: 'Production',
        delivery: 'Livraison',
        delivery_cancel: 'Annulation livraison',
        correction: 'Correction'
      })[m.reason] || m.reason;
      const t = new Date(m.created_at);
      const timeStr = String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0');
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #F5F0E8;gap:8px">';
      html += '<div style="flex:1;min-width:0"><div style="font-size:12px;color:var(--brown)"><strong>' + escapeHtml(prodName) + '</strong></div>';
      html += '<div style="font-size:11px;color:var(--brown-mid)">' + timeStr + ' · ' + escapeHtml(reasonLbl) + '</div></div>';
      html += '<div style="font-family:Georgia,serif;font-weight:800;font-size:16px;color:' + (isPos ? 'var(--green)' : 'var(--red)') + '">' + (isPos ? '+' : '') + delta + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  mc.innerHTML = html;
}

async function loadPrevis(boutique, date) {
const { data, error } = await supa.from('previs').select('*')
.eq('tenant_id', TENANT_ID).eq('boutique_id', boutique).eq('service_date', date);
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
previsData = {};
(data || []).forEach(function(r) {
previsData[r.product_id] = r.qty == null ? '' : String(r.qty).replace('.', ',');
});
}

async function loadPrevisRaw(boutique, date) {
const { data, error } = await supa.from('previs').select('*')
.eq('tenant_id', TENANT_ID).eq('boutique_id', boutique).eq('service_date', date);
if (error) return {};
const out = {};
(data || []).forEach(function(r) {
out[r.product_id] = r.qty == null ? 0 : parseQty(r.qty);
});
return out;
}

async function upsertPrevis(pid, boutique, date, raw) {
setSyncStatus('syncing');
const qty = raw === '' || raw == null ? null : parseQty(raw);
const { error } = await supa.from('previs').upsert({
tenant_id: TENANT_ID, boutique_id: boutique, product_id: pid,
service_date: date, qty: qty,
updated_by: DEVICE_ID, updated_at: new Date().toISOString()
}, { onConflict: 'tenant_id,boutique_id,product_id,service_date' });
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
}

function subscribeRealtimePrevis() {
if (realtimeChannelPrevis) supa.removeChannel(realtimeChannelPrevis);
realtimeChannelPrevis = supa.channel('previs_rt')
.on('postgres_changes', { event: '*', schema: 'public', table: 'previs' }, async function(payload) {
const r = payload.new;
if (!r || r.updated_by === DEVICE_ID) return;
if (r.service_date !== currentPrevisDate) return;
if (r.boutique_id === currentBoutique) {
previsData[r.product_id] = r.qty == null ? '' : String(r.qty).replace('.', ',');
if (currentVue === 'previs') renderPrevis();
}
if (currentVue === 'traiteur' && (currentBoutique === 'veigne' || currentBoutique === 'tours')) {
// Pour le traiteur consolide, recharger les prévis utiles
if (currentBoutique === 'veigne' && (r.boutique_id === 'veigne' || r.boutique_id === 'saint-avertin')) {
await reloadTraiteurData();
renderTraiteur();
} else if (currentBoutique === 'tours' && r.boutique_id === 'tours') {
await reloadTraiteurData();
renderTraiteur();
}
}
if (currentVue === 'previs_traiteur' && currentBoutique === 'saint-avertin' && r.boutique_id === 'saint-avertin') {
previsTraiteurDataSA[r.product_id] = r.qty == null ? '' : String(r.qty).replace('.', ',');
renderPrevisTraiteurSA();
}
}).subscribe();
}

async function reloadTraiteurData() {
if (currentBoutique === 'veigne') {
const [vData, saData] = await Promise.all([
loadPrevisRaw('veigne', currentPrevisDate),
loadPrevisRaw('saint-avertin', currentPrevisDate)
]);
previsTraiteurDataV = {};
previsTraiteurDataSA = {};
Object.keys(vData).forEach(function(pid) { previsTraiteurDataV[pid] = String(vData[pid]).replace('.', ','); });
Object.keys(saData).forEach(function(pid) { previsTraiteurDataSA[pid] = String(saData[pid]).replace('.', ','); });
} else if (currentBoutique === 'tours') {
const tData = await loadPrevisRaw('tours', currentPrevisDate);
previsTraiteurDataV = {};
Object.keys(tData).forEach(function(pid) { previsTraiteurDataV[pid] = String(tData[pid]).replace('.', ','); });
}
}

const psaDisplay = psaFilled ? psa : (defSA != null ? String(defSA) : '');

function getProductionShopForProduct(productId, originShop, dateISO) {
// Determine qui produit/honore la commande SPECIALE pour ce produit.
// v20.63 — règles métier par catégorie (indépendantes du réappro/supply) :
//  - grosses pâtisseries : production dédiée à Veigné (toujours)
//  - petites pâtisseries : honorées depuis le réappro de la boutique d'origine
//    EXCEPTION v20.64 : St-Avertin le MARDI (fermée le lundi, pas de réappro frais) → Veigné
//  - viennoiserie / brioches : cuites sur place à Veigné/Tours ; St-Avertin (cold) = Local
//  - autres (pains, traiteur…) : logique d'approvisionnement (supply) inchangée
const p = products.find(function(x) { return x.id === productId; });
if (!p) return originShop; // fallback
const cat = p.category;
if (cat === 'patisserie_gros') return 'veigne';
if (cat === 'patisserie_petits') {
  if (originShop === 'saint-avertin' && dateISO &&
      new Date(dateISO + 'T12:00').getDay() === 2) return 'veigne'; // mardi
  return originShop;
}
if (cat === 'viennoiserie' || cat === 'brioches_special') {
  return (originShop === 'veigne' || originShop === 'tours') ? originShop : 'local';
}
const supply = getProductSupply(p, originShop);
if (!supply || supply === 'on_site') return originShop;
if (supply === 'local') return 'local';
if (supply === 'veigne') return 'veigne';
return originShop;
}

function computeOrderProductionShop(draft) {
// Selon les items de la commande, deduit un production_shop majoritaire.
// Si plusieurs productions dans une même commande (cas rare), on prend la plus frequente.
const counts = {};
(draft.items || []).forEach(function(it) {
if (!it.product_id) return;
const ps = getProductionShopForProduct(it.product_id, draft.origin_shop, draft.pickup_date);
counts[ps] = (counts[ps] || 0) + 1;
});
const keys = Object.keys(counts);
if (!keys.length) return draft.origin_shop;
keys.sort(function(a, b) { return counts[b] - counts[a]; });
return keys[0];
}

async function loadSpecialOrders(b, weekStart) {
const endD = new Date(weekStart + 'T12:00');
endD.setDate(endD.getDate() + 6);
const weekEnd = endD.getFullYear() + '-' + String(endD.getMonth()+1).padStart(2,'0') + '-' + String(endD.getDate()).padStart(2,'0');
let q = supa.from('special_orders').select('*').eq('tenant_id', TENANT_ID);
if (b !== 'local') {
q = q.or('origin_shop.eq.' + b + ',production_shop.eq.' + b);
} else {
q = q.eq('production_shop', 'local');
}
q = q.gte('pickup_date', weekStart).lte('pickup_date', weekEnd).order('pickup_date').order('pickup_time', { nullsFirst: true });
const { data: ordersData, error } = await q;
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
const orderIds = (ordersData || []).map(function(o) { return o.id; });
let itemsData = [];
if (orderIds.length) {
const { data: its, error: e2 } = await supa.from('special_order_items').select('*').in('order_id', orderIds).order('position');
if (!e2) itemsData = its || [];
}
specialOrdersData = (ordersData || []).map(function(o) {
o.items = itemsData.filter(function(i) { return i.order_id === o.id; });
return o;
});
}

async function upsertSpecialOrder() {
const d = specialFormDraft;
if (!d) return;
if (!d.customer_name || !d.customer_name.trim()) { showToast('Nom client obligatoire', 'error'); return; }
if (!d.pickup_date) { showToast('Date de retrait obligatoire', 'error'); return; }

return (it.product_id || (it.product_name_custom && it.product_name_custom.trim()));
});
if (!cleanItems.length) { showToast('Au moins 1 produit', 'error'); return; }

setSyncStatus('syncing');

const nowISO = new Date().toISOString();

tenant_id: TENANT_ID,

function addDaysISO(iso, n) {
const d = new Date(iso + 'T12:00');
d.setDate(d.getDate() + n);
return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function renderSpecialOrderCard(o, isMine) {

return (parseQty(it.qty) || 1) + 'x ' + name;
}).join(' + ');
// v20.62 — commande d'une autre boutique (À produire) = lecture seule : pas d'édition du contenu

html += '<button class="sp-status-next" onclick="event.stopPropagation(); changeSpecialOrderStatus(\'' + o.id + '\', \'' + next + '\')">' + STATUS_LBL[next] + ' ✓</button>';

// === MESSAGERIE LIVREUR ===
async function loadMessages() {
let q = supa.from('livreur_messages').select('*').eq('tenant_id', TENANT_ID);
// Le livreur voit tout. Un expediteur (local/veigne) ne voit que ses messages envoyés.
if (currentBoutique !== 'livreur') {
q = q.eq('sender_boutique', currentBoutique);
}
const { data, error } = await q.order('created_at', { ascending: false }).limit(80);
if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
messagesData = data || [];
}

async function sendMessage() {
const content = (messageDraft.content || '').trim();
if (!content) { showToast('Message vide', 'error'); return; }
setSyncStatus('syncing');
const payload = {
tenant_id: TENANT_ID,
sender_boutique: currentBoutique,
sender_device: DEVICE_ID,
content: content,
urgent: !!messageDraft.urgent,
stop_boutique: messageDraft.stop_boutique || null
};
const { error } = await supa.from('livreur_messages').insert(payload);
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
messageDraft = { content: '', urgent: false, stop_boutique: '' };
await loadMessages();
renderMessages();
showToast('Message envoyé', 'sync');
}

async function markMessageRead(id) {
const msg = messagesData.find(function(m) { return m.id === id; });
if (!msg || msg.read_at) return;
const nowISO = new Date().toISOString();
const { error } = await supa.from('livreur_messages').update({ read_at: nowISO }).eq('id', id);
if (!error) msg.read_at = nowISO;
}

async function markAllMessagesRead() {
const unread = messagesData.filter(function(m) { return !m.read_at; });
if (!unread.length) return;
const nowISO = new Date().toISOString();
const ids = unread.map(function(m) { return m.id; });
await supa.from('livreur_messages').update({ read_at: nowISO }).in('id', ids);
unread.forEach(function(m) { m.read_at = nowISO; });
renderMessages();
renderNav(); // vide la pastille de l'onglet
}

async function toggleMessageDone(id, currentVal) {
setSyncStatus('syncing');
const newVal = !currentVal;
const { error } = await supa.from('livreur_messages').update({ done: newVal }).eq('id', id);
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
const msg = messagesData.find(function(m) { return m.id === id; });
if (msg) msg.done = newVal;
renderMessages();
}

async function deleteMessage(id) {
if (!confirm('Supprimer ce message ?')) return;
setSyncStatus('syncing');
const { error } = await supa.from('livreur_messages').delete().eq('id', id);
if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
setSyncStatus('ok');
messagesData = messagesData.filter(function(m) { return m.id !== id; });
renderMessages();
showToast('Supprime', 'sync');
}

function subscribeRealtimeMessages() {
if (realtimeChannelMessages) supa.removeChannel(realtimeChannelMessages);
realtimeChannelMessages = supa.channel('messages_' + currentBoutique)
.on('postgres_changes', { event: '*', schema: 'public', table: 'livreur_messages' },
function(payload) {
const r = payload.new || payload.old;
if (!r) return;
// Filtrer selon le contexte (idem loadMessages)
if (currentBoutique !== 'livreur' && r.sender_boutique !== currentBoutique) return;
if (payload.eventType === 'INSERT') {
if (payload.new.sender_device === DEVICE_ID) return; // déjà traite localement
messagesData.unshift(payload.new);
if (currentVue === 'messages') renderMessages();
renderNav(); // maj pastille non-lus (visible même hors onglet Messages)
if (currentBoutique === 'livreur') {
showMessageAlert(payload.new); // modal persistant + bip répété jusqu'à "J'ai vu"
} else {
showToast('Nouveau message', 'sync');
}
} else if (payload.eventType === 'UPDATE') {
const idx = messagesData.findIndex(function(m) { return m.id === payload.new.id; });
if (idx >= 0) {
messagesData[idx] = payload.new;
if (currentVue === 'messages') renderMessages();
renderNav();
}
} else if (payload.eventType === 'DELETE') {
messagesData = messagesData.filter(function(m) { return m.id !== payload.old.id; });
if (currentVue === 'messages') renderMessages();
renderNav();
}
}).subscribe();
}

function formatMsgDate(iso) {
const d = new Date(iso);
const now = new Date();
const sameDay = d.toDateString() === now.toDateString();
const hh = String(d.getHours()).padStart(2, '0');
const mm = String(d.getMinutes()).padStart(2, '0');
if (sameDay) return 'Aujourd hui ' + hh + 'h' + mm;
// yesterday?
const yest = new Date(now);
yest.setDate(yest.getDate() - 1);
if (d.toDateString() === yest.toDateString()) return 'Hier ' + hh + 'h' + mm;
return d.getDate() + '/' + (d.getMonth()+1) + ' ' + hh + 'h' + mm;
}

function renderMessageCard(m, isLivreur) {
const cls = 'msg-card'

+ (m.urgent ? ' urgent' : '')
+ (m.done ? ' done' : '')
+ (!m.read_at && isLivreur ? ' unread' : '');
  const sender = BOUTIQUE_NAMES[m.sender_boutique] || m.sender_boutique;
  const stop = m.stop_boutique ? (BOUTIQUE_NAMES[m.stop_boutique] || m.stop_boutique) : null;

let status = '';
if (m.done) status = '<span class="msg-status done">✓ Fait</span>';
else if (m.read_at) status = '<span class="msg-status read">Lu ' + formatMsgDate(m.read_at) + '</span>';
else status = '<span class="msg-status unread">Non lu</span>';

let html = '<div class="' + cls + '">';
html += '<div class="msg-head">'

+ '<div class="msg-sender">' + escapeHtml(sender) + (stop ? ' <span class="msg-stop">→ ' + escapeHtml(stop) + '</span>' : '') + (m.urgent ? ' <span class="msg-urgent-tag">URGENT</span>' : '') + '</div>'
+ '<div class="msg-date">' + formatMsgDate(m.created_at) + '</div>'
+ '</div>';
  html += '<div class="msg-content">' + escapeHtml(m.content).replace(/\n/g, '<br>') + '</div>';
  html += '<div class="msg-footer">';
  html += status;
  if (isLivreur) {
  html += '<button class="msg-done-btn ' + (m.done ? 'undone' : '') + '" onclick="toggleMessageDone(\'' + m.id + '\', ' + !!m.done + ')">'
+ (m.done ? 'Annuler' : 'Marquer fait')
+ '</button>';
  } else {
  html += '<button class="msg-del-btn" onclick="deleteMessage(\'' + m.id + '\')">Supprimer</button>';
  }
  html += '</div>';
  html += '</div>';
  return html;
  }

function printCurrentView() {
// Prepare: set print title based on current view
const boutiqueLabel = BOUTIQUE_NAMES[currentBoutique] || currentBoutique;
let title = boutiqueLabel;
if (currentVue === 'production') title += ' - Production du ' + formatDateFr(currentReapproDate);
else if (currentVue === 'recap') title += ' - Recap semaine du ' + formatDateFr(currentWeekStart);
else if (currentVue === 'livraison') title += ' - Feuille de route ' + formatDateFr(currentDate);
document.title = 'LBDD - ' + title;
window.print();
setTimeout(function() { document.title = 'LBDD Cloud'; }, 500);
}

function canPrintCurrent() {
return currentVue === 'production' || currentVue === 'recap' || currentVue === 'livraison';
}

// === HELPERS ===
function setSyncStatus(s) {
const dot = document.getElementById('sync-dot'), text = document.getElementById('sync-text');
dot.className = 'sync-dot ' + s;
if (s === 'syncing') text.textContent = 'Synchronisation...';
else if (s === 'ok') text.textContent = 'Synchronise';
else if (s === 'error') text.textContent = 'Erreur';
}

let toastTimer;
// ===== Alerte livreur (nouveau message) : son + modal persistant =====
// iOS/Safari : le son ne démarre qu'après un geste user → on déverrouille au 1er tap.

// Déverrouille/réamorce le contexte audio au 1er geste (appelé à l'entrée livreur)
function primeMsgAudioOnGesture() {
const unlock = function() {
try {
if (!msgAudioCtx) msgAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
if (msgAudioCtx.state === 'suspended') msgAudioCtx.resume();
} catch (e) {}
};
if (_msgAudioPrimed) { unlock(); return; }
_msgAudioPrimed = true;
const handler = function() {
unlock();
document.removeEventListener('pointerdown', handler);
document.removeEventListener('touchstart', handler);
};
document.addEventListener('pointerdown', handler);
document.addEventListener('touchstart', handler);
}

function playMessageBeep(urgent) {
if (!msgSoundEnabled || !msgAudioCtx) return;
try {
if (msgAudioCtx.state === 'suspended') msgAudioCtx.resume();
const ctx = msgAudioCtx;
const beep = function(when, freq, dur) {
const o = ctx.createOscillator();
const g = ctx.createGain();
o.type = 'square'; o.frequency.value = freq;   // square = plus perçant qu'une sinus
o.connect(g); g.connect(ctx.destination);
g.gain.setValueAtTime(0.0001, when);
g.gain.exponentialRampToValueAtTime(0.5, when + 0.02);
g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
o.start(when); o.stop(when + dur + 0.03);
};
const t = ctx.currentTime;
if (urgent) { beep(t, 1245, 0.18); beep(t + 0.22, 988, 0.18); beep(t + 0.44, 1245, 0.26); }
else { beep(t, 988, 0.16); beep(t + 0.2, 1245, 0.22); }
} catch (e) {}
}

// Bascule son ON/OFF (bouton en haut des écrans livreur)
function toggleMessageSound() {
msgSoundEnabled = !msgSoundEnabled;
try { localStorage.setItem('msgSoundMuted', msgSoundEnabled ? '0' : '1'); } catch (e) {}
if (msgSoundEnabled) { primeMsgAudioOnGesture(); playMessageBeep(false); }
if (currentVue === 'tournee' || currentVue === 'livraison') renderLivraison();
else if (currentVue === 'messages') renderMessages();
}

// HTML du bouton son (interrupteur, en haut des écrans Tournée + Messages du livreur)
function livreurSoundBtnHtml() {
if (currentBoutique !== 'livreur') return '';
if (msgSoundEnabled) {
return '<button class="livreur-sound-btn on" onclick="toggleMessageSound()">🔔 Sons activés — touche pour couper</button>';
}
return '<button class="livreur-sound-btn off" onclick="toggleMessageSound()">🔕 Sons coupés — touche pour activer</button>';
}

// ===== Modal d'alerte qui RESTE jusqu'au tap "J'ai vu" =====
function showMessageAlert(msg) {
msgAlertQueue.push(msg);
if (msgAlertQueue.length === 1) renderMessageAlert();
}

function renderMessageAlert() {
const ov = document.getElementById('msg-alert');
if (!ov) return;
if (!msgAlertQueue.length) { // plus rien : on ferme
ov.classList.remove('show'); ov.innerHTML = '';
if (_msgAlertRepeatTimer) { clearInterval(_msgAlertRepeatTimer); _msgAlertRepeatTimer = null; }
return;
}
const msg = msgAlertQueue[0];
const urgent = !!msg.urgent;
const sender = BOUTIQUE_NAMES[msg.sender_boutique] || msg.sender_boutique || '';
const extra = msgAlertQueue.length > 1 ? '<div class="msg-alert-more">+ ' + (msgAlertQueue.length - 1) + ' autre(s) message(s) en attente</div>' : '';
ov.innerHTML =
'<div class="msg-alert-box ' + (urgent ? 'urgent' : '') + '">'
+ '<div class="msg-alert-icon">' + (urgent ? '🚨' : '🔔') + '</div>'
+ '<div class="msg-alert-title ' + (urgent ? 'urgent' : '') + '">' + (urgent ? 'MESSAGE URGENT' : 'Nouveau message') + '</div>'
+ '<div class="msg-alert-from">de ' + escapeHtml(sender) + ' · ' + formatMsgDate(msg.created_at) + '</div>'
+ '<div class="msg-alert-content">' + escapeHtml(msg.content || '') + '</div>'
+ '<button class="msg-alert-btn" onclick="dismissMessageAlert()">✓ J\'ai vu</button>'
+ extra
+ '</div>';
ov.classList.add('show');
playMessageBeep(urgent);
// Re-bip toutes les 6 s tant que le livreur n'a pas acquitté
if (_msgAlertRepeatTimer) clearInterval(_msgAlertRepeatTimer);
_msgAlertRepeatTimer = setInterval(function() {
if (!msgAlertQueue.length) { clearInterval(_msgAlertRepeatTimer); _msgAlertRepeatTimer = null; return; }
playMessageBeep(!!msgAlertQueue[0].urgent);
}, 6000);
}

function dismissMessageAlert() {
const msg = msgAlertQueue.shift();
// marquer lu en base (et localement) puis passer au suivant
if (msg && !msg.read_at) {
const local = messagesData.find(function(m) { return m.id === msg.id; });
if (local) local.read_at = new Date().toISOString();
supa.from('livreur_messages').update({ read_at: new Date().toISOString() }).eq('id', msg.id).then(function() {});
renderNav();
}
renderMessageAlert();
}

// Garde l'écran de la tablette allumé pendant la tournée (sinon pas de son possible)
async function requestWakeLock() {
try {
if ('wakeLock' in navigator && !_wakeLock) {
_wakeLock = await navigator.wakeLock.request('screen');
_wakeLock.addEventListener('release', function() { _wakeLock = null; });
}
} catch (e) {}
}
function releaseWakeLock() {
try { if (_wakeLock) { _wakeLock.release(); _wakeLock = null; } } catch (e) {}
}
// Réacquérir le wake lock quand l'app revient au premier plan
document.addEventListener('visibilitychange', function() {
if (document.visibilityState === 'visible' && currentBoutique === 'livreur') requestWakeLock();
});

// ===== Pavé numérique réutilisable (Ventes + Prévis) =====
// Entiers uniquement. Réutilise le handler oninput existant de chaque champ
// (on écrit la valeur puis on dispatch un event 'input' → la sauvegarde se fait toute seule).
let _npTarget = null;
let _npBuffer = '';

function openNumpad(inp) {
if (!inp) return;
_npTarget = inp;
const cur = (inp.value == null ? '' : String(inp.value)).replace(/[^0-9]/g, '');
_npBuffer = cur;
renderNumpad();
}

function renderNumpad() {
const ov = document.getElementById('np-overlay');
if (!ov || !_npTarget) return;
const label = _npTarget.getAttribute('data-np-label') || 'Quantité';
let keys = '';
['1','2','3','4','5','6','7','8','9'].forEach(function(d) {
keys += '<button class="np-key" onclick="npKey(\'' + d + '\')">' + d + '</button>';
});
keys += '<button class="np-key np-ghost" onclick="npClear()">C</button>';
keys += '<button class="np-key" onclick="npKey(\'0\')">0</button>';
keys += '<button class="np-key np-ghost" onclick="npBackspace()">⌫</button>';
ov.innerHTML = '<div class="np-box">'
+ '<div class="np-head">' + escapeHtml(label) + '</div>'
+ '<div class="np-display" id="np-display">' + (_npBuffer === '' ? '0' : escapeHtml(_npBuffer)) + '</div>'
+ '<div class="np-pad">' + keys + '</div>'
+ '<div class="np-actions">'
+ '<button class="np-cancel" onclick="closeNumpad()">Annuler</button>'
+ '<button class="np-ok" onclick="npValidate()">Valider</button>'
+ '</div></div>';
ov.classList.add('show');
}

function _npRefresh() {
const d = document.getElementById('np-display');
if (d) d.textContent = (_npBuffer === '' ? '0' : _npBuffer);
}
function npKey(d) {
if (_npBuffer === '0') _npBuffer = '';   // pas de zéro en tête
if (_npBuffer.length >= 5) return;       // garde-fou (max 99999)
_npBuffer += d; _npRefresh();
}
function npBackspace() { _npBuffer = _npBuffer.slice(0, -1); _npRefresh(); }
function npClear() { _npBuffer = ''; _npRefresh(); }

function npValidate() {
if (_npTarget) {
_npTarget.value = _npBuffer;  // '' si vidé
try { _npTarget.dispatchEvent(new Event('input', { bubbles: true })); } catch (e) {}
}
closeNumpad();
}
function closeNumpad() {
const ov = document.getElementById('np-overlay');
if (ov) { ov.classList.remove('show'); ov.innerHTML = ''; }
_npTarget = null; _npBuffer = '';
}

// ===== Pavé PIN code d'accès boutique (remplace prompt()/alert() natifs) =====
let _codeResolve = null, _codeLabel = '', _codeValid = [], _codeBuffer = '';

function askCodeModal(label, validCodes) {
_codeLabel = label || 'Code d\'accès';
_codeValid = (validCodes || []).map(function(c) { return String(c); });
_codeBuffer = '';
return new Promise(function(resolve) { _codeResolve = resolve; renderCodeModal(); });
}

function renderCodeModal() {
const ov = document.getElementById('code-overlay');
if (!ov) return;
let keys = '';
['1','2','3','4','5','6','7','8','9'].forEach(function(d) {
keys += '<button class="np-key" onclick="codeKey(\'' + d + '\')">' + d + '</button>';
});
keys += '<button class="np-key np-ghost" onclick="codeClear()">C</button>';
keys += '<button class="np-key" onclick="codeKey(\'0\')">0</button>';
keys += '<button class="np-key np-ghost" onclick="codeBackspace()">⌫</button>';
ov.innerHTML = '<div class="np-box">'
+ '<div class="np-head">' + escapeHtml(_codeLabel) + '</div>'
+ '<div class="np-display" id="code-display">&nbsp;</div>'
+ '<div class="np-error" id="code-error">Code incorrect</div>'
+ '<div class="np-pad">' + keys + '</div>'
+ '<div class="np-actions">'
+ '<button class="np-cancel" onclick="codeCancel()">Annuler</button>'
+ '<button class="np-ok" onclick="codeSubmit()">Valider</button>'
+ '</div></div>';
ov.classList.add('show');
}

function _codeRefresh() {
const d = document.getElementById('code-display');
if (d) d.textContent = _codeBuffer ? '•'.repeat(_codeBuffer.length) : ' ';
}
function codeKey(d) {
if (_codeBuffer.length >= 10) return;
_codeBuffer += d;
const e = document.getElementById('code-error'); if (e) e.style.display = 'none';
_codeRefresh();
}
function codeBackspace() { _codeBuffer = _codeBuffer.slice(0, -1); _codeRefresh(); }
function codeClear() { _codeBuffer = ''; _codeRefresh(); }
function codeSubmit() {
if (_codeValid.indexOf(_codeBuffer) !== -1) {
_resolveCode(true);
} else {
_codeBuffer = '';
const e = document.getElementById('code-error'); if (e) e.style.display = 'block';
_codeRefresh();
}
}
function codeCancel() { _resolveCode(false); }
function _resolveCode(val) {
const ov = document.getElementById('code-overlay');
if (ov) { ov.classList.remove('show'); ov.innerHTML = ''; }
const r = _codeResolve; _codeResolve = null; _codeBuffer = '';
if (r) r(val);
}

function showToast(msg, type) {
const t = document.getElementById('toast');
t.textContent = msg;
t.className = 'toast' + (type ? ' ' + type : '');
setTimeout(function() { t.classList.add('show'); }, 10);
clearTimeout(toastTimer);
toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function escapeHtml(s) {
if (s == null) return '';
return String(s).replace(/[&<>"']/g, function(c) {
return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
});
}
