<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Les Bles de Demain</title>
<style>
:root {
  --gold: #CEAB52;
  --gold-light: #E8D5A3;
  --gold-dark: #8B6914;
  --grey: #474950;
  --grey-dark: #2E3044;
  --grey-light: #5A5C66;
  --cream: #FAF6EE;
  --brown: #3D2B1F;
  --brown-mid: #6B4226;
  --green: #4A7C59;
  --red: #B83232;
  --orange: #D4701A;
  --blue: #2C5F8A;
  --white: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; }

#splash {
  position: fixed; inset: 0; background: var(--grey);
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px;
}
.splash-logo { width: 160px; height: 160px; margin-bottom: 22px; display: flex; align-items: center; justify-content: center; }
.splash-logo img { width: 100%; height: 100%; object-fit: contain; }
.splash-sub { color: var(--gold); font-size: 13px; opacity: 0.75; margin-top: 4px; }
.splash-cloud {
  background: rgba(74,124,89,0.22); color: #7DD6A0;
  padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
  margin-top: 8px; margin-bottom: 32px; border: 1px solid rgba(125,214,160,0.35);
}
.splash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 380px; }
.splash-btn {
  background: rgba(255,255,255,0.05); border: 2px solid rgba(206,171,82,0.25);
  border-radius: 18px; padding: 24px 16px; cursor: pointer; text-align: center;
  color: inherit; font-family: inherit; transition: transform 0.15s;
}
.splash-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.12); }
.splash-btn[disabled] { opacity: 0.4; }
.splash-name { color: var(--white); font-size: 17px; font-weight: 700; margin-bottom: 6px; font-family: Georgia, serif; }
.splash-role { color: var(--gold); font-size: 11px; opacity: 0.75; line-height: 1.4; }

#app { display: none; flex-direction: column; min-height: 100vh; }
.header {
  background: var(--grey); padding: 8px 14px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.18);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-icon { width: 56px; height: 40px; display: flex; align-items: center; justify-content: center; }
.header-icon img { width: 100%; height: 100%; object-fit: contain; }
.header-title { font-family: Georgia, serif; color: var(--white); font-size: 14px; font-weight: 700; }
.header-boutique { color: var(--gold); font-size: 11px; opacity: 0.85; }
.change-btn {
  background: rgba(206,171,82,0.18); border: 1px solid rgba(206,171,82,0.3); border-radius: 8px;
  padding: 8px 14px; color: var(--white); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}

.sync-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--grey-dark); color: var(--white); font-size: 11px;
}
.sync-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.sync-dot.ok { background: #4ADE80; box-shadow: 0 0 8px rgba(74,222,128,0.6); }
.sync-dot.syncing { background: #FBBF24; animation: pulse 1s infinite; }
.sync-dot.error { background: #F87171; }
@keyframes pulse { 50% { opacity: 0.3; } }
.device-id { opacity: 0.5; font-family: ui-monospace, monospace; font-size: 10px; }

.main { flex: 1; padding: 10px 12px 80px; max-width: 700px; margin: 0 auto; width: 100%; }

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--grey); display: flex; justify-content: space-around;
  border-top: 1px solid rgba(206,171,82,0.2); z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bnav-item {
  flex: 1; padding: 10px 4px 8px; cursor: pointer; border: none; background: transparent;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-family: inherit;
}
.bnav-item .lbl { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.45); }
.bnav-item.active .lbl { color: var(--gold); }
.bnav-item.active { border-top: 2px solid var(--gold); padding-top: 8px; }

.info-banner {
  background: white; border-radius: 12px; padding: 10px 14px; margin-bottom: 10px;
  border-left: 4px solid var(--blue); font-size: 12px; color: var(--brown-mid); line-height: 1.5;
  box-shadow: 0 2px 8px rgba(61,43,31,0.05);
}
.info-banner strong { color: var(--brown); }

.date-bar {
  display: flex; align-items: center; gap: 10px;
  background: white; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
  box-shadow: 0 2px 12px rgba(61,43,31,0.08);
}
.date-bar .date-nav {
  width: 44px; height: 44px; border: 1px solid var(--gold);
  background: #FFF9ED; color: var(--gold); border-radius: 10px;
  font-size: 22px; font-weight: 700; cursor: pointer; flex-shrink: 0;
}
.date-bar .date-nav:active { background: var(--gold); color: white; }
.date-bar .date-title {
  flex: 1; text-align: center; font-size: 14px; color: var(--brown); line-height: 1.3;
}
.date-bar .date-title strong {
  text-transform: capitalize; font-size: 15px; color: var(--brown);
}
.date-bar .date-today {
  display: inline-block; font-size: 11px; color: var(--gold); font-weight: 700;
  background: #FFF9ED; padding: 2px 7px; border-radius: 8px; margin-left: 4px;
}
.date-bar .date-sub {
  font-size: 11px; color: #999; margin-top: 3px;
}

.copy-prev-box {
  background: white; border-radius: 14px; padding: 16px; margin-bottom: 10px;
  box-shadow: 0 2px 12px rgba(61,43,31,0.08); text-align: center;
}
.copy-prev-txt { font-size: 13px; color: var(--brown-mid); margin-bottom: 12px; line-height: 1.5; }
.btn-gold {
  background: var(--gold); color: white; border: none; padding: 12px 20px;
  border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(206,171,82,0.3);
}
.btn-gold:active { transform: scale(0.98); }

.prod-filter-bar {
  display: flex; align-items: center; gap: 10px;
  background: white; border-radius: 12px; padding: 10px 14px; margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(61,43,31,0.05); font-size: 13px; color: var(--brown-mid);
}
.prod-filter-bar label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.prod-filter-bar input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--gold); }

.prod-kpi-bar {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px;
}
.prod-kpi {
  background: white; border-radius: 12px; padding: 10px 8px; text-align: center;
  box-shadow: 0 2px 8px rgba(61,43,31,0.06);
}
.prod-kpi-val {
  font-family: Georgia, serif; font-size: 22px; font-weight: 700; color: var(--brown);
  line-height: 1;
}
.prod-kpi-lbl { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.3px; }

.prod-table {
  background: white; border-radius: 14px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(61,43,31,0.08); margin-bottom: 10px;
}
.prod-table-header {
  display: grid; grid-template-columns: 1.3fr 0.7fr 0.7fr 0.7fr 0.7fr;
  padding: 8px 10px; background: #F5F0E5; gap: 4px;
  font-size: 10px; font-weight: 700; color: var(--brown); text-transform: uppercase;
}
.prod-table-header .col-c { text-align: center; }
.prod-table-header .col-total { color: var(--gold); }
.prod-cat-title {
  padding: 10px 12px; font-family: Georgia, serif; font-weight: 700;
  font-size: 13px; color: var(--brown); background: #FAF5EA;
  border-bottom: 1px solid #F0EAE0;
}
.prod-row {
  display: grid; grid-template-columns: 1.3fr 0.7fr 0.7fr 0.7fr 0.7fr;
  padding: 10px; border-bottom: 1px solid #F5F0E5; gap: 4px; align-items: center;
  font-size: 13px;
}
.prod-row:last-child { border-bottom: none; }
.prod-row .prod-name { color: var(--brown); font-weight: 500; }
.prod-row .prod-unit { font-size: 10px; color: #999; display: block; margin-top: 1px; }
.prod-row .cell {
  text-align: center; font-weight: 600; font-variant-numeric: tabular-nums;
}
.prod-row .cell.zero { color: #CCC; font-weight: 400; }
.prod-row .cell.total {
  color: var(--gold); font-size: 15px; font-weight: 700;
  background: #FFF9ED; border-radius: 6px; padding: 3px 0;
}
.prod-empty {
  background: white; border-radius: 14px; padding: 40px 20px; text-align: center;
  color: #999; box-shadow: 0 2px 12px rgba(61,43,31,0.08); font-size: 13px;
}

.section {
  background: white; border-radius: 14px; box-shadow: 0 2px 16px rgba(61,43,31,0.08);
  margin-bottom: 10px; overflow: hidden;
}
.section-header {
  padding: 11px 14px; border-bottom: 1px solid #F0EAE0;
  font-family: Georgia, serif; font-size: 14px; font-weight: 700; color: var(--brown);
}

.col-header {
  display: grid; grid-template-columns: 1fr 80px 90px; padding: 6px 14px;
  background: #F5F0E5; gap: 6px;
}
.col-lbl { font-size: 10px; font-weight: 700; color: var(--brown-mid); text-align: center; text-transform: uppercase; letter-spacing: 0.3px; }
.col-lbl:first-child { text-align: left; }
.col-lbl.cmd { color: var(--gold-dark); }
.produit-row {
  display: grid; grid-template-columns: 1fr 80px 90px; align-items: center;
  padding: 8px 14px; border-bottom: 1px solid #F5F0E8; gap: 6px;
}
.produit-row:last-child { border-bottom: none; }
.produit-name { font-size: 13px; font-weight: 500; color: var(--brown); line-height: 1.3; }
.produit-unit { font-size: 10px; color: var(--gold-dark); }
.qty-input {
  width: 100%; padding: 10px 6px; border: 2px solid #E0D8C8; border-radius: 8px;
  font-size: 16px; font-weight: 700; text-align: center; color: var(--brown);
  background: #FAF8F4; font-family: inherit; -moz-appearance: textfield;
}
.qty-input::-webkit-outer-spin-button,
.qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.qty-input.cmd { border-color: rgba(206,171,82,0.3); background: #FEFBF4; }
.qty-input:focus { outline: none; border-color: var(--gold); background: white; }
.qty-input.has-value { background: #FFFCF2; border-color: var(--gold); color: var(--gold-dark); }
.qty-input.has-value.cmd { background: #FBF0D5; }
.qty-input.just-updated { animation: flash 1s; }
@keyframes flash {
  0%, 100% { background: #FFFCF2; }
  30% { background: #D6E8F5; border-color: var(--blue); }
}

.ventes-col-header {
  display: grid; grid-template-columns: 1fr 48px 48px 48px 48px 56px 44px;
  padding: 6px 10px; background: #F5F0E5; gap: 3px;
}
.ventes-row {
  display: grid; grid-template-columns: 1fr 48px 48px 48px 48px 56px 44px;
  align-items: center; padding: 8px 10px; border-bottom: 1px solid #F5F0E8; gap: 3px;
}
.ventes-row:last-child { border-bottom: none; }
.v-inp {
  width: 100%; padding: 9px 2px; border: 2px solid #E0D8C8; border-radius: 7px;
  font-size: 14px; font-weight: 700; text-align: center; color: var(--brown);
  background: #FAF8F4; font-family: inherit; -moz-appearance: textfield;
}
.v-inp::-webkit-outer-spin-button,
.v-inp::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.v-inp:focus { outline: none; border-color: var(--gold); background: white; }
.v-inp.matin.has { background: #EEF7F2; border-color: var(--green); color: var(--green); }
.v-inp.aprem.has { background: #FEF3EC; border-color: var(--orange); color: var(--orange); }
.v-inp.reste.has { background: #FEF2F2; border-color: var(--red); color: var(--red); }
.v-inp.just-updated { animation: flash 1s; }
.v-vendu {
  text-align: center; font-family: Georgia, serif; font-size: 15px; font-weight: 900;
  color: var(--blue); padding: 8px 0;
}
.v-vendu.zero { color: #C0B090; font-size: 13px; }
.v-perte {
  text-align: center; font-size: 11px; font-weight: 700;
  padding: 4px 0; border-radius: 5px;
}
.v-perte.zero { color: #C0B090; }
.v-perte.ok { color: var(--green); background: #EEF7F2; }
.v-perte.warn { color: var(--orange); background: #FEF3EC; }
.v-perte.bad { color: var(--red); background: #FEF2F2; }
.v-rupture-btn {
  background: transparent; border: 1.5px solid #E0D8C8; border-radius: 7px;
  padding: 6px 0; font-size: 18px; cursor: pointer; font-family: inherit;
  color: #B8A890; line-height: 1; transition: all 0.15s;
}
.v-rupture-btn.has {
  background: #FEF3EC; border-color: var(--orange); color: var(--orange);
  font-size: 11px; font-weight: 800;
}
.v-rupture-btn:active { transform: scale(0.94); }

.ventes-day-bar {
  background: var(--green); color: white; border-radius: 12px;
  padding: 10px 14px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.ventes-day-title { font-family: Georgia, serif; font-size: 14px; font-weight: 700; }
.ventes-day-btn {
  background: rgba(255,255,255,0.15); border: none; border-radius: 7px;
  padding: 4px 10px; color: white; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white; border-radius: 16px; padding: 22px; max-width: 360px; width: 100%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.modal-title {
  font-family: Georgia, serif; font-size: 16px; font-weight: 700; color: var(--brown);
  margin-bottom: 4px;
}
.modal-sub { font-size: 12px; color: var(--brown-mid); margin-bottom: 16px; }
.modal-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px;
}
.modal-btn {
  background: #F5F0E5; border: 1.5px solid #E0D8C8; border-radius: 10px;
  padding: 12px 0; font-size: 14px; font-weight: 700; color: var(--brown);
  cursor: pointer; font-family: inherit;
}
.modal-btn:active { transform: scale(0.96); background: #E8D5A3; }
.modal-btn.selected { background: var(--orange); color: white; border-color: var(--orange); }
.modal-actions { display: flex; gap: 8px; }
.modal-action {
  flex: 1; padding: 11px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.modal-action.cancel { background: #F0EAE0; color: var(--brown); }
.modal-action.clear  { background: #FEF2F2; color: var(--red); border: 1px solid var(--red); }

.loading { text-align: center; padding: 40px 20px; color: var(--brown-mid); font-size: 13px; }
.error-box {
  background: #FEF2F2; border: 2px solid var(--red); border-radius: 12px;
  padding: 16px; margin: 20px 12px; color: var(--red); font-size: 13px;
}
.error-box h3 { margin-bottom: 8px; font-family: Georgia, serif; }
.error-box pre {
  margin-top: 10px; padding: 10px; background: white; border-radius: 6px;
  font-size: 11px; overflow-x: auto; color: var(--brown); white-space: pre-wrap; word-break: break-word;
}
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--grey); color: var(--white); padding: 12px 20px;
  border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 300;
  opacity: 0; transition: all 0.3s; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  max-width: 90vw; text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.sync { background: var(--blue); }
.toast.error { background: var(--red); }
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--brown-mid);
  background: white; border-radius: 12px; margin-top: 10px;
}

.recap-week-bar {
  background: var(--gold); color: white; border-radius: 12px;
  padding: 10px 14px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.recap-week-title { font-family: Georgia, serif; font-size: 13px; font-weight: 700; text-align: center; flex: 1; }
.recap-week-btn {
  background: rgba(255,255,255,0.2); border: none; border-radius: 7px;
  padding: 4px 10px; color: white; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}

.recap-toggle {
  display: flex; gap: 6px; margin-bottom: 10px; background: white;
  padding: 4px; border-radius: 10px; box-shadow: 0 2px 8px rgba(61,43,31,0.05);
}
.recap-toggle-btn {
  flex: 1; padding: 8px; border: none; background: transparent;
  border-radius: 7px; font-size: 12px; font-weight: 700; color: var(--brown-mid);
  cursor: pointer; font-family: inherit;
}
.recap-toggle-btn.active { background: var(--gold); color: white; }

.kpi-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px;
}
.kpi {
  background: white; border-radius: 12px; padding: 12px 10px; text-align: center;
  box-shadow: 0 2px 8px rgba(61,43,31,0.05);
}
.kpi-val { font-family: Georgia, serif; font-size: 22px; font-weight: 900; color: var(--brown); }
.kpi-lbl { font-size: 10px; color: var(--brown-mid); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
.kpi.ok .kpi-val { color: var(--green); }
.kpi.warn .kpi-val { color: var(--orange); }
.kpi.bad .kpi-val { color: var(--red); }
.kpi.blue .kpi-val { color: var(--blue); }

.recap-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.recap-table th {
  text-align: center; padding: 8px 4px; background: #F5F0E5;
  font-size: 10px; font-weight: 700; color: var(--brown-mid); text-transform: uppercase;
}
.recap-table th:first-child { text-align: left; padding-left: 14px; }
.recap-table td {
  padding: 8px 4px; border-bottom: 1px solid #F5F0E8; text-align: center;
}
.recap-table td:first-child {
  text-align: left; padding-left: 14px; font-weight: 600; color: var(--brown);
}
.recap-table tr:last-child td { border-bottom: none; }
.recap-table tr.total {
  background: #FAF6EE; font-weight: 700;
}
.recap-table tr.today td:first-child { color: var(--gold-dark); font-weight: 700; }
.pct-badge {
  display: inline-block; padding: 3px 8px; border-radius: 5px;
  font-size: 11px; font-weight: 700; min-width: 40px;
}
.pct-badge.ok { background: #EEF7F2; color: var(--green); }
.pct-badge.warn { background: #FEF3EC; color: var(--orange); }
.pct-badge.bad { background: #FEF2F2; color: var(--red); }
.pct-badge.zero { background: transparent; color: #C0B090; }

.chart-container {
  background: white; border-radius: 14px; padding: 14px;
  margin-bottom: 10px; box-shadow: 0 2px 8px rgba(61,43,31,0.05);
}
.chart-title {
  font-family: Georgia, serif; font-size: 13px; font-weight: 700;
  color: var(--brown); margin-bottom: 10px;
}
.chart-svg { width: 100%; height: 180px; }

.top-list {
  background: white; border-radius: 14px; padding: 14px;
  margin-bottom: 10px; box-shadow: 0 2px 8px rgba(61,43,31,0.05);
}
.top-item {
  display: grid; grid-template-columns: 24px 1fr 60px;
  align-items: center; padding: 6px 0; border-bottom: 1px solid #F5F0E8;
  gap: 8px;
}
.top-item:last-child { border-bottom: none; }
.top-rank {
  width: 24px; height: 24px; border-radius: 50%; background: var(--gold);
  color: white; font-size: 12px; font-weight: 800; text-align: center; line-height: 24px;
  font-family: Georgia, serif;
}
.top-rank.r1 { background: var(--gold); }
.top-rank.r2 { background: #B0A070; }
.top-rank.r3 { background: #8B7D5A; }
.top-name { font-size: 12px; color: var(--brown); font-weight: 500; }
.top-val { text-align: right; font-weight: 800; color: var(--blue); font-family: Georgia, serif; }

.tour-switch { display: flex; gap: 6px; margin-bottom: 10px; }
.tour-btn {
  flex: 1; padding: 10px 6px; border: 2px solid #E0D8C8; border-radius: 10px;
  background: white; font-size: 12px; font-weight: 700; color: var(--brown-mid);
  cursor: pointer; font-family: inherit;
}
.tour-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
.tour-btn:active { transform: scale(0.96); }

.tour-toolbar { display: flex; gap: 8px; margin-bottom: 10px; }
.tour-action {
  flex: 1; padding: 10px; border: none; border-radius: 10px;
  background: white; color: var(--brown); font-size: 12px; font-weight: 700;

<script>

};

let supa, currentBoutique = null, currentVue = 'reappro';
let products = [], reapprosData = {}, salesData = {};

let updateTimers = {}, currentDate = todayISO();

];

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function serviceDateISO() {
  const d = new Date();
  if (d.getHours() < 2) { d.setDate(d.getDate() - 1); }
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDateFr(iso) {
  const d = new Date(iso + 'T12:00');
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function mondayOfWeek(iso) {
  const d = new Date(iso + 'T12:00');
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function addDays(iso, n) {
  const d = new Date(iso + 'T12:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function weekDaysFromMonday(monday) {
  const arr = [];
  for (let i = 0; i < 7; i++) arr.push(addDays(monday, i));
  return arr;
}

function formatDayShort(iso) {
  const d = new Date(iso + 'T12:00');
  const names = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  return names[d.getDay()] + ' ' + d.getDate();
}

function formatWeekRange(monday) {
  const sunday = addDays(monday, 6);
  const m = new Date(monday + 'T12:00');
  const s = new Date(sunday + 'T12:00');
  const months = ['janv','fev','mars','avr','mai','juin','juil','aout','sept','oct','nov','dec'];
  if (m.getMonth() === s.getMonth()) {
    return 'Semaine du ' + m.getDate() + ' au ' + s.getDate() + ' ' + months[s.getMonth()];
  }
  return 'Semaine du ' + m.getDate() + ' ' + months[m.getMonth()] + ' au ' + s.getDate() + ' ' + months[s.getMonth()];
}

try {
  supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  document.getElementById('device-id-label').textContent = DEVICE_ID;
  loadProducts();
} catch (err) { showInitError(err); }

async function loadProducts() {
  try {
    const { data, error } = await supa
      .from('products').select('*')
      .eq('tenant_id', TENANT_ID).eq('actif', true)
      .order('category', { ascending: true }).order('name', { ascending: true });
    if (error) throw error;
    products = data || [];
  } catch (err) { showInitError(err); }
}

function getProductsForReappro() {
  return products.filter(function(p) {
    const u = p.usage || 'reappro';
    return u === 'reappro' || u === 'both';
  });
}

function getProductsForVentes() {
  return products.filter(function(p) {
    const u = p.usage || 'reappro';
    return u === 'ventes' || u === 'both';
  });
}

function showInitError(err) {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('main-content').innerHTML =
    '<div class="error-box"><h3>Erreur Supabase</h3><pre>' + escapeHtml(err && err.message ? err.message : String(err)) + '</pre></div>';
}

async function enterBoutique(b) {
  currentBoutique = b;
  isLivreurMode = (b === 'livreur');
  isLocalMode = (b === 'local');
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('header-boutique').textContent = BOUTIQUE_NAMES[b] || b;
  renderNav();
  setVue(NAV_ITEMS[b][0].id);
}

function goSplash() {
  if (realtimeChannelReappro)    { supa.removeChannel(realtimeChannelReappro);    realtimeChannelReappro = null; }
  if (realtimeChannelSales)      { supa.removeChannel(realtimeChannelSales);      realtimeChannelSales = null; }
  if (realtimeChannelDeliveries) { supa.removeChannel(realtimeChannelDeliveries); realtimeChannelDeliveries = null; }
  if (realtimeChannelProduction) { supa.removeChannel(realtimeChannelProduction); realtimeChannelProduction = null; }
  currentBoutique = null; reapprosData = {}; salesData = {}; deliveriesData = []; productionData = {};
  isLivreurMode = false; isLocalMode = false;
  document.getElementById('splash').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function renderNav() {
  const items = NAV_ITEMS[currentBoutique] || [];
  document.getElementById('bottom-nav').innerHTML = items.map(function(it) {
    return '<button class="bnav-item ' + (it.id === currentVue ? 'active' : '') + '" onclick="setVue(\'' + it.id + '\')"><span class="lbl">' + it.lbl + '</span></button>';
  }).join('');
}

async function setVue(v) {
  currentVue = v;
  renderNav();
  document.getElementById('main-content').innerHTML = '<div class="loading">Chargement...</div>';
  if (v === 'reappro') {
    await loadReappros(currentBoutique);
    subscribeRealtimeReappro(currentBoutique);
    renderReappro();
  } else if (v === 'ventes') {
    await loadSales(currentBoutique, currentDate);
    subscribeRealtimeSales(currentBoutique);
    renderVentes();
  } else if (v === 'recap') {
    await loadRecapWeek(currentBoutique, currentWeekStart);
    renderRecap();
  } else if (v === 'livraison' || v === 'tournee') {
    await loadDeliveries(currentDate);
    subscribeRealtimeDeliveries();
    renderLivraison();
  } else if (v === 'production') {
    await loadProduction(currentReapproDate);
    subscribeRealtimeProduction();
    renderProduction();
  }
}

// === REAPPRO ===
async function loadReappros(b) {
  const { data, error } = await supa.from('reappros').select('*')
    .eq('tenant_id', TENANT_ID).eq('boutique_id', b)
    .eq('service_date', currentReapproDate);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  reapprosData = {};
  (data || []).forEach(function(r) {
    reapprosData[r.product_id] = { avoir: r.avoir || '', commander: r.commander || '' };
  });
}

async function loadReapprosDate(b, date) {
  const { data, error } = await supa.from('reappros').select('*')
    .eq('tenant_id', TENANT_ID).eq('boutique_id', b)
    .eq('service_date', date);
  if (error) return {};
  const result = {};
  (data || []).forEach(function(r) {
    result[r.product_id] = { avoir: r.avoir || '', commander: r.commander || '' };
  });
  return result;
}

async function upsertReappro(pid) {
  setSyncStatus('syncing');
  const d = reapprosData[pid] || {};
  const { error } = await supa.from('reappros').upsert({
    tenant_id: TENANT_ID, boutique_id: currentBoutique, product_id: pid,
    service_date: currentReapproDate,
    avoir: d.avoir || null, commander: d.commander || null,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  }, { onConflict: 'tenant_id,boutique_id,product_id,service_date' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
  else { setSyncStatus('ok'); }
}

async function changeReapproDate(delta) {
  const d = new Date(currentReapproDate + 'T12:00');
  d.setDate(d.getDate() + delta);
  currentReapproDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  await loadReappros(currentBoutique);
  renderReappro();
}

async function copyFromPreviousDay() {
  const d = new Date(currentReapproDate + 'T12:00');
  d.setDate(d.getDate() - 1);
  const prevISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const prevData = await loadReapprosDate(currentBoutique, prevISO);
  const pids = Object.keys(prevData);
  if (!pids.length) {
    showToast('Aucune commande a reprendre pour ' + prevISO, 'error');
    return;
  }
  if (!confirm('Reprendre les ' + pids.length + ' produits commandes le ' + prevISO + ' ?')) return;
  setSyncStatus('syncing');
  const rows = pids.map(function(pid) {
    return {
      tenant_id: TENANT_ID,
      boutique_id: currentBoutique,
      product_id: pid,
      service_date: currentReapproDate,
      avoir: prevData[pid].avoir || null,
      commander: prevData[pid].commander || null,
      updated_by: DEVICE_ID,
      updated_at: new Date().toISOString()
    };
  });
  const { error } = await supa.from('reappros').upsert(rows, { onConflict: 'tenant_id,boutique_id,product_id,service_date' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  await loadReappros(currentBoutique);
  renderReappro();
  showToast('Commande reprise de ' + prevISO, 'sync');
}

function subscribeRealtimeReappro(b) {
  if (realtimeChannelReappro) supa.removeChannel(realtimeChannelReappro);
  realtimeChannelReappro = supa.channel('reappros_' + b)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'reappros', filter: 'boutique_id=eq.' + b },
      function(payload) {
        const r = payload.new;
        if (!r || r.updated_by === DEVICE_ID) return;
        if (r.service_date !== currentReapproDate) return;
        reapprosData[r.product_id] = { avoir: r.avoir || '', commander: r.commander || '' };
        updateReapproInput(r.product_id, 'avoir', r.avoir);
        updateReapproInput(r.product_id, 'commander', r.commander);
        showToast('MAJ d un autre appareil', 'sync');
      }).subscribe();
}

function updateReapproInput(pid, field, val) {
  const input = document.querySelector('[data-pid="' + pid + '"][data-field="' + field + '"]');
  if (!input || document.activeElement === input) return;
  input.value = val || '';
  input.classList.toggle('has-value', !!val);
  input.classList.remove('just-updated');
  void input.offsetWidth;
  input.classList.add('just-updated');
}

function renderReappro() {
  const cats = REAPPRO_CATS[currentBoutique] || [];
  const mc = document.getElementById('main-content');
  if (!cats.length) { mc.innerHTML = '<div class="empty-state">Aucune categorie de reassort.</div>'; return; }
  const nbLignes = Object.keys(reapprosData).filter(function(k) {
    const v = reapprosData[k];
    return (v.avoir && v.avoir !== '') || (v.commander && v.commander !== '');
  }).length;
  const isToday = (currentReapproDate === serviceDateISO());
  let html = '<div class="date-bar">'
    + '<button class="date-nav" onclick="changeReapproDate(-1)">&#8592;</button>'
    + '<div class="date-title">Commande du <strong>' + escapeHtml(formatDateFr(currentReapproDate)) + '</strong>'
    + (isToday ? ' <span class="date-today">(aujourd hui)</span>' : '')
    + '<div class="date-sub">' + nbLignes + ' produit' + (nbLignes > 1 ? 's' : '') + ' saisi' + (nbLignes > 1 ? 's' : '') + '</div>'
    + '</div>'
    + '<button class="date-nav" onclick="changeReapproDate(1)">&#8594;</button>'
    + '</div>';
  if (nbLignes === 0) {
    html += '<div class="copy-prev-box">'
      + '<div class="copy-prev-txt">Ecran vide pour ce jour. Tu peux reprendre la commande d hier :</div>'
      + '<button class="btn-gold" onclick="copyFromPreviousDay()">Reprendre la commande d hier</button>'
      + '</div>';
  } else {
    html += '<div class="info-banner"><strong>Mode cloud actif</strong><br>Saisis tes valeurs - synchro temps reel entre tous les appareils.</div>';
  }
  const reappProducts = getProductsForReappro();
  cats.forEach(function(cat) {
    const prods = reappProducts.filter(function(p) { return p.category === cat; });
    if (!prods.length) return;
    html += '<div class="section"><div class="section-header">' + (CAT_LABELS[cat] || cat) + '</div>'
      + '<div class="col-header"><span class="col-lbl">Produit</span><span class="col-lbl">J ai</span><span class="col-lbl cmd">Je commande</span></div>';
    prods.forEach(function(p) {
      const val = reapprosData[p.id] || { avoir: '', commander: '' };
      const a = val.avoir || '', c = val.commander || '';
      html += '<div class="produit-row"><div><div class="produit-name">' + escapeHtml(p.name) + '</div><div class="produit-unit">' + escapeHtml(p.unit || '') + '</div></div>'
        + '<input type="text" inputmode="decimal" class="qty-input ' + (a ? 'has-value' : '') + '" data-pid="' + p.id + '" data-field="avoir" value="' + escapeHtml(a) + '" placeholder="-" oninput="handleReapproInput(this)" onfocus="this.select()">'
        + '<input type="text" inputmode="decimal" class="qty-input cmd ' + (c ? 'has-value' : '') + '" data-pid="' + p.id + '" data-field="commander" value="' + escapeHtml(c) + '" placeholder="-" oninput="handleReapproInput(this)" onfocus="this.select()">'
        + '</div>';
    });
    html += '</div>';
  });
  mc.innerHTML = html;
}

function handleReapproInput(el) {
  const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
  if (!reapprosData[pid]) reapprosData[pid] = { avoir: '', commander: '' };
  reapprosData[pid][field] = val;
  el.classList.toggle('has-value', !!val);

  updateTimers['r_' + pid] = setTimeout(function() { upsertReappro(pid); }, 400);

// === VENTES ===
async function loadSales(b, date) {
  const { data, error } = await supa.from('sales').select('*')
    .eq('tenant_id', TENANT_ID).eq('boutique_id', b).eq('date', date);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  salesData = {};
  (data || []).forEach(function(r) {
    salesData[r.product_id] = {
      matin: r.matin == null ? '' : r.matin,
      aprem: r.aprem == null ? '' : r.aprem,
      reste: r.reste == null ? '' : r.reste,
      rupture_heure: r.rupture_heure || ''
    };
  });
}

async function upsertSale(pid) {
  setSyncStatus('syncing');
  const d = salesData[pid] || {};
  const matin = d.matin === '' ? null : parseInt(d.matin) || 0;
  const aprem = d.aprem === '' ? null : parseInt(d.aprem) || 0;
  const reste = d.reste === '' ? null : parseInt(d.reste) || 0;
  const { error } = await supa.from('sales').upsert({
    tenant_id: TENANT_ID, boutique_id: currentBoutique, product_id: pid, date: currentDate,
    matin: matin, aprem: aprem, reste: reste,
    rupture_heure: d.rupture_heure || null,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  }, { onConflict: 'tenant_id,boutique_id,product_id,date' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
  else { setSyncStatus('ok'); }
}

function subscribeRealtimeSales(b) {
  if (realtimeChannelSales) supa.removeChannel(realtimeChannelSales);
  realtimeChannelSales = supa.channel('sales_' + b)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sales', filter: 'boutique_id=eq.' + b },
      function(payload) {
        const r = payload.new;
        if (!r || r.updated_by === DEVICE_ID) return;
        if (r.date !== currentDate) return;
        salesData[r.product_id] = {
          matin: r.matin == null ? '' : r.matin,
          aprem: r.aprem == null ? '' : r.aprem,
          reste: r.reste == null ? '' : r.reste,
          rupture_heure: r.rupture_heure || ''
        };
        ['matin','aprem','reste'].forEach(function(f) { updateSaleInput(r.product_id, f, r[f]); });
        updateVendu(r.product_id);
        updateRuptureBtn(r.product_id);
        showToast('MAJ ventes d un autre appareil', 'sync');
      }).subscribe();
}

function updateSaleInput(pid, field, val) {
  const input = document.querySelector('.v-inp[data-pid="' + pid + '"][data-field="' + field + '"]');
  if (!input || document.activeElement === input) return;
  const v = (val == null ? '' : val);
  input.value = v;
  input.classList.toggle('has', v !== '' && v !== 0);
  input.classList.remove('just-updated');
  void input.offsetWidth;
  input.classList.add('just-updated');
}

function calcVendu(pid) {
  const d = salesData[pid] || {};
  const m = d.matin === '' ? null : parseInt(d.matin) || 0;
  const a = d.aprem === '' ? 0 : parseInt(d.aprem) || 0;
  const r = d.reste === '' ? null : parseInt(d.reste) || 0;
  if (m === null || r === null) return null;
  return Math.max(0, m + a - r);
}

function calcPertePct(pid) {
  const d = salesData[pid] || {};
  const m = d.matin === '' ? null : parseInt(d.matin) || 0;
  const a = d.aprem === '' ? 0 : parseInt(d.aprem) || 0;
  const r = d.reste === '' ? null : parseInt(d.reste) || 0;
  if (m === null || r === null) return null;
  const total = m + a;
  if (total === 0) return null;
  return Math.round((r / total) * 100);
}

function updateVendu(pid) {
  const el = document.getElementById('vendu_' + pid);
  if (el) {
    const v = calcVendu(pid);
    if (v === null) { el.textContent = '-'; el.className = 'v-vendu zero'; }
    else { el.textContent = v; el.className = 'v-vendu'; }
  }
  const pe = document.getElementById('perte_' + pid);
  if (pe) {
    const p = calcPertePct(pid);
    if (p === null) { pe.textContent = '-'; pe.className = 'v-perte zero'; }
    else {
      pe.textContent = p + '%';
      pe.className = 'v-perte ' + (p > 20 ? 'bad' : p > 10 ? 'warn' : 'ok');
    }
  }
}

function updateRuptureBtn(pid) {
  const btn = document.getElementById('rupt_' + pid);
  if (!btn) return;
  const d = salesData[pid] || {};
  if (d.rupture_heure) {
    btn.textContent = d.rupture_heure;
    btn.classList.add('has');
  } else {
    btn.innerHTML = '&#9203;';
    btn.classList.remove('has');
  }
}

function renderVentes() {

    mc.innerHTML = '<div class="empty-state">Module Ventes pas encore active.</div>'; return;

    html += '<div class="section"><div class="section-header">' + (CAT_LABELS[cat] || cat) + '</div>'
      + '<div class="ventes-col-header">'
      + '<span class="col-lbl">Produit</span>'
      + '<span class="col-lbl" style="color:var(--green)">Mat</span>'
      + '<span class="col-lbl" style="color:var(--orange)">Apr</span>'
      + '<span class="col-lbl" style="color:var(--red)">Res</span>'
      + '<span class="col-lbl" style="color:var(--blue)">Vendu</span>'
      + '<span class="col-lbl">Perte</span>'
      + '<span class="col-lbl">Rupt</span>'
      + '</div>';
    ps.forEach(function(p) {
      const d = salesData[p.id] || {};
      const m = d.matin === '' || d.matin === undefined ? '' : d.matin;
      const a = d.aprem === '' || d.aprem === undefined ? '' : d.aprem;
      const r = d.reste === '' || d.reste === undefined ? '' : d.reste;
      const vendu = calcVendu(p.id);
      const perte = calcPertePct(p.id);
      const ruptH = d.rupture_heure || '';
      const perteCls = perte === null ? 'zero' : (perte > 20 ? 'bad' : perte > 10 ? 'warn' : 'ok');
      const perteTxt = perte === null ? '-' : (perte + '%');
      const ruptCls = ruptH ? 'has' : '';
      const ruptTxt = ruptH ? ruptH : '&#9203;';
      html += '<div class="ventes-row">'
        + '<div><div class="produit-name">' + escapeHtml(p.name) + '</div><div class="produit-unit">' + escapeHtml(p.unit || '') + '</div></div>'
        + '<input type="number" inputmode="numeric" min="0" class="v-inp matin ' + (m !== '' ? 'has' : '') + '" data-pid="' + p.id + '" data-field="matin" value="' + m + '" placeholder="-" oninput="handleSaleInput(this)" onfocus="this.select()">'
        + '<input type="number" inputmode="numeric" min="0" class="v-inp aprem ' + (a !== '' ? 'has' : '') + '" data-pid="' + p.id + '" data-field="aprem" value="' + a + '" placeholder="-" oninput="handleSaleInput(this)" onfocus="this.select()">'
        + '<input type="number" inputmode="numeric" min="0" class="v-inp reste ' + (r !== '' ? 'has' : '') + '" data-pid="' + p.id + '" data-field="reste" value="' + r + '" placeholder="-" oninput="handleSaleInput(this)" onfocus="this.select()">'
        + '<div id="vendu_' + p.id + '" class="v-vendu' + (vendu === null ? ' zero' : '') + '">' + (vendu === null ? '-' : vendu) + '</div>'
        + '<div id="perte_' + p.id + '" class="v-perte ' + perteCls + '">' + perteTxt + '</div>'
        + '<button id="rupt_' + p.id + '" class="v-rupture-btn ' + ruptCls + '" onclick="openRuptureModal(\'' + p.id + '\')">' + ruptTxt + '</button>'
        + '</div>';
    });
    html += '</div>';
  });
  mc.innerHTML = html;

function handleSaleInput(el) {
  const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
  if (!salesData[pid]) salesData[pid] = { matin: '', aprem: '', reste: '', rupture_heure: '' };
  salesData[pid][field] = val;
  el.classList.toggle('has', val !== '');
  updateVendu(pid);
  clearTimeout(updateTimers['s_' + pid]);

}

async function changeDate(delta) {
  const d = new Date(currentDate + 'T12:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

// === RECAP SEMAINE ===
async function loadRecapWeek(b, monday) {
  const sunday = addDays(monday, 6);
  const { data, error } = await supa.from('sales').select('*')
    .eq('tenant_id', TENANT_ID).eq('boutique_id', b)
    .gte('date', monday).lte('date', sunday);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  recapWeekData = {};
  const days = weekDaysFromMonday(monday);
  days.forEach(function(d) { recapWeekData[d] = []; });
  (data || []).forEach(function(r) {
    if (!recapWeekData[r.date]) recapWeekData[r.date] = [];
    recapWeekData[r.date].push(r);
  });
}

function calcDayStats(dayISO) {
  const rows = recapWeekData[dayISO] || [];
  let totalVendu = 0, totalProduit = 0, totalReste = 0;
  let productsMap = {};
  rows.forEach(function(r) {
    if (recapMode === 'category' && recapCategory !== 'all') {
      const p = products.find(function(x) { return x.id === r.product_id; });
      if (!p || p.category !== recapCategory) return;
    }
    const m = r.matin == null ? 0 : r.matin;
    const a = r.aprem == null ? 0 : r.aprem;
    const re = r.reste == null ? 0 : r.reste;
    const total = m + a;
    const vendu = Math.max(0, total - re);
    totalVendu += vendu;
    totalProduit += total;
    totalReste += re;
    productsMap[r.product_id] = (productsMap[r.product_id] || 0) + vendu;
  });
  const pertePct = totalProduit > 0 ? Math.round((totalReste / totalProduit) * 100) : null;
  return { vendu: totalVendu, produit: totalProduit, reste: totalReste, pertePct: pertePct, products: productsMap };
}

function calcWeekStats() {
  const days = weekDaysFromMonday(currentWeekStart);
  let totalV = 0, totalP = 0, totalR = 0;
  let dayWithRupture = new Set();
  let productsSold = {};
  let productsLost = {};
  days.forEach(function(d) {
    const rows = recapWeekData[d] || [];
    rows.forEach(function(r) {
      if (recapMode === 'category' && recapCategory !== 'all') {
        const p = products.find(function(x) { return x.id === r.product_id; });
        if (!p || p.category !== recapCategory) return;
      }
      const m = r.matin == null ? 0 : r.matin;
      const a = r.aprem == null ? 0 : r.aprem;
      const re = r.reste == null ? 0 : r.reste;
      const total = m + a;
      const vendu = Math.max(0, total - re);
      totalV += vendu;
      totalP += total;
      totalR += re;
      if (r.rupture_heure) dayWithRupture.add(d);
      productsSold[r.product_id] = (productsSold[r.product_id] || 0) + vendu;
      if (total > 0) {
        if (!productsLost[r.product_id]) productsLost[r.product_id] = { reste: 0, total: 0 };
        productsLost[r.product_id].reste += re;
        productsLost[r.product_id].total += total;
      }
    });
  });
  const pertePct = totalP > 0 ? Math.round((totalR / totalP) * 100) : null;
  return {
    vendu: totalV, produit: totalP, reste: totalR, pertePct: pertePct,
    daysWithRupture: dayWithRupture.size,
    productsSold: productsSold, productsLost: productsLost
  };
}

function changeWeek(delta) { currentWeekStart = addDays(currentWeekStart, delta * 7); setVue('recap'); }
function setRecapMode(mode) { recapMode = mode; if (mode === 'global') recapCategory = 'all'; renderRecap(); }
function setRecapCategory(cat) { recapCategory = cat; renderRecap(); }

function pctClass(p) {
  if (p === null || p === undefined) return 'zero';
  if (p > 20) return 'bad';
  if (p > 10) return 'warn';
  return 'ok';
}

function renderBarChart(days, values, maxVal) {
  const W = 320, H = 160, PAD = 24, BARW = 28;
  const chartW = W - PAD * 2;
  const barGap = (chartW - BARW * 7) / 6;
  const max = Math.max(maxVal, 1);
  let svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
  svg += '<line x1="' + PAD + '" y1="' + (H-22) + '" x2="' + (W-PAD) + '" y2="' + (H-22) + '" stroke="#E0D8C8" stroke-width="1"/>';
  days.forEach(function(d, i) {
    const v = values[i] || 0;
    const h = v === 0 ? 2 : ((H - 40) * v / max);
    const x = PAD + i * (BARW + barGap);
    const y = H - 22 - h;
    const isToday = (d === todayISO());
    const color = isToday ? '#CEAB52' : '#2C5F8A';
    svg += '<rect x="' + x + '" y="' + y + '" width="' + BARW + '" height="' + h + '" fill="' + color + '" rx="4"/>';
    if (v > 0) {
      svg += '<text x="' + (x + BARW/2) + '" y="' + (y - 4) + '" text-anchor="middle" fill="#3D2B1F" font-size="10" font-weight="700">' + v + '</text>';
    }
    svg += '<text x="' + (x + BARW/2) + '" y="' + (H - 6) + '" text-anchor="middle" fill="#6B4226" font-size="10">' + formatDayShort(d).split(' ')[0] + '</text>';
  });
  svg += '</svg>';
  return svg;
}

function renderLineChart(days, values) {
  const W = 320, H = 160, PAD = 28;
  const chartW = W - PAD * 2;
  const stepX = chartW / 6;
  const max = 30;
  let svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
  const y0 = H - 22, h10 = (H-40) * 10/max, h20 = (H-40) * 20/max;
  svg += '<rect x="' + PAD + '" y="' + (y0-h10) + '" width="' + chartW + '" height="' + h10 + '" fill="#EEF7F2" opacity="0.5"/>';
  svg += '<rect x="' + PAD + '" y="' + (y0-h20) + '" width="' + chartW + '" height="' + (h20-h10) + '" fill="#FEF3EC" opacity="0.5"/>';
  svg += '<rect x="' + PAD + '" y="18" width="' + chartW + '" height="' + (y0-h20-18) + '" fill="#FEF2F2" opacity="0.5"/>';
  svg += '<text x="' + (PAD-4) + '" y="' + (y0+3) + '" text-anchor="end" fill="#6B4226" font-size="9">0%</text>';
  svg += '<text x="' + (PAD-4) + '" y="' + (y0-h10+3) + '" text-anchor="end" fill="#6B4226" font-size="9">10%</text>';
  svg += '<text x="' + (PAD-4) + '" y="' + (y0-h20+3) + '" text-anchor="end" fill="#6B4226" font-size="9">20%</text>';
  let pts = [];
  let validPts = [];
  days.forEach(function(d, i) {
    const v = values[i];
    const x = PAD + i * stepX;
    if (v !== null && v !== undefined) {
      const cappedV = Math.min(v, max);
      const y = y0 - (H-40) * cappedV / max;
      pts.push(x + ',' + y);
      validPts.push({ x: x, y: y, v: v, d: d });
    }
  });
  if (pts.length > 1) {
    svg += '<polyline points="' + pts.join(' ') + '" fill="none" stroke="#474950" stroke-width="2"/>';
  }
  validPts.forEach(function(p) {
    const color = p.v > 20 ? '#B83232' : p.v > 10 ? '#D4701A' : '#4A7C59';
    svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="5" fill="' + color + '" stroke="white" stroke-width="2"/>';
    svg += '<text x="' + p.x + '" y="' + (p.y - 10) + '" text-anchor="middle" fill="' + color + '" font-size="10" font-weight="700">' + p.v + '%</text>';
  });
  days.forEach(function(d, i) {
    const x = PAD + i * stepX;
    svg += '<text x="' + x + '" y="' + (H - 6) + '" text-anchor="middle" fill="#6B4226" font-size="10">' + formatDayShort(d).split(' ')[0] + '</text>';
  });
  svg += '</svg>';
  return svg;
}

function renderRecap() {
  const mc = document.getElementById('main-content');
  const days = weekDaysFromMonday(currentWeekStart);
  const weekStats = calcWeekStats();
  const today = todayISO();

  let html = '<div class="recap-week-bar">'
    + '<button class="recap-week-btn" onclick="changeWeek(-1)">&lt;</button>'
    + '<span class="recap-week-title">' + formatWeekRange(currentWeekStart) + '</span>'
    + '<button class="recap-week-btn" onclick="changeWeek(1)">&gt;</button>'
    + '</div>';

  html += '<div class="recap-toggle">'
    + '<button class="recap-toggle-btn ' + (recapMode === 'global' ? 'active' : '') + '" onclick="setRecapMode(\'global\')">Vue globale</button>'
    + '<button class="recap-toggle-btn ' + (recapMode === 'category' ? 'active' : '') + '" onclick="setRecapMode(\'category\')">Par categorie</button>'
    + '</div>';

  if (recapMode === 'category') {
    const ventesCats = [];
    const ORDER = ['pains', 'viennoiserie', 'brioches_special', 'patisserie_petits', 'patisserie_gros', 'traiteur', 'gateaux_secs'];
    ORDER.forEach(function(c) {
      if (products.some(function(p) { return p.category === c && (p.usage === 'ventes' || p.usage === 'both'); })) {
        ventesCats.push(c);
      }
    });
    html += '<div class="recap-toggle" style="flex-wrap:wrap">';
    html += '<button class="recap-toggle-btn ' + (recapCategory === 'all' ? 'active' : '') + '" onclick="setRecapCategory(\'all\')" style="flex:0 0 auto;padding:6px 12px">Toutes</button>';
    ventesCats.forEach(function(c) {
      html += '<button class="recap-toggle-btn ' + (recapCategory === c ? 'active' : '') + '" onclick="setRecapCategory(\'' + c + '\')" style="flex:0 0 auto;padding:6px 12px">' + (CAT_LABELS[c] || c) + '</button>';
    });
    html += '</div>';
  }

  const perteCls = pctClass(weekStats.pertePct);
  html += '<div class="kpi-grid">'
    + '<div class="kpi blue"><div class="kpi-val">' + weekStats.vendu + '</div><div class="kpi-lbl">Vendu</div></div>'
    + '<div class="kpi ' + perteCls + '"><div class="kpi-val">' + (weekStats.pertePct === null ? '-' : weekStats.pertePct + '%') + '</div><div class="kpi-lbl">Perte moyenne</div></div>'
    + '<div class="kpi ' + (weekStats.daysWithRupture > 0 ? 'warn' : '') + '"><div class="kpi-val">' + weekStats.daysWithRupture + '</div><div class="kpi-lbl">Jours rupture</div></div>'
    + '</div>';

  const venduParJour = [];
  const pertePctParJour = [];
  html += '<div class="section"><div class="section-header">Detail par jour</div>';
  html += '<table class="recap-table"><thead><tr>'
    + '<th>Jour</th><th>Vendu</th><th>Reste</th><th>Perte</th>'
    + '</tr></thead><tbody>';
  days.forEach(function(d) {
    const s = calcDayStats(d);
    venduParJour.push(s.vendu);
    pertePctParJour.push(s.pertePct);
    const cls = d === today ? 'today' : '';
    html += '<tr class="' + cls + '">'
      + '<td>' + formatDayShort(d) + '</td>'
      + '<td>' + (s.vendu > 0 ? s.vendu : '-') + '</td>'
      + '<td>' + (s.reste > 0 ? s.reste : '-') + '</td>'
      + '<td><span class="pct-badge ' + pctClass(s.pertePct) + '">' + (s.pertePct === null ? '-' : s.pertePct + '%') + '</span></td>'
      + '</tr>';
  });
  html += '<tr class="total">'
    + '<td>Total</td>'
    + '<td>' + weekStats.vendu + '</td>'
    + '<td>' + weekStats.reste + '</td>'
    + '<td><span class="pct-badge ' + perteCls + '">' + (weekStats.pertePct === null ? '-' : weekStats.pertePct + '%') + '</span></td>'
    + '</tr>';
  html += '</tbody></table></div>';

  if (weekStats.vendu > 0) {
    html += '<div class="chart-container">'
      + '<div class="chart-title">Ventes par jour</div>'
      + renderBarChart(days, venduParJour, Math.max.apply(null, venduParJour))
      + '</div>';
    html += '<div class="chart-container">'
      + '<div class="chart-title">% Perte par jour</div>'
      + renderLineChart(days, pertePctParJour)
      + '</div>';
  }

  const soldArr = Object.keys(weekStats.productsSold)
    .map(function(pid) { return { pid: pid, v: weekStats.productsSold[pid] }; })
    .filter(function(x) { return x.v > 0; })
    .sort(function(a, b) { return b.v - a.v; })
    .slice(0, 5);
  if (soldArr.length) {
    html += '<div class="top-list"><div class="chart-title">Top 5 ventes</div>';
    soldArr.forEach(function(item, i) {
      const p = products.find(function(x) { return x.id === item.pid; });
      const name = p ? p.name : item.pid;
      html += '<div class="top-item"><div class="top-rank r' + (i+1) + '">' + (i+1) + '</div>'
        + '<div class="top-name">' + escapeHtml(name) + '</div>'
        + '<div class="top-val">' + item.v + '</div></div>';
    });
    html += '</div>';
  }

  const lostArr = Object.keys(weekStats.productsLost)
    .map(function(pid) {
      const l = weekStats.productsLost[pid];
      return { pid: pid, pct: Math.round(l.reste / l.total * 100), total: l.total };
    })
    .filter(function(x) { return x.pct > 10 && x.total >= 3; })
    .sort(function(a, b) { return b.pct - a.pct; })
    .slice(0, 5);
  if (lostArr.length) {
    html += '<div class="top-list"><div class="chart-title">Top 5 pertes</div>';
    lostArr.forEach(function(item, i) {
      const p = products.find(function(x) { return x.id === item.pid; });
      const name = p ? p.name : item.pid;
      html += '<div class="top-item"><div class="top-rank r' + (i+1) + '">' + (i+1) + '</div>'
        + '<div class="top-name">' + escapeHtml(name) + '</div>'
        + '<div class="top-val perte">' + item.pct + '%</div></div>';
    });
    html += '</div>';
  }

  if (weekStats.produit === 0) {
    html += '<div class="empty-state">Aucune donnee de vente pour cette semaine.<br><br>Saisis des ventes dans l onglet "Ventes" pour voir ton recap ici.</div>';
  }

  mc.innerHTML = html;
}

// === LIVRAISON ===
async function loadDeliveries(date) {
  const { data, error } = await supa.from('deliveries').select('*')
    .eq('tenant_id', TENANT_ID).eq('date', date)
    .order('tour', { ascending: true }).order('position', { ascending: true });
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  deliveriesData = data || [];
}

function subscribeRealtimeDeliveries() {
  if (realtimeChannelDeliveries) supa.removeChannel(realtimeChannelDeliveries);
  realtimeChannelDeliveries = supa.channel('deliveries_' + TENANT_ID)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'deliveries' },
      async function(payload) {
        if (payload.new && payload.new.updated_by === DEVICE_ID) return;
        if (payload.old && payload.old.updated_by === DEVICE_ID) return;
        await loadDeliveries(currentDate);
        if (currentVue === 'livraison' || currentVue === 'tournee') { renderLivraison(); }
        showToast('MAJ tournee d un autre appareil', 'sync');
      }).subscribe();
}

async function changeLivraisonDate(delta) {
  const d = new Date(currentDate + 'T12:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  await loadDeliveries(currentDate);
  renderLivraison();
}

function setTour(t) { currentTour = t; renderLivraison(); }

async function generateDefaultTour() {
  const stopsForTour = deliveriesData.filter(function(d) { return d.tour === currentTour; });
  if (stopsForTour.length > 0) {
    if (!confirm('Il y a deja ' + stopsForTour.length + ' arret(s) sur cette tournee. Ajouter les arrets par defaut (St-Avertin, Tours) ?')) return;
  }
  const maxPos = stopsForTour.reduce(function(m, d) { return Math.max(m, d.position); }, 0);
  const toInsert = DEFAULT_STOPS.map(function(s, i) {
    return {
      tenant_id: TENANT_ID, date: currentDate, tour: currentTour,
      position: maxPos + i + 1,
      stop_type: s.stop_type, stop_ref: s.stop_ref, stop_label: s.stop_label,
      delivered: false, updated_by: DEVICE_ID, updated_at: new Date().toISOString()
    };
  });
  setSyncStatus('syncing');
  const { error } = await supa.from('deliveries').insert(toInsert);
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  showToast('Tournee generee', 'sync');
  await loadDeliveries(currentDate);
  renderLivraison();
}

function openAddStopModal() {
  addStopForm = { type: 'pro', label: '', address: '', notes: '' };
  document.getElementById('add-stop-type').value = 'pro';
  document.getElementById('add-stop-label').value = '';
  document.getElementById('add-stop-address').value = '';
  document.getElementById('add-stop-notes').value = '';
  document.getElementById('add-stop-modal').classList.add('show');
  setTimeout(function() { document.getElementById('add-stop-label').focus(); }, 100);
}

function closeAddStopModal() { document.getElementById('add-stop-modal').classList.remove('show'); }
function onStopTypeChange() {}

async function saveAddStop() {
  const type = document.getElementById('add-stop-type').value;
  const label = document.getElementById('add-stop-label').value.trim();
  const address = document.getElementById('add-stop-address').value.trim();
  const notes = document.getElementById('add-stop-notes').value.trim();
  if (!label) { showToast('Le libelle est obligatoire', 'error'); return; }
  const stopsForTour = deliveriesData.filter(function(d) { return d.tour === currentTour; });
  const maxPos = stopsForTour.reduce(function(m, d) { return Math.max(m, d.position); }, 0);
  const newStop = {
    tenant_id: TENANT_ID, date: currentDate, tour: currentTour,
    position: maxPos + 1,
    stop_type: type, stop_ref: type + '_' + Date.now(),
    stop_label: label, address: address || null, notes: notes || null,
    delivered: false, updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  };
  setSyncStatus('syncing');
  const { error } = await supa.from('deliveries').insert(newStop);
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  closeAddStopModal();
  await loadDeliveries(currentDate);
  renderLivraison();
}

async function toggleDelivered(id, currentVal) {
  setSyncStatus('syncing');
  const newVal = !currentVal;
  const patch = {
    delivered: newVal,
    delivered_at: newVal ? new Date().toISOString() : null,
    delivered_by: newVal ? DEVICE_ID : null,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  };
  const { error } = await supa.from('deliveries').update(patch).eq('id', id);
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  const stop = deliveriesData.find(function(d) { return d.id === id; });
  if (stop) {
    stop.delivered = newVal;
    stop.delivered_at = patch.delivered_at;
    stop.delivered_by = patch.delivered_by;
  }
  renderLivraison();
}

async function moveStop(id, delta) {
  const stopsForTour = deliveriesData.filter(function(d) { return d.tour === currentTour; })
    .sort(function(a, b) { return a.position - b.position; });
  const idx = stopsForTour.findIndex(function(d) { return d.id === id; });
  if (idx < 0) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= stopsForTour.length) return;
  const a = stopsForTour[idx], b = stopsForTour[newIdx];
  const tmp = a.position;
  a.position = b.position;
  b.position = tmp;
  setSyncStatus('syncing');
  const { error: e1 } = await supa.from('deliveries').update({ position: a.position, updated_by: DEVICE_ID, updated_at: new Date().toISOString() }).eq('id', a.id);
  const { error: e2 } = await supa.from('deliveries').update({ position: b.position, updated_by: DEVICE_ID, updated_at: new Date().toISOString() }).eq('id', b.id);
  if (e1 || e2) { setSyncStatus('error'); showToast((e1 || e2).message, 'error'); return; }
  setSyncStatus('ok');
  renderLivraison();
}

async function deleteStop(id) {
  if (!confirm('Supprimer cet arret ?')) return;
  setSyncStatus('syncing');
  const { error } = await supa.from('deliveries').delete().eq('id', id);
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  await loadDeliveries(currentDate);
  renderLivraison();
}

function formatDeliveredTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + 'h' + String(d.getMinutes()).padStart(2,'0');
}

function renderLivraison() {
  const mc = document.getElementById('main-content');
  const stopsForTour = deliveriesData
    .filter(function(d) { return d.tour === currentTour; })
    .sort(function(a, b) { return a.position - b.position; });

  const totalStops = stopsForTour.length;
  const deliveredStops = stopsForTour.filter(function(d) { return d.delivered; }).length;

  let html = '<div class="ventes-day-bar">'
    + '<button class="ventes-day-btn" onclick="changeLivraisonDate(-1)">&lt;</button>'
    + '<span class="ventes-day-title">' + formatDateFr(currentDate) + '</span>'
    + '<button class="ventes-day-btn" onclick="changeLivraisonDate(1)">&gt;</button>'
    + '</div>';

  html += '<div class="tour-switch">'
    + '<button class="tour-btn ' + (currentTour === 'matin' ? 'active' : '') + '" onclick="setTour(\'matin\')">Matin</button>'
    + '<button class="tour-btn ' + (currentTour === 'aprem' ? 'active' : '') + '" onclick="setTour(\'aprem\')">Apres-midi</button>'
    + '<button class="tour-btn ' + (currentTour === 'autre' ? 'active' : '') + '" onclick="setTour(\'autre\')">Autre</button>'
    + '</div>';

  if (totalStops > 0) {
    const pct = Math.round(deliveredStops / totalStops * 100);
    html += '<div class="info-banner" style="border-left-color:var(--green)"><strong>Progression : ' + deliveredStops + ' / ' + totalStops + ' arrets livres (' + pct + '%)</strong></div>';
  }

  if (!isLivreurMode) {
    html += '<div class="tour-toolbar">'
      + '<button class="tour-action primary" onclick="generateDefaultTour()">+ Generer tournee</button>'
      + '<button class="tour-action" onclick="openAddStopModal()">+ Arret Pro</button>'
      + '</div>';
  }

  if (stopsForTour.length === 0) {
    html += '<div class="empty-state">'
      + 'Aucun arret sur cette tournee.<br><br>'
      + (isLivreurMode
          ? 'Le responsable doit d abord preparer la tournee.'
          : 'Tape sur "Generer tournee" pour creer les arrets par defaut (St-Avertin puis Tours), ou "+ Arret Pro" pour ajouter un client.')
      + '</div>';
  } else {
    stopsForTour.forEach(function(stop, idx) {
      const isDelivered = stop.delivered;
      const cardCls = 'stop-card' + (isDelivered ? ' delivered' : '') + (isLivreurMode ? ' livreur-mode' : '');
      const typeTag = stop.stop_type === 'boutique' ? 'Boutique' : (stop.stop_type === 'pro' ? 'Pro' : 'Autre');
      const typeTagCls = stop.stop_type === 'pro' ? 'pro' : '';
      let metaHtml = '<span class="tag ' + typeTagCls + '">' + typeTag + '</span>';
      if (stop.address) metaHtml += ' ' + escapeHtml(stop.address);
      if (stop.delivered && stop.delivered_at) {
        metaHtml += ' <span class="time">Livre a ' + formatDeliveredTime(stop.delivered_at) + '</span>';
      }
      if (stop.notes) metaHtml += '<div style="margin-top:4px;font-style:italic">' + escapeHtml(stop.notes) + '</div>';

      html += '<div class="' + cardCls + '">'
        + '<div class="stop-pos">' + (idx + 1) + '</div>'
        + '<div class="stop-info">'
          + '<div class="stop-name">' + escapeHtml(stop.stop_label) + '</div>'
          + '<div class="stop-meta">' + metaHtml + '</div>'
        + '</div>'
        + '<button class="stop-check ' + (isDelivered ? 'checked' : '') + '" onclick="toggleDelivered(\'' + stop.id + '\', ' + isDelivered + ')">&#10003;</button>';

      if (!isLivreurMode) {
        html += '<div class="stop-actions">'
          + (idx > 0 ? '<button class="stop-mini-btn" onclick="moveStop(\'' + stop.id + '\', -1)">&uarr; Monter</button>' : '')
          + (idx < stopsForTour.length - 1 ? '<button class="stop-mini-btn" onclick="moveStop(\'' + stop.id + '\', 1)">&darr; Descendre</button>' : '')
          + '<button class="stop-mini-btn danger" onclick="deleteStop(\'' + stop.id + '\')">Supprimer</button>'
          + '</div>';
      }
      html += '</div>';
    });
  }

  mc.innerHTML = html;
}

// === PRODUCTION (Le Local) ===
const PROD_BOUTIQUES = ['veigne', 'tours', 'saint-avertin'];
const PROD_BOUTIQUE_LABELS = { 'veigne': 'Veigne', 'tours': 'Tours', 'saint-avertin': 'St-Avert.' };

async function loadProduction(date) {
  const { data, error } = await supa.from('reappros').select('*')
    .eq('tenant_id', TENANT_ID).eq('service_date', date)
    .in('boutique_id', PROD_BOUTIQUES);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  productionData = { veigne: {}, tours: {}, 'saint-avertin': {} };
  (data || []).forEach(function(r) {
    if (!productionData[r.boutique_id]) productionData[r.boutique_id] = {};
    productionData[r.boutique_id][r.product_id] = {
      avoir: r.avoir || '',
      commander: r.commander || ''
    };
  });
}

function subscribeRealtimeProduction() {
  if (realtimeChannelProduction) supa.removeChannel(realtimeChannelProduction);
  realtimeChannelProduction = supa.channel('prod_reappros')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'reappros' },
      function(payload) {
        const r = payload.new;
        if (!r || r.updated_by === DEVICE_ID) return;
        if (r.service_date !== currentReapproDate) return;
        if (PROD_BOUTIQUES.indexOf(r.boutique_id) === -1) return;
        if (!productionData[r.boutique_id]) productionData[r.boutique_id] = {};
        productionData[r.boutique_id][r.product_id] = {
          avoir: r.avoir || '', commander: r.commander || ''
        };
        renderProduction();
        showToast('Commande mise a jour (' + PROD_BOUTIQUE_LABELS[r.boutique_id] + ')', 'sync');
      }).subscribe();
}

function parseQty(v) {
  if (v == null || v === '') return 0;
  const n = parseFloat(String(v).replace(',', '.'));
  return isNaN(n) ? 0 : n;
}

function formatQty(n) {
  if (!n) return '0';
  return (Math.round(n * 100) / 100).toString().replace('.', ',');
}

async function changeProductionDate(delta) {
  const d = new Date(currentReapproDate + 'T12:00');
  d.setDate(d.getDate() + delta);
  currentReapproDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  await loadProduction(currentReapproDate);
  renderProduction();
}

function toggleProductionFilter() {
  productionFilterEmpty = !productionFilterEmpty;
  renderProduction();
}

function renderProduction() {
  const mc = document.getElementById('main-content');
  const isToday = (currentReapproDate === serviceDateISO());

  const reappProducts = products.filter(function(p) { return p.usage === 'reappro' || p.usage === 'both'; });

  const rows = reappProducts.map(function(p) {
    const vV = productionData['veigne'] ? productionData['veigne'][p.id] : null;
    const vT = productionData['tours'] ? productionData['tours'][p.id] : null;
    const vS = productionData['saint-avertin'] ? productionData['saint-avertin'][p.id] : null;
    const cV = parseQty(vV && vV.commander);
    const cT = parseQty(vT && vT.commander);
    const cS = parseQty(vS && vS.commander);
    const total = cV + cT + cS;
    return { p: p, veigne: cV, tours: cT, savertin: cS, total: total };
  });

  const filtered = productionFilterEmpty ? rows.filter(function(r) { return r.total > 0; }) : rows;

  const nbProdCommandes = rows.filter(function(r) { return r.total > 0; }).length;
  const nbBoutiquesActives = ['veigne', 'tours', 'saint-avertin'].filter(function(b) {
    return rows.some(function(r) { return r[b === 'saint-avertin' ? 'savertin' : b] > 0; });
  }).length;
  const volumeTotal = rows.reduce(function(s, r) { return s + r.total; }, 0);

  let html = '<div class="date-bar">'
    + '<button class="date-nav" onclick="changeProductionDate(-1)">&#8592;</button>'
    + '<div class="date-title">Production du <strong>' + escapeHtml(formatDateFr(currentReapproDate)) + '</strong>'
    + (isToday ? ' <span class="date-today">(aujourd hui)</span>' : '')
    + '<div class="date-sub">Commandes recues des boutiques</div>'
    + '</div>'
    + '<button class="date-nav" onclick="changeProductionDate(1)">&#8594;</button>'
    + '</div>';

  html += '<div class="prod-kpi-bar">'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + nbProdCommandes + '</div><div class="prod-kpi-lbl">Produits</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + formatQty(volumeTotal) + '</div><div class="prod-kpi-lbl">Volume total</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + nbBoutiquesActives + '/3</div><div class="prod-kpi-lbl">Boutiques</div></div>'
    + '</div>';

  html += '<div class="prod-filter-bar"><label>'
    + '<input type="checkbox" ' + (productionFilterEmpty ? 'checked' : '') + ' onchange="toggleProductionFilter()">'
    + '<span>Cacher les produits sans commandes</span></label></div>';

  if (!filtered.length) {
    html += '<div class="prod-empty">'
      + (productionFilterEmpty
          ? 'Aucune commande pour cette date.<br>Decoche le filtre pour voir tous les produits.'
          : 'Aucun produit dans la base reappro.')
      + '</div>';
    mc.innerHTML = html;
    return;
  }

  const byCat = {};
  filtered.forEach(function(r) {
    const c = r.p.category || 'autre';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(r);
  });

  const catOrder = Object.keys(CAT_LABELS);
  const cats = Object.keys(byCat).sort(function(a, b) {
    const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  html += '<div class="prod-table">'
    + '<div class="prod-table-header">'
    + '<span>Produit</span>'
    + '<span class="col-c">Veigne</span>'
    + '<span class="col-c">Tours</span>'
    + '<span class="col-c">St-Avert.</span>'
    + '<span class="col-c col-total">TOTAL</span>'
    + '</div>';

  cats.forEach(function(cat) {
    html += '<div class="prod-cat-title">' + escapeHtml(CAT_LABELS[cat] || cat) + '</div>';
    byCat[cat].forEach(function(r) {
      html += '<div class="prod-row">'
        + '<div><span class="prod-name">' + escapeHtml(r.p.name) + '</span>'
        + (r.p.unit ? '<span class="prod-unit">' + escapeHtml(r.p.unit) + '</span>' : '') + '</div>'
        + '<div class="cell ' + (r.veigne > 0 ? '' : 'zero') + '">' + formatQty(r.veigne) + '</div>'
        + '<div class="cell ' + (r.tours > 0 ? '' : 'zero') + '">' + formatQty(r.tours) + '</div>'
        + '<div class="cell ' + (r.savertin > 0 ? '' : 'zero') + '">' + formatQty(r.savertin) + '</div>'
        + '<div class="cell total">' + formatQty(r.total) + '</div>'
        + '</div>';
    });
  });

  html += '</div>';

  mc.innerHTML = html;
}

// === HELPERS ===
function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot'), text = document.getElementById('sync-text');
  dot.className = 'sync-dot ' + s;
  if (s === 'syncing') text.textContent = 'Synchronisation...';
  else if (s === 'ok') text.textContent = 'Synchronise';
  else if (s === 'error') text.textContent = 'Erreur';
}

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  setTimeout(function() { t.classList.add('show'); }, 10);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}
