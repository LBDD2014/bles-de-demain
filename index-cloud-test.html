// === PRODUCTION (Le Local) ===
const PROD_BOUTIQUES = ['veigne', 'tours', 'saint-avertin'];
const PROD_BOUTIQUE_LABELS = { 'veigne': 'Veigne', 'tours': 'Tours', 'saint-avertin': 'St-Avert.' };

async function loadProduction(date) {
  const { data, error } = await supa.from('reappros').select('*')
    .eq('tenant_id', TENANT_ID).eq('service_date', date)
    .in('boutique_id', PROD_BOUTIQUES);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  productionData = { veigne: {}, tours: {}, 'saint-avertin': {} };
  (data || []).forEach(function(r) {
    if (!productionData[r.boutique_id]) productionData[r.boutique_id] = {};
    productionData[r.boutique_id][r.product_id] = {
      avoir: r.avoir || '',
      commander: r.commander || '',
      previs: r.previs == null ? '' : r.previs
    };
  });
}

function subscribeRealtimeProduction() {
  if (realtimeChannelProduction) supa.removeChannel(realtimeChannelProduction);
  realtimeChannelProduction = supa.channel('prod_reappros')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'reappros' },
      function(payload) {
        const r = payload.new;
        if (!r || r.updated_by === DEVICE_ID) return;
        if (r.service_date !== currentReapproDate) return;
        if (PROD_BOUTIQUES.indexOf(r.boutique_id) === -1) return;
        if (!productionData[r.boutique_id]) productionData[r.boutique_id] = {};
        productionData[r.boutique_id][r.product_id] = {
          avoir: r.avoir || '', commander: r.commander || '',
          previs: r.previs == null ? '' : r.previs
        };
        renderProduction();
        showToast('Commande mise a jour (' + PROD_BOUTIQUE_LABELS[r.boutique_id] + ')', 'sync');
      }).subscribe();
}

function parseQty(v) {
  if (v == null || v === '') return 0;
  const n = parseFloat(String(v).replace(',', '.'));
  return isNaN(n) ? 0 : n;
}

function formatQty(n) {
  if (!n) return '0';
  return (Math.round(n * 100) / 100).toString().replace('.', ',');
}

async function loadProductionLocal(date) {
  const { data, error } = await supa.from('production_local').select('*')
    .eq('tenant_id', TENANT_ID).eq('service_date', date);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  productionLocalData = {};
  (data || []).forEach(function(r) {
    productionLocalData[r.product_id] = {
      produit: r.produit == null ? '' : String(r.produit).replace('.', ','),
      stock:   r.stock   == null ? '' : String(r.stock).replace('.', ',')
    };
  });
}

async function loadProductionLocalDate(date) {
  const { data, error } = await supa.from('production_local').select('*')
    .eq('tenant_id', TENANT_ID).eq('service_date', date);
  if (error) return {};
  const result = {};
  (data || []).forEach(function(r) {
    result[r.product_id] = {
      produit: r.produit == null ? '' : String(r.produit).replace('.', ','),
      stock:   r.stock   == null ? '' : String(r.stock).replace('.', ',')
    };
  });
  return result;
}

async function upsertProductionLocal(pid) {
  setSyncStatus('syncing');
  const d = productionLocalData[pid] || {};
  const produit = d.produit === '' || d.produit == null ? null : parseQty(d.produit);
  const stock   = d.stock   === '' || d.stock   == null ? null : parseQty(d.stock);
  const { error } = await supa.from('production_local').upsert({
    tenant_id: TENANT_ID, product_id: pid, service_date: currentReapproDate,
    produit: produit, stock: stock,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  }, { onConflict: 'tenant_id,service_date,product_id' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
  else { setSyncStatus('ok'); }
}

function subscribeRealtimeProductionLocal() {
  if (realtimeChannelProductionLocal) supa.removeChannel(realtimeChannelProductionLocal);
  realtimeChannelProductionLocal = supa.channel('prod_local')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'production_local' },
      function(payload) {
        const r = payload.new;
        if (!r || r.updated_by === DEVICE_ID) return;
        if (r.service_date !== currentReapproDate) return;
        productionLocalData[r.product_id] = {
          produit: r.produit == null ? '' : String(r.produit).replace('.', ','),
          stock:   r.stock   == null ? '' : String(r.stock).replace('.', ',')
        };
        renderProduction();
        showToast('Production mise a jour', 'sync');
      }).subscribe();
}

async function copyStockFromPreviousDay() {
  const d = new Date(currentReapproDate + 'T12:00');
  d.setDate(d.getDate() - 1);
  const prevISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const prevData = await loadProductionLocalDate(prevISO);
  const reportableProducts = products.filter(function(p) {
    return REPORTABLE_CATS.indexOf(p.category) !== -1;
  });
  const toCarry = reportableProducts.filter(function(p) {
    const prev = prevData[p.id];
    return prev && prev.stock && prev.stock !== '' && parseQty(prev.stock) > 0;
  });
  if (!toCarry.length) {
    showToast('Aucun stock a reporter depuis ' + prevISO, 'error');
    return;
  }
  if (!confirm('Reporter le stock de ' + toCarry.length + ' produit(s) depuis ' + prevISO + ' ?')) return;
  setSyncStatus('syncing');
  const rows = toCarry.map(function(p) {
    const existing = productionLocalData[p.id] || {};
    return {
      tenant_id: TENANT_ID,
      product_id: p.id,
      service_date: currentReapproDate,
      produit: existing.produit === '' || existing.produit == null ? null : parseQty(existing.produit),
      stock: parseQty(prevData[p.id].stock),
      updated_by: DEVICE_ID,
      updated_at: new Date().toISOString()
    };
  });
  const { error } = await supa.from('production_local').upsert(rows, { onConflict: 'tenant_id,service_date,product_id' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  await loadProductionLocal(currentReapproDate);
  renderProduction();
  showToast(toCarry.length + ' stocks reportes depuis ' + prevISO, 'sync');
}

function handleProductionInput(el) {
  const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
  if (!productionLocalData[pid]) productionLocalData[pid] = { produit: '', stock: '' };
  productionLocalData[pid][field] = val;
  if (field === 'produit') el.classList.toggle('has-prod', !!val);
  else el.classList.toggle('has-stock', !!val);
  const ecartEl = document.getElementById('ecart_' + pid);
  if (ecartEl) {
    const cmd = parseQty(ecartEl.dataset.cmd);
    const p = parseQty(productionLocalData[pid].produit);
    const s = parseQty(productionLocalData[pid].stock);
    const dispo = p + s;
    if (p === 0 && s === 0 && cmd === 0) {
      ecartEl.innerHTML = '<span class="ecart-badge zero">-</span>';
    } else {
      const e = dispo - cmd;
      const eTxt = e === 0 ? '0' : (e > 0 ? '+' + formatQty(e) : formatQty(e));
      const eCls = e >= 0 ? 'ok' : 'bad';
      ecartEl.innerHTML = '<span class="ecart-badge ' + eCls + '">' + eTxt + '</span>';
    }
  }
  clearTimeout(updateTimers['pl_' + pid]);
  updateTimers['pl_' + pid] = setTimeout(function() { upsertProductionLocal(pid); }, 400);
}

  const d = new Date(currentReapproDate + 'T12:00');

function renderProduction() {
  const mc = document.getElementById('main-content');
  const isToday = (currentReapproDate === serviceDateISO());

  const allProducts = products.slice();

  // Marches actifs dans l'horizon : ceux qui ont au moins un produit avec emmene > 0
  const activeMarkets = MARKET_IDS.filter(function(mid) {
    return marketUpcomingData[mid] && marketUpcomingData[mid]._products && Object.keys(marketUpcomingData[mid]._products).length > 0;
  });

  // Grid : Produit | V | T | SA | [marches actifs] | Cmd | Produit | Stock | Ecart
  const fixedColsBefore = '1.3fr 0.5fr 0.5fr 0.5fr';
  const marketColsTpl = activeMarkets.map(function() { return '0.6fr'; }).join(' ');
  const fixedColsAfter = '0.55fr 0.7fr 0.7fr 0.7fr';
  const gridTpl = fixedColsBefore + (marketColsTpl ? ' ' + marketColsTpl : '') + ' ' + fixedColsAfter;

  const rows = allProducts.map(function(p) {
    const vV = productionData['veigne'] ? productionData['veigne'][p.id] : null;
    const vT = productionData['tours'] ? productionData['tours'][p.id] : null;
    const vS = productionData['saint-avertin'] ? productionData['saint-avertin'][p.id] : null;

    // v19.1 : filtrer selon le mode fournisseur
    // Mode 'local' : on ne compte que les commandes dont supply=local
    // Mode 'veigne' : on ne compte que les commandes dont supply=veigne. Pour Veigne elle-meme, on prend son previs (produit sur place).
    const supV = getProductSupply(p, 'veigne');
    const supT = getProductSupply(p, 'tours');
    const supS = getProductSupply(p, 'saint-avertin');

    let cV = 0, cT = 0, cS = 0;
    if (productionSupplierMode === 'local') {
      // Tolerance : si supply n'est pas configure (null), on garde l'ancien comportement
      cV = (supV == null || supV === 'local') ? parseQty(vV && vV.commander) : 0;
      cT = (supT == null || supT === 'local') ? parseQty(vT && vT.commander) : 0;
      cS = (supS == null || supS === 'local') ? parseQty(vS && vS.commander) : 0;
    } else if (productionSupplierMode === 'veigne') {
      // Veigne pour elle-meme : son previs interne (ce qu'elle prevoit de produire pour son propre compte)
      cV = (supV === 'on_site') ? parseQty(vV && vV.previs) : 0;
      cT = (supT === 'veigne') ? parseQty(vT && vT.commander) : 0;
      cS = (supS === 'veigne') ? parseQty(vS && vS.commander) : 0;
    }

    const marketVals = {};
    let marketSum = 0;
    // Les marches ne concernent que le Local
    if (productionSupplierMode === 'local') {
      activeMarkets.forEach(function(mid) {
        const mv = (marketUpcomingData[mid] && marketUpcomingData[mid]._products && marketUpcomingData[mid]._products[p.id]) || 0;
        marketVals[mid] = mv;
        marketSum += mv;
      });
    }
    const total = cV + cT + cS + marketSum;
    const pl = productionLocalData[p.id] || { produit: '', stock: '' };
    const prod  = pl.produit === '' || pl.produit == null ? null : parseQty(pl.produit);
    const stock = pl.stock   === '' || pl.stock   == null ? null : parseQty(pl.stock);
    return {
      p: p, veigne: cV, tours: cT, savertin: cS, markets: marketVals, total: total,
      produitRaw: pl.produit, stockRaw: pl.stock,
      produitVal: prod, stockVal: stock
    };
  });

  const filtered = productionFilterEmpty
    ? rows.filter(function(r) {
        return r.total > 0 || (r.produitVal != null && r.produitVal !== 0) || (r.stockVal != null && r.stockVal !== 0);
      })
    : rows;

  const volumeTotal = rows.reduce(function(s, r) { return s + r.total; }, 0);
  const volumeProduit = rows.reduce(function(s, r) { return s + (r.produitVal || 0); }, 0);
  const nbManque = rows.filter(function(r) {
    const dispo = (r.produitVal || 0) + (r.stockVal || 0);
    return r.total > 0 && dispo < r.total;
  }).length;

  const horizonTxt = activeMarkets.length
    ? 'Boutiques + marches (horizon ' + MARKET_PREP_DAYS + 'j)'
    : 'Commandes boutiques';
  const modeLabel = productionSupplierMode === 'veigne' ? 'Prod. Veigne' : 'Production Local';

  let html = '<div class="date-bar">'
    + '<button class="date-nav" onclick="changeProductionDate(-1)">&#8592;</button>'
    + '<div class="date-title">' + modeLabel + ' du <strong>' + escapeHtml(formatDateFr(currentReapproDate)) + '</strong>'
    + (isToday ? ' <span class="date-today">(aujourd hui)</span>' : '')
    + '<div class="date-sub">' + horizonTxt + '</div>'
    + '</div>'
    + '<button class="date-nav" onclick="changeProductionDate(1)">&#8594;</button>'
    + '</div>';

  html += '<div class="prod-kpi-bar">'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + formatQty(volumeTotal) + '</div><div class="prod-kpi-lbl">Commande</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--blue)">' + formatQty(volumeProduit) + '</div><div class="prod-kpi-lbl">Produit</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:' + (nbManque > 0 ? 'var(--red)' : 'var(--green)') + '">' + nbManque + '</div><div class="prod-kpi-lbl">A produire</div></div>'
    + '</div>';

  const hasReportable = allProducts.some(function(p) { return REPORTABLE_CATS.indexOf(p.category) !== -1; });
  if (hasReportable) {
    html += '<div class="copy-stock-box">'
      + '<div class="copy-stock-txt">Reporter le stock de la veille pour Ingredients, Sec &amp; Traiteur, Gateaux Secs.</div>'
      + '<button class="btn-gold-sm" onclick="copyStockFromPreviousDay()">Reporter les stocks d hier</button>'
      + '</div>';
  }

  html += '<div class="prod-filter-bar"><label>'
    + '<input type="checkbox" ' + (productionFilterEmpty ? 'checked' : '') + ' onchange="toggleProductionFilter()">'
    + '<span>Cacher les produits sans activite</span></label></div>';

  if (!filtered.length) {
    html += '<div class="prod-empty">'
      + (productionFilterEmpty
          ? 'Aucune activite pour cette date.<br>Decoche le filtre pour voir tous les produits.'
          : 'Aucun produit dans la base.')
      + '</div>';
    mc.innerHTML = html;
    return;
  }

  const byCat = {};
  filtered.forEach(function(r) {
    const c = r.p.category || 'autre';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(r);
  });

  const catOrder = Object.keys(CAT_LABELS);
  const cats = Object.keys(byCat).sort(function(a, b) {
    const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  // Header
  let headerHtml = '<div class="prod-table-header" style="grid-template-columns:' + gridTpl + '">'
    + '<span>Produit</span>'
    + '<span class="col-c">V</span>'
    + '<span class="col-c">T</span>'
    + '<span class="col-c">SA</span>';
  activeMarkets.forEach(function(mid) {
    const dateBadge = marketUpcomingData[mid]._date
      ? '<span class="market-header-badge">' + formatMarketDayLabel(marketUpcomingData[mid]._date) + '</span>'
      : '';
    headerHtml += '<span class="col-c" style="color:var(--orange)">' + escapeHtml(MARKET_LABELS_SHORT[mid]) + dateBadge + '</span>';
  });
  headerHtml += '<span class="col-c col-total">Cmd</span>'
    + '<span class="col-c col-prod">Produit</span>'
    + '<span class="col-c col-stock">Stock</span>'
    + '<span class="col-c col-ecart">Ecart</span>'
    + '</div>';

  html += '<div class="prod-table">' + headerHtml;

  cats.forEach(function(cat) {
    const isReportable = REPORTABLE_CATS.indexOf(cat) !== -1;
    const catLabel = (CAT_LABELS[cat] || cat) + (isReportable ? ' <span style="font-size:10px;color:var(--gold);font-weight:700">(reportable)</span>' : '');
    html += '<div class="prod-cat-title">' + catLabel + '</div>';
    byCat[cat].forEach(function(r) {
      const p = r.produitVal || 0;
      const s = r.stockVal || 0;
      const dispo = p + s;
      let ecartHtml;
      if (p === 0 && s === 0 && r.total === 0) {
        ecartHtml = '<span class="ecart-badge zero">-</span>';
      } else {
        const e = dispo - r.total;
        const eTxt = e === 0 ? '0' : (e > 0 ? '+' + formatQty(e) : formatQty(e));
        const eCls = e >= 0 ? 'ok' : 'bad';
        ecartHtml = '<span class="ecart-badge ' + eCls + '">' + eTxt + '</span>';
      }
      const prodCls = r.produitRaw ? 'has-prod' : '';
      const stockCls = r.stockRaw ? 'has-stock' : '';
      let rowHtml = '<div class="prod-row" style="grid-template-columns:' + gridTpl + '">'
        + '<div><span class="prod-name">' + escapeHtml(r.p.name) + '</span>'
        + (r.p.unit ? '<span class="prod-unit">' + escapeHtml(r.p.unit) + '</span>' : '') + '</div>'
        + '<div class="cell ' + (r.veigne > 0 ? '' : 'zero') + '">' + formatQty(r.veigne) + '</div>'
        + '<div class="cell ' + (r.tours > 0 ? '' : 'zero') + '">' + formatQty(r.tours) + '</div>'
        + '<div class="cell ' + (r.savertin > 0 ? '' : 'zero') + '">' + formatQty(r.savertin) + '</div>';
      activeMarkets.forEach(function(mid) {
        const v = r.markets[mid] || 0;
        rowHtml += '<div class="cell ' + (v > 0 ? '' : 'zero') + '" style="color:' + (v > 0 ? 'var(--orange)' : 'inherit') + ';font-weight:' + (v > 0 ? '700' : '400') + '">' + formatQty(v) + '</div>';
      });
      rowHtml += '<div class="cell total">' + formatQty(r.total) + '</div>'
        + '<input type="text" inputmode="decimal" class="prod-input ' + prodCls + '" data-pid="' + r.p.id + '" data-field="produit" value="' + escapeHtml(r.produitRaw || '') + '" placeholder="-" oninput="handleProductionInput(this)" onfocus="this.select()">'
        + '<input type="text" inputmode="decimal" class="prod-input ' + stockCls + '" data-pid="' + r.p.id + '" data-field="stock" value="' + escapeHtml(r.stockRaw || '') + '" placeholder="-" oninput="handleProductionInput(this)" onfocus="this.select()">'
        + '<div id="ecart_' + r.p.id + '" data-cmd="' + r.total + '">' + ecartHtml + '</div>'
        + '</div>';
      html += rowHtml;
    });
  });

  html += '</div>';

  mc.innerHTML = html;
}

// === MARCHES ===
async function loadMarketEntries(marketId, date) {
  const { data, error } = await supa.from('market_entries').select('*')
    .eq('tenant_id', TENANT_ID).eq('market_id', marketId).eq('service_date', date);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  marketEntriesData = {};
  (data || []).forEach(function(r) {
    marketEntriesData[r.product_id] = {
      marche:             r.marche             == null ? '' : String(r.marche).replace('.', ','),
      commande:           r.commande           == null ? '' : String(r.commande).replace('.', ','),
      commande_tranchee:  r.commande_tranchee  == null ? '' : String(r.commande_tranchee).replace('.', ','),
      pertes:             r.pertes             == null ? '' : String(r.pertes).replace('.', ','),
      product_notes:      r.product_notes || ''
    };
  });
}

async function loadMarketEntriesForDate(marketId, date) {
  const { data, error } = await supa.from('market_entries').select('*')
    .eq('tenant_id', TENANT_ID).eq('market_id', marketId).eq('service_date', date);
  if (error) return {};
  const result = {};
  (data || []).forEach(function(r) {
    result[r.product_id] = {
      marche:             r.marche             == null ? '' : String(r.marche).replace('.', ','),
      commande:           r.commande           == null ? '' : String(r.commande).replace('.', ','),
      commande_tranchee:  r.commande_tranchee  == null ? '' : String(r.commande_tranchee).replace('.', ','),
      pertes:             r.pertes             == null ? '' : String(r.pertes).replace('.', ','),
      product_notes:      r.product_notes || ''
    };
  });
  return result;
}

async function upsertMarketEntry(pid) {
  setSyncStatus('syncing');
  const d = marketEntriesData[pid] || {};
  const marche = d.marche === '' || d.marche == null ? null : parseQty(d.marche);
  const commande = d.commande === '' || d.commande == null ? null : parseQty(d.commande);
  const commandeTr = d.commande_tranchee === '' || d.commande_tranchee == null ? null : parseQty(d.commande_tranchee);
  const pertes = d.pertes === '' || d.pertes == null ? null : parseQty(d.pertes);
  const { error } = await supa.from('market_entries').upsert({
    tenant_id: TENANT_ID, market_id: currentMarketId, service_date: currentMarketDate,
    product_id: pid,
    marche: marche, commande: commande, commande_tranchee: commandeTr, pertes: pertes,
    product_notes: d.product_notes || null,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  }, { onConflict: 'tenant_id,market_id,service_date,product_id' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
  else { setSyncStatus('ok'); }
}

async function loadMarketDayNote(marketId, date) {
  const { data, error } = await supa.from('market_day_notes').select('*')
    .eq('tenant_id', TENANT_ID).eq('market_id', marketId).eq('service_date', date).maybeSingle();
  if (error) { marketDayNote = ''; return; }
  marketDayNote = (data && data.notes) || '';
}

async function upsertMarketDayNote(text) {
  setSyncStatus('syncing');
  const { error } = await supa.from('market_day_notes').upsert({
    tenant_id: TENANT_ID, market_id: currentMarketId, service_date: currentMarketDate,
    notes: text || null,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  }, { onConflict: 'tenant_id,market_id,service_date' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
  else { setSyncStatus('ok'); }
}

function subscribeRealtimeMarket() {
  if (realtimeChannelMarket) supa.removeChannel(realtimeChannelMarket);
  realtimeChannelMarket = supa.channel('market_' + currentMarketId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'market_entries', filter: 'market_id=eq.' + currentMarketId },
      function(payload) {
        const r = payload.new;
        if (!r || r.updated_by === DEVICE_ID) return;
        if (r.service_date !== currentMarketDate) return;
        marketEntriesData[r.product_id] = {
          marche:             r.marche             == null ? '' : String(r.marche).replace('.', ','),
          commande:           r.commande           == null ? '' : String(r.commande).replace('.', ','),
          commande_tranchee:  r.commande_tranchee  == null ? '' : String(r.commande_tranchee).replace('.', ','),
          pertes:             r.pertes             == null ? '' : String(r.pertes).replace('.', ','),
          product_notes: r.product_notes || ''
        };
        renderMarket();
        showToast('MAJ marche d un autre appareil', 'sync');
      })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'market_day_notes', filter: 'market_id=eq.' + currentMarketId },
      function(payload) {
        const r = payload.new;
        if (!r || r.updated_by === DEVICE_ID) return;
        if (r.service_date !== currentMarketDate) return;
        marketDayNote = r.notes || '';
        const ta = document.getElementById('market-day-note');
        if (ta && document.activeElement !== ta) ta.value = marketDayNote;
      })
    .subscribe();
}

async function changeMarketDate(delta) {
  const d = new Date(currentMarketDate + 'T12:00');
  d.setDate(d.getDate() + delta);
  currentMarketDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  await loadMarketEntries(currentMarketId, currentMarketDate);
  await loadMarketDayNote(currentMarketId, currentMarketDate);
  renderMarket();
}

async function copyFromLastMarket() {
  // Meme marche, semaine d'avant - on ne reprend que le volume "Marche" (walk-in)
  // et les notes produit. Les commandes clients ne se reportent pas (specifiques chaque semaine).
  const d = new Date(currentMarketDate + 'T12:00');
  d.setDate(d.getDate() - 7);
  const prevISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const prevData = await loadMarketEntriesForDate(currentMarketId, prevISO);
  const pids = Object.keys(prevData).filter(function(pid) {
    const v = prevData[pid];
    return (v.marche && v.marche !== '');
  });
  if (!pids.length) {
    showToast('Aucune base Marche a reprendre du ' + prevISO, 'error');
    return;
  }
  if (!confirm('Reprendre la base "Marche" de ' + pids.length + ' produit(s) du marche du ' + prevISO + ' ?')) return;
  setSyncStatus('syncing');
  const rows = pids.map(function(pid) {
    return {
      tenant_id: TENANT_ID, market_id: currentMarketId, service_date: currentMarketDate,
      product_id: pid,
      marche: prevData[pid].marche === '' ? null : parseQty(prevData[pid].marche),
      commande: null, commande_tranchee: null, pertes: null,
      product_notes: prevData[pid].product_notes || null,
      updated_by: DEVICE_ID, updated_at: new Date().toISOString()
    };
  });
  const { error } = await supa.from('market_entries').upsert(rows, { onConflict: 'tenant_id,market_id,service_date,product_id' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  await loadMarketEntries(currentMarketId, currentMarketDate);
  renderMarket();
  showToast('Base Marche reprise depuis ' + prevISO, 'sync');
}

function handleMarketInput(el) {
  const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
  if (!marketEntriesData[pid]) marketEntriesData[pid] = { marche: '', commande: '', commande_tranchee: '', pertes: '', product_notes: '' };
  marketEntriesData[pid][field] = val;
  if (field !== 'product_notes') {
    el.classList.toggle('has-' + field, !!val);
  }
  clearTimeout(updateTimers['m_' + pid]);
  updateTimers['m_' + pid] = setTimeout(function() { upsertMarketEntry(pid); }, 400);
}

function handleMarketDayNoteInput(el) {
  marketDayNote = el.value;
  clearTimeout(updateTimers['m_daynote']);
  updateTimers['m_daynote'] = setTimeout(function() { upsertMarketDayNote(marketDayNote); }, 500);
}

function toggleMarketFilter() {
  marketFilterEmpty = !marketFilterEmpty;
  renderMarket();
}

function renderMarket() {
  const mc = document.getElementById('main-content');
  const isMarketDay = (new Date(currentMarketDate + 'T12:00').getDay() === MARKET_DAY_OF_WEEK[currentMarketId]);
  const marketLabel = BOUTIQUE_NAMES[currentMarketId];

  const allProducts = products.slice();

  const rows = allProducts.map(function(p) {
    const m = marketEntriesData[p.id] || { marche: '', commande: '', commande_tranchee: '', pertes: '', product_notes: '' };
    const marche  = m.marche            === '' || m.marche            == null ? null : parseQty(m.marche);
    const cmd     = m.commande          === '' || m.commande          == null ? null : parseQty(m.commande);
    const cmdTr   = m.commande_tranchee === '' || m.commande_tranchee == null ? null : parseQty(m.commande_tranchee);
    const pertes  = m.pertes            === '' || m.pertes            == null ? null : parseQty(m.pertes);
    return {
      p: p,
      marcheRaw: m.marche, commandeRaw: m.commande, commandeTranRaw: m.commande_tranchee, pertesRaw: m.pertes,
      notesRaw: m.product_notes,
      marcheVal: marche, commandeVal: cmd, commandeTranVal: cmdTr, pertesVal: pertes
    };
  });

  const filtered = marketFilterEmpty
    ? rows.filter(function(r) {
        return (r.marcheVal != null && r.marcheVal !== 0) ||
               (r.commandeVal != null && r.commandeVal !== 0) ||
               (r.commandeTranVal != null && r.commandeTranVal !== 0) ||
               (r.pertesVal != null && r.pertesVal !== 0) ||
               (r.notesRaw && r.notesRaw !== '');
      })
    : rows;

  // KPIs : total charger (marche+cmd+cmdTr), total commandes clients (cmd+cmdTr), pertes
  const totalCharger = rows.reduce(function(s, r) { return s + (r.marcheVal || 0) + (r.commandeVal || 0) + (r.commandeTranVal || 0); }, 0);
  const totalCommandes = rows.reduce(function(s, r) { return s + (r.commandeVal || 0) + (r.commandeTranVal || 0); }, 0);
  const totalPertes = rows.reduce(function(s, r) { return s + (r.pertesVal || 0); }, 0);

  let html = '<div class="date-bar">'
    + '<button class="date-nav" onclick="changeMarketDate(-1)">&#8592;</button>'
    + '<div class="date-title">' + escapeHtml(marketLabel) + ' - <strong>' + escapeHtml(formatDateFr(currentMarketDate)) + '</strong>'
    + (isMarketDay ? ' <span class="date-today">(jour de marche)</span>' : '')
    + '<div class="date-sub">Marche / Commande / Cmd tranchee / Pertes</div>'
    + '</div>'
    + '<button class="date-nav" onclick="changeMarketDate(1)">&#8594;</button>'
    + '</div>';

  html += '<div class="prod-kpi-bar">'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + formatQty(totalCharger) + '</div><div class="prod-kpi-lbl">A charger</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--gold-dark)">' + formatQty(totalCommandes) + '</div><div class="prod-kpi-lbl">Commandes</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--red)">' + formatQty(totalPertes) + '</div><div class="prod-kpi-lbl">Pertes</div></div>'
    + '</div>';

  // Bouton reprendre la semaine d'avant
  html += '<div class="copy-stock-box">'
    + '<div class="copy-stock-txt">Reprendre la base "Marche" du meme marche la semaine derniere.</div>'
    + '<button class="btn-gold-sm" onclick="copyFromLastMarket()">Reprendre la semaine d avant</button>'
    + '</div>';

  // Notes globales du marche
  html += '<div class="market-note-box">'
    + '<div class="market-note-lbl">Notes du marche (pre-commandes clients, infos generales)</div>'
    + '<textarea id="market-day-note" class="market-note-ta" placeholder="Ex: Mme Martin - 2 baguettes + 1 Mathis 1kg tranche pour 9h" oninput="handleMarketDayNoteInput(this)">' + escapeHtml(marketDayNote) + '</textarea>'
    + '</div>';

  html += '<div class="prod-filter-bar"><label>'
    + '<input type="checkbox" ' + (marketFilterEmpty ? 'checked' : '') + ' onchange="toggleMarketFilter()">'
    + '<span>Cacher les produits sans activite</span></label></div>';

  if (!filtered.length) {
    html += '<div class="prod-empty">'
      + (marketFilterEmpty
          ? 'Aucun produit saisi pour ce marche.<br>Decoche le filtre pour voir tous les produits et commencer la saisie.'
          : 'Aucun produit dans la base.')
      + '</div>';
    mc.innerHTML = html;
    return;
  }

  const byCat = {};
  filtered.forEach(function(r) {
    const c = r.p.category || 'autre';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(r);
  });
  const catOrder = Object.keys(CAT_LABELS);
  const cats = Object.keys(byCat).sort(function(a, b) {
    const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  html += '<div class="market-table">'
    + '<div class="market-table-header">'
    + '<span>Produit</span>'
    + '<span class="col-c" style="color:var(--blue)">Marche</span>'
    + '<span class="col-c" style="color:var(--gold-dark)">Cmd</span>'
    + '<span class="col-c" style="color:var(--gold-dark)">Cmd tr.</span>'
    + '<span class="col-c" style="color:var(--red)">Pertes</span>'
    + '<span>Notes</span>'
    + '</div>';

  cats.forEach(function(cat) {
    html += '<div class="prod-cat-title">' + escapeHtml(CAT_LABELS[cat] || cat) + '</div>';
    byCat[cat].forEach(function(r) {
      const clsM  = r.marcheRaw          ? 'has-marche' : '';
      const clsC  = r.commandeRaw        ? 'has-commande' : '';
      const clsCt = r.commandeTranRaw    ? 'has-commande_tranchee' : '';
      const clsP  = r.pertesRaw          ? 'has-pertes' : '';
      html += '<div class="market-row">'
        + '<div><span class="prod-name">' + escapeHtml(r.p.name) + '</span>'
        + (r.p.unit ? '<span class="prod-unit">' + escapeHtml(r.p.unit) + '</span>' : '') + '</div>'
        + '<input type="text" inputmode="decimal" class="market-input ' + clsM  + '" data-pid="' + r.p.id + '" data-field="marche"            value="' + escapeHtml(r.marcheRaw       || '') + '" placeholder="-" oninput="handleMarketInput(this)" onfocus="this.select()">'
        + '<input type="text" inputmode="decimal" class="market-input ' + clsC  + '" data-pid="' + r.p.id + '" data-field="commande"          value="' + escapeHtml(r.commandeRaw     || '') + '" placeholder="-" oninput="handleMarketInput(this)" onfocus="this.select()">'
        + '<input type="text" inputmode="decimal" class="market-input ' + clsCt + '" data-pid="' + r.p.id + '" data-field="commande_tranchee" value="' + escapeHtml(r.commandeTranRaw || '') + '" placeholder="-" oninput="handleMarketInput(this)" onfocus="this.select()">'
        + '<input type="text" inputmode="decimal" class="market-input ' + clsP  + '" data-pid="' + r.p.id + '" data-field="pertes"            value="' + escapeHtml(r.pertesRaw       || '') + '" placeholder="-" oninput="handleMarketInput(this)" onfocus="this.select()">'
        + '<input type="text" class="market-note-inline" data-pid="' + r.p.id + '" data-field="product_notes" value="' + escapeHtml(r.notesRaw || '') + '" placeholder="ex: 600g, tranche..." oninput="handleMarketInput(this)">'
        + '</div>';
    });
  });

  html += '</div>';
  mc.innerHTML = html;
}

// === MARCHES - Anticipation pour Le Local ===
// Charge les commandes marche a venir dans les MARKET_PREP_DAYS jours suivant la date du Local
async function loadMarketUpcoming(localDate) {
  marketUpcomingData = {};
  const startD = new Date(localDate + 'T12:00');
  const endD = new Date(localDate + 'T12:00');
  endD.setDate(endD.getDate() + MARKET_PREP_DAYS);
  const startISO = startD.getFullYear() + '-' + String(startD.getMonth()+1).padStart(2,'0') + '-' + String(startD.getDate()).padStart(2,'0');
  const endISO = endD.getFullYear() + '-' + String(endD.getMonth()+1).padStart(2,'0') + '-' + String(endD.getDate()).padStart(2,'0');
  const { data, error } = await supa.from('market_entries').select('*')
    .eq('tenant_id', TENANT_ID)
    .gte('service_date', startISO).lte('service_date', endISO);
  if (error) return;
  (data || []).forEach(function(r) {
    // Total a produire pour ce produit/marche/date = marche + commande + commande_tranchee
    const total = (r.marche || 0) + (r.commande || 0) + (r.commande_tranchee || 0);
    if (total === 0) return;
    if (!marketUpcomingData[r.market_id]) marketUpcomingData[r.market_id] = { _date: r.service_date, _products: {} };
    if (r.service_date < marketUpcomingData[r.market_id]._date) {
      marketUpcomingData[r.market_id]._date = r.service_date;
    }
    marketUpcomingData[r.market_id]._products[r.product_id] = total;
  });
}

async function saveNewProduct() {
  const d = adminNewProductDraft;
  if (!d.name || !d.name.trim()) { showToast('Nom obligatoire', 'error'); return; }
  if (!d.category || !d.category.trim()) { showToast('Categorie obligatoire', 'error'); return; }
  setSyncStatus('syncing');
  const row = {
    tenant_id: TENANT_ID,
    name: d.name.trim(),
    category: d.category.trim(),
    unit: d.unit ? d.unit.trim() : null,
    usage: d.usage || 'both',

  };

async function deleteProduct(pid) {
  const p = adminProducts.find(function(x) { return x.id === pid; });
  if (!p) return;
  if (!confirm('Supprimer DEFINITIVEMENT "' + p.name + '" ?\n\nATTENTION : si ce produit a un historique (commandes, ventes, production), la suppression sera impossible et je te proposerai de le desactiver a la place.')) return;
  setSyncStatus('syncing');
  const { error } = await supa.from('products').delete().eq('id', pid);
  if (error) {
    setSyncStatus('error');
    const msg = (error.message || '').toLowerCase();
    if (msg.indexOf('foreign') !== -1 || msg.indexOf('violates') !== -1 || msg.indexOf('referenced') !== -1) {
      if (confirm('Ce produit a de l historique en base.\nLe DESACTIVER a la place (il disparaitra des ecrans mais l historique reste) ?')) {
        const { error: e2 } = await supa.from('products').update({ actif: false }).eq('id', pid);
        if (e2) { showToast(e2.message, 'error'); return; }
        await loadAdminProducts();
        await loadProducts();
        renderAdminProducts();
        showToast('Produit desactive', 'sync');
      }
    } else {
      showToast(error.message, 'error');
    }
    return;
  }
  setSyncStatus('ok');
  await loadAdminProducts();
  await loadProducts();
  renderAdminProducts();
  showToast('Produit supprime', 'sync');
}

// === VALORISATION DES FLUX ===
let currentValoWeek = null; // lundi de la semaine selectionnee (ISO YYYY-MM-DD)
let valoData = {}; // { boutique_id: { product_id: { qty, p_name, p_cat } } }

function getMondayOf(dateStr) {
  const d = new Date(dateStr + 'T12:00');
  const dow = d.getDay(); // 0=dim, 1=lun
  const shift = dow === 0 ? -6 : (1 - dow);
  d.setDate(d.getDate() + shift);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function changeValoWeek(delta) {
  const d = new Date(currentValoWeek + 'T12:00');
  d.setDate(d.getDate() + delta * 7);
  currentValoWeek = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  (async function() {
    await loadValorisation();
    renderValorisation();
  })();
}

async function loadValorisation() {
  if (!currentValoWeek) currentValoWeek = getMondayOf(todayISO());
  const start = currentValoWeek;
  const d = new Date(start + 'T12:00');
  d.setDate(d.getDate() + 6);
  const end = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  // Charger tous les reappros de la semaine
  const { data, error } = await supa.from('reappros').select('*')
    .eq('tenant_id', TENANT_ID).gte('service_date', start).lte('service_date', end);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  // Charger aussi produits si pas deja dispo
  if (!adminProducts.length) await loadAdminProducts();
  const prodMap = {};
  adminProducts.forEach(function(p) { prodMap[p.id] = p; });
  valoData = {};
  (data || []).forEach(function(r) {
    if (r.qty == null) return;
    if (!valoData[r.boutique_id]) valoData[r.boutique_id] = {};
    if (!valoData[r.boutique_id][r.product_id]) {
      const p = prodMap[r.product_id];
      valoData[r.boutique_id][r.product_id] = {
        qty: 0,
        name: p ? p.name : r.product_id,
        cat: p ? (p.category || 'autre') : 'autre',
        prix: p ? p.prix_cession : null
      };
    }
    valoData[r.boutique_id][r.product_id].qty += Number(r.qty);
  });
}

function renderValorisation() {
  const mc = document.getElementById('main-content');
  const start = currentValoWeek;
  const d = new Date(start + 'T12:00');
  d.setDate(d.getDate() + 6);
  const endISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

  // Boutiques concernees (ont des reappros)
  const boutiques = Object.keys(valoData).sort();

  // Totaux par boutique + grand total
  const totalParBoutique = {};
  const totalParBoutiqueNonValorise = {};
  let grandTotal = 0;
  let grandTotalLignes = 0;
  let grandTotalNonValorise = 0;

  boutiques.forEach(function(b) {
    let tot = 0, totNV = 0, nbLignes = 0;
    Object.keys(valoData[b]).forEach(function(pid) {
      const e = valoData[b][pid];
      if (e.prix != null && e.prix > 0) {
        tot += e.qty * Number(e.prix);
      } else {
        totNV += e.qty;
      }
      nbLignes++;
    });
    totalParBoutique[b] = tot;
    totalParBoutiqueNonValorise[b] = totNV;
    grandTotal += tot;
    grandTotalNonValorise += totNV;
    grandTotalLignes += nbLignes;
  });

  let html = '<div class="date-bar">'
    + '<button class="date-nav" onclick="changeValoWeek(-1)">&#8592;</button>'
    + '<div class="date-title">Semaine du <strong>' + escapeHtml(formatDateFr(start)) + '</strong> au <strong>' + escapeHtml(formatDateFr(endISO)) + '</strong>'
    + '<div class="date-sub">Valorisation des flux Local vers Boutiques</div>'
    + '</div>'
    + '<button class="date-nav" onclick="changeValoWeek(1)">&#8594;</button>'
    + '</div>';

  html += '<div class="prod-kpi-bar">'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:var(--green)">' + grandTotal.toFixed(2).replace('.', ',') + ' EUR</div><div class="prod-kpi-lbl">Total valorise</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val">' + grandTotalLignes + '</div><div class="prod-kpi-lbl">Produits livres</div></div>'
    + '<div class="prod-kpi"><div class="prod-kpi-val" style="color:' + (grandTotalNonValorise > 0 ? 'var(--red)' : 'var(--brown-mid)') + '">' + formatQty(grandTotalNonValorise) + '</div><div class="prod-kpi-lbl">Qty sans prix</div></div>'
    + '</div>';

  if (!boutiques.length) {
    html += '<div class="prod-empty">Aucune livraison enregistree cette semaine.</div>';
    mc.innerHTML = html;
    return;
  }

  if (grandTotalNonValorise > 0) {
    html += '<div class="info-banner" style="background:#FEF2F2;border-left:3px solid var(--red)">'
      + '<strong>Produits sans prix</strong><br>Certains produits livres n ont pas de prix de cession renseigne. Va dans l onglet Produits pour les renseigner.</div>';
  }

  // Tableau par boutique
  boutiques.forEach(function(b) {
    const rows = Object.keys(valoData[b]).map(function(pid) {
      return Object.assign({ pid: pid }, valoData[b][pid]);
    });
    rows.sort(function(a, c) {
      const ao = Object.keys(CAT_LABELS).indexOf(a.cat);
      const co = Object.keys(CAT_LABELS).indexOf(c.cat);
      if (ao !== co) return (ao === -1 ? 999 : ao) - (co === -1 ? 999 : co);
      return a.name.localeCompare(c.name);
    });

    html += '<div class="valo-boutique-card">'
      + '<div class="valo-boutique-head">'
      + '<div class="valo-boutique-name">' + escapeHtml(BOUTIQUE_NAMES[b] || b) + '</div>'
      + '<div class="valo-boutique-total">' + totalParBoutique[b].toFixed(2).replace('.', ',') + ' EUR'
      + (totalParBoutiqueNonValorise[b] > 0 ? ' <span style="color:var(--red);font-size:11px">+ ' + formatQty(totalParBoutiqueNonValorise[b]) + ' sans prix</span>' : '')
      + '</div>'
      + '</div>';

    html += '<div class="valo-table">';
    html += '<div class="valo-row valo-row-head"><span>Produit</span><span>Qty</span><span>PU</span><span>Total</span></div>';
    rows.forEach(function(r) {
      const hasPrice = r.prix != null && r.prix > 0;
      const total = hasPrice ? (r.qty * Number(r.prix)) : 0;
      html += '<div class="valo-row ' + (hasPrice ? '' : 'valo-row-nopx') + '">'
        + '<span class="valo-prod">' + escapeHtml(r.name) + '</span>'
        + '<span class="valo-qty">' + formatQty(r.qty) + '</span>'
        + '<span class="valo-pu">' + (hasPrice ? Number(r.prix).toFixed(2).replace('.', ',') : '-') + '</span>'
        + '<span class="valo-tot">' + (hasPrice ? total.toFixed(2).replace('.', ',') + ' EUR' : '<em style="color:var(--red);font-size:11px">sans prix</em>') + '</span>'
        + '</div>';
    });
    html += '</div>';
    html += '</div>';
  });

  mc.innerHTML = html;
}

// === STOCK LOCAL (v20.1) ===

let stockData = {
  // par product_id : { last_real_qty, last_real_at, receipts_since, outputs_since, theoretical, seuil }
};
let stockReceiptModalOpen = false;
let stockReceiptDraft = { product_id: '', qty: '', supplier: '', note: '' };

async function loadStockData() {
  // 1. Dernier inventaire de chaque produit
  const { data: invRows } = await supa.from('stock_inventory').select('*').eq('tenant_id', TENANT_ID).order('inventoried_at', { ascending: false });
  // 2. Receptions fournisseur (toutes)
  const { data: recRows } = await supa.from('stock_receipts').select('*').eq('tenant_id', TENANT_ID);
  // 3. Reappros envoyes aux boutiques (qty_livree si defini, sinon commander) - sert au calcul sorties
  const { data: reapRows } = await supa.from('reappros').select('*').eq('tenant_id', TENANT_ID);

  // Grouper par produit
  const byProd = {};
  (invRows || []).forEach(function(r) {
    if (!byProd[r.product_id]) byProd[r.product_id] = { last_real: null };
    if (!byProd[r.product_id].last_real) byProd[r.product_id].last_real = r; // le + recent
  });
  (recRows || []).forEach(function(r) {
    if (!byProd[r.product_id]) byProd[r.product_id] = { last_real: null };
    byProd[r.product_id].receipts = byProd[r.product_id].receipts || [];
    byProd[r.product_id].receipts.push(r);
  });
  (reapRows || []).forEach(function(r) {
    if (!byProd[r.product_id]) byProd[r.product_id] = { last_real: null };
    byProd[r.product_id].reappros = byProd[r.product_id].reappros || [];
    byProd[r.product_id].reappros.push(r);
  });

  stockData = {};
  products.forEach(function(p) {
    // Ne suivre stock QUE viennoiserie + brioches (Phil a confirme)
    if (p.category !== 'viennoiserie' && p.category !== 'brioches_special') return;
    const entry = byProd[p.id] || {};
    const baseReal = entry.last_real ? parseQty(entry.last_real.qty_real) : 0;
    const baseDate = entry.last_real ? entry.last_real.inventoried_at : null;
    // Receptions depuis baseDate
    let recSince = 0;
    (entry.receipts || []).forEach(function(r) {
      if (!baseDate || r.received_at > baseDate) recSince += parseQty(r.qty);
    });
    // Sorties reappros depuis baseDate (prend qty_livree si defini, sinon commander)
    let outSince = 0;
    (entry.reappros || []).forEach(function(r) {
      if (!baseDate || (r.updated_at && r.updated_at > baseDate)) {
        if (r.qty_livree != null) outSince += parseQty(r.qty_livree);
        else if (r.commander != null) outSince += parseQty(r.commander);
      }
    });
    const theo = baseReal + recSince - outSince;
    stockData[p.id] = {
      product: p,
      last_real: baseReal,
      last_real_at: baseDate,
      receipts_since: recSince,
      outputs_since: outSince,
      theoretical: Math.max(0, theo),
      seuil: p.seuil_stock != null ? parseQty(p.seuil_stock) : null
    };
  });
}

function renderStock() {
  const mc = document.getElementById('main-content');
  let html = '<div class="info-banner"><strong>Stock Local</strong><br>Theorique = auto (dernier reel + receptions - sorties). Reel = inventaire physique (saisis pour remettre la base a zero). Seuil en BackOffice > Produits.</div>';

  html += '<div class="stock-actions-bar">'
    + '<button class="btn-gold" onclick="openStockReceiptModal()">&#43; Reception fournisseur</button>'
    + '</div>';

  const entries = Object.keys(stockData).map(function(pid) { return stockData[pid]; });
  if (!entries.length) {
    html += '<div class="empty-state">Aucun produit suivi en stock.<br>Seules les viennoiseries et brioches sont suivies.</div>';
    mc.innerHTML = html;
    return;
  }

  // Grouper par categorie
  const byCat = { 'viennoiserie': [], 'brioches_special': [] };
  entries.forEach(function(e) { byCat[e.product.category].push(e); });

  html += '<div class="section reappro-section">';
  html += '<div class="col-header stock-col-header">'
    + '<span class="col-lbl">Produit</span>'
    + '<span class="col-lbl">Theo.</span>'
    + '<span class="col-lbl cmd">Reel</span>'
    + '<span class="col-lbl">Ecart</span>'
    + '<span class="col-lbl">Seuil</span>'
    + '</div>';

  ['viennoiserie', 'brioches_special'].forEach(function(cat) {
    if (!byCat[cat] || !byCat[cat].length) return;
    html += '<div class="prod-cat-title">' + (CAT_LABELS[cat] || cat) + '</div>';
    byCat[cat].sort(function(a, b) { return a.product.name.localeCompare(b.product.name); });
    byCat[cat].forEach(function(e) {
      const theo = e.theoretical;
      const real = e.last_real;
      const ecart = real - theo;
      const seuil = e.seuil;
      // Alerte
      let alertCls = '';
      if (seuil != null && seuil > 0) {
        const ratio = real / seuil;
        if (ratio < 0.3) alertCls = 'stock-red';
        else if (ratio < 0.5) alertCls = 'stock-orange';
        else alertCls = 'stock-green';
      }
      let ecartCls = '';
      if (Math.abs(ecart) > Math.max(theo * 0.1, 1)) ecartCls = 'stock-red';
      html += '<div class="produit-row stock-row ' + alertCls + '">';
      html += '<div><div class="produit-name">' + escapeHtml(e.product.name) + '</div></div>';
      html += '<div class="stock-cell">' + theo + '</div>';
      html += '<div class="stock-cell"><input type="text" inputmode="decimal" class="qty-input stock-real-inp" data-pid="' + e.product.id + '" placeholder="' + real + '" onchange="saveStockReal(this)"></div>';
      html += '<div class="stock-cell ' + ecartCls + '">' + (ecart > 0 ? '+' : '') + ecart + '</div>';
      html += '<div class="stock-cell">' + (seuil != null ? seuil : '<span style="color:#bbb">-</span>') + '</div>';
      html += '</div>';
    });
  });

  html += '</div>';
  mc.innerHTML = html;

  if (stockReceiptModalOpen) renderStockReceiptModal();
}

async function saveStockReal(el) {
  const pid = el.dataset.pid;
  const val = el.value.trim();
  if (!val) return;
  const qty = parseQty(val);
  if (!confirm('Confirmer inventaire physique : ' + qty + ' ? Cela remet la base du stock a zero pour ce produit.')) { el.value = ''; return; }
  setSyncStatus('syncing');
  const { error } = await supa.from('stock_inventory').insert({
    tenant_id: TENANT_ID, product_id: pid, qty_real: qty,
    inventoried_at: new Date().toISOString(), updated_by: DEVICE_ID
  });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  await loadStockData();
  renderStock();
  showToast('Inventaire enregistre', 'sync');
}

function openStockReceiptModal() {
  stockReceiptDraft = { product_id: '', qty: '', supplier: '', note: '' };
  stockReceiptModalOpen = true;
  renderStock();
}

function closeStockReceiptModal() {
  stockReceiptModalOpen = false;
  renderStock();
}

function handleStockReceiptField(field, val) {
  stockReceiptDraft[field] = val;
}

async function saveStockReceipt() {
  const d = stockReceiptDraft;
  if (!d.product_id) { showToast('Choisis un produit', 'error'); return; }
  const qty = parseQty(d.qty);
  if (!qty || qty <= 0) { showToast('Quantite invalide', 'error'); return; }
  setSyncStatus('syncing');
  const { error } = await supa.from('stock_receipts').insert({
    tenant_id: TENANT_ID, product_id: d.product_id, qty: qty,
    received_at: new Date().toISOString(), supplier: d.supplier || null,
    note: d.note || null, updated_by: DEVICE_ID
  });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
  stockReceiptModalOpen = false;
  await loadStockData();
  renderStock();
  showToast('+' + qty + ' en stock', 'sync');
}

function renderStockReceiptModal() {
  // Ajoute modal dans le body (une fois)
  let modal = document.getElementById('stock-receipt-modal');

  let html = '<div class="modal-content stock-modal">';
  html += '<div class="modal-header"><strong>Reception fournisseur</strong><button onclick="closeStockReceiptModal()" class="modal-close">&times;</button></div>';
  html += '<div class="modal-body">';

  html += '<select class="sp-input" onchange="handleStockReceiptField(\'product_id\', this.value)">';
  html += '<option value="">-- choisir --</option>';

  });

  html += '<input type="text" inputmode="decimal" class="sp-input" placeholder="ex: 3" value="' + escapeHtml(stockReceiptDraft.qty) + '" oninput="handleStockReceiptField(\'qty\', this.value)">';
  html += '<label class="sp-lbl" style="margin-top:10px">Fournisseur</label>';
  html += '<input type="text" class="sp-input" placeholder="optionnel" value="' + escapeHtml(stockReceiptDraft.supplier) + '" oninput="handleStockReceiptField(\'supplier\', this.value)">';

  html += '</div></div>';

  modal.innerHTML = html;
  document.body.appendChild(modal);

// === PREVIS (v20) ===

async function loadPrevis(boutique, date) {
  const { data, error } = await supa.from('previs').select('*')
    .eq('tenant_id', TENANT_ID).eq('boutique_id', boutique).eq('service_date', date);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  previsData = {};
  (data || []).forEach(function(r) {
    previsData[r.product_id] = r.qty == null ? '' : String(r.qty).replace('.', ',');
  });
}

async function loadPrevisRaw(boutique, date) {
  const { data, error } = await supa.from('previs').select('*')
    .eq('tenant_id', TENANT_ID).eq('boutique_id', boutique).eq('service_date', date);
  if (error) return {};
  const out = {};
  (data || []).forEach(function(r) {
    out[r.product_id] = r.qty == null ? 0 : parseQty(r.qty);
  });
  return out;
}

async function upsertPrevis(pid, boutique, date, raw) {
  setSyncStatus('syncing');
  const qty = raw === '' || raw == null ? null : parseQty(raw);
  const { error } = await supa.from('previs').upsert({
    tenant_id: TENANT_ID, boutique_id: boutique, product_id: pid,
    service_date: date, qty: qty,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  }, { onConflict: 'tenant_id,boutique_id,product_id,service_date' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); return; }
  setSyncStatus('ok');
}

function subscribeRealtimePrevis() {
  if (realtimeChannelPrevis) supa.removeChannel(realtimeChannelPrevis);
  realtimeChannelPrevis = supa.channel('previs_rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'previs' }, async function(payload) {
      const r = payload.new;
      if (!r || r.updated_by === DEVICE_ID) return;
      if (r.service_date !== currentPrevisDate) return;
      if (r.boutique_id === currentBoutique) {
        previsData[r.product_id] = r.qty == null ? '' : String(r.qty).replace('.', ',');
        if (currentVue === 'previs') renderPrevis();
      }
      if (currentVue === 'traiteur' && (currentBoutique === 'veigne' || currentBoutique === 'tours')) {
        // Pour le traiteur consolide, recharger les previs utiles
        if (currentBoutique === 'veigne' && (r.boutique_id === 'veigne' || r.boutique_id === 'saint-avertin')) {
          await reloadTraiteurData();
          renderTraiteur();
        } else if (currentBoutique === 'tours' && r.boutique_id === 'tours') {
          await reloadTraiteurData();
          renderTraiteur();
        }
      }
      if (currentVue === 'previs_traiteur' && currentBoutique === 'saint-avertin' && r.boutique_id === 'saint-avertin') {
        previsTraiteurDataSA[r.product_id] = r.qty == null ? '' : String(r.qty).replace('.', ',');
        renderPrevisTraiteurSA();
      }
    }).subscribe();
}

async function reloadTraiteurData() {
  if (currentBoutique === 'veigne') {
    const [vData, saData] = await Promise.all([
      loadPrevisRaw('veigne', currentPrevisDate),
      loadPrevisRaw('saint-avertin', currentPrevisDate)
    ]);
    previsTraiteurDataV = {};
    previsTraiteurDataSA = {};
    Object.keys(vData).forEach(function(pid) { previsTraiteurDataV[pid] = String(vData[pid]).replace('.', ','); });
    Object.keys(saData).forEach(function(pid) { previsTraiteurDataSA[pid] = String(saData[pid]).replace('.', ','); });
  } else if (currentBoutique === 'tours') {
    const tData = await loadPrevisRaw('tours', currentPrevisDate);
    previsTraiteurDataV = {};
    Object.keys(tData).forEach(function(pid) { previsTraiteurDataV[pid] = String(tData[pid]).replace('.', ','); });
  }
}

async function changePrevisDate(delta) {
  const d = new Date(currentPrevisDate + 'T12:00');
  d.setDate(d.getDate() + delta);
  currentPrevisDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  await loadPrevis(currentBoutique, currentPrevisDate);
  renderPrevis();
}

async function changeTraiteurDate(delta) {
  const d = new Date(currentPrevisDate + 'T12:00');
  d.setDate(d.getDate() + delta);
  currentPrevisDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  await reloadTraiteurData();
  renderTraiteur();
}

async function changePrevisTraiteurSADate(delta) {
  const d = new Date(currentPrevisDate + 'T12:00');
  d.setDate(d.getDate() + delta);
  currentPrevisDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  await loadPrevis('saint-avertin', currentPrevisDate);
  previsTraiteurDataSA = {};
  Object.keys(previsData).forEach(function(pid) { previsTraiteurDataSA[pid] = previsData[pid]; });

}

function handlePrevisInput(el) {
  const pid = el.dataset.pid, val = el.value;
  previsData[pid] = val;
  el.classList.toggle('has-value', !!val);
  clearTimeout(updateTimers['pv_' + pid]);
  updateTimers['pv_' + pid] = setTimeout(function() { upsertPrevis(pid, currentBoutique, currentPrevisDate, val); }, 500);
}

function handleTraiteurPrevisInput(el) {
  const pid = el.dataset.pid, val = el.value, boutique = el.dataset.boutique;
  if (boutique === 'veigne' || boutique === 'tours') previsTraiteurDataV[pid] = val;
  if (boutique === 'saint-avertin') previsTraiteurDataSA[pid] = val;
  el.classList.toggle('has-value', !!val);
  clearTimeout(updateTimers['tp_' + boutique + '_' + pid]);
  updateTimers['tp_' + boutique + '_' + pid] = setTimeout(function() {
    upsertPrevis(pid, boutique, currentPrevisDate, val);
  }, 500);
}

function handlePrevisTraiteurSAInput(el) {
  const pid = el.dataset.pid, val = el.value;
  previsTraiteurDataSA[pid] = val;
  previsData[pid] = val;
  el.classList.toggle('has-value', !!val);
  clearTimeout(updateTimers['pts_' + pid]);
  updateTimers['pts_' + pid] = setTimeout(function() {
    upsertPrevis(pid, 'saint-avertin', currentPrevisDate, val);
  }, 500);
}

// Fetch reste_j1 de la veille pour un ensemble de produits
async function loadRestesJ1(boutique, serviceDate) {
  const d = new Date(serviceDate + 'T12:00');
  d.setDate(d.getDate() - 1);
  const yISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const { data, error } = await supa.from('sales').select('product_id, reste_j1')
    .eq('tenant_id', TENANT_ID).eq('boutique_id', boutique).eq('date', yISO);
  if (error) return {};
  const out = {};
  (data || []).forEach(function(r) {
    if (r.reste_j1 != null && r.reste_j1 !== '') {
      out[r.product_id] = parseQty(r.reste_j1);
    }
  });
  return out;
}

async function renderTraiteur() {
  const mc = document.getElementById('main-content');
  const isToday = (currentPrevisDate === serviceDateISO());
  const isVeigne = (currentBoutique === 'veigne');
  const isTours = (currentBoutique === 'tours');

  let prods, j1V, j1SA;
  if (isVeigne) {
    prods = getProductsForTraiteurPrevis('veigne').concat(
      getProductsForTraiteurPrevis('saint-avertin').filter(function(p) {
        // pas de doublon
        return getProductSupply(p, 'veigne') !== 'on_site';
      })
    );
    // Dedupe
    const seen = {};
    prods = prods.filter(function(p) { if (seen[p.id]) return false; seen[p.id] = true; return true; });
    [j1V, j1SA] = await Promise.all([
      loadRestesJ1('veigne', currentPrevisDate),
      loadRestesJ1('saint-avertin', currentPrevisDate)
    ]);
  } else if (isTours) {
    prods = getProductsForTraiteurPrevis('tours');
    j1V = await loadRestesJ1('tours', currentPrevisDate);
    j1SA = {};
  } else {
    mc.innerHTML = '<div class="empty-state">Vue traiteur non disponible pour cette boutique.</div>';
    return;
  }

  prods.sort(function(a, b) { return a.name.localeCompare(b.name); });

  let html = '<div class="date-bar">'
    + '<button class="date-nav" onclick="changeTraiteurDate(-1)">&#8592;</button>'
    + '<div class="date-title">Traiteur du <strong>' + escapeHtml(formatDateFr(currentPrevisDate)) + '</strong>'
    + (isToday ? ' <span class="date-today">(auj.)</span>' : '')
    + '<div class="date-sub">' + (isVeigne ? 'Consolide Veigne + St-Avertin' : 'Tours uniquement') + '</div>'
    + '</div>'
    + '<button class="date-nav" onclick="changeTraiteurDate(1)">&#8594;</button>'
    + '</div>';

  if (!prods.length) {
    html += '<div class="empty-state">Aucun produit traiteur configure.<br>Verifie en BackOffice > Categories que "traiteur" a Previs = ON, et que les produits traiteur ont supply = Sur place pour la boutique productrice.</div>';
    mc.innerHTML = html;
    return;
  }

  if (isVeigne) {
    html += '<div class="info-banner"><strong>Vue Traiteur consolidee</strong><br>Saisis ton previs Veigne et celui que St-Avertin a communique. Le total a produire = (Previs - J1).</div>';

    html += '<div class="section reappro-section">';
    html += '<div class="section-header section-header-reappro"><span>Traiteur du ' + escapeHtml(formatDateFr(currentPrevisDate)) + '</span></div>';
    html += '<div class="traiteur-grid-header">';
    html += '<span class="col-lbl">Produit</span>';
    html += '<span class="col-lbl">V prev.</span><span class="col-lbl">V J1</span>';
    html += '<span class="col-lbl">SA prev.</span><span class="col-lbl">SA J1</span>';
    html += '<span class="col-lbl cmd">Total</span>';
    html += '</div>';

    let grandTotal = 0;
    prods.forEach(function(p) {
      const pv = previsTraiteurDataV[p.id] == null ? '' : previsTraiteurDataV[p.id];
      const psa = previsTraiteurDataSA[p.id] == null ? '' : previsTraiteurDataSA[p.id];
      const pvN = parseQty(pv);
      const psaN = parseQty(psa);
      const j1vN = j1V[p.id] || 0;
      const j1saN = j1SA[p.id] || 0;
      const total = Math.max(0, pvN - j1vN) + Math.max(0, psaN - j1saN);
      grandTotal += total;
      html += '<div class="traiteur-row">';
      html += '<div class="produit-name">' + escapeHtml(p.name) + '</div>';
      html += '<input type="text" inputmode="decimal" class="qty-input ' + (pv ? 'has-value' : '') + '" data-pid="' + p.id + '" data-boutique="veigne" value="' + escapeHtml(String(pv)) + '" placeholder="-" oninput="handleTraiteurPrevisInput(this)" onfocus="this.select()">';
      html += '<div class="traiteur-j1">' + (j1vN > 0 ? j1vN : '-') + '</div>';
      html += '<input type="text" inputmode="decimal" class="qty-input ' + (psa ? 'has-value' : '') + '" data-pid="' + p.id + '" data-boutique="saint-avertin" value="' + escapeHtml(String(psa)) + '" placeholder="-" oninput="handleTraiteurPrevisInput(this)" onfocus="this.select()">';
      html += '<div class="traiteur-j1">' + (j1saN > 0 ? j1saN : '-') + '</div>';
      html += '<div class="traiteur-total">' + (total > 0 ? '<strong>' + total + '</strong>' : '<span style="color:#bbb">-</span>') + '</div>';
      html += '</div>';
    });
    html += '<div class="traiteur-grand-total"><span>Volume total a produire</span><strong>' + grandTotal + '</strong></div>';
    html += '</div>';
  } else {
    html += '<div class="section reappro-section">';
    html += '<div class="section-header section-header-reappro"><span>Traiteur Tours du ' + escapeHtml(formatDateFr(currentPrevisDate)) + '</span></div>';
    html += '<div class="col-header"><span class="col-lbl">Produit</span><span class="col-lbl">J1</span><span class="col-lbl cmd">A produire</span></div>';
    let grandTotal = 0;
    prods.forEach(function(p) {
      const pv = previsTraiteurDataV[p.id] == null ? '' : previsTraiteurDataV[p.id];
      const pvN = parseQty(pv);
      const j1vN = j1V[p.id] || 0;
      const total = Math.max(0, pvN - j1vN);
      grandTotal += total;
      html += '<div class="produit-row">';
      html += '<div><div class="produit-name">' + escapeHtml(p.name) + '</div></div>';
      html += '<div class="previs-j1">' + (j1vN > 0 ? j1vN : '<span style="color:#bbb">-</span>') + '</div>';
      html += '<input type="text" inputmode="decimal" class="qty-input cmd ' + (pv ? 'has-value' : '') + '" data-pid="' + p.id + '" data-boutique="tours" value="' + escapeHtml(String(pv)) + '" placeholder="-" oninput="handleTraiteurPrevisInput(this)" onfocus="this.select()">';
