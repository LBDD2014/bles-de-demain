<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Les Bles de Demain</title>
<style>
:root {
  --gold: #CEAB52;
  --gold-light: #E8D5A3;
  --gold-dark: #8B6914;
  --grey: #474950;
  --grey-dark: #2E3044;
  --grey-light: #5A5C66;
  --cream: #FAF6EE;
  --brown: #3D2B1F;
  --brown-mid: #6B4226;
  --green: #4A7C59;
  --red: #B83232;
  --orange: #D4701A;
  --blue: #2C5F8A;
  --white: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; }

#splash {
  position: fixed; inset: 0; background: var(--grey);
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px;
}
.splash-logo { width: 160px; height: 160px; margin-bottom: 22px; display: flex; align-items: center; justify-content: center; }
.splash-logo img { width: 100%; height: 100%; object-fit: contain; }
.splash-sub { color: var(--gold); font-size: 13px; opacity: 0.75; margin-top: 4px; }
.splash-cloud {
  background: rgba(74,124,89,0.22); color: #7DD6A0;
  padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
  margin-top: 8px; margin-bottom: 32px; border: 1px solid rgba(125,214,160,0.35);
}
.splash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 380px; }
.splash-btn {
  background: rgba(255,255,255,0.05); border: 2px solid rgba(206,171,82,0.25);
  border-radius: 18px; padding: 24px 16px; cursor: pointer; text-align: center;
  color: inherit; font-family: inherit; transition: transform 0.15s;
}
.splash-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.12); }
.splash-btn[disabled] { opacity: 0.4; }
.splash-name { color: var(--white); font-size: 17px; font-weight: 700; margin-bottom: 6px; font-family: Georgia, serif; }
.splash-role { color: var(--gold); font-size: 11px; opacity: 0.75; line-height: 1.4; }

#app { display: none; flex-direction: column; min-height: 100vh; }
.header {
  background: var(--grey); padding: 8px 14px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.18);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-icon { width: 56px; height: 40px; display: flex; align-items: center; justify-content: center; }
.header-icon img { width: 100%; height: 100%; object-fit: contain; }
.header-title { font-family: Georgia, serif; color: var(--white); font-size: 14px; font-weight: 700; }
.header-boutique { color: var(--gold); font-size: 11px; opacity: 0.85; }
.change-btn {
  background: rgba(206,171,82,0.18); border: 1px solid rgba(206,171,82,0.3); border-radius: 8px;
  padding: 8px 14px; color: var(--white); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}

.sync-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--grey-dark); color: var(--white); font-size: 11px;
}
.sync-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.sync-dot.ok { background: #4ADE80; box-shadow: 0 0 8px rgba(74,222,128,0.6); }
.sync-dot.syncing { background: #FBBF24; animation: pulse 1s infinite; }
.sync-dot.error { background: #F87171; }
@keyframes pulse { 50% { opacity: 0.3; } }
.device-id { opacity: 0.5; font-family: ui-monospace, monospace; font-size: 10px; }

.main { flex: 1; padding: 10px 12px 80px; max-width: 700px; margin: 0 auto; width: 100%; }

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--grey); display: flex; justify-content: space-around;
  border-top: 1px solid rgba(206,171,82,0.2); z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bnav-item {
  flex: 1; padding: 10px 4px 8px; cursor: pointer; border: none; background: transparent;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-family: inherit;
}
.bnav-item .lbl { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.45); }
.bnav-item.active .lbl { color: var(--gold); }
.bnav-item.active { border-top: 2px solid var(--gold); padding-top: 8px; }

.info-banner {
  background: white; border-radius: 12px; padding: 10px 14px; margin-bottom: 10px;
  border-left: 4px solid var(--blue); font-size: 12px; color: var(--brown-mid); line-height: 1.5;
  box-shadow: 0 2px 8px rgba(61,43,31,0.05);
}
.info-banner strong { color: var(--brown); }

.section {
  background: white; border-radius: 14px; box-shadow: 0 2px 16px rgba(61,43,31,0.08);
  margin-bottom: 10px; overflow: hidden;
}
.section-header {
  padding: 11px 14px; border-bottom: 1px solid #F0EAE0;
  font-family: Georgia, serif; font-size: 14px; font-weight: 700; color: var(--brown);
}

/* === REAPPRO === */
.col-header {
  display: grid; grid-template-columns: 1fr 80px 90px; padding: 6px 14px;
  background: #F5F0E5; gap: 6px;
}
.col-lbl { font-size: 10px; font-weight: 700; color: var(--brown-mid); text-align: center; text-transform: uppercase; letter-spacing: 0.3px; }
.col-lbl:first-child { text-align: left; }
.col-lbl.cmd { color: var(--gold-dark); }
.produit-row {
  display: grid; grid-template-columns: 1fr 80px 90px; align-items: center;
  padding: 8px 14px; border-bottom: 1px solid #F5F0E8; gap: 6px;
}
.produit-row:last-child { border-bottom: none; }
.produit-name { font-size: 13px; font-weight: 500; color: var(--brown); line-height: 1.3; }
.produit-unit { font-size: 10px; color: var(--gold-dark); }
.qty-input {
  width: 100%; padding: 10px 6px; border: 2px solid #E0D8C8; border-radius: 8px;
  font-size: 16px; font-weight: 700; text-align: center; color: var(--brown);
  background: #FAF8F4; font-family: inherit; -moz-appearance: textfield;
}
.qty-input::-webkit-outer-spin-button,
.qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.qty-input.cmd { border-color: rgba(206,171,82,0.3); background: #FEFBF4; }
.qty-input:focus { outline: none; border-color: var(--gold); background: white; }
.qty-input.has-value { background: #FFFCF2; border-color: var(--gold); color: var(--gold-dark); }
.qty-input.has-value.cmd { background: #FBF0D5; }
.qty-input.just-updated { animation: flash 1s; }
@keyframes flash {
  0%, 100% { background: #FFFCF2; }
  30% { background: #D6E8F5; border-color: var(--blue); }
}

/* === VENTES === */
.ventes-col-header {
  display: grid; grid-template-columns: 1fr 48px 48px 48px 48px 56px 44px;
  padding: 6px 10px; background: #F5F0E5; gap: 3px;
}
.ventes-row {
  display: grid; grid-template-columns: 1fr 48px 48px 48px 48px 56px 44px;
  align-items: center; padding: 8px 10px; border-bottom: 1px solid #F5F0E8; gap: 3px;
}
.ventes-row:last-child { border-bottom: none; }
.v-inp {
  width: 100%; padding: 9px 2px; border: 2px solid #E0D8C8; border-radius: 7px;
  font-size: 14px; font-weight: 700; text-align: center; color: var(--brown);
  background: #FAF8F4; font-family: inherit; -moz-appearance: textfield;
}
.v-inp::-webkit-outer-spin-button,
.v-inp::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.v-inp:focus { outline: none; border-color: var(--gold); background: white; }
.v-inp.matin.has { background: #EEF7F2; border-color: var(--green); color: var(--green); }
.v-inp.aprem.has { background: #FEF3EC; border-color: var(--orange); color: var(--orange); }
.v-inp.reste.has { background: #FEF2F2; border-color: var(--red); color: var(--red); }
.v-inp.just-updated { animation: flash 1s; }
.v-vendu {
  text-align: center; font-family: Georgia, serif; font-size: 15px; font-weight: 900;
  color: var(--blue); padding: 8px 0;
}
.v-vendu.zero { color: #C0B090; font-size: 13px; }
.v-perte {
  text-align: center; font-size: 11px; font-weight: 700;
  padding: 4px 0; border-radius: 5px;
}
.v-perte.zero { color: #C0B090; }
.v-perte.ok { color: var(--green); background: #EEF7F2; }
.v-perte.warn { color: var(--orange); background: #FEF3EC; }
.v-perte.bad { color: var(--red); background: #FEF2F2; }
.v-rupture-btn {
  background: transparent; border: 1.5px solid #E0D8C8; border-radius: 7px;
  padding: 6px 0; font-size: 18px; cursor: pointer; font-family: inherit;
  color: #B8A890; line-height: 1; transition: all 0.15s;
}
.v-rupture-btn.has {
  background: #FEF3EC; border-color: var(--orange); color: var(--orange);
  font-size: 11px; font-weight: 800;
}
.v-rupture-btn:active { transform: scale(0.94); }

.ventes-day-bar {
  background: var(--green); color: white; border-radius: 12px;
  padding: 10px 14px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.ventes-day-title { font-family: Georgia, serif; font-size: 14px; font-weight: 700; }
.ventes-day-btn {
  background: rgba(255,255,255,0.15); border: none; border-radius: 7px;
  padding: 4px 10px; color: white; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}

/* === MODAL RUPTURE === */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white; border-radius: 16px; padding: 22px; max-width: 360px; width: 100%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.modal-title {
  font-family: Georgia, serif; font-size: 16px; font-weight: 700; color: var(--brown);
  margin-bottom: 4px;
}
.modal-sub { font-size: 12px; color: var(--brown-mid); margin-bottom: 16px; }
.modal-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px;
}
.modal-btn {
  background: #F5F0E5; border: 1.5px solid #E0D8C8; border-radius: 10px;
  padding: 12px 0; font-size: 14px; font-weight: 700; color: var(--brown);
  cursor: pointer; font-family: inherit;
}
.modal-btn:active { transform: scale(0.96); background: #E8D5A3; }
.modal-btn.selected { background: var(--orange); color: white; border-color: var(--orange); }
.modal-actions { display: flex; gap: 8px; }
.modal-action {
  flex: 1; padding: 11px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.modal-action.cancel { background: #F0EAE0; color: var(--brown); }
.modal-action.clear  { background: #FEF2F2; color: var(--red); border: 1px solid var(--red); }

.loading { text-align: center; padding: 40px 20px; color: var(--brown-mid); font-size: 13px; }
.error-box {
  background: #FEF2F2; border: 2px solid var(--red); border-radius: 12px;
  padding: 16px; margin: 20px 12px; color: var(--red); font-size: 13px;
}
.error-box h3 { margin-bottom: 8px; font-family: Georgia, serif; }
.error-box pre {
  margin-top: 10px; padding: 10px; background: white; border-radius: 6px;
  font-size: 11px; overflow-x: auto; color: var(--brown); white-space: pre-wrap; word-break: break-word;
}
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--grey); color: var(--white); padding: 12px 20px;
  border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 300;
  opacity: 0; transition: all 0.3s; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  max-width: 90vw; text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.sync { background: var(--blue); }
.toast.error { background: var(--red); }
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--brown-mid);
  background: white; border-radius: 12px; margin-top: 10px;
}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">
    <img src="logo-splash.png.png" alt="Les Bles de Demain" onerror="this.style.display='none'">
  </div>
  <div class="splash-sub">Cloud - Phase 2</div>
  <div class="splash-cloud">Synchronisation Supabase</div>
  <div class="splash-grid">
    <button class="splash-btn" onclick="enterBoutique('veigne')">
      <div class="splash-name">Veigne</div>
      <div class="splash-role">Reappro - Ventes</div>
    </button>
    <button class="splash-btn" onclick="enterBoutique('tours')">
      <div class="splash-name">Tours</div>
      <div class="splash-role">Reappro</div>
    </button>
    <button class="splash-btn" onclick="enterBoutique('saint-avertin')">
      <div class="splash-name">St-Avertin</div>
      <div class="splash-role">Reappro</div>
    </button>
    <button class="splash-btn" disabled>
      <div class="splash-name">Le Local</div>
      <div class="splash-role">A venir</div>
    </button>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <img src="logo-splash.png.png" alt="LBDD" onerror="this.parentElement.style.display='none'">
      </div>
      <div>
        <div class="header-title">Les Bles de Demain</div>
        <div class="header-boutique" id="header-boutique"></div>
      </div>
    </div>
    <button class="change-btn" onclick="goSplash()">Changer</button>
  </div>
  <div class="sync-bar">
    <span><span class="sync-dot ok" id="sync-dot"></span><span id="sync-text">Connecte</span></span>
    <span class="device-id" id="device-id-label"></span>
  </div>
  <div class="main" id="main-content">
    <div class="loading">Chargement...</div>
  </div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<!-- Modal heure de rupture -->
<div class="modal-overlay" id="rupture-modal">
  <div class="modal">
    <div class="modal-title">Heure de rupture</div>
    <div class="modal-sub" id="rupture-modal-product"></div>
    <div class="modal-grid" id="rupture-modal-grid"></div>
    <div class="modal-actions">
      <button class="modal-action cancel" onclick="closeRuptureModal()">Annuler</button>
      <button class="modal-action clear" onclick="clearRupture()">Effacer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://utavpdhphdztvrmzyeeo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yZEruV2rXCf3J8Al_nkavQ_610QCELB';
const TENANT_ID    = '00000000-0000-0000-0000-000000000001';
const DEVICE_ID    = 'dev_' + Math.random().toString(36).substring(2, 8);

const REAPPRO_CATS = {
  'veigne':        ['viennoiserie', 'brioches_special', 'bases_patisserie', 'ingredients'],
  'tours':         ['viennoiserie', 'brioches_special', 'patisserie_petits', 'patisserie_gros', 'sec_traiteur', 'ingredients'],
  'saint-avertin': ['patisserie_petits', 'brioches_special']
};

const VENTES_BOUTIQUES = ['veigne'];
const HEURES_RUPTURE = ['9h','10h','11h','12h','13h','14h','15h','16h','17h','18h','19h','20h'];

const CAT_LABELS = {
  'pains':             'Pains',
  'viennoiserie':      'Viennoiserie',
  'brioches_special':  'Brioches',
  'patisserie_petits': 'Petits Gateaux',
  'patisserie_gros':   'Gros Gateaux',
  'sec_traiteur':      'Sec & Traiteur',
  'bases_patisserie':  'Bases Patisserie',
  'ingredients':       'Ingredients',
  'traiteur':          'Traiteur',
  'gateaux_secs':      'Gateaux Secs'
};

const BOUTIQUE_NAMES = {
  'veigne': 'Veigne', 'tours': 'Tours', 'saint-avertin': 'St-Avertin', 'local': 'Le Local'
};

const NAV_ITEMS = {
  'veigne': [
    { id: 'reappro', lbl: 'Reappro' },
    { id: 'ventes',  lbl: 'Ventes' }
  ],
  'tours':         [{ id: 'reappro', lbl: 'Reappro' }],
  'saint-avertin': [{ id: 'reappro', lbl: 'Reappro' }]
};

let supa, currentBoutique = null, currentVue = 'reappro';
let products = [], reapprosData = {}, salesData = {};
let realtimeChannelReappro = null, realtimeChannelSales = null;
let updateTimers = {}, currentDate = todayISO();
let rupturePid = null;

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDateFr(iso) {
  const d = new Date(iso + 'T12:00');
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

try {
  supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  document.getElementById('device-id-label').textContent = DEVICE_ID;
  loadProducts();
} catch (err) { showInitError(err); }

async function loadProducts() {
  try {
    const { data, error } = await supa
      .from('products').select('*')
      .eq('tenant_id', TENANT_ID).eq('actif', true)
      .order('category', { ascending: true }).order('name', { ascending: true });
    if (error) throw error;
    products = data || [];
    // Pour le module Ventes : filtre sur usage='ventes' ou 'both'
    // Pour le module Reappro : filtre sur usage='reappro' ou 'both'
  } catch (err) { showInitError(err); }
}

function getProductsForReappro() {
  return products.filter(function(p) {
    const u = p.usage || 'reappro';
    return u === 'reappro' || u === 'both';
  });
}

function getProductsForVentes() {
  return products.filter(function(p) {
    const u = p.usage || 'reappro';
    return u === 'ventes' || u === 'both';
  });
}

function showInitError(err) {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('main-content').innerHTML =
    '<div class="error-box"><h3>Erreur Supabase</h3><pre>' + escapeHtml(err && err.message ? err.message : String(err)) + '</pre></div>';
}

async function enterBoutique(b) {
  currentBoutique = b;
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('header-boutique').textContent = BOUTIQUE_NAMES[b] || b;
  renderNav();
  setVue(NAV_ITEMS[b][0].id);
}

function goSplash() {
  if (realtimeChannelReappro) { supa.removeChannel(realtimeChannelReappro); realtimeChannelReappro = null; }
  if (realtimeChannelSales)   { supa.removeChannel(realtimeChannelSales);   realtimeChannelSales = null; }
  currentBoutique = null; reapprosData = {}; salesData = {};
  document.getElementById('splash').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function renderNav() {
  const items = NAV_ITEMS[currentBoutique] || [];
  document.getElementById('bottom-nav').innerHTML = items.map(function(it) {
    return '<button class="bnav-item ' + (it.id === currentVue ? 'active' : '') + '" onclick="setVue(\'' + it.id + '\')"><span class="lbl">' + it.lbl + '</span></button>';
  }).join('');
}

async function setVue(v) {
  currentVue = v;
  renderNav();
  document.getElementById('main-content').innerHTML = '<div class="loading">Chargement...</div>';
  if (v === 'reappro') {
    await loadReappros(currentBoutique);
    subscribeRealtimeReappro(currentBoutique);
    renderReappro();
  } else if (v === 'ventes') {
    await loadSales(currentBoutique, currentDate);
    subscribeRealtimeSales(currentBoutique);
    renderVentes();
  }
}

// === REAPPRO ===
async function loadReappros(b) {
  const { data, error } = await supa.from('reappros').select('*')
    .eq('tenant_id', TENANT_ID).eq('boutique_id', b);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  reapprosData = {};
  (data || []).forEach(function(r) {
    reapprosData[r.product_id] = { avoir: r.avoir || '', commander: r.commander || '' };
  });
}

async function upsertReappro(pid) {
  setSyncStatus('syncing');
  const d = reapprosData[pid] || {};
  const { error } = await supa.from('reappros').upsert({
    tenant_id: TENANT_ID, boutique_id: currentBoutique, product_id: pid,
    avoir: d.avoir || null, commander: d.commander || null,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  }, { onConflict: 'tenant_id,boutique_id,product_id' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
  else { setSyncStatus('ok'); }
}

function subscribeRealtimeReappro(b) {
  if (realtimeChannelReappro) supa.removeChannel(realtimeChannelReappro);
  realtimeChannelReappro = supa.channel('reappros_' + b)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'reappros', filter: 'boutique_id=eq.' + b },
      function(payload) {
        const r = payload.new;
        if (!r || r.updated_by === DEVICE_ID) return;
        reapprosData[r.product_id] = { avoir: r.avoir || '', commander: r.commander || '' };
        updateReapproInput(r.product_id, 'avoir', r.avoir);
        updateReapproInput(r.product_id, 'commander', r.commander);
        showToast('MAJ d un autre appareil', 'sync');
      }).subscribe();
}

function updateReapproInput(pid, field, val) {
  const input = document.querySelector('[data-pid="' + pid + '"][data-field="' + field + '"]');
  if (!input || document.activeElement === input) return;
  input.value = val || '';
  input.classList.toggle('has-value', !!val);
  input.classList.remove('just-updated');
  void input.offsetWidth;
  input.classList.add('just-updated');
}

function renderReappro() {
  const cats = REAPPRO_CATS[currentBoutique] || [];
  const mc = document.getElementById('main-content');
  if (!cats.length) { mc.innerHTML = '<div class="empty-state">Aucune categorie de reassort.</div>'; return; }
  let html = '<div class="info-banner"><strong>Mode cloud actif</strong><br>Saisis tes valeurs - synchro temps reel entre tous les appareils.</div>';
  const reappProducts = getProductsForReappro();
  cats.forEach(function(cat) {
    const prods = reappProducts.filter(function(p) { return p.category === cat; });
    if (!prods.length) return;
    html += '<div class="section"><div class="section-header">' + (CAT_LABELS[cat] || cat) + '</div>'
      + '<div class="col-header"><span class="col-lbl">Produit</span><span class="col-lbl">J ai</span><span class="col-lbl cmd">Je commande</span></div>';
    prods.forEach(function(p) {
      const val = reapprosData[p.id] || { avoir: '', commander: '' };
      const a = val.avoir || '', c = val.commander || '';
      html += '<div class="produit-row"><div><div class="produit-name">' + escapeHtml(p.name) + '</div><div class="produit-unit">' + escapeHtml(p.unit || '') + '</div></div>'
        + '<input type="text" inputmode="decimal" class="qty-input ' + (a ? 'has-value' : '') + '" data-pid="' + p.id + '" data-field="avoir" value="' + escapeHtml(a) + '" placeholder="-" oninput="handleReapproInput(this)" onfocus="this.select()">'
        + '<input type="text" inputmode="decimal" class="qty-input cmd ' + (c ? 'has-value' : '') + '" data-pid="' + p.id + '" data-field="commander" value="' + escapeHtml(c) + '" placeholder="-" oninput="handleReapproInput(this)" onfocus="this.select()">'
        + '</div>';
    });
    html += '</div>';
  });
  mc.innerHTML = html;
}

function handleReapproInput(el) {
  const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
  if (!reapprosData[pid]) reapprosData[pid] = { avoir: '', commander: '' };
  reapprosData[pid][field] = val;
  el.classList.toggle('has-value', !!val);
  clearTimeout(updateTimers['r_' + pid]);
  updateTimers['r_' + pid] = setTimeout(function() { upsertReappro(pid); }, 400);
}

// === VENTES ===
async function loadSales(b, date) {
  const { data, error } = await supa.from('sales').select('*')
    .eq('tenant_id', TENANT_ID).eq('boutique_id', b).eq('date', date);
  if (error) { showToast('Erreur: ' + error.message, 'error'); return; }
  salesData = {};
  (data || []).forEach(function(r) {
    salesData[r.product_id] = {
      matin: r.matin == null ? '' : r.matin,
      aprem: r.aprem == null ? '' : r.aprem,
      reste: r.reste == null ? '' : r.reste,
      rupture_heure: r.rupture_heure || ''
    };
  });
}

async function upsertSale(pid) {
  setSyncStatus('syncing');
  const d = salesData[pid] || {};
  const matin = d.matin === '' ? null : parseInt(d.matin) || 0;
  const aprem = d.aprem === '' ? null : parseInt(d.aprem) || 0;
  const reste = d.reste === '' ? null : parseInt(d.reste) || 0;
  const { error } = await supa.from('sales').upsert({
    tenant_id: TENANT_ID, boutique_id: currentBoutique, product_id: pid, date: currentDate,
    matin: matin, aprem: aprem, reste: reste,
    rupture_heure: d.rupture_heure || null,
    updated_by: DEVICE_ID, updated_at: new Date().toISOString()
  }, { onConflict: 'tenant_id,boutique_id,product_id,date' });
  if (error) { setSyncStatus('error'); showToast(error.message, 'error'); }
  else { setSyncStatus('ok'); }
}

function subscribeRealtimeSales(b) {
  if (realtimeChannelSales) supa.removeChannel(realtimeChannelSales);
  realtimeChannelSales = supa.channel('sales_' + b)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sales', filter: 'boutique_id=eq.' + b },
      function(payload) {
        const r = payload.new;
        if (!r || r.updated_by === DEVICE_ID) return;
        if (r.date !== currentDate) return;
        salesData[r.product_id] = {
          matin: r.matin == null ? '' : r.matin,
          aprem: r.aprem == null ? '' : r.aprem,
          reste: r.reste == null ? '' : r.reste,
          rupture_heure: r.rupture_heure || ''
        };
        ['matin','aprem','reste'].forEach(function(f) { updateSaleInput(r.product_id, f, r[f]); });
        updateVendu(r.product_id);
        updateRuptureBtn(r.product_id);
        showToast('MAJ ventes d un autre appareil', 'sync');
      }).subscribe();
}

function updateSaleInput(pid, field, val) {
  const input = document.querySelector('.v-inp[data-pid="' + pid + '"][data-field="' + field + '"]');
  if (!input || document.activeElement === input) return;
  const v = (val == null ? '' : val);
  input.value = v;
  input.classList.toggle('has', v !== '' && v !== 0);
  input.classList.remove('just-updated');
  void input.offsetWidth;
  input.classList.add('just-updated');
}

function calcVendu(pid) {
  const d = salesData[pid] || {};
  const m = d.matin === '' ? null : parseInt(d.matin) || 0;
  const a = d.aprem === '' ? 0 : parseInt(d.aprem) || 0;
  const r = d.reste === '' ? null : parseInt(d.reste) || 0;
  if (m === null || r === null) return null;
  return Math.max(0, m + a - r);
}

function calcPertePct(pid) {
  const d = salesData[pid] || {};
  const m = d.matin === '' ? null : parseInt(d.matin) || 0;
  const a = d.aprem === '' ? 0 : parseInt(d.aprem) || 0;
  const r = d.reste === '' ? null : parseInt(d.reste) || 0;
  if (m === null || r === null) return null;
  const total = m + a;
  if (total === 0) return null;
  return Math.round((r / total) * 100);
}

function updateVendu(pid) {
  const el = document.getElementById('vendu_' + pid);
  if (el) {
    const v = calcVendu(pid);
    if (v === null) { el.textContent = '-'; el.className = 'v-vendu zero'; }
    else { el.textContent = v; el.className = 'v-vendu'; }
  }
  const pe = document.getElementById('perte_' + pid);
  if (pe) {
    const p = calcPertePct(pid);
    if (p === null) { pe.textContent = '-'; pe.className = 'v-perte zero'; }
    else {
      pe.textContent = p + '%';
      pe.className = 'v-perte ' + (p > 20 ? 'bad' : p > 10 ? 'warn' : 'ok');
    }
  }
}

function updateRuptureBtn(pid) {
  const btn = document.getElementById('rupt_' + pid);
  if (!btn) return;
  const d = salesData[pid] || {};
  if (d.rupture_heure) {
    btn.textContent = d.rupture_heure;
    btn.classList.add('has');
  } else {
    btn.innerHTML = '&#9203;';
    btn.classList.remove('has');
  }
}

function renderVentes() {
  const mc = document.getElementById('main-content');
  if (!VENTES_BOUTIQUES.includes(currentBoutique)) {
    mc.innerHTML = '<div class="empty-state">Module Ventes pas encore active.</div>'; return;
  }
  const ventesProducts = getProductsForVentes();
  // Categories presentes dans les produits ventes, dans l'ordre logique
  const ORDER = ['pains', 'viennoiserie', 'brioches_special', 'patisserie_petits', 'patisserie_gros', 'sec_traiteur', 'traiteur', 'gateaux_secs'];
  const presentCats = ORDER.filter(function(c) {
    return ventesProducts.some(function(p) { return p.category === c; });
  });

  let html = '<div class="ventes-day-bar">'
    + '<button class="ventes-day-btn" onclick="changeDate(-1)">&lt;</button>'
    + '<span class="ventes-day-title">' + formatDateFr(currentDate) + '</span>'
    + '<button class="ventes-day-btn" onclick="changeDate(1)">&gt;</button>'
    + '</div>';
  html += '<div class="info-banner"><strong>Saisie ventes</strong><br>Matin / Aprem / Reste -> Vendu et % Perte automatiques. Tape l icone horloge pour saisir une rupture.</div>';

  if (!presentCats.length) {
    html += '<div class="empty-state">Aucun produit Ventes en base pour le moment.<br><br>Charge tes produits Ventes via SQL Editor.</div>';
    mc.innerHTML = html;
    return;
  }

  presentCats.forEach(function(cat) {
    const ps = ventesProducts.filter(function(p) {
      // Respecter restriction boutique si presente
      if (p.boutique_restriction && p.boutique_restriction !== currentBoutique) return false;
      return p.category === cat;
    });
    if (!ps.length) return;
    html += '<div class="section"><div class="section-header">' + (CAT_LABELS[cat] || cat) + '</div>'
      + '<div class="ventes-col-header">'
      + '<span class="col-lbl">Produit</span>'
      + '<span class="col-lbl" style="color:var(--green)">Mat</span>'
      + '<span class="col-lbl" style="color:var(--orange)">Apr</span>'
      + '<span class="col-lbl" style="color:var(--red)">Res</span>'
      + '<span class="col-lbl" style="color:var(--blue)">Vendu</span>'
      + '<span class="col-lbl">Perte</span>'
      + '<span class="col-lbl">Rupt</span>'
      + '</div>';
    ps.forEach(function(p) {
      const d = salesData[p.id] || {};
      const m = d.matin === '' || d.matin === undefined ? '' : d.matin;
      const a = d.aprem === '' || d.aprem === undefined ? '' : d.aprem;
      const r = d.reste === '' || d.reste === undefined ? '' : d.reste;
      const vendu = calcVendu(p.id);
      const perte = calcPertePct(p.id);
      const ruptH = d.rupture_heure || '';
      const perteCls = perte === null ? 'zero' : (perte > 20 ? 'bad' : perte > 10 ? 'warn' : 'ok');
      const perteTxt = perte === null ? '-' : (perte + '%');
      const ruptCls = ruptH ? 'has' : '';
      const ruptTxt = ruptH ? ruptH : '&#9203;';
      html += '<div class="ventes-row">'
        + '<div><div class="produit-name">' + escapeHtml(p.name) + '</div><div class="produit-unit">' + escapeHtml(p.unit || '') + '</div></div>'
        + '<input type="number" inputmode="numeric" min="0" class="v-inp matin ' + (m !== '' ? 'has' : '') + '" data-pid="' + p.id + '" data-field="matin" value="' + m + '" placeholder="-" oninput="handleSaleInput(this)" onfocus="this.select()">'
        + '<input type="number" inputmode="numeric" min="0" class="v-inp aprem ' + (a !== '' ? 'has' : '') + '" data-pid="' + p.id + '" data-field="aprem" value="' + a + '" placeholder="-" oninput="handleSaleInput(this)" onfocus="this.select()">'
        + '<input type="number" inputmode="numeric" min="0" class="v-inp reste ' + (r !== '' ? 'has' : '') + '" data-pid="' + p.id + '" data-field="reste" value="' + r + '" placeholder="-" oninput="handleSaleInput(this)" onfocus="this.select()">'
        + '<div id="vendu_' + p.id + '" class="v-vendu' + (vendu === null ? ' zero' : '') + '">' + (vendu === null ? '-' : vendu) + '</div>'
        + '<div id="perte_' + p.id + '" class="v-perte ' + perteCls + '">' + perteTxt + '</div>'
        + '<button id="rupt_' + p.id + '" class="v-rupture-btn ' + ruptCls + '" onclick="openRuptureModal(\'' + p.id + '\')">' + ruptTxt + '</button>'
        + '</div>';
    });
    html += '</div>';
  });
  mc.innerHTML = html;
}

function handleSaleInput(el) {
  const pid = el.dataset.pid, field = el.dataset.field, val = el.value;
  if (!salesData[pid]) salesData[pid] = { matin: '', aprem: '', reste: '', rupture_heure: '' };
  salesData[pid][field] = val;
  el.classList.toggle('has', val !== '');
  updateVendu(pid);
  clearTimeout(updateTimers['s_' + pid]);
  updateTimers['s_' + pid] = setTimeout(function() { upsertSale(pid); }, 400);
}

async function changeDate(delta) {
  const d = new Date(currentDate + 'T12:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  await loadSales(currentBoutique, currentDate);
  renderVentes();
}

// === MODAL RUPTURE ===
function openRuptureModal(pid) {
  rupturePid = pid;
  const p = products.find(function(x) { return x.id === pid; });
  document.getElementById('rupture-modal-product').textContent = p ? p.name : '';
  const cur = (salesData[pid] || {}).rupture_heure || '';
  const grid = document.getElementById('rupture-modal-grid');
  grid.innerHTML = HEURES_RUPTURE.map(function(h) {
    return '<button class="modal-btn ' + (h === cur ? 'selected' : '') + '" onclick="selectRupture(\'' + h + '\')">' + h + '</button>';
  }).join('');
  document.getElementById('rupture-modal').classList.add('show');
}

function closeRuptureModal() {
  document.getElementById('rupture-modal').classList.remove('show');
  rupturePid = null;
}

function selectRupture(h) {
  if (!rupturePid) return;
  if (!salesData[rupturePid]) salesData[rupturePid] = { matin: '', aprem: '', reste: '', rupture_heure: '' };
  salesData[rupturePid].rupture_heure = h;
  updateRuptureBtn(rupturePid);
  upsertSale(rupturePid);
  closeRuptureModal();
}

function clearRupture() {
  if (!rupturePid) return;
  if (!salesData[rupturePid]) salesData[rupturePid] = { matin: '', aprem: '', reste: '', rupture_heure: '' };
  salesData[rupturePid].rupture_heure = '';
  updateRuptureBtn(rupturePid);
  upsertSale(rupturePid);
  closeRuptureModal();
}

// === HELPERS ===
function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot'), text = document.getElementById('sync-text');
  dot.className = 'sync-dot ' + s;
  if (s === 'syncing') text.textContent = 'Synchronisation...';
  else if (s === 'ok') text.textContent = 'Synchronise';
  else if (s === 'error') text.textContent = 'Erreur';
}

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  setTimeout(function() { t.classList.add('show'); }, 10);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}
